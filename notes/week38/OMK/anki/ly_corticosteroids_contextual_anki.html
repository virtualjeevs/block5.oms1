<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contextual Anki — Ly: Pharmacology of Corticosteroids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --surface:#131929;
  --surface-2:#19223a;
  --surface-3:#1f2a42;
  --surface-4:#24314e;
  --amber:#f6a533;
  --amber-soft:rgba(246,165,51,.13);
  --amber-mid:rgba(246,165,51,.25);
  --amber-dim:rgba(246,165,51,.55);
  --teal:#2dd4bf;
  --teal-soft:rgba(45,212,191,.12);
  --teal-mid:rgba(45,212,191,.22);
  --teal-dim:rgba(45,212,191,.5);
  --green:#34d399;
  --green-soft:rgba(52,211,153,.13);
  --green-mid:rgba(52,211,153,.22);
  --red:#f87171;
  --red-soft:rgba(248,113,113,.12);
  --red-mid:rgba(248,113,113,.22);
  --text:#dde5f0;
  --text-2:#7e90a9;
  --text-3:#3e5065;
  --border:#1c2a40;
  --border-2:#243348;
  --hero-glow-a:rgba(45,212,191,.08);
  --hero-glow-b:rgba(246,165,51,.09);
  --bg-top:#0b0f1a;
  --bg-bottom:#0d1321;
  --map-shadow:0 20px 45px rgba(0,0,0,.22);
  --panel-shadow:0 22px 48px rgba(0,0,0,.24);
  --header-shadow:0 22px 50px rgba(0,0,0,.24);
}
html[data-theme="cream"]{
  --bg:#f4efe4;
  --surface:#fffaf1;
  --surface-2:#f6efe2;
  --surface-3:#efe5d3;
  --surface-4:#e4d5ba;
  --amber:#b86519;
  --amber-soft:rgba(184,101,25,.13);
  --amber-mid:rgba(184,101,25,.22);
  --amber-dim:rgba(184,101,25,.45);
  --teal:#0f8a7b;
  --teal-soft:rgba(15,138,123,.12);
  --teal-mid:rgba(15,138,123,.2);
  --teal-dim:rgba(15,138,123,.42);
  --green:#21885a;
  --green-soft:rgba(33,136,90,.12);
  --green-mid:rgba(33,136,90,.22);
  --red:#c65a52;
  --red-soft:rgba(198,90,82,.12);
  --red-mid:rgba(198,90,82,.22);
  --text:#2f2a24;
  --text-2:#6c5f51;
  --text-3:#a28d78;
  --border:#e4d5ba;
  --border-2:#d6c2a1;
  --hero-glow-a:rgba(15,138,123,.08);
  --hero-glow-b:rgba(184,101,25,.08);
  --bg-top:#f7f2e8;
  --bg-bottom:#efe7d9;
  --map-shadow:0 18px 40px rgba(106,80,45,.11);
  --panel-shadow:0 20px 42px rgba(106,80,45,.12);
  --header-shadow:0 18px 42px rgba(106,80,45,.12);
  --header-a:rgba(255,250,241,.96);
  --header-b:rgba(246,239,226,.92);
  --card-a:rgba(255,251,244,.98);
  --card-b:rgba(246,239,226,.98);
  --card-action-bg:rgba(239,229,211,.86);
  --nav-bg:rgba(246,239,226,.95);
  --nav-bg-hover:rgba(239,229,211,.98);
  --nav-text:#5f5141;
  --showall-bg:rgba(255,250,241,.92);
  --showall-text:#5f5141;
  --meta-bg:rgba(255,250,241,.8);
  --table-head-a:#0f8a7b;
  --table-head-b:#b86519;
}
html[data-theme="forest"]{
  --bg:#081512;
  --surface:#0f201b;
  --surface-2:#16302a;
  --surface-3:#1d4037;
  --surface-4:#28544a;
  --amber:#e4b04b;
  --amber-soft:rgba(228,176,75,.12);
  --amber-mid:rgba(228,176,75,.22);
  --amber-dim:rgba(228,176,75,.45);
  --teal:#52d6b7;
  --teal-soft:rgba(82,214,183,.12);
  --teal-mid:rgba(82,214,183,.2);
  --teal-dim:rgba(82,214,183,.42);
  --green:#7ae582;
  --green-soft:rgba(122,229,130,.12);
  --green-mid:rgba(122,229,130,.22);
  --red:#ff8b7a;
  --red-soft:rgba(255,139,122,.12);
  --red-mid:rgba(255,139,122,.22);
  --text:#e4f2ec;
  --text-2:#8fb6aa;
  --text-3:#54756b;
  --border:#1d3a32;
  --border-2:#295049;
  --hero-glow-a:rgba(82,214,183,.08);
  --hero-glow-b:rgba(228,176,75,.08);
  --bg-top:#081512;
  --bg-bottom:#0b1c18;
  --header-a:rgba(15,32,27,.96);
  --header-b:rgba(10,24,21,.92);
  --card-a:rgba(22,48,42,.98);
  --card-b:rgba(15,32,27,.98);
  --card-action-bg:rgba(29,64,55,.82);
  --nav-bg:rgba(22,48,42,.95);
  --nav-bg-hover:rgba(29,64,55,.98);
  --nav-text:#d0e9e0;
  --showall-bg:rgba(15,32,27,.86);
  --showall-text:#c7e7dc;
  --meta-bg:rgba(255,255,255,.04);
  --table-head-a:#1f7a67;
  --table-head-b:#d79f42;
}
html:not([data-theme]),html[data-theme="slate"]{
  --header-a:rgba(25,34,58,.78);
  --header-b:rgba(19,25,41,.56);
  --card-a:rgba(25,34,58,.98);
  --card-b:rgba(21,29,47,.98);
  --card-action-bg:rgba(31,42,66,.55);
  --nav-bg:rgba(25,34,58,.85);
  --nav-bg-hover:rgba(31,42,66,.98);
  --nav-text:#dde5f0;
  --showall-bg:rgba(255,255,255,.03);
  --showall-text:#7e90a9;
  --meta-bg:rgba(221,229,240,.04);
  --table-head-a:#2863d8;
  --table-head-b:#3d7bf4;
}
html{font-size:17px;-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 80px;
}
.wrap{width:100%;max-width:860px}

/* ── Header ── */
header{
  margin-bottom:32px;text-align:center;
  background:linear-gradient(180deg, var(--header-a), var(--header-b));
  border:1px solid var(--border-2);
  box-shadow:var(--header-shadow);
  border-radius:24px;
  padding:24px 20px 20px;
}
.hero-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap
}
.hero-copy{flex:1;min-width:240px}
.theme-switch{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end
}
.theme-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.theme-btn:hover{color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.theme-btn.active{
  background:var(--teal-soft);border-color:rgba(45,212,191,.24);color:var(--teal)
}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:10px;
}
h1{
  font-family:'Crimson Pro',serif;font-weight:600;
  font-size:clamp(32px,5vw,48px);line-height:1.05;
  letter-spacing:-.025em;color:var(--text);margin-bottom:6px;
}
.sub{font-size:14px;color:var(--text-2)}

/* ── Legend ── */
.legend{display:flex;gap:18px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-2)}
.lswatch{width:9px;height:9px;border-radius:50%}

/* ── Map ── */
.map-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:20px 16px 14px;margin-bottom:12px;
  overflow:hidden;
  box-shadow:var(--map-shadow);
}
/* SVG classes */
.c-gray rect{fill:var(--surface-3);stroke:var(--border-2);stroke-width:.5}
.c-gray .th{fill:var(--text);font-family:'Crimson Pro',serif;font-size:13px;font-weight:600}
.c-gray .ts{fill:var(--text-2);font-family:'DM Sans',sans-serif;font-size:10px}
.c-amber rect{fill:var(--amber-soft);stroke:var(--amber-dim);stroke-width:.75}
.c-amber .th{fill:var(--amber);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-amber .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.c-teal rect{fill:var(--teal-soft);stroke:var(--teal-dim);stroke-width:.75}
.c-teal .th{fill:var(--teal);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-teal .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.conn{stroke:var(--border-2);stroke-width:1;fill:none;opacity:.7}
.node{cursor:pointer;transition:filter .15s}
.node:hover{filter:brightness(1.25)}
.sel-node.c-amber rect{stroke:var(--amber)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(246,165,51,.5))}
.sel-node.c-teal rect{stroke:var(--teal)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(45,212,191,.4))}
.done-node{opacity:.45}
.hint-lbl{fill:var(--text-3);font-family:'DM Mono',monospace;font-size:9.5px;font-style:italic}

/* ── Panel ── */
.panel,.review-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:22px 20px;margin-bottom:12px;
  display:none;
  box-shadow:var(--panel-shadow);
}
.panel.open{display:block;animation:rise .22s ease-out}
.review-panel.open{display:block;border-color:rgba(246,165,51,.25);animation:rise .22s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.phead{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.badge{
  font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
}
.b-plo{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(246,165,51,.28)}
.b-lo{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(45,212,191,.25)}
.ptitle{font-size:15px;font-weight:500;color:var(--text);flex:1;line-height:1.4}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border-2);transition:background .2s}
.dot.active{background:var(--text)}
.dot.done{background:var(--green)}
.dot.partial{background:var(--amber)}
.xbtn{
  background:none;border:none;cursor:pointer;color:var(--text-3);
  font-size:20px;line-height:1;padding:2px 7px;border-radius:5px;
  transition:color .12s,background .12s;
}
.xbtn:hover{color:var(--text);background:var(--surface-3)}

/* ── Card ── */
.card{
  background:linear-gradient(180deg, var(--card-a), var(--card-b));
  border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.ctitle{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
}
.cbody{font-size:16px;line-height:1.9;color:var(--text)}

.card-actions{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
  gap:12px;margin-top:12px;padding:12px 14px;border-radius:14px;
  border:1px solid var(--border);background:var(--card-action-bg)
}
.card-meta{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--text-2);
  font-size:11px;font-family:'DM Mono',monospace
}
.meta-pill{
  padding:5px 10px;border-radius:999px;border:1px solid var(--border-2);
  background:var(--meta-bg)
}
.meta-pill strong{color:var(--text)}
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.action-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border-2);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:8px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.action-btn:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--surface-4)}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.action-btn.primary{
  background:var(--teal-soft);border-color:rgba(45,212,191,.22);color:var(--teal)
}
.action-btn.primary:hover:not(:disabled){background:var(--teal-mid);color:#dffef8}
.action-btn.amber{
  background:var(--amber-soft);border-color:rgba(246,165,51,.25);color:var(--amber)
}
.action-btn.amber:hover:not(:disabled){background:var(--amber-mid);color:#fff3df}
.action-btn.ghost{
  color:var(--text-3)
}

/* Table quiz */
.tblq-note{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:14px;
  line-height:1.5;
}
.tblq-copy{color:var(--text-2);flex:1;min-width:220px}
.tblq-actions{display:none}
.tblq-pill,.tblq-btn{
  border-radius:999px;padding:8px 14px;font-size:11px;
  font-family:'DM Mono',monospace
}
.tblq-pill{
  background:var(--teal-soft);border:1px solid rgba(45,212,191,.25);color:var(--teal)
}
.tblq-btn{
  background:none;border:1px solid var(--border-2);color:var(--text-2);cursor:pointer
}
.tblq-btn:hover{background:var(--surface-2);color:var(--text)}
.review-panel .tblq-actions{display:none}
.tblq-wrap{
  overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)
}
.tblq{
  width:100%;border-collapse:collapse;font-size:15px;line-height:1.6
}
.tblq thead th{
  background:linear-gradient(135deg,var(--table-head-a),var(--table-head-b));
  color:#f6f9ff;padding:14px 16px;text-align:left;font-weight:600;
  border-right:1px solid rgba(255,255,255,.08)
}
.tblq thead th:last-child{border-right:none}
.tblq tbody th[scope="row"]{
  background:rgba(221,229,240,.06);color:var(--text);font-weight:600;
  padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq tbody td{
  background:rgba(255,255,255,.02);padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq td .occ{
  display:block;text-align:center;white-space:normal;padding:10px 12px;min-width:180px
}
.tblq td .score-row{
  display:flex;justify-content:center;flex-wrap:wrap;margin:8px 0 0
}

/* Occluded terms */
.occ{
  display:inline-block;min-width:3ch;
  background:var(--text);color:transparent;
  border:1px solid transparent;
  border-radius:3px;cursor:pointer;padding:1px 6px;
  white-space:nowrap;user-select:none;
  vertical-align:baseline;
  transition:background .15s,color .15s,border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15)}
.occ.rev{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.25)}
.occ.needed{background:var(--amber-soft);color:var(--amber);cursor:default;border-color:rgba(246,165,51,.25)}
.occ.unscored{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.2)}

/* Score buttons */
.score-row{
  display:inline-flex;gap:3px;margin-left:5px;
  vertical-align:middle;animation:pop .15s ease-out;
}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.sbtn{
  font-size:9px;padding:1px 6px;border-radius:3px;cursor:pointer;
  font-family:'DM Mono',monospace;transition:background .1s,border-color .1s;
}
.sbtn.know{
  background:var(--green-soft);color:var(--green);
  border:1px solid rgba(52,211,153,.3);
}
.sbtn.know:hover{background:var(--green-mid)}
.sbtn.need{
  background:var(--red-soft);color:var(--red);
  border:1px solid rgba(248,113,113,.25);
}
.sbtn.need:hover{background:var(--red-mid)}

/* Jump links */
.jump{
  display:inline-flex;align-items:center;
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);background:var(--surface-3);
  border:1px solid var(--border-2);border-radius:3px;
  padding:1px 5px;margin-left:3px;cursor:pointer;
  vertical-align:middle;transition:all .12s;white-space:nowrap;
}
.jump.amber:hover{color:var(--amber);border-color:var(--amber-dim);background:var(--amber-soft)}
.jump.teal:hover{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-soft)}

/* Hint */
.hint{
  font-size:13px;color:var(--text-2);background:var(--surface-3);
  border-left:2px solid var(--border-2);border-radius:0 7px 7px 0;
  padding:9px 14px;margin-top:14px;line-height:1.65;
}
.hlbl{
  font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text-3);display:block;margin-bottom:4px;
}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
.nbtn{
  background:var(--nav-bg);border:1px solid var(--border);
  color:var(--nav-text);font-family:'DM Sans',sans-serif;font-size:13px;
  padding:9px 16px;border-radius:10px;cursor:pointer;
  transition:background .12s,color .12s;
}
.nbtn:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text)}
.nbtn:disabled{opacity:.25;cursor:not-allowed}
.nmc{display:flex;gap:10px;align-items:center}
.ncnt{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.showall{
  background:var(--showall-bg);border:1px solid var(--border);
  color:var(--showall-text);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .12s;
}
.showall:hover{color:var(--text);border-color:var(--border-2)}

/* Stats */
.stats{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 18px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:10px;
  box-shadow:0 18px 40px rgba(0,0,0,.2);
}
.stat{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.stat strong{color:var(--text)}
.sep{color:var(--border-2)}
.sactions{display:flex;gap:8px;align-items:center;margin-left:auto}
.sbtn-lite{
  background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;
  color:var(--text-2);font-family:'DM Mono',monospace;border-radius:999px;
  padding:7px 12px;transition:all .12s
}
.sbtn-lite:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.sbtn-lite:disabled{opacity:.35;cursor:not-allowed}
.review-btn{
  background:var(--amber-soft);border:1px solid rgba(246,165,51,.28);
  color:var(--amber);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;
  transition:all .12s;display:none;align-items:center;gap:5px;
}
.review-btn.vis{display:inline-flex}
.review-btn:hover{background:var(--amber-mid)}
.reset-btn{
  background:none;border:none;cursor:pointer;font-size:11px;
  color:var(--text-3);font-family:'DM Mono',monospace;
  text-decoration:underline;text-underline-offset:2px;
}
.reset-btn:hover{color:var(--text-2)}

/* Review panel */
.rhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rtitle{
  font-family:'Crimson Pro',serif;font-size:17px;font-weight:600;
  color:var(--amber);flex:1;
}
.rprog{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2)}
.rsub{
  font-size:11px;color:var(--text-2);font-family:'DM Mono',monospace;
  background:var(--surface-3);border:1px solid var(--border);
  padding:7px 12px;border-radius:7px;margin-bottom:14px;line-height:1.5;
}

/* Footer hint */
.kbhint{
  text-align:center;font-size:10px;color:var(--text-3);

// ═══════════════════════════════════════════════════

const D={
  ai:{label:'AI Types',sub:'Primary, secondary, tertiary, and acute adrenal insufficiency',type:'PLO',cards:[
    {t:'Primary adrenal insufficiency',b:'Primary AI (Addison\'s) = {direct damage to the adrenal glands} leading to hormone deficiency. Damage to the adrenal cortex causes reduced production of {cortisol and aldosterone}. High ACTH causes {hyperpigmentation}. Clinical: fatigue, weight loss, {hypotension}, {salt craving} (primary only), hyperpigmentation (primary only).',h:'Salt craving and hyperpigmentation are PRIMARY ONLY features. Alabaster-coloured pale skin is SECONDARY ONLY.'},
    {t:'Secondary adrenal insufficiency',b:'Secondary AI = {insufficient ACTH secretion} by the pituitary gland leading to {cortisol deficiency}. Pituitary dysfunction results in inadequate ACTH stimulation. Aldosterone is {usually normal} due to {renin-angiotensin} regulation. Typically {no hyperpigmentation} because ACTH is not elevated.',h:'Key differentiator: aldosterone is usually normal in secondary AI because zona glomerulosa is under RAAS, not ACTH.'},
    {t:'Tertiary adrenal insufficiency',b:'Tertiary AI is commonly {drug-induced from exogenous glucocorticoid use}. It is a {hypothalamic} problem, so the whole downstream axis is decreased. Aldosterone is {usually normal} because zona glomerulosa is under the {renin-angiotensin system}, not ACTH.',h:'Most common cause of tertiary AI = chronic steroid use causing HPA suppression. Abrupt withdrawal → crisis.'},
    {t:'Acute adrenal insufficiency (crisis)',b:'Adrenal crisis is a {true endocrine emergency} where death can occur. Most common precipitant: abrupt withdrawal from {supraphysiologic doses} or {chronic glucocorticoid usage} when the HPA axis is suppressed. Clinical: severe weakness, {abdominal or flank pain}, severe dehydration → {hypotension and shock}, tachycardia, {hypoglycemia}. Diagnosis: {rapid ACTH stimulation test}.',h:'Other precipitants: undiagnosed primary AI + major stress, or known primary AI + patient doesn\'t stress-dose during illness.'},
    {t:'Table quiz: AI types comparison',b:'<div class="tblq-note"><div class="tblq-copy">Adrenal insufficiency types — definition, mechanism, and clinical features.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Type</th><th>Definition</th><th>Mechanism</th><th>Key Clinical Features</th></tr></thead><tbody><tr><th scope="row">Primary (Addison\'s)</th><td>{Direct damage to adrenal glands → hormone deficiency}</td><td>{↓Cortisol + ↓Aldosterone; high ACTH → hyperpigmentation}</td><td>{Fatigue, weight loss, hypotension, salt craving, hyperpigmentation}</td></tr><tr><th scope="row">Secondary</th><td>{Insufficient ACTH from pituitary → cortisol deficiency}</td><td>{Inadequate ACTH stimulation; aldosterone usually normal (RAAS)}</td><td>{Fatigue, weight loss, hypotension; NO hyperpigmentation}</td></tr><tr><th scope="row">Acute Crisis</th><td>{Sudden life-threatening drop in cortisol}</td><td>{Triggered by stress in AI patient or abrupt GC withdrawal}</td><td>{Severe hypotension/shock, abdominal pain, vomiting, hypoglycemia}</td></tr></tbody></table></div>',h:'Primary = all hormones affected. Secondary = cortisol only (aldosterone spared). Acute = emergency requiring IV hydrocortisone.'},
    {t:'Table quiz: hormone level patterns',b:'<div class="tblq-note"><div class="tblq-copy">Where is the lesion? Hormone levels localize the defect.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Disease Type</th><th>Hypothalamus</th><th>Pituitary</th><th>Final Hormone</th></tr></thead><tbody><tr><th scope="row">Primary (gland)</th><td>{Increased (↑)}</td><td>{Increased (↑)}</td><td>{Decreased (↓)}</td></tr><tr><th scope="row">Secondary (pituitary)</th><td>{Increased (↑)}</td><td>{Decreased (↓)}</td><td>{Decreased (↓)}</td></tr><tr><th scope="row">Tertiary (hypothalamus)</th><td>{Decreased (↓)}</td><td>{Decreased (↓)}</td><td>{Decreased (↓)}</td></tr></tbody></table></div>',h:'Primary = upstream hormones GO UP. Secondary = pituitary + final BOTH DOWN, hypothalamus compensates up. Tertiary = everything DOWN.'}
  ]},
  potency:{label:'Potency',sub:'Synthetic corticosteroids — duration, potency, and equivalent doses',type:'PLO',cards:[
    {t:'Duration categories',b:'Short-acting (8–12 hrs): {hydrocortisone (cortisol)}. Intermediate-acting (12–36 hrs): {prednisone}, {prednisolone}, {methylprednisolone}, {triamcinolone}, {fludrocortisone}. Long-acting (36–72 hrs): {betamethasone} and {dexamethasone}.',h:'Quick anchor: hydrocortisone 20 mg = prednisone 5 mg = methylprednisolone 4 mg = dexamethasone 0.75 mg.'},
    {t:'Prednisone vs prednisolone',b:'{Prednisone} is a {prodrug} converted to {prednisolone} (active metabolite) in the {liver}. Both have GC potency {4} and MC potency {0.8} with equivalent dose {5 mg}. Prednisolone is preferred in patients with {liver disease} since it bypasses hepatic activation.',h:'This is a Ly favorite — know that prednisone requires hepatic conversion.'},
    {t:'Methylprednisolone and triamcinolone',b:'{Methylprednisolone} has GC potency {5}, MC potency {0.5}, equiv dose {4 mg} — {less mineralocorticoid effect} than prednisone; commonly used for {asthma, MS, lupus}. {Triamcinolone} has GC potency {5}, MC potency {0} (zero!), equiv dose {4 mg} — preferred for {rheumatologic conditions}.',h:'Triamcinolone = zero MC effect. Methylprednisolone = less MC than prednisone but not zero.'},
    {t:'Dexamethasone and betamethasone',b:'Both are long-acting with GC potency {25} and MC potency {0}. Equivalent dose = {0.75 mg}. {Dexamethasone} is used in {cerebral edema} and {Cushing\'s syndrome diagnosis}. {Betamethasone} is used for {fetal lung maturation} (potent anti-inflammatory).',h:'25× the GC potency of hydrocortisone with ZERO MC effect — these are the most potent GCs.'},
    {t:'Fludrocortisone potency',b:'{Fludrocortisone} has GC potency {10} but MC potency {125} — used only for {mineralocorticoid effects}. It is the commonly prescribed synthetic mineralocorticoid for {adrenal insufficiency} and {orthostatic hypotension}.',h:'Fludrocortisone has by far the highest MC potency of any synthetic corticosteroid (125×).'},
    {t:'Table quiz: potency comparison',b:'<div class="tblq-note"><div class="tblq-copy">Complete potency table — tap cells to test duration, GC, MC, and equivalent dose.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Drug</th><th>Duration</th><th>GC</th><th>MC</th><th>Equiv (mg)</th></tr></thead><tbody><tr><th scope="row">Hydrocortisone</th><td>{Short (8–12 h)}</td><td>{1}</td><td>{1}</td><td>{20}</td></tr><tr><th scope="row">Prednisone</th><td>{Intermediate (12–36 h)}</td><td>{4}</td><td>{0.8}</td><td>{5}</td></tr><tr><th scope="row">Methylprednisolone</th><td>{Intermediate}</td><td>{5}</td><td>{0.5}</td><td>{4}</td></tr><tr><th scope="row">Triamcinolone</th><td>{Intermediate}</td><td>{5}</td><td>{0}</td><td>{4}</td></tr><tr><th scope="row">Dexamethasone</th><td>{Long (36–72 h)}</td><td>{25}</td><td>{0}</td><td>{0.75}</td></tr><tr><th scope="row">Fludrocortisone</th><td>{Intermediate}</td><td>{10}</td><td>{125}</td><td>{MC only}</td></tr></tbody></table></div>',h:'Hydrocortisone is the reference standard (GC=1, MC=1, dose=20 mg). All others compared to it.'}
  ]},
  moa:{label:'MOA & ADME',sub:'Mechanism of action of GCs and MCs, and ADME of synthetic glucocorticoids',type:'PLO',cards:[
    {t:'Glucocorticoid MOA',b:'MOA of synthetic drugs is {just like natural cortisol}. The steroid binds to {glucocorticoid receptors (GRs)} in the {cytoplasm} of target cells. The receptor is initially bound to {heat shock proteins}. Once steroid binds, HSP falls off and a {dimer} forms. The dimer enters the {nucleus} → binds {GRE} → alters transcription → alters proteins → effect.',h:'GC MOA: steroid enters cell → binds cytoplasmic GR → HSP dissociates → dimerizes → nucleus → GRE → gene regulation.'},
    {t:'Mineralocorticoid MOA',b:'{Aldosterone} is the most important endogenous mineralocorticoid (salt-retaining activity). It binds {mineralocorticoid receptors (MRs)} in the {kidney, colon, and sweat glands} → increases {Na⁺ reabsorption} and {K⁺ excretion} by upregulating {Na⁺/K⁺ ATPase} and {ENaC} in the distal tubules.',h:'Net effect at collecting duct: sodium and water IN, potassium OUT.'},
    {t:'ADME of synthetic glucocorticoids',b:'Absorption: generally well absorbed after {oral} administration. Distribution: {wide distribution} to muscles, liver, skin, intestines, kidneys. Metabolism: primarily metabolized in the {liver} by {CYP450 enzymes}. Key conversion: {prednisone} (prodrug) → {prednisolone} (active metabolite). Excretion: excreted mainly via the {kidneys} as urine. When quick onset is needed, use {intravenous} administration.',h:'Remember: prednisone is a PRODRUG. Patients with liver disease should get prednisolone directly.'}
  ]},
  effects:{label:'Effects & AEs',sub:'Pharmacologic effects, adverse effects, and immune cell changes',type:'PLO',cards:[
    {t:'Anti-inflammatory & immunosuppressive',b:'GCs {downregulate pro-inflammatory genes and cytokines}, upregulate anti-inflammatory proteins, and reduce leukocyte migration. Adverse: increased risk of {infections}, {immunosuppression} ({leukocytosis — WBCs up}), {masks signs of infection}.',h:'TRANSACTIVATION: ↑ IL-10, Annexin A1, IκB. TRANSREPRESSION: ↓ IL-1, IL-2, IL-6, IL-8, COX-2, prostaglandins, TNF, IFN-γ.'},
    {t:'Immune cell effects',b:'{Neutrophil count increases} (demargination). {Lymphocytes, eosinophils, and basophils decrease} via promoted {apoptosis}. {Dendritic-cell maturation} is inhibited. {Macrophage} behavior shifts with dose effects.',h:'High-yield: GCs cause leukocytosis by increasing neutrophils while decreasing lymphocytes — a paradoxical WBC increase.'},
    {t:'Metabolic and bone effects',b:'Metabolic: GCs enhance {gluconeogenesis} in the liver, decrease peripheral glucose uptake, increase proteolysis → {hyperglycemia}, {Cushingoid appearance} (central obesity, buffalo hump). Bone: GCs {inhibit osteoblast activity} and increase {osteoclast-mediated bone resorption} → {osteoporosis}, fractures, decreased bone density.',h:'Cushingoid features from exogenous steroids mimic Cushing syndrome — fat redistribution, moon face, buffalo hump, muscle wasting.'},
    {t:'HPA axis suppression',b:'Exogenous GCs exert {negative feedback on the HPA axis}, reducing endogenous cortisol production → {adrenal suppression and atrophy}. Risk of {acute adrenal insufficiency if abruptly discontinued}. Must {taper corticosteroids} rather than stopping suddenly.',h:'This is the mechanism behind iatrogenic adrenal crisis — chronic GC use → HPA suppression → adrenal atrophy → sudden stop → crisis.'},
    {t:'Mineralocorticoid adverse effects',b:'Some corticosteroids activate {mineralocorticoid receptors} → {sodium and water retention} → {edema}, {hypertension}, {electrolyte imbalances} (hypokalemia, hypernatremia).',h:'MC AEs: Edema, Hypokalemia, Hypernatremia, Hypertension. GC AEs: Hyperglycemia, Peptic Ulcer, Fractures, Osteoporosis, Glaucoma, Adrenal suppression, Immunosuppression.'},
    {t:'Table quiz: effects and AEs',b:'<div class="tblq-note"><div class="tblq-copy">Effects of GCs with mechanisms and adverse effects.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Effect</th><th>Mechanism</th><th>Adverse Effects</th></tr></thead><tbody><tr><th scope="row">Anti-inflammatory</th><td>{↓Pro-inflammatory genes/cytokines; ↑anti-inflammatory proteins; ↓leukocyte migration}</td><td>{↑Infection risk, immunosuppression, masks infection signs}</td></tr><tr><th scope="row">Metabolic</th><td>{↑Gluconeogenesis; ↓peripheral glucose uptake; ↑proteolysis}</td><td>{Hyperglycemia, Cushingoid appearance}</td></tr><tr><th scope="row">Bone</th><td>{↓Osteoblasts; ↑osteoclast resorption}</td><td>{Osteoporosis, fractures, ↓bone density}</td></tr><tr><th scope="row">HPA Suppression</th><td>{Negative feedback → ↓endogenous cortisol}</td><td>{Adrenal atrophy; crisis if stopped abruptly}</td></tr><tr><th scope="row">MC Effects (CV)</th><td>{MR activation → Na⁺/water retention}</td><td>{Edema, HTN, hypokalemia}</td></tr></tbody></table></div>',h:'Key teaching point: all adverse effects are extensions of the normal pharmacologic actions when prolonged or excessive.'}
  ]},
  ddi:{label:'Drug Interactions',sub:'CYP3A inducers, inhibitors, and additive toxicities',type:'LO',cards:[
    {t:'CYP3A — the anchor enzyme',b:'CYP3A is the {anchor} enzyme for glucocorticoid metabolism. CYP3A {inducers} will {decrease} serum concentration → decreased efficacy. CYP3A {inhibitors} will {increase} serum concentration → increased toxicity.',h:'CYP3A inducers = less drug effect. CYP3A inhibitors = more drug effect (and toxicity). This is universal CYP logic.'},
    {t:'Specific inducers and inhibitors',b:'CYP3A INDUCERS (decrease GC levels): {nafcillin}, {rifampin}, {St. John\'s wort}. CYP3A INHIBITOR (increases GC levels): {clarithromycin}. Also know: which corticosteroid is {not affected to a clinically relevant degree} by CYP3A interactions?',h:'Ly specifically asks students to know which drug is NOT affected. Think about which GC doesn\'t need hepatic activation.'},
    {t:'Additive toxicities',b:'Drugs with additive toxicity when combined with GCs: {warfarin} (bleeding risk), {furosemide and HCTZ} (hypokalemia), {ciprofloxacin and levofloxacin} (tendon rupture), {metformin and insulin} (hyperglycemia opposition), {ibuprofen / NSAIDs} (GI bleeding), {oral antacids} (decreased GC absorption).',h:'Furosemide + GCs = double hypokalemia risk. Fluoroquinolones + GCs = tendon rupture risk. NSAIDs + GCs = GI bleed risk.'}
  ]},
  flud:{label:'Fludrocortisone',sub:'Mineralocorticoid focus — mechanism, clinical use, and adverse effects',type:'LO',cards:[
    {t:'Fludrocortisone mechanism and use',b:'{Fludrocortisone} is the synthetic corticosteroid and {commonly prescribed mineralocorticoid}. Its MOA is like natural {aldosterone} — it binds {mineralocorticoid receptors} in the kidney, resulting in {potassium excretion} and {sodium + water reabsorption} via upregulating Na⁺/K⁺ ATPase and ENaC.',h:'Fludrocortisone = synthetic aldosterone replacement. MC potency = 125 (by far the highest).'},
    {t:'Fludrocortisone adverse effects',b:'Expected AEs of fludrocortisone include: MC effects — {edema}, {hypokalemia}, {hypernatremia}, {hypertension}. GC effects (because GC potency = 10) — {hyperglycemia}, peptic ulcer, fractures, osteoporosis, glaucoma, {adrenal suppression}, {immunosuppression}.',h:'Fludrocortisone has both MC AND GC activity — so you get both sets of adverse effects.'}
  ]},
  tx:{label:'Treatment',sub:'Acute adrenal crisis emergency management and chronic replacement therapy',type:'LO',cards:[
    {t:'Acute adrenal crisis Tx',b:'Emergency treatment requires {parenteral glucocorticoids}: {IV hydrocortisone} (interferes with ACTH stimulation test) or {IV dexamethasone} (does {not} interfere with ACTH stimulation test). Also: {fluid replacement} with IV normal saline or {IV dextrose 5% in normal saline (D5NS)}. Consider mineralocorticoid replacement with {fludrocortisone acetate}.',h:'If you need to run an ACTH stim test to confirm the diagnosis, use dexamethasone — it won\'t interfere with the assay.'},
    {t:'Maintenance therapy',b:'Agents of choice: {hydrocortisone} or {prednisone}. Dosing: {67%} of daily dose given in the {morning}, remainder ({33%}) given {6–8 hours later} (mimics circadian rhythm). In {primary adrenal insufficiency}, {fludrocortisone acetate} can supplement mineralocorticoid loss. Fludrocortisone may be unnecessary because GCs at large doses can also bind {mineralocorticoid receptors}.',h:'The 2/3 AM + 1/3 PM dosing schedule mimics the natural cortisol circadian pattern — peak in early morning.'},
    {t:'Counseling and taper',b:'Counsel patients on expected treatment outcomes, consequences of {missed doses}, and drug side effects. Patients on chronic GCs must {never abruptly discontinue} — always {taper slowly}. Patients should carry a {medical alert card} and understand {stress dosing} protocols.',h:'Abrupt withdrawal from chronic GCs = most common cause of adrenal crisis in clinical practice.'}
  ]},
  cases:{label:'Cases',sub:'Clinical integration cases and high-yield pattern recognition',type:'LO',cards:[
    {t:'Case 1: Abrupt GC withdrawal',b:'Long-term {prednisone} + {abrupt discontinuation} = think {HPA-axis suppression} with risk of {acute adrenal insufficiency}. The HPA axis was suppressed by chronic exogenous GC → adrenal atrophy → sudden removal of exogenous cortisol → crisis.',h:'This is the classic iatrogenic adrenal crisis scenario — always taper, never stop abruptly.'},
    {t:'Case 2: Addison\'s disease',b:'{Hyperpigmentation} + {hyponatremia} + {hyperkalemia} + {acidosis} + abnormal {ACTH stimulation test} = think {primary adrenal insufficiency / Addison\'s disease}. High ACTH (from loss of cortisol feedback) contains the α-MSH sequence → melanocyte stimulation → darkened skin.',h:'This is the classic primary AI presentation. All three electrolyte findings (hyponatremia, hyperkalemia, acidosis) come from aldosterone deficiency.'},
    {t:'Clinical manifestations summary',b:'Symptoms of AI include: fatigue, lack of energy, {anorexia and weight loss}, gastric pain/nausea/vomiting ({most common in primary}), myalgia, joint pain, dizziness, {salt craving} (primary only), {hyperpigmentation} (primary only), {alabaster-coloured pale skin} (secondary only), low BP, postural hypotension, dehydration.',h:'Three features unique to PRIMARY: salt craving, hyperpigmentation, and GI symptoms being most common. One feature unique to SECONDARY: pale/alabaster skin.'}
  ]}
};

const LINKS={
  'cortisol deficiency':['ai','AI Types','amber'],
  'hyperpigmentation':['ai','AI Types','amber'],
  'acute adrenal insufficiency':['ai','AI Types','amber'],
  'hydrocortisone':['potency','Potency','amber'],
  'prednisone':['potency','Potency','amber'],
  'prednisolone':['potency','Potency','amber'],
  'dexamethasone':['potency','Potency','amber'],
  'methylprednisolone':['potency','Potency','amber'],
  'glucocorticoid receptors (GRs)':['moa','MOA & ADME','amber'],
  'mineralocorticoid receptors':['moa','MOA & ADME','amber'],
  'fludrocortisone':['flud','Fludrocortisone','teal'],
  'fludrocortisone acetate':['flud','Fludrocortisone','teal'],
  'Fludrocortisone':['flud','Fludrocortisone','teal'],
  'IV hydrocortisone':['tx','Treatment','teal'],
  'IV dexamethasone':['tx','Treatment','teal'],
  'taper corticosteroids':['tx','Treatment','teal'],
  'adrenal suppression and atrophy':['effects','Effects & AEs','amber'],
  'CYP450 enzymes':['ddi','Drug Interactions','teal'],
  'clarithromycin':['ddi','Drug Interactions','teal'],
  'rifampin':['ddi','Drug Interactions','teal']
};

const DECK_ID='ly_corticosteroids_pharm';
const THEME_STORAGE_KEY=`${DECK_ID}_theme`;

function setTheme(theme){
  const next=theme||'slate';
  if(next==='slate') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',next);
  document.querySelectorAll('.theme-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.theme===next);
  });
  try{localStorage.setItem(THEME_STORAGE_KEY,next);}catch(e){}
}

try{
  setTheme(localStorage.getItem(THEME_STORAGE_KEY)||'slate');
}catch(e){
  setTheme('slate');
}

document.getElementById('deckMeta').textContent=`Active recall map · ${Object.keys(D).length} topics · ${Object.values(D).reduce((n,node)=>n+node.cards.length,0)} cards`;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let cur=null, ci=0;
let tr={};       // tr[nid][cardIdx] = Set<termIdx>
let sc={};       // sc[nid][cardIdx][termIdx] = 'knew'|'needed'
let done=new Set();
let totRev=0, totKnew=0, totNeed=0;
let revQueue=[], revIdx=0, revTr={};
const PROGRESS_COOKIE=`${DECK_ID}_progress_v1`;

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function nT(b){return(b.match(/\{[^}]+\}/g)||[]).length}

function initNode(id){
  if(!tr[id]){
    tr[id]={};sc[id]={};
    D[id].cards.forEach((_,i)=>{tr[id][i]=new Set();sc[id][i]={}});
  }
}

function setCookie(name,value,days){
  const maxAge=days*24*60*60;
  document.cookie=`${name}=${encodeURIComponent(value)}; path=/; max-age=${maxAge}; SameSite=Lax`;
}

function getCookie(name){
  const prefix=`${name}=`;
  return document.cookie.split('; ').reduce((found,part)=>{
    if(found!==null) return found;
    return part.indexOf(prefix)===0 ? decodeURIComponent(part.slice(prefix.length)) : null;
  },null);
}

function clearCookie(name){
  document.cookie=`${name}=; path=/; max-age=0; SameSite=Lax`;
}

function serializeProgress(){
  const state={c:cur||'',i:ci||0,r:{},s:{}};
  Object.keys(tr).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const set=tr[nid][cardIdx];
      return set&&set.size ? Array.from(set).sort((a,b)=>a-b).join('.') : '';
    });
    if(rows.some(Boolean)) state.r[nid]=rows;
  });
  Object.keys(sc).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const obj=sc[nid][cardIdx]||{};
      const packed=Object.keys(obj).sort((a,b)=>parseInt(a)-parseInt(b)).map(idx=>`${idx}${obj[idx]==='knew'?'k':'n'}`).join('.');
      return packed;
    });
    if(rows.some(Boolean)) state.s[nid]=rows;
  });
  return JSON.stringify(state);
}

function saveProgress(){
  try{
    setCookie(PROGRESS_COOKIE,serializeProgress(),180);
  }catch(e){}
}

function loadProgress(){
  const raw=getCookie(PROGRESS_COOKIE);
  if(!raw) return;
  try{
    const state=JSON.parse(raw);
    tr={};sc={};

    Object.keys(D).forEach(nid=>{
      initNode(nid);
      const revealedRows=(state.r&&state.r[nid])||[];
      revealedRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(v=>{
          if(v==='') return;
          tr[nid][cardIdx].add(parseInt(v,10));
        });
      });

      const scoredRows=(state.s&&state.s[nid])||[];
      scoredRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(token=>{
          if(!token) return;
          const score=token.slice(-1)==='k' ? 'knew' : 'needed';
          const idx=parseInt(token.slice(0,-1),10);
          if(!Number.isNaN(idx)) sc[nid][cardIdx][idx]=score;
        });
      });
    });

    if(state.c&&D[state.c]){
      cur=state.c;
      ci=Math.max(0,Math.min(D[cur].cards.length-1,parseInt(state.i,10)||0));
    }
  }catch(e){
    clearCookie(PROGRESS_COOKIE);
  }
}

function cardMetrics(nid,cidx){
  initNode(nid);
  const total=nT(D[nid].cards[cidx].b);
  const revealed=tr[nid][cidx].size;
  let unscored=0, knew=0, needed=0;
  for(let i=0;i<total;i++){
    const score=sc[nid][cidx][i];
    if(score==='knew') knew++;
    else if(score==='needed') needed++;
    else if(tr[nid][cidx].has(i)) unscored++;
  }
  return {total,revealed,unscored,knew,needed,allRevealed:total>0&&revealed>=total};
}

function parseBody(body, nid, cidx, opts={}){
  // opts: {forReview, targetTermIdx}
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    let revealed, scored;

    if(opts.forReview){
      revealed=opts.revealedSet ? opts.revealedSet.has(idx) : false;
      scored=null;
    } else {
      revealed=tr[nid]&&tr[nid][cidx]&&tr[nid][cidx].has(idx);
      scored=revealed&&sc[nid]&&sc[nid][cidx] ? (sc[nid][cidx][idx]||null) : null;
    }

    const link=LINKS[t];
    const showJump=revealed&&link&&link[0]!==nid;
    const isTarget=opts.forReview&&opts.targetTermIdx===idx;

    let cls='occ';
    if(revealed||isTarget){
      if(scored==='knew') cls+=' rev';
      else if(scored==='needed') cls+=' needed';
      else cls+=' unscored';
    }

    const da=opts.forReview?'':`data-nid="${nid}" data-ci="${cidx}" data-i="${idx}"`;
    const onclick=(!revealed&&!opts.forReview)?` onclick="revTerm(this)"`
      :(opts.forReview&&isTarget&&!opts.revealedSet?.has(idx))?' onclick="revRevTerm(this)"':'';

    let html=`<span class="${cls}"${da}${onclick}>${t}</span>`;

    if(revealed&&!scored&&!opts.forReview){
      html+=`<span class="score-row" data-nid="${nid}" data-ci="${cidx}" data-i="${idx}">`+
        `<button class="sbtn know" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button>`+
        `<button class="sbtn need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button>`+
        `</span>`;
    }
    if(showJump){
      html+=`<span class="jump ${link[2]}" onclick="jumpNode('${link[0]}',event)" title="Jump to ${link[1]}">→ ${link[1]}</span>`;
    }
    return html;
  });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const d=D[cur].cards[ci];
  const m=cardMetrics(cur,ci);

  // Dots
  document.getElementById('dots').innerHTML=D[cur].cards.map((_,i)=>{
    const tot=nT(D[cur].cards[i].b),got=tr[cur][i].size;
    const cls=i===ci?'active':got>=tot&&tot>0?'done':got>0?'partial':'';
    return `<span class="dot ${cls}"></span>`;
  }).join('');

  document.getElementById('cnt').textContent=`${ci+1} / ${D[cur].cards.length}`;
  document.getElementById('bprev').disabled=ci===0;
  document.getElementById('bnext').disabled=ci===D[cur].cards.length-1;
  document.getElementById('revealTopicBtn').disabled=!cur;

  document.getElementById('ccard').innerHTML=
    `<div class="ctitle">${d.t}</div>`+
    `<div class="cbody">${parseBody(d.b,cur,ci)}</div>`+
    (d.h?`<div class="hint"><span class="hlbl">Clinical note</span>${d.h}</div>`:'');

  document.getElementById('cardActions').innerHTML=
    `<div class="card-meta">`+
      `<span class="meta-pill"><strong>${m.revealed}</strong> / ${m.total} revealed</span>`+
      `<span class="meta-pill"><strong>${m.knew}</strong> knew</span>`+
      `<span class="meta-pill"><strong>${m.needed}</strong> needed help</span>`+
      (m.unscored?`<span class="meta-pill"><strong>${m.unscored}</strong> waiting to score</span>`:'')+
    `</div>`+
    `<div class="action-row">`+
      `<button class="action-btn primary" onclick="revealAll()" ${m.total===0||m.allRevealed?'disabled':''}>Reveal this card</button>`+
      `<button class="action-btn amber" onclick="knewAllCurrentCard()" ${!m.allRevealed?'disabled':''}>Knew all</button>`+
      `<button class="action-btn ghost" onclick="resetCard()" ${m.revealed===0&&m.knew===0&&m.needed===0?'disabled':''}>Reset this card</button>`+
    `</div>`;
}

function renderReview(){
  if(!revQueue.length) return;
  const q=revQueue[revIdx];
  const revSet=revTr[revIdx]||new Set();

  document.getElementById('rprog').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rcnt').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rsub').innerHTML=
    `<strong>${D[q.nid].label} — ${q.card.t}</strong><br>`+
    `Term to recall: <span style="color:var(--amber)">${q.term}</span>`;
  document.getElementById('rbprev').disabled=revIdx===0;
  document.getElementById('rbnext').disabled=revIdx===revQueue.length-1;

  // Build card body: only the target term is blanked; others shown in dim text
  let i=0;
  const body=q.card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    const isTarget=idx===q.tidx;
    const isRevealed=revSet.has(idx);
    if(isTarget){
      if(isRevealed){
        return `<span class="occ needed">${t}</span>`;
      } else {
        return `<span class="occ" onclick="revRevTerm()" style="cursor:pointer">${t}</span>`;
      }
    }
    return `<span style="color:var(--text-2)">${t}</span>`;
  });

  document.getElementById('rccard').innerHTML=
    `<div class="ctitle">${q.card.t}</div>`+
    `<div class="cbody">${body}</div>`+
    (q.card.h?`<div class="hint"><span class="hlbl">Clinical note</span>${q.card.h}</div>`:'');
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function selNode(id){
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  document.getElementById('n-'+id).classList.add('sel-node');
  cur=id;ci=0;
  initNode(id);
  const p=document.getElementById('panel');
  p.classList.add('open');
  const d=D[id];
  const b=document.getElementById('bdg');
  b.textContent=d.label;
  b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
  document.getElementById('ptitle').textContent=d.sub;
  render();
  saveProgress();
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function jumpNode(id,e){
  e.stopPropagation();
  selNode(id);
}

function revTerm(s){
  if(s.classList.contains('rev')||s.classList.contains('needed')||s.classList.contains('unscored')) return;
  const nid=s.dataset.nid,cidx=parseInt(s.dataset.ci),tidx=parseInt(s.dataset.i);
  initNode(nid);
  tr[nid][cidx].add(tidx);
  totRev++;
  updStats();
  render();
}

function scoreIt(e,nid,cidx,tidx,score){
  e.stopPropagation();
  if(sc[nid][cidx][tidx]) return; // already scored
  sc[nid][cidx][tidx]=score;
  if(score==='knew') totKnew++;
  else totNeed++;
  chkDone(nid);
  updStats();
  render();
}

function revealAll(){
  const d=D[cur].cards[ci];
  const n=nT(d.b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){tr[cur][ci].add(i);totRev++;}
  }
  chkDone(cur);updStats();render();
}

function knewAllCurrentCard(){
  if(!cur) return;
  initNode(cur);
  const n=nT(D[cur].cards[ci].b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){
      tr[cur][ci].add(i);
      totRev++;
    }
    const prev=sc[cur][ci][i];
    if(prev==='needed') totNeed--;
    if(prev!=='knew') totKnew++;
    sc[cur][ci][i]='knew';
  }
  chkDone(cur);
  updStats();
  render();
}

function revealNodeCards(nid){
  initNode(nid);
  D[nid].cards.forEach((card,cidx)=>{
    const n=nT(card.b);
    for(let i=0;i<n;i++){
      if(!tr[nid][cidx].has(i)){
        tr[nid][cidx].add(i);
        totRev++;
      }
    }
    chkDone(nid);
  });
}

function revealTopic(){
  if(!cur) return;
  revealNodeCards(cur);
  updStats();
  render();
}

function revealDeck(){
  Object.keys(D).forEach(nid=>revealNodeCards(nid));
  updStats();
  if(cur) render();
}

function goCard(dir){
  ci=Math.max(0,Math.min(D[cur].cards.length-1,ci+dir));
  render();
  saveProgress();
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  cur=null;
  document.getElementById('revealTopicBtn').disabled=true;
  saveProgress();
}

function chkDone(id){
  const all=D[id].cards.every((_,i)=>{
    const t=nT(D[id].cards[i].b);
    return t===0||tr[id][i].size>=t;
  });
  if(all){
    done.add(id);
    document.getElementById('n-'+id).classList.add('done-node');
  }
}

function countNeeded(){
  let n=0;
  Object.keys(sc).forEach(nid=>Object.keys(sc[nid]).forEach(cidx=>
    Object.values(sc[nid][cidx]).forEach(v=>{if(v==='needed')n++})
  ));
  return n;
}

function updStats(){
  document.getElementById('st-rev').textContent=totRev;
  document.getElementById('st-knew').textContent=totKnew;
  document.getElementById('st-need').textContent=totNeed;
  document.getElementById('st-done').textContent=done.size;
  const n=countNeeded();
  document.getElementById('rcount').textContent=n;
  document.getElementById('reviewBtn').classList.toggle('vis',n>0);
  saveProgress();
}

function recalcState(){
  totRev=0;totKnew=0;totNeed=0;done=new Set();
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('done-node'));

  Object.keys(D).forEach(nid=>{
    let all=true;
    D[nid].cards.forEach((card,i)=>{
      const got=tr[nid]&&tr[nid][i]?tr[nid][i].size:0;
      const tot=nT(card.b);
      totRev+=got;
      Object.values(sc[nid]&&sc[nid][i]?sc[nid][i]:{}).forEach(v=>{
        if(v==='knew') totKnew++;
        else if(v==='needed') totNeed++;
      });
      if(!(tot===0||got>=tot)) all=false;
    });
    if(all){
      done.add(nid);
      const el=document.getElementById('n-'+nid);
      if(el) el.classList.add('done-node');
    }
  });

  updStats();
}

function resetCard(){
  if(!cur) return;
  initNode(cur);
  tr[cur][ci]=new Set();
  sc[cur][ci]={};
  closeReview();
  recalcState();
  render();
}

function resetAll(){
  tr={};sc={};done.clear();
  totRev=0;totKnew=0;totNeed=0;
  document.querySelectorAll('svg .node').forEach(g=>{
    g.classList.remove('sel-node','done-node');
  });
  document.getElementById('revealTopicBtn').disabled=!cur;
  updStats();
  closeReview();
  if(cur){initNode(cur);render();}
}

// ═══════════════════════════════════════════════════
// REVIEW (SPACED REP)
// ═══════════════════════════════════════════════════
function startReview(){
  revQueue=[];
  Object.keys(sc).forEach(nid=>{
    Object.keys(sc[nid]).forEach(cidx=>{
      const card=D[nid].cards[parseInt(cidx)];
      let termIdx=0;
      card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
        const i=termIdx++;
        if(sc[nid][cidx][i]==='needed'){
          revQueue.push({nid,cidx:parseInt(cidx),tidx:i,term:t,card});
        }
      });
    });
  });
  // Fisher-Yates shuffle
  for(let i=revQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [revQueue[i],revQueue[j]]=[revQueue[j],revQueue[i]];
  }
  revIdx=0;revTr={};
  if(!revQueue.length) return;
  const rp=document.getElementById('reviewPanel');
  rp.classList.add('open');
  rp.scrollIntoView({behavior:'smooth',block:'nearest'});
  renderReview();
}

function revRevTerm(){
  if(!revTr[revIdx]) revTr[revIdx]=new Set();
  revTr[revIdx].add(revQueue[revIdx].tidx);
  renderReview();
}

function revAllReview(){revRevTerm();}

function goReview(dir){
  revIdx=Math.max(0,Math.min(revQueue.length-1,revIdx+dir));
  renderReview();
}

function closeReview(){
  document.getElementById('reviewPanel').classList.remove('open');
}

function restoreSession(){
  loadProgress();
  recalcState();
  if(cur&&D[cur]){
    document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
    const nodeEl=document.getElementById('n-'+cur);
    if(nodeEl) nodeEl.classList.add('sel-node');
    const d=D[cur];
    const p=document.getElementById('panel');
    p.classList.add('open');
    const b=document.getElementById('bdg');
    b.textContent=d.label;
    b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
    document.getElementById('ptitle').textContent=d.sub;
    document.getElementById('revealTopicBtn').disabled=false;
    render();
  }else{
    document.getElementById('revealTopicBtn').disabled=true;
  }
}

restoreSession();

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inRev=document.getElementById('reviewPanel').classList.contains('open');
  if(inRev){
    if(e.key==='ArrowLeft'){e.preventDefault();goReview(-1)}
    else if(e.key==='ArrowRight'){e.preventDefault();goReview(1)}
    else if(e.key==='Escape') closeReview();
    return;
  }
  if(!cur) return;
  if(e.key==='ArrowLeft'){e.preventDefault();goCard(-1)}
  else if(e.key==='ArrowRight'){e.preventDefault();goCard(1)}
  else if(e.key==='Escape') closePanel();
});
</script>
</body>
