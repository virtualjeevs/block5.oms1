<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reproductive Steroids & CAH — Active Recall Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --surface:#131929;
  --surface-2:#19223a;
  --surface-3:#1f2a42;
  --surface-4:#24314e;
  --amber:#f6a533;
  --amber-soft:rgba(246,165,51,.13);
  --amber-mid:rgba(246,165,51,.25);
  --amber-dim:rgba(246,165,51,.55);
  --teal:#2dd4bf;
  --teal-soft:rgba(45,212,191,.12);
  --teal-mid:rgba(45,212,191,.22);
  --teal-dim:rgba(45,212,191,.5);
  --green:#34d399;
  --green-soft:rgba(52,211,153,.13);
  --green-mid:rgba(52,211,153,.22);
  --red:#f87171;
  --red-soft:rgba(248,113,113,.12);
  --red-mid:rgba(248,113,113,.22);
  --text:#dde5f0;
  --text-2:#7e90a9;
  --text-3:#3e5065;
  --border:#1c2a40;
  --border-2:#243348;
  --hero-glow-a:rgba(45,212,191,.08);
  --hero-glow-b:rgba(246,165,51,.09);
  --bg-top:#0b0f1a;
  --bg-bottom:#0d1321;
  --map-shadow:0 20px 45px rgba(0,0,0,.22);
  --panel-shadow:0 22px 48px rgba(0,0,0,.24);
  --header-shadow:0 22px 50px rgba(0,0,0,.24);
}
html[data-theme="cream"]{
  --bg:#f4efe4;
  --surface:#fffaf1;
  --surface-2:#f6efe2;
  --surface-3:#efe5d3;
  --surface-4:#e4d5ba;
  --amber:#b86519;
  --amber-soft:rgba(184,101,25,.13);
  --amber-mid:rgba(184,101,25,.22);
  --amber-dim:rgba(184,101,25,.45);
  --teal:#0f8a7b;
  --teal-soft:rgba(15,138,123,.12);
  --teal-mid:rgba(15,138,123,.2);
  --teal-dim:rgba(15,138,123,.42);
  --green:#21885a;
  --green-soft:rgba(33,136,90,.12);
  --green-mid:rgba(33,136,90,.22);
  --red:#c65a52;
  --red-soft:rgba(198,90,82,.12);
  --red-mid:rgba(198,90,82,.22);
  --text:#2f2a24;
  --text-2:#6c5f51;
  --text-3:#a28d78;
  --border:#e4d5ba;
  --border-2:#d6c2a1;
  --hero-glow-a:rgba(15,138,123,.08);
  --hero-glow-b:rgba(184,101,25,.08);
  --bg-top:#f7f2e8;
  --bg-bottom:#efe7d9;
  --map-shadow:0 18px 40px rgba(106,80,45,.11);
  --panel-shadow:0 20px 42px rgba(106,80,45,.12);
  --header-shadow:0 18px 42px rgba(106,80,45,.12);
  --header-a:rgba(255,250,241,.96);
  --header-b:rgba(246,239,226,.92);
  --card-a:rgba(255,251,244,.98);
  --card-b:rgba(246,239,226,.98);
  --card-action-bg:rgba(239,229,211,.86);
  --nav-bg:rgba(246,239,226,.95);
  --nav-bg-hover:rgba(239,229,211,.98);
  --nav-text:#5f5141;
  --showall-bg:rgba(255,250,241,.92);
  --showall-text:#5f5141;
  --meta-bg:rgba(255,250,241,.8);
  --table-head-a:#0f8a7b;
  --table-head-b:#b86519;
}
html[data-theme="forest"]{
  --bg:#081512;
  --surface:#0f201b;
  --surface-2:#16302a;
  --surface-3:#1d4037;
  --surface-4:#28544a;
  --amber:#e4b04b;
  --amber-soft:rgba(228,176,75,.12);
  --amber-mid:rgba(228,176,75,.22);
  --amber-dim:rgba(228,176,75,.45);
  --teal:#52d6b7;
  --teal-soft:rgba(82,214,183,.12);
  --teal-mid:rgba(82,214,183,.2);
  --teal-dim:rgba(82,214,183,.42);
  --green:#7ae582;
  --green-soft:rgba(122,229,130,.12);
  --green-mid:rgba(122,229,130,.22);
  --red:#ff8b7a;
  --red-soft:rgba(255,139,122,.12);
  --red-mid:rgba(255,139,122,.22);
  --text:#e4f2ec;
  --text-2:#8fb6aa;
  --text-3:#54756b;
  --border:#1d3a32;
  --border-2:#295049;
  --hero-glow-a:rgba(82,214,183,.08);
  --hero-glow-b:rgba(228,176,75,.08);
  --bg-top:#081512;
  --bg-bottom:#0b1c18;
  --header-a:rgba(15,32,27,.96);
  --header-b:rgba(10,24,21,.92);
  --card-a:rgba(22,48,42,.98);
  --card-b:rgba(15,32,27,.98);
  --card-action-bg:rgba(29,64,55,.82);
  --nav-bg:rgba(22,48,42,.95);
  --nav-bg-hover:rgba(29,64,55,.98);
  --nav-text:#d0e9e0;
  --showall-bg:rgba(15,32,27,.86);
  --showall-text:#c7e7dc;
  --meta-bg:rgba(255,255,255,.04);
  --table-head-a:#1f7a67;
  --table-head-b:#d79f42;
}
html:not([data-theme]),html[data-theme="slate"]{
  --header-a:rgba(25,34,58,.78);
  --header-b:rgba(19,25,41,.56);
  --card-a:rgba(25,34,58,.98);
  --card-b:rgba(21,29,47,.98);
  --card-action-bg:rgba(31,42,66,.55);
  --nav-bg:rgba(25,34,58,.85);
  --nav-bg-hover:rgba(31,42,66,.98);
  --nav-text:#dde5f0;
  --showall-bg:rgba(255,255,255,.03);
  --showall-text:#7e90a9;
  --meta-bg:rgba(221,229,240,.04);
  --table-head-a:#2863d8;
  --table-head-b:#3d7bf4;
}
html{font-size:17px;-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 80px;
}
.wrap{width:100%;max-width:860px}

/* ── Header ── */
header{
  margin-bottom:32px;text-align:center;
  background:linear-gradient(180deg, var(--header-a), var(--header-b));
  border:1px solid var(--border-2);
  box-shadow:var(--header-shadow);
  border-radius:24px;
  padding:24px 20px 20px;
}
.hero-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap
}
.hero-copy{flex:1;min-width:240px}
.theme-switch{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end
}
.theme-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.theme-btn:hover{color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.theme-btn.active{
  background:var(--teal-soft);border-color:rgba(45,212,191,.24);color:var(--teal)
}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:10px;
}
h1{
  font-family:'Crimson Pro',serif;font-weight:600;
  font-size:clamp(32px,5vw,48px);line-height:1.05;
  letter-spacing:-.025em;color:var(--text);margin-bottom:6px;
}
.sub{font-size:14px;color:var(--text-2)}

/* ── Legend ── */
.legend{display:flex;gap:18px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-2)}
.lswatch{width:9px;height:9px;border-radius:50%}

/* ── Map ── */
.map-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:20px 16px 14px;margin-bottom:12px;
  overflow:hidden;
  box-shadow:var(--map-shadow);
}
/* SVG classes */
.c-gray rect{fill:var(--surface-3);stroke:var(--border-2);stroke-width:.5}
.c-gray .th{fill:var(--text);font-family:'Crimson Pro',serif;font-size:13px;font-weight:600}
.c-gray .ts{fill:var(--text-2);font-family:'DM Sans',sans-serif;font-size:10px}
.c-amber rect{fill:var(--amber-soft);stroke:var(--amber-dim);stroke-width:.75}
.c-amber .th{fill:var(--amber);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-amber .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.c-teal rect{fill:var(--teal-soft);stroke:var(--teal-dim);stroke-width:.75}
.c-teal .th{fill:var(--teal);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-teal .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.conn{stroke:var(--border-2);stroke-width:1;fill:none;opacity:.7}
.node{cursor:pointer;transition:filter .15s}
.node:hover{filter:brightness(1.25)}
.sel-node.c-amber rect{stroke:var(--amber)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(246,165,51,.5))}
.sel-node.c-teal rect{stroke:var(--teal)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(45,212,191,.4))}
.done-node{opacity:.45}
.hint-lbl{fill:var(--text-3);font-family:'DM Mono',monospace;font-size:9.5px;font-style:italic}

/* ── Panel ── */
.panel,.review-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:22px 20px;margin-bottom:12px;
  display:none;
  box-shadow:var(--panel-shadow);
}
.panel.open{display:block;animation:rise .22s ease-out}
.review-panel.open{display:block;border-color:rgba(246,165,51,.25);animation:rise .22s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.phead{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.badge{
  font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
}
.b-plo{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(246,165,51,.28)}
.b-lo{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(45,212,191,.25)}
.ptitle{font-size:15px;font-weight:500;color:var(--text);flex:1;line-height:1.4}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border-2);transition:background .2s}
.dot.active{background:var(--text)}
.dot.done{background:var(--green)}
.dot.partial{background:var(--amber)}
.xbtn{
  background:none;border:none;cursor:pointer;color:var(--text-3);
  font-size:20px;line-height:1;padding:2px 7px;border-radius:5px;
  transition:color .12s,background .12s;
}
.xbtn:hover{color:var(--text);background:var(--surface-3)}

/* ── Card ── */
.card{
  background:linear-gradient(180deg, var(--card-a), var(--card-b));
  border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.ctitle{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
}
.cbody{font-size:16px;line-height:1.9;color:var(--text)}

.card-actions{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
  gap:12px;margin-top:12px;padding:12px 14px;border-radius:14px;
  border:1px solid var(--border);background:var(--card-action-bg)
}
.card-meta{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--text-2);
  font-size:11px;font-family:'DM Mono',monospace
}
.meta-pill{
  padding:5px 10px;border-radius:999px;border:1px solid var(--border-2);
  background:var(--meta-bg)
}
.meta-pill strong{color:var(--text)}
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.action-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border-2);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:8px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.action-btn:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--surface-4)}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.action-btn.primary{
  background:var(--teal-soft);border-color:rgba(45,212,191,.22);color:var(--teal)
}
.action-btn.primary:hover:not(:disabled){background:var(--teal-mid);color:#dffef8}
.action-btn.amber{
  background:var(--amber-soft);border-color:rgba(246,165,51,.25);color:var(--amber)
}
.action-btn.amber:hover:not(:disabled){background:var(--amber-mid);color:#fff3df}
.action-btn.ghost{
  color:var(--text-3)
}

/* Table quiz */
.tblq-note{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:14px;
  line-height:1.5;
}
.tblq-copy{color:var(--text-2);flex:1;min-width:220px}
.tblq-actions{display:none}
.tblq-pill,.tblq-btn{
  border-radius:999px;padding:8px 14px;font-size:11px;
  font-family:'DM Mono',monospace
}
.tblq-pill{
  background:var(--teal-soft);border:1px solid rgba(45,212,191,.25);color:var(--teal)
}
.tblq-btn{
  background:none;border:1px solid var(--border-2);color:var(--text-2);cursor:pointer
}
.tblq-btn:hover{background:var(--surface-2);color:var(--text)}
.review-panel .tblq-actions{display:none}
.tblq-wrap{
  overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)
}
.tblq{
  width:100%;border-collapse:collapse;font-size:15px;line-height:1.6
}
.tblq thead th{
  background:linear-gradient(135deg,var(--table-head-a),var(--table-head-b));
  color:#f6f9ff;padding:14px 16px;text-align:left;font-weight:600;
  border-right:1px solid rgba(255,255,255,.08)
}
.tblq thead th:last-child{border-right:none}
.tblq tbody th[scope="row"]{
  background:rgba(221,229,240,.06);color:var(--text);font-weight:600;
  padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq tbody td{
  background:rgba(255,255,255,.02);padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq td .occ{
  display:block;text-align:center;white-space:normal;padding:10px 12px;min-width:180px
}
.tblq td .score-row{
  display:flex;justify-content:center;flex-wrap:wrap;margin:8px 0 0
}

/* Occluded terms */
.occ{
  display:inline-block;min-width:3ch;
  background:var(--text);color:transparent;
  border:1px solid transparent;
  border-radius:3px;cursor:pointer;padding:1px 6px;
  white-space:nowrap;user-select:none;
  vertical-align:baseline;
  transition:background .15s,color .15s,border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15)}
.occ.rev{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.25)}
.occ.needed{background:var(--amber-soft);color:var(--amber);cursor:default;border-color:rgba(246,165,51,.25)}
.occ.unscored{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.2)}

/* Score buttons */
.score-row{
  display:inline-flex;gap:3px;margin-left:5px;
  vertical-align:middle;animation:pop .15s ease-out;
}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.sbtn{
  font-size:9px;padding:1px 6px;border-radius:3px;cursor:pointer;
  font-family:'DM Mono',monospace;transition:background .1s,border-color .1s;
}
.sbtn.know{
  background:var(--green-soft);color:var(--green);
  border:1px solid rgba(52,211,153,.3);
}
.sbtn.know:hover{background:var(--green-mid)}
.sbtn.need{
  background:var(--red-soft);color:var(--red);
  border:1px solid rgba(248,113,113,.25);
}
.sbtn.need:hover{background:var(--red-mid)}

/* Jump links */
.jump{
  display:inline-flex;align-items:center;
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);background:var(--surface-3);
  border:1px solid var(--border-2);border-radius:3px;
  padding:1px 5px;margin-left:3px;cursor:pointer;
  vertical-align:middle;transition:all .12s;white-space:nowrap;
}
.jump.amber:hover{color:var(--amber);border-color:var(--amber-dim);background:var(--amber-soft)}
.jump.teal:hover{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-soft)}

/* Hint */
.hint{
  font-size:13px;color:var(--text-2);background:var(--surface-3);
  border-left:2px solid var(--border-2);border-radius:0 7px 7px 0;
  padding:9px 14px;margin-top:14px;line-height:1.65;
}
.hlbl{
  font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text-3);display:block;margin-bottom:4px;
}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
.nbtn{
  background:var(--nav-bg);border:1px solid var(--border);
  color:var(--nav-text);font-family:'DM Sans',sans-serif;font-size:13px;
  padding:9px 16px;border-radius:10px;cursor:pointer;
  transition:background .12s,color .12s;
}
.nbtn:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text)}
.nbtn:disabled{opacity:.25;cursor:not-allowed}
.nmc{display:flex;gap:10px;align-items:center}
.ncnt{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.showall{
  background:var(--showall-bg);border:1px solid var(--border);
  color:var(--showall-text);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .12s;
}
.showall:hover{color:var(--text);border-color:var(--border-2)}

/* Stats */
.stats{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 18px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:10px;
  box-shadow:0 18px 40px rgba(0,0,0,.2);
}
.stat{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.stat strong{color:var(--text)}
.sep{color:var(--border-2)}
.sactions{display:flex;gap:8px;align-items:center;margin-left:auto}
.sbtn-lite{
  background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;
  color:var(--text-2);font-family:'DM Mono',monospace;border-radius:999px;
  padding:7px 12px;transition:all .12s
}
.sbtn-lite:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.sbtn-lite:disabled{opacity:.35;cursor:not-allowed}
.review-btn{
  background:var(--amber-soft);border:1px solid rgba(246,165,51,.28);
  color:var(--amber);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;
  transition:all .12s;display:none;align-items:center;gap:5px;
}
.review-btn.vis{display:inline-flex}
.review-btn:hover{background:var(--amber-mid)}
.reset-btn{
  background:none;border:none;cursor:pointer;font-size:11px;
  color:var(--text-3);font-family:'DM Mono',monospace;
  text-decoration:underline;text-underline-offset:2px;
}
.reset-btn:hover{color:var(--text-2)}

/* Review panel */
.rhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rtitle{
  font-family:'Crimson Pro',serif;font-size:17px;font-weight:600;
  color:var(--amber);flex:1;
}
.rprog{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2)}
.rsub{
  font-size:11px;color:var(--text-2);font-family:'DM Mono',monospace;
  background:var(--surface-3);border:1px solid var(--border);
  padding:7px 12px;border-radius:7px;margin-bottom:14px;line-height:1.5;
}

/* Footer hint */
.kbhint{
  text-align:center;font-size:10px;color:var(--text-3);

const D={
  plo1:{label:'PLO 1',sub:'Testicular synthesis of testosterone & androgen receptor binding',type:'PLO',cards:[
    {t:'Universal precursor',b:'All steroid hormones derive from {cholesterol} ({C27}). The {rate-limiting} step is cleavage of the cholesterol side chain by mitochondrial {cytochrome P450scc} ({desmolase}) to form {pregnenolone} ({C21}).',h:'Johnson calls pregnenolone the mother of all steroids.'},
    {t:'LH drives the entry step',b:'In {Leydig cells}, {LH} binding to the {LH receptor} activates {cAMP}, stimulates {desmolase}, and drives cholesterol → {pregnenolone}.',h:'This is the first committed step in the testicular pathway.'},
    {t:'SER pathway to testosterone',b:'In the {SER}, {17α-hydroxylase} converts pregnenolone → {17α-OH-pregnenolone}; {17,20-lyase} converts that → {DHEA}; {3β-HSD} converts DHEA → {androstenedione}; {17β-HSD} converts androstenedione → {testosterone}.',h:'Johnson separates mitochondrial and smooth ER steps on the pathway figure.'},
    {t:'Peripheral conversion products',b:'{5α-reductase Type 2} converts testosterone → {DHT} in {target tissues}. {Aromatase} converts testosterone → {estradiol} in {peripheral tissues} and {Sertoli cells}.',h:'These conversions explain tissue-specific androgen and estrogen effects.'},
    {t:'Table quiz: testosterone synthesis pathway',b:'<div class="tblq-note"><div class="tblq-copy">Table quiz: the step column stays visible, and each comparison cell can be revealed one by one.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Step</th><th>Enzyme</th><th>Substrate -> Product</th><th>Location</th></tr></thead><tbody><tr><th scope="row">1</th><td>{P450scc (desmolase)}</td><td>{Cholesterol -> Pregnenolone}</td><td>{Mitochondria}</td></tr><tr><th scope="row">2</th><td>{17alpha-hydroxylase}</td><td>{Pregnenolone -> 17alpha-OH-pregnenolone}</td><td>{SER}</td></tr><tr><th scope="row">3</th><td>{17,20-lyase}</td><td>{17alpha-OH-pregnenolone -> DHEA}</td><td>{SER}</td></tr><tr><th scope="row">4</th><td>{3beta-HSD}</td><td>{DHEA -> Androstenedione}</td><td>{SER}</td></tr><tr><th scope="row">5</th><td>{17beta-HSD}</td><td>{Androstenedione -> Testosterone}</td><td>{SER}</td></tr><tr><th scope="row">6</th><td>{5alpha-reductase Type 2}</td><td>{Testosterone -> DHT}</td><td>{Target tissues}</td></tr><tr><th scope="row">7</th><td>{Aromatase}</td><td>{Testosterone -> Estradiol}</td><td>{Peripheral tissues / Sertoli cells}</td></tr></tbody></table></div>',h:'This is Johnsons full Leydig-cell pathway table moved into the active recall deck.'},
    {t:'Androgen receptor signaling',b:'Steroid hormones use {intracellular/nuclear receptors}, not cell-surface receptors. Testosterone and DHT bind the {androgen receptor} in the {cytoplasm}; the complex {dimerizes}, moves to the {nucleus}, binds {androgen response elements}, and activates {gene transcription}.',h:'This is the classic steroid receptor mechanism.'},
    {t:'Potency and AR gene',b:'{DHT} = {100%} potency > {Testosterone} ({50%}) > {Androstenedione} ({8%}) > {DHEA} ({4%}). The {AR gene} is on {Xq11-13} of the {X chromosome}; > {200} mutations cause {androgen insensitivity syndrome}. {Finasteride} inhibits {5α-reductase Type 2}.',h:'Johnson highlights finasteride for BPH and male-pattern baldness.'}
  ]},
  plo2:{label:'PLO 2',sub:'Central regulation of testosterone synthesis: GnRH, FSH & LH',type:'PLO',cards:[
    {t:'GnRH enters the portal system',b:'The {hypothalamus} secretes {GnRH} in {pulsatile} fashion into the {hypothalamo-hypophyseal portal vessels}, which carry it to the {anterior pituitary} ({adenohypophysis}).',h:'This is the opening step of the HPG axis.'},
    {t:'Pulses matter',b:'Pulsatile GnRH is {required}. {Continuous} GnRH desensitizes/downregulates {GnRH receptors} and decreases {FSH} / {LH} release.',h:'Johnson ties this directly to therapy for prostate cancer and precocious puberty.'},
    {t:'FSH target',b:'{FSH} acts on {Sertoli cells} to support {spermatogenesis} and produce {inhibin} and {ABP}.',h:'ABP = androgen-binding protein.'},
    {t:'LH target',b:'{LH} acts on {Leydig cells} to stimulate {testosterone synthesis}.',h:'This is the key endocrine driver of testicular testosterone production.'}
  ]},
  plo3:{label:'PLO 3',sub:'Control of glandular secretion by negative feedback',type:'PLO',cards:[
    {t:'Long-loop feedback',b:'{Long loop} negative feedback means an {end-organ hormone} such as {testosterone} or {cortisol} inhibits both the {anterior pituitary} and the {hypothalamus}.',h:'This is the core endocrine feedback pattern.'},
    {t:'Short-loop feedback',b:'{Short loop} negative feedback means an {anterior pituitary hormone} such as {ACTH} or {LH} inhibits its own {hypothalamic releasing hormone}.',h:'Johnson contrasts this with the long loop.'},
    {t:'CAH and lost feedback',b:'In classic {CAH}, inadequate {cortisol} means loss of {long-loop negative feedback} on {ACTH}. ACTH rises, drives adrenal {hyperplasia}, and shunts precursors into {androgen pathways}.',h:'This is why the disorder is called hyperplasia.'},
    {t:'Male HPG specifics',b:'In the male HPG axis, {testosterone} suppresses {GnRH} and {LH}; {Inhibin} from {Sertoli cells} suppresses {FSH} only; {Estradiol} aromatized from testosterone also suppresses {GnRH}.',h:'Johnson separates testosterone, inhibin, and estradiol feedback targets.'}
  ]},
  plo4:{label:'PLO 4',sub:'Significance of hormone binding to plasma proteins',type:'PLO',cards:[
    {t:'Why binding matters',b:'Steroids are {lipophilic}, so they travel bound to {carrier proteins} in plasma. Only the {free} ({unbound}) fraction is biologically active and can cross {cell membranes} to bind {intracellular receptors}.',h:'Johnson frames this as the reason total and free hormone levels can differ.'},
    {t:'Major carriers',b:'{Testosterone} / {DHT} travel mainly with {SHBG} and are ~{98%} bound; {Cortisol} travels mainly with {CBG} and is ~{90–95%} bound.',h:'Albumin also contributes to testosterone binding.'},
    {t:'Albumin and affinity differences',b:'{Aldosterone} is carried weakly by {albumin} and is ~{50%} bound, giving it a shorter {half-life}. {Estradiol} / {progesterone} travel with {SHBG} and {albumin}; estradiol binds SHBG with {lower affinity} than testosterone.',h:'Johnson uses this table to compare the main circulating steroid carriers.'},
    {t:'Table quiz: plasma protein binding',b:'<div class="tblq-note"><div class="tblq-copy">Table quiz: the steroid column stays visible, and each comparison cell can be revealed one by one.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Steroid</th><th>Primary Carrier</th><th>Notes</th></tr></thead><tbody><tr><th scope="row">Testosterone / DHT</th><td>{SHBG (sex hormone-binding globulin)}</td><td>{About 98% bound; also binds albumin}</td></tr><tr><th scope="row">Cortisol</th><td>{CBG (cortisol-binding globulin / transcortin)}</td><td>{About 90-95% bound}</td></tr><tr><th scope="row">Aldosterone</th><td>{Albumin (weak)}</td><td>{About 50% bound -> shorter half-life}</td></tr><tr><th scope="row">Estradiol / Progesterone</th><td>{SHBG and albumin}</td><td>{Estradiol binds SHBG with lower affinity than testosterone}</td></tr></tbody></table></div>',h:'This is the carrier-protein comparison table from the Johnson notes.'},
    {t:'Clinical significance',b:'Changes in binding proteins alter {total hormone levels} but not {free hormone}. {Pregnancy} or {OCP use} increases hepatic {SHBG} → higher {total testosterone} with potentially unchanged {free testosterone}. In workups separating {primary synthesis} from {peripheral conversion}, binding status matters.',h:'Johnson explicitly says to measure free testosterone when true androgenic status matters.'}
  ]},
  lo1:{label:'LO 1',sub:'Pituitary gland: development, structure, vasculature & hypothalamic relationship',type:'LO',cards:[
    {t:'Two lobes, two origins',b:'The {anterior pituitary} ({adenohypophysis}) derives from {Rathke\'s pouch} / {oral ectoderm}; the {posterior pituitary} ({neurohypophysis}) derives from {neural ectoderm} ({diencephalon}). The posterior lobe contains terminals from the {supraoptic} ({ADH}) and {paraventricular} ({oxytocin}) nuclei.',h:'ADH and oxytocin are synthesized in hypothalamic cell bodies and released from posterior pituitary axon terminals.'},
    {t:'Portal system route',b:'{Parvocellular neurons} secrete releasing/inhibiting hormones into the {median eminence} → first {capillary bed} → {portal vessels} → second {capillary bed} in the {anterior pituitary}.',h:'This is the route that delivers hypothalamic control signals to the adenohypophysis.'},
    {t:'Why the portal vessels are essential',b:'Hypothalamic hormones exist in {small quantities}; if released into the {general circulation} they would be {diluted} to ineffective concentrations. The portal system preserves {high local concentrations}.',h:'Johnson emphasizes dilution as the key reason the portal system exists.'},
    {t:'The 6 + 2 pituitary hormones',b:'Adenohypophysis ({6}): {GH}, {ACTH}, {TSH}, {FSH}, {LH}, {Prolactin} (+ {MSH} remnant). Neurohypophysis ({2}): {ADH} and {Oxytocin}.',h:'This is Johnson\'s quick inventory card for pituitary output.'}
  ]},
  lo2:{label:'LO 2',sub:'Components of the hypothalamic-hypophyseal-gonadal axis',type:'LO',cards:[
    {t:'Level 1: hypothalamus',b:'Level 1 — {Hypothalamus}: {GnRH} neurons release pulsatile bursts from the {circhoral oscillator} into {portal vessels} at the {median eminence}.',h:'Johnson names the GnRH pulse generator the circhoral oscillator.'},
    {t:'Level 2: anterior pituitary',b:'Level 2 — {Anterior pituitary}: {gonadotroph cells} respond to GnRH pulses and release {FSH} and {LH} into the {systemic circulation}.',h:'This is the endocrine relay between hypothalamus and gonads.'},
    {t:'Level 3: gonads',b:'Level 3 — {Gonads}: in testes, {LH} → {Leydig cells} → {testosterone}, and {FSH} → {Sertoli cells} → {spermatogenesis}, {inhibin}, and {ABP}; in ovaries, {LH} → {theca cells} → {androgens}, and {FSH} → {granulosa cells} → {estradiol}.',h:'Johnson uses both testes and ovaries to define the full HPG axis.'},
    {t:'Localizing endocrine disease',b:'{Primary hypogonadism} / {testicular failure} = ↓ {T} with ↑ {LH} / {FSH}; {Secondary} pituitary disease = ↓ {FSH} / {LH} → ↓ {T}; {Tertiary} hypothalamic disease such as {Kallmann syndrome} = ↓ {GnRH} → ↓ {FSH} / {LH} → ↓ {T}.',h:'This is Johnson\'s framework for localizing endocrine pathology.'},
    {t:'Table quiz: localizing endocrine disease',b:'<div class="tblq-note"><div class="tblq-copy">Table quiz: the endocrine level stays visible, and the disease type and example can be revealed one by one.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Level</th><th>Disease Type</th><th>Example</th></tr></thead><tbody><tr><th scope="row">Peripheral gland</th><td>{Primary}</td><td>{Primary hypogonadism (testicular failure) -> low T, high LH/FSH}</td></tr><tr><th scope="row">Pituitary</th><td>{Secondary}</td><td>{Pituitary adenoma -> low FSH/LH -> low T}</td></tr><tr><th scope="row">Hypothalamus</th><td>{Tertiary}</td><td>{Kallmann syndrome -> low GnRH -> low FSH/LH -> low T}</td></tr></tbody></table></div>',h:'This adds Johnsons localization framework as a comparison card rather than only a sentence card.'}
  ]},
  lo3:{label:'LO 3',sub:'Age-related changes in the HPG axis → puberty',type:'LO',cards:[
    {t:'Puberty turns the pulse generator on',b:'Before puberty, the {GnRH pulse generator} is relatively {quiescent}; at puberty, {frequency} and {amplitude} of pulsatile GnRH release increase, initially during {sleep} and later throughout the day → ↑ {FSH} and {LH}.',h:'Johnson starts puberty with a change in pulse pattern, not a new hormone.'},
    {t:'Gonadal activation and pubertal changes',b:'In males, {Leydig cells} begin producing more {testosterone} and {Sertoli cells} support {spermatogenesis}. Secondary sexual characteristics include {deep voice}, {pubic/axillary hair}, {muscle mass}, {penile growth}, and {skeletal maturation}.',h:'This card follows the downstream effects of rising gonadotropin output.'},
    {t:'Estrogen closes the growth plates',b:'Regardless of genetic sex, {estrogen} drives {epiphyseal plate fusion}. Excess {androgens} in CAH lead to excess estrogen via {aromatase}, causing {premature fusion} and {short adult stature}.',h:'Johnson specifically links excess androgen exposure to short adult height through estrogen.'},
    {t:'Central vs non-central precocious puberty',b:'{Central precocious puberty} ({CPP}) = early activation of the {HPG axis}. {Non-central precocious puberty} ({NCPP}) is not driven by the HPG axis and can come from {CAH}, {tumors}, {exogenous hormones}, or {McCune-Albright}.',h:'Johnson also calls NCPP pseudo-precocious puberty.'},
    {t:'How to tell them apart in males',b:'{Central precocious puberty} shows a big {LH surge} after {GnRH stimulation} and {enlarged testes}. {Non-central precocious puberty} such as CAH shows little LH response, {prepubertal testicular volume}, elevated {17-OHP}, and an exaggerated {ACTH stimulation test}.',h:'Johnson\'s differential: true central precocious puberty vs non-classic CAH.'},
    {t:'Table quiz: CPP vs NCPP in males',b:'<div class="tblq-note"><div class="tblq-copy">Table quiz: the test column stays visible, and each comparison cell can be revealed one by one.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Test</th><th>Central (true) PP</th><th>Non-Central PP (e.g. CAH)</th></tr></thead><tbody><tr><th scope="row">GnRH stimulation</th><td>{Huge LH surge about 1 hour after infusion}</td><td>{No significant LH response}</td></tr><tr><th scope="row">Testicular volume</th><td>{Enlarged for age}</td><td>{Prepubertal or small for degree of virilization}</td></tr><tr><th scope="row">17-OHP</th><td>{Normal}</td><td>{Elevated}</td></tr><tr><th scope="row">ACTH stimulation</th><td>{Normal cortisol rise}</td><td>{Exaggerated 17-OHP rise with blunted cortisol rise}</td></tr></tbody></table></div>',h:'Johnsons male differential is true central precocious puberty versus non-classic CAH.'}
  ]},
  lo4:{label:'LO 4',sub:'CAH: phenotypic & biochemical differences & altered steroid synthesis',type:'LO',cards:[
    {t:'CAH overview',b:'CAH is a group of {autosomal recessive} disorders involving deficient synthesis of {cortisol}, {aldosterone}, or both. About {95%} are due to {21α-hydroxylase deficiency} from {CYP21A2} mutations; prevalence is ~{1 in 15,000} live births.',h:'Johnson notes roughly 300 known CYP21A2 mutations.'},

    {t:'Table quiz: classic vs non-classic CAH',b:'<div class="tblq-note"><div class="tblq-copy">Table quiz: the feature column stays visible, and each comparison cell can be revealed one by one.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Feature</th><th>Classic CAH</th><th>Non-Classic (Late-Onset) CAH</th></tr></thead><tbody><tr><th scope="row">Severity</th><td>{Severe enzyme deficiency}</td><td>{Mild or partial enzyme deficiency}</td></tr><tr><th scope="row">Onset</th><td>{At birth / neonatal}</td><td>{Childhood / adolescence / adulthood}</td></tr><tr><th scope="row">Cortisol</th><td>{Markedly deficient -> adrenal insufficiency}</td><td>{Mildly low; sufficient for normal function}</td></tr><tr><th scope="row">Aldosterone</th><td>{May be deficient (salt wasting) - degree varies}</td><td>{Usually adequate}</td></tr><tr><th scope="row">Androgens</th><td>{Markedly elevated -> ambiguous genitalia in XX females}</td><td>{Mildly elevated -> precocious puberty, hirsutism, acne}</td></tr><tr><th scope="row">17-OHP</th><td>{Greater than 300 nmol/L (1000 ng/mL) in neonates}</td><td>{200-1500 ng/dL; greater than 1500 ng/dL after ACTH stimulation is diagnostic}</td></tr><tr><th scope="row">Neonatal screening</th><td>{Detected (mandated heel-stick)}</td><td>{Usually not detected by neonatal screening}</td></tr></tbody></table></div>',h:'This brings the 2024 updated classification table directly into the LO 4 deck.'},

function setTheme(theme){

  if(next==='slate') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',next);
  document.querySelectorAll('.theme-btn').forEach(btn=>{

  });

try{
  setTheme(localStorage.getItem('contextual-anki-theme')||'slate');
}catch(e){

document.getElementById('deckMeta').textContent=`Active recall map · ${Object.keys(D).length} topics · ${Object.values(D).reduce((n,node)=>n+node.cards.length,0)} cards`;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let cur=null, ci=0;
let tr={};       // tr[nid][cardIdx] = Set<termIdx>
let sc={};       // sc[nid][cardIdx][termIdx] = 'knew'|'needed'
let done=new Set();
let totRev=0, totKnew=0, totNeed=0;
let revQueue=[], revIdx=0, revTr={};
const PROGRESS_COOKIE='contextual_anki_progress_v1';

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function nT(b){return(b.match(/\{[^}]+\}/g)||[]).length}

function initNode(id){
  if(!tr[id]){
    tr[id]={};sc[id]={};
    D[id].cards.forEach((_,i)=>{tr[id][i]=new Set();sc[id][i]={}});
  }
}

function setCookie(name,value,days){
  const maxAge=days*24*60*60;
  document.cookie=`${name}=${encodeURIComponent(value)}; path=/; max-age=${maxAge}; SameSite=Lax`;
}

function getCookie(name){
  const prefix=`${name}=`;
  return document.cookie.split('; ').reduce((found,part)=>{
    if(found!==null) return found;
    return part.indexOf(prefix)===0 ? decodeURIComponent(part.slice(prefix.length)) : null;
  },null);
}

function clearCookie(name){
  document.cookie=`${name}=; path=/; max-age=0; SameSite=Lax`;
}

function serializeProgress(){
  const state={c:cur||'',i:ci||0,r:{},s:{}};
  Object.keys(tr).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const set=tr[nid][cardIdx];
      return set&&set.size ? Array.from(set).sort((a,b)=>a-b).join('.') : '';
    });
    if(rows.some(Boolean)) state.r[nid]=rows;
  });
  Object.keys(sc).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const obj=sc[nid][cardIdx]||{};
      const packed=Object.keys(obj).sort((a,b)=>parseInt(a)-parseInt(b)).map(idx=>`${idx}${obj[idx]==='knew'?'k':'n'}`).join('.');
      return packed;
    });
    if(rows.some(Boolean)) state.s[nid]=rows;
  });
  return JSON.stringify(state);
}

function saveProgress(){
  try{
    setCookie(PROGRESS_COOKIE,serializeProgress(),180);
  }catch(e){}
}

function loadProgress(){
  const raw=getCookie(PROGRESS_COOKIE);
  if(!raw) return;
  try{
    const state=JSON.parse(raw);
    tr={};sc={};

    Object.keys(D).forEach(nid=>{
      initNode(nid);
      const revealedRows=(state.r&&state.r[nid])||[];
      revealedRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(v=>{
          if(v==='') return;
          tr[nid][cardIdx].add(parseInt(v,10));
        });
      });

      const scoredRows=(state.s&&state.s[nid])||[];
      scoredRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(token=>{
          if(!token) return;
          const score=token.slice(-1)==='k' ? 'knew' : 'needed';
          const idx=parseInt(token.slice(0,-1),10);
          if(!Number.isNaN(idx)) sc[nid][cardIdx][idx]=score;
        });
      });
    });

    if(state.c&&D[state.c]){
      cur=state.c;
      ci=Math.max(0,Math.min(D[cur].cards.length-1,parseInt(state.i,10)||0));
    }
  }catch(e){
    clearCookie(PROGRESS_COOKIE);
  }
}

function cardMetrics(nid,cidx){
  initNode(nid);
  const total=nT(D[nid].cards[cidx].b);
  const revealed=tr[nid][cidx].size;
  let unscored=0, knew=0, needed=0;
  for(let i=0;i<total;i++){
    const score=sc[nid][cidx][i];
    if(score==='knew') knew++;
    else if(score==='needed') needed++;
    else if(tr[nid][cidx].has(i)) unscored++;
  }
  return {total,revealed,unscored,knew,needed,allRevealed:total>0&&revealed>=total};
}

function parseBody(body, nid, cidx, opts={}){
  // opts: {forReview, targetTermIdx}
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    let revealed, scored;

    if(opts.forReview){
      revealed=opts.revealedSet ? opts.revealedSet.has(idx) : false;
      scored=null;
    } else {
      revealed=tr[nid]&&tr[nid][cidx]&&tr[nid][cidx].has(idx);
      scored=revealed&&sc[nid]&&sc[nid][cidx] ? (sc[nid][cidx][idx]||null) : null;
    }

    const link=LINKS[t];
    const showJump=revealed&&link&&link[0]!==nid;
    const isTarget=opts.forReview&&opts.targetTermIdx===idx;

    let cls='occ';
    if(revealed||isTarget){
      if(scored==='knew') cls+=' rev';
      else if(scored==='needed') cls+=' needed';
      else cls+=' unscored';
    }

    const da=opts.forReview?'':`data-nid="${nid}" data-ci="${cidx}" data-i="${idx}"`;
    const onclick=(!revealed&&!opts.forReview)?` onclick="revTerm(this)"`
      :(opts.forReview&&isTarget&&!opts.revealedSet?.has(idx))?' onclick="revRevTerm(this)"':'';

    let html=`<span class="${cls}"${da}${onclick}>${t}</span>`;

    if(revealed&&!scored&&!opts.forReview){
      html+=`<span class="score-row" data-nid="${nid}" data-ci="${cidx}" data-i="${idx}">`+
        `<button class="sbtn know" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button>`+
        `<button class="sbtn need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button>`+
        `</span>`;
    }
    if(showJump){
      html+=`<span class="jump ${link[2]}" onclick="jumpNode('${link[0]}',event)" title="Jump to ${link[1]}">→ ${link[1]}</span>`;
    }
    return html;
  });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const d=D[cur].cards[ci];
  const m=cardMetrics(cur,ci);

  // Dots
  document.getElementById('dots').innerHTML=D[cur].cards.map((_,i)=>{
    const tot=nT(D[cur].cards[i].b),got=tr[cur][i].size;
    const cls=i===ci?'active':got>=tot&&tot>0?'done':got>0?'partial':'';
    return `<span class="dot ${cls}"></span>`;
  }).join('');

  document.getElementById('cnt').textContent=`${ci+1} / ${D[cur].cards.length}`;
  document.getElementById('bprev').disabled=ci===0;
  document.getElementById('bnext').disabled=ci===D[cur].cards.length-1;
  document.getElementById('revealTopicBtn').disabled=!cur;

  document.getElementById('ccard').innerHTML=
    `<div class="ctitle">${d.t}</div>`+
    `<div class="cbody">${parseBody(d.b,cur,ci)}</div>`+
    (d.h?`<div class="hint"><span class="hlbl">Clinical note</span>${d.h}</div>`:'');

  document.getElementById('cardActions').innerHTML=
    `<div class="card-meta">`+
      `<span class="meta-pill"><strong>${m.revealed}</strong> / ${m.total} revealed</span>`+
      `<span class="meta-pill"><strong>${m.knew}</strong> knew</span>`+
      `<span class="meta-pill"><strong>${m.needed}</strong> needed help</span>`+
      (m.unscored?`<span class="meta-pill"><strong>${m.unscored}</strong> waiting to score</span>`:'')+
    `</div>`+
    `<div class="action-row">`+
      `<button class="action-btn primary" onclick="revealAll()" ${m.total===0||m.allRevealed?'disabled':''}>Reveal this card</button>`+
      `<button class="action-btn amber" onclick="knewAllCurrentCard()" ${!m.allRevealed?'disabled':''}>Knew all</button>`+
      `<button class="action-btn ghost" onclick="resetCard()" ${m.revealed===0&&m.knew===0&&m.needed===0?'disabled':''}>Reset this card</button>`+
    `</div>`;
}

function renderReview(){
  if(!revQueue.length) return;
  const q=revQueue[revIdx];
  const revSet=revTr[revIdx]||new Set();

  document.getElementById('rprog').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rcnt').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rsub').innerHTML=
    `<strong>${D[q.nid].label} — ${q.card.t}</strong><br>`+
    `Term to recall: <span style="color:var(--amber)">${q.term}</span>`;
  document.getElementById('rbprev').disabled=revIdx===0;
  document.getElementById('rbnext').disabled=revIdx===revQueue.length-1;

  // Build card body: only the target term is blanked; others shown in dim text
  let i=0;
  const body=q.card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    const isTarget=idx===q.tidx;
    const isRevealed=revSet.has(idx);
    if(isTarget){
      if(isRevealed){
        return `<span class="occ needed">${t}</span>`;
      } else {
        return `<span class="occ" onclick="revRevTerm()" style="cursor:pointer">${t}</span>`;
      }
    }
    return `<span style="color:var(--text-2)">${t}</span>`;
  });

  document.getElementById('rccard').innerHTML=
    `<div class="ctitle">${q.card.t}</div>`+
    `<div class="cbody">${body}</div>`+
    (q.card.h?`<div class="hint"><span class="hlbl">Clinical note</span>${q.card.h}</div>`:'');
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function selNode(id){
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  document.getElementById('n-'+id).classList.add('sel-node');
  cur=id;ci=0;
  initNode(id);
  const p=document.getElementById('panel');
  p.classList.add('open');
  const d=D[id];
  const b=document.getElementById('bdg');
  b.textContent=d.label;
  b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
  document.getElementById('ptitle').textContent=d.sub;
  render();
  saveProgress();
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function jumpNode(id,e){
  e.stopPropagation();
  selNode(id);
}

function revTerm(s){
  if(s.classList.contains('rev')||s.classList.contains('needed')||s.classList.contains('unscored')) return;
  const nid=s.dataset.nid,cidx=parseInt(s.dataset.ci),tidx=parseInt(s.dataset.i);
  initNode(nid);
  tr[nid][cidx].add(tidx);
  totRev++;
  updStats();
  render();
}

function scoreIt(e,nid,cidx,tidx,score){
  e.stopPropagation();
  if(sc[nid][cidx][tidx]) return; // already scored
  sc[nid][cidx][tidx]=score;
  if(score==='knew') totKnew++;
  else totNeed++;
  chkDone(nid);
  updStats();
  render();
}

function revealAll(){
  const d=D[cur].cards[ci];
  const n=nT(d.b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){tr[cur][ci].add(i);totRev++;}
  }
  chkDone(cur);updStats();render();
}

function knewAllCurrentCard(){
  if(!cur) return;
  initNode(cur);
  const n=nT(D[cur].cards[ci].b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){
      tr[cur][ci].add(i);
      totRev++;
    }
    const prev=sc[cur][ci][i];
    if(prev==='needed') totNeed--;
    if(prev!=='knew') totKnew++;
    sc[cur][ci][i]='knew';
  }
  chkDone(cur);
  updStats();
  render();
}

function revealNodeCards(nid){
  initNode(nid);
  D[nid].cards.forEach((card,cidx)=>{
    const n=nT(card.b);
    for(let i=0;i<n;i++){
      if(!tr[nid][cidx].has(i)){
        tr[nid][cidx].add(i);
        totRev++;
      }
    }
    chkDone(nid);
  });
}

function revealTopic(){
  if(!cur) return;
  revealNodeCards(cur);
  updStats();
  render();
}

function revealDeck(){
  Object.keys(D).forEach(nid=>revealNodeCards(nid));
  updStats();
  if(cur) render();
}

function goCard(dir){
  ci=Math.max(0,Math.min(D[cur].cards.length-1,ci+dir));
  render();
  saveProgress();
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  cur=null;
  document.getElementById('revealTopicBtn').disabled=true;
  saveProgress();
}

function chkDone(id){
  const all=D[id].cards.every((_,i)=>{
    const t=nT(D[id].cards[i].b);
    return t===0||tr[id][i].size>=t;
  });
  if(all){
    done.add(id);
    document.getElementById('n-'+id).classList.add('done-node');
  }
}

function countNeeded(){
  let n=0;
  Object.keys(sc).forEach(nid=>Object.keys(sc[nid]).forEach(cidx=>
    Object.values(sc[nid][cidx]).forEach(v=>{if(v==='needed')n++})
  ));
  return n;
}

function updStats(){
  document.getElementById('st-rev').textContent=totRev;
  document.getElementById('st-knew').textContent=totKnew;
  document.getElementById('st-need').textContent=totNeed;
  document.getElementById('st-done').textContent=done.size;
  const n=countNeeded();
  document.getElementById('rcount').textContent=n;
  document.getElementById('reviewBtn').classList.toggle('vis',n>0);
  saveProgress();
}

function recalcState(){
  totRev=0;totKnew=0;totNeed=0;done=new Set();
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('done-node'));

  Object.keys(D).forEach(nid=>{
    let all=true;
    D[nid].cards.forEach((card,i)=>{
      const got=tr[nid]&&tr[nid][i]?tr[nid][i].size:0;
      const tot=nT(card.b);
      totRev+=got;
      Object.values(sc[nid]&&sc[nid][i]?sc[nid][i]:{}).forEach(v=>{
        if(v==='knew') totKnew++;
        else if(v==='needed') totNeed++;
      });
      if(!(tot===0||got>=tot)) all=false;
    });
    if(all){
      done.add(nid);
      const el=document.getElementById('n-'+nid);
      if(el) el.classList.add('done-node');
    }
  });

  updStats();
}

function resetCard(){
  if(!cur) return;
  initNode(cur);
  tr[cur][ci]=new Set();
  sc[cur][ci]={};
  closeReview();
  recalcState();
  render();
}

function resetAll(){
  tr={};sc={};done.clear();
  totRev=0;totKnew=0;totNeed=0;
  document.querySelectorAll('svg .node').forEach(g=>{
    g.classList.remove('sel-node','done-node');
  });
  document.getElementById('revealTopicBtn').disabled=!cur;
  updStats();
  closeReview();
  if(cur){initNode(cur);render();}
}

// ═══════════════════════════════════════════════════
// REVIEW (SPACED REP)
// ═══════════════════════════════════════════════════
function startReview(){
  revQueue=[];
  Object.keys(sc).forEach(nid=>{
    Object.keys(sc[nid]).forEach(cidx=>{
      const card=D[nid].cards[parseInt(cidx)];
      let termIdx=0;
      card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
        const i=termIdx++;
        if(sc[nid][cidx][i]==='needed'){
          revQueue.push({nid,cidx:parseInt(cidx),tidx:i,term:t,card});
        }
      });
    });
  });
  // Fisher-Yates shuffle
  for(let i=revQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [revQueue[i],revQueue[j]]=[revQueue[j],revQueue[i]];
  }
  revIdx=0;revTr={};
  if(!revQueue.length) return;
  const rp=document.getElementById('reviewPanel');
  rp.classList.add('open');
  rp.scrollIntoView({behavior:'smooth',block:'nearest'});
  renderReview();
}

function revRevTerm(){
  if(!revTr[revIdx]) revTr[revIdx]=new Set();
  revTr[revIdx].add(revQueue[revIdx].tidx);
  renderReview();
}

function revAllReview(){revRevTerm();}

function goReview(dir){
  revIdx=Math.max(0,Math.min(revQueue.length-1,revIdx+dir));
  renderReview();
}

function closeReview(){
  document.getElementById('reviewPanel').classList.remove('open');
}

function restoreSession(){
  loadProgress();
  recalcState();
  if(cur&&D[cur]){
    document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
    const nodeEl=document.getElementById('n-'+cur);
    if(nodeEl) nodeEl.classList.add('sel-node');
    const d=D[cur];
    const p=document.getElementById('panel');
    p.classList.add('open');
    const b=document.getElementById('bdg');
    b.textContent=d.label;
    b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
    document.getElementById('ptitle').textContent=d.sub;
    document.getElementById('revealTopicBtn').disabled=false;
    render();
  }else{
    document.getElementById('revealTopicBtn').disabled=true;
  }
}

restoreSession();

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inRev=document.getElementById('reviewPanel').classList.contains('open');
  if(inRev){
    if(e.key==='ArrowLeft'){e.preventDefault();goReview(-1)}
    else if(e.key==='ArrowRight'){e.preventDefault();goReview(1)}
    else if(e.key==='Escape') closeReview();
    return;
  }
  if(!cur) return;
  if(e.key==='ArrowLeft'){e.preventDefault();goCard(-1)}
  else if(e.key==='ArrowRight'){e.preventDefault();goCard(1)}
  else if(e.key==='Escape') closePanel();
});
</script>
</body>
</html>
