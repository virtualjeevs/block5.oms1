<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glucocorticoids & HPA Axis — Active Recall Map</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:#0b0f1a; --surface:#131929; --surface-2:#19223a; --surface-3:#1f2a42; --surface-4:#24314e;
  --amber:#f6a533; --amber-soft:rgba(246,165,51,.13); --amber-mid:rgba(246,165,51,.25); --amber-dim:rgba(246,165,51,.55);
  --teal:#2dd4bf; --teal-soft:rgba(45,212,191,.12); --teal-mid:rgba(45,212,191,.22); --teal-dim:rgba(45,212,191,.5);
  --green:#34d399; --green-soft:rgba(52,211,153,.13); --green-mid:rgba(52,211,153,.22);
  --red:#f87171; --red-soft:rgba(248,113,113,.12);
  --text:#dde5f0; --text-2:#7e90a9; --text-3:#3e5065;
  --border:#1c2a40; --border-2:#243348;
  --hero-glow-a:rgba(45,212,191,.08); --hero-glow-b:rgba(246,165,51,.09);
  --bg-top:#0b0f1a; --bg-bottom:#0d1321;
  --map-shadow:0 20px 45px rgba(0,0,0,.22); --panel-shadow:0 22px 48px rgba(0,0,0,.24);
  --header-shadow:0 22px 50px rgba(0,0,0,.24);
  --header-a:#131929; --header-b:#19223a;
  --card-a:#131929; --card-b:#19223a;
  --card-action-bg:#111827;
  --nav-bg:#19223a; --nav-bg-hover:#1f2a42; --nav-text:#7e90a9;
  --showall-bg:rgba(246,165,51,.12); --showall-text:#f6a533;
  --meta-bg:#19223a;
  --table-head-a:#19223a; --table-head-b:#1f2a42;
}
html[data-theme="cream"]{
  --bg:#f4efe4; --surface:#ede8dc; --surface-2:#e5dfd1; --surface-3:#ddd6c5; --surface-4:#d4ccba;
  --amber:#b87a10; --amber-soft:rgba(184,122,16,.12); --amber-mid:rgba(184,122,16,.22); --amber-dim:rgba(184,122,16,.5);
  --teal:#0f7a6e; --teal-soft:rgba(15,122,110,.1); --teal-mid:rgba(15,122,110,.2); --teal-dim:rgba(15,122,110,.45);
  --green:#1a8a5c; --green-soft:rgba(26,138,92,.12); --green-mid:rgba(26,138,92,.2);
  --red:#b84040; --red-soft:rgba(184,64,64,.1);
  --text:#2a2015; --text-2:#6b5c42; --text-3:#a8966e;
  --border:#d4ccba; --border-2:#c9bfa6;
  --hero-glow-a:rgba(15,122,110,.06); --hero-glow-b:rgba(184,122,16,.07);
  --bg-top:#f4efe4; --bg-bottom:#ede8dc;
  --header-a:#ede8dc; --header-b:#e5dfd1;
  --card-a:#ede8dc; --card-b:#e5dfd1;
  --card-action-bg:#e0d9cc;
  --nav-bg:#e5dfd1; --nav-bg-hover:#ddd6c5; --nav-text:#6b5c42;
  --showall-bg:rgba(184,122,16,.1); --showall-text:#b87a10;
  --meta-bg:#e5dfd1;
  --table-head-a:#e5dfd1; --table-head-b:#ddd6c5;
}
html[data-theme="forest"]{
  --bg:#081512; --surface:#0d1f1a; --surface-2:#132820; --surface-3:#183228; --surface-4:#1d3c2f;
  --amber:#e8a428; --amber-soft:rgba(232,164,40,.13); --amber-mid:rgba(232,164,40,.25); --amber-dim:rgba(232,164,40,.55);
  --teal:#3ecfb5; --teal-soft:rgba(62,207,181,.1); --teal-mid:rgba(62,207,181,.2); --teal-dim:rgba(62,207,181,.45);
  --green:#4ade80; --green-soft:rgba(74,222,128,.12); --green-mid:rgba(74,222,128,.2);
  --red:#f87171; --red-soft:rgba(248,113,113,.1);
  --text:#cce8d8; --text-2:#6e9e80; --text-3:#2e5240;
  --border:#1a3828; --border-2:#214530;
  --hero-glow-a:rgba(62,207,181,.07); --hero-glow-b:rgba(232,164,40,.08);
  --bg-top:#081512; --bg-bottom:#0a1a16;
  --header-a:#0d1f1a; --header-b:#132820;
  --card-a:#0d1f1a; --card-b:#132820;
  --card-action-bg:#091510;
  --nav-bg:#132820; --nav-bg-hover:#183228; --nav-text:#6e9e80;
  --showall-bg:rgba(232,164,40,.12); --showall-text:#e8a428;
  --meta-bg:#132820;
  --table-head-a:#132820; --table-head-b:#183228;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg, var(--header-a), var(--header-b));
  border-bottom:1px solid var(--border);
  box-shadow:var(--header-shadow);
  padding:1.5rem 2rem 1.25rem;
}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;}
header h1{font-family:'Crimson Pro',serif;font-size:1.9rem;font-weight:600;color:var(--text);line-height:1.15;margin-bottom:.3rem;}
#deckMeta{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-2);}
.theme-switch{display:flex;gap:.4rem;align-items:flex-start;padding-top:.2rem;flex-shrink:0;}
.theme-btn{font-family:'DM Mono',monospace;font-size:.7rem;padding:.28rem .65rem;border-radius:5px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s;}
.theme-btn.active,.theme-btn:hover{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-mid);}

/* ── LEGEND ── */
.legend{display:flex;gap:1.4rem;align-items:center;padding:.65rem 2rem;border-bottom:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--text-2);}
.lswatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── MAP WRAPPER ── */
.map-wrap{padding:1.5rem 2rem;overflow-x:auto;}
.map-svg-container{max-width:720px;margin:0 auto;filter:drop-shadow(var(--map-shadow));}
svg.map{width:100%;height:auto;display:block;}

/* ── SVG NODE STYLES ── */
.node{cursor:pointer;transition:filter .15s;}
.node:hover{filter:brightness(1.15);}
.node rect{rx:6;ry:6;stroke-width:1.5;}
.c-amber rect{fill:var(--amber-soft);stroke:var(--amber-mid);}
.c-amber text{fill:var(--amber);}
.c-teal rect{fill:var(--teal-soft);stroke:var(--teal-mid);}
.c-teal text{fill:var(--teal);}
.c-gray rect{fill:var(--surface-3);stroke:var(--border-2);}
.c-gray text{fill:var(--text-2);}
.node-label{font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;}
.node-sub{font-family:'DM Sans',sans-serif;font-size:8px;opacity:.85;}
.conn{stroke:var(--border-2);stroke-width:1;stroke-dasharray:4 3;}
.hint-lbl{font-family:'DM Mono',monospace;font-size:8px;fill:var(--text-3);text-anchor:middle;}
.done-node{opacity:.45;}

/* ── PANEL ── */
.panel-wrap{padding:0 2rem 2rem;max-width:800px;margin:0 auto;}
.card-panel{
  display:none;
  background:linear-gradient(135deg, var(--card-a), var(--card-b));
  border:1px solid var(--border-2);
  border-radius:12px;
  box-shadow:var(--panel-shadow);
  overflow:hidden;
}
.card-panel.open{display:block;}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.25rem;
  border-bottom:1px solid var(--border);
  background:var(--surface-2);
  gap:.75rem;flex-wrap:wrap;
}
.panel-label{font-family:'DM Mono',monospace;font-size:.7rem;padding:.2rem .55rem;border-radius:4px;}
.pl-amber{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber-mid);}
.pl-teal{background:var(--teal-soft);color:var(--teal);border:1px solid var(--teal-mid);}
.panel-title{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600;color:var(--text);flex:1;}
.close-btn{background:transparent;border:1px solid var(--border-2);color:var(--text-2);border-radius:6px;padding:.25rem .6rem;cursor:pointer;font-size:.8rem;transition:all .15s;}
.close-btn:hover{background:var(--surface-3);color:var(--text);}

/* ── CARD NAV ── */
.card-nav{display:flex;align-items:center;gap:.6rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface);}
.nav-btn{
  font-family:'DM Mono',monospace;font-size:.72rem;padding:.3rem .7rem;
  background:var(--nav-bg);color:var(--nav-text);border:1px solid var(--border-2);
  border-radius:6px;cursor:pointer;transition:all .15s;
}
.nav-btn:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text);}
.nav-btn:disabled{opacity:.4;cursor:default;}
.card-counter{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-2);flex:1;text-align:center;}
.progress-dots{display:flex;gap:4px;flex-wrap:wrap;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border-2);transition:background .2s;}
.dot.partial{background:var(--amber-dim);}
.dot.done{background:var(--green);}

/* ── CARD BODY ── */
.card-body{padding:1.25rem 1.5rem;}
.card-title{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-2);margin-bottom:.65rem;letter-spacing:.04em;}
.card-text{font-size:.95rem;line-height:1.7;color:var(--text);}
.card-hint{font-size:.82rem;line-height:1.55;color:var(--text-2);margin-top:.85rem;padding:.6rem .85rem;background:var(--surface-3);border-left:3px solid var(--teal-mid);border-radius:0 6px 6px 0;font-style:italic;}

/* ── OCCLUSION ── */
.occ{
  display:inline-block;min-width:3ch;
  background:var(--text);color:transparent;
  border:1px solid transparent;border-radius:3px;
  cursor:pointer;padding:1px 6px;white-space:nowrap;
  user-select:none;vertical-align:baseline;
  transition:background .15s, color .15s, border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15);opacity:1;}
.occ.rev    {background:var(--green-soft);color:var(--green); cursor:default;border-color:rgba(52,211,153,.25);}
.occ.needed {background:var(--amber-soft);color:var(--amber); cursor:default;border-color:rgba(246,165,51,.25);}
.occ.unscored{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.20);}
.score-row{display:inline-flex;gap:.3rem;margin-left:.4rem;vertical-align:middle;}
.sc-btn{font-family:'DM Mono',monospace;font-size:.65rem;padding:.15rem .4rem;border-radius:4px;border:none;cursor:pointer;transition:all .15s;}
.sc-knew{background:var(--green-soft);color:var(--green);}
.sc-knew:hover{background:var(--green-mid);}
.sc-need{background:var(--amber-soft);color:var(--amber);}
.sc-need:hover{background:var(--amber-mid);}
.jump-link{font-family:'DM Mono',monospace;font-size:.65rem;margin-left:.35rem;padding:.15rem .4rem;border-radius:4px;background:var(--teal-soft);color:var(--teal);border:1px solid var(--teal-mid);cursor:pointer;vertical-align:middle;text-decoration:none;}
.jump-link:hover{background:var(--teal-mid);}

/* ── TABLE QUIZ ── */
.tblq-note{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  background:var(--amber-soft);border:1px solid var(--amber-mid);border-radius:6px;
  padding:.55rem .85rem;margin-bottom:.85rem;}
.tblq-copy{font-size:.78rem;color:var(--amber);font-style:italic;}
.tblq-actions{display:none;}
.tblq-pill{font-family:'DM Mono',monospace;font-size:.65rem;padding:.15rem .45rem;background:var(--amber-mid);color:var(--amber);border-radius:4px;}
.tblq-btn{font-family:'DM Mono',monospace;font-size:.65rem;padding:.15rem .45rem;border:1px solid var(--amber-mid);background:transparent;color:var(--amber);border-radius:4px;cursor:pointer;}
.tblq-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border-2);}
table.tblq{width:100%;border-collapse:collapse;}
table.tblq thead tr{background:linear-gradient(90deg, var(--table-head-a), var(--table-head-b));}
table.tblq th{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-2);padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border-2);}
table.tblq td{padding:.55rem .75rem;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle;}
table.tblq tr:last-child td{border-bottom:none;}
table.tblq th[scope="row"]{color:var(--text);font-weight:500;white-space:nowrap;background:var(--surface-2);}
.tblq td .occ{display:block;text-align:center;white-space:normal;padding:10px 12px;min-width:180px;}
.tblq td .score-row{display:flex;justify-content:center;margin:4px 0 0;margin-left:0;}

/* ── CARD ACTIONS ── */
.card-actions{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  padding:.7rem 1.25rem;background:var(--card-action-bg);border-top:1px solid var(--border);
}
.meta-pills{display:flex;gap:.4rem;flex-wrap:wrap;}
.meta-pill{font-family:'DM Mono',monospace;font-size:.65rem;padding:.2rem .5rem;border-radius:4px;background:var(--meta-bg);color:var(--text-2);border:1px solid var(--border);}
.meta-pill.p-rev{color:var(--green);}
.meta-pill.p-knew{color:var(--green);}
.meta-pill.p-need{color:var(--amber);}
.meta-pill.p-wait{color:var(--teal);}
.action-btns{display:flex;gap:.4rem;flex-wrap:wrap;}
.btn-reveal{font-family:'DM Mono',monospace;font-size:.72rem;padding:.3rem .75rem;border-radius:6px;border:none;cursor:pointer;background:var(--teal-soft);color:var(--teal);border:1px solid var(--teal-mid);transition:all .15s;}
.btn-reveal:hover:not(:disabled){background:var(--teal-mid);}
.btn-reveal:disabled{opacity:.35;cursor:default;}
.btn-knew-all{font-family:'DM Mono',monospace;font-size:.72rem;padding:.3rem .75rem;border-radius:6px;border:1px solid var(--amber-mid);background:var(--amber-soft);color:var(--amber);cursor:pointer;transition:all .15s;}
.btn-knew-all:hover:not(:disabled){background:var(--amber-mid);}
.btn-knew-all:disabled{opacity:.35;cursor:default;}
.btn-reset-card{font-family:'DM Mono',monospace;font-size:.72rem;padding:.3rem .7rem;border-radius:6px;background:transparent;border:1px solid var(--border-2);color:var(--text-2);cursor:pointer;transition:all .15s;}
.btn-reset-card:hover:not(:disabled){background:var(--surface-3);}
.btn-reset-card:disabled{opacity:.3;cursor:default;}

/* ── STATS BAR ── */
.stats-bar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  padding:.65rem 2rem;border-top:1px solid var(--border);margin-top:1rem;
  background:var(--surface);border-radius:8px;max-width:800px;margin:1rem auto 0;
}
.stats-left{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.stat-pill{font-family:'DM Mono',monospace;font-size:.68rem;padding:.2rem .5rem;border-radius:4px;background:var(--surface-2);color:var(--text-2);}
.stat-pill.s-rev{color:var(--text);}
.stat-pill.s-knew{color:var(--green);}
.stat-pill.s-need{color:var(--amber);}
.stat-pill.s-done{color:var(--teal);}
.stats-right{display:flex;gap:.4rem;flex-wrap:wrap;}
.btn-showall{font-family:'DM Mono',monospace;font-size:.68rem;padding:.25rem .65rem;border-radius:5px;background:var(--showall-bg);color:var(--showall-text);border:1px solid var(--amber-mid);cursor:pointer;transition:all .15s;}
.btn-showall:hover:not(:disabled){filter:brightness(1.1);}
.btn-showall:disabled{opacity:.3;cursor:default;}
.btn-review{font-family:'DM Mono',monospace;font-size:.68rem;padding:.25rem .65rem;border-radius:5px;background:var(--teal-soft);color:var(--teal);border:1px solid var(--teal-mid);cursor:pointer;display:none;transition:all .15s;}
.btn-review:hover{background:var(--teal-mid);}
.btn-reset-all{font-family:'DM Mono',monospace;font-size:.68rem;padding:.25rem .65rem;border-radius:5px;background:transparent;border:1px solid var(--border-2);color:var(--text-2);cursor:pointer;transition:all .15s;}
.btn-reset-all:hover{background:var(--surface-3);}

/* ── REVIEW PANEL ── */
.review-panel{
  display:none;max-width:800px;margin:1rem auto 2rem;
  background:linear-gradient(135deg, var(--card-a), var(--card-b));
  border:1px solid var(--border-2);border-radius:12px;box-shadow:var(--panel-shadow);overflow:hidden;
}
.review-panel.open{display:block;}
.review-header{padding:.85rem 1.25rem;background:var(--surface-2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
.review-title{font-family:'Crimson Pro',serif;font-size:1.05rem;font-weight:600;color:var(--teal);}
.rsub{font-family:'DM Mono',monospace;font-size:.68rem;padding:.35rem .85rem;background:var(--amber-soft);color:var(--amber);border-bottom:1px solid var(--amber-mid);}
.review-nav{display:flex;gap:.5rem;align-items:center;padding:.6rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface);}
.review-counter{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-2);flex:1;text-align:center;}
.review-body{padding:1.25rem 1.5rem;}
.review-close{background:transparent;border:1px solid var(--border-2);color:var(--text-2);border-radius:6px;padding:.25rem .6rem;cursor:pointer;font-size:.8rem;}
.review-close:hover{background:var(--surface-3);color:var(--text);}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .action-btns,.stats-right,.meta-pills{width:100%;}
  .map-wrap{padding:1rem;}
  .panel-wrap{padding:0 1rem 1.5rem;}
  .stats-bar{margin:1rem 1rem 0;}
}
</style>
</head>
<body>

<header>
  <div class="hero-top">
    <div class="hero-copy">
      <div class="eyebrow">Block 5 · Dr. Peter Morganelli, Ph.D.</div>
      <h1>Glucocorticoids &amp; the HPA Axis</h1>
      <p id="deckMeta" class="sub"></p>
    </div>
    <div class="theme-switch">
      <button class="theme-btn active" data-theme="slate" onclick="setTheme('slate')">Slate</button>
      <button class="theme-btn" data-theme="cream" onclick="setTheme('cream')">Cream</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
    </div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="lswatch" style="background:var(--amber)"></div>Program Learning Outcomes (PLO)</div>
  <div class="legend-item"><div class="lswatch" style="background:var(--teal)"></div>Lecture Objectives (LO)</div>
</div>

<div class="map-wrap">
  <div class="map-svg-container">
    <svg class="map" viewBox="0 0 720 330" xmlns="http://www.w3.org/2000/svg">
      <!-- connectors PLO top row → center -->
      <line class="conn" x1="115" y1="56" x2="275" y2="148"/>
      <line class="conn" x1="270" y1="56" x2="310" y2="148"/>
      <line class="conn" x1="450" y1="56" x2="410" y2="148"/>
      <line class="conn" x1="605" y1="56" x2="445" y2="148"/>
      <!-- connectors LO bottom row → center -->
      <line class="conn" x1="115" y1="264" x2="275" y2="178"/>
      <line class="conn" x1="270" y1="264" x2="310" y2="178"/>
      <line class="conn" x1="450" y1="264" x2="410" y2="178"/>
      <line class="conn" x1="605" y1="264" x2="445" y2="178"/>

      <!-- PLO nodes (top row, amber) -->
      <g id="n-plo1" class="node c-amber" onclick="selNode('plo1')">
        <rect x="50" y="16" width="130" height="52" rx="7"/>
        <text class="node-label" x="115" y="39" text-anchor="middle">PLO 1</text>
        <text class="node-sub" x="115" y="56" text-anchor="middle">Adrenal Steroids &amp;</text>
        <text class="node-sub" x="115" y="66" text-anchor="middle">Steroidogenesis</text>
      </g>
      <g id="n-plo2" class="node c-amber" onclick="selNode('plo2')">
        <rect x="205" y="16" width="130" height="52" rx="7"/>
        <text class="node-label" x="270" y="39" text-anchor="middle">PLO 2</text>
        <text class="node-sub" x="270" y="56" text-anchor="middle">HPA Axis</text>
        <text class="node-sub" x="270" y="66" text-anchor="middle">Regulation</text>
      </g>
      <g id="n-plo3" class="node c-amber" onclick="selNode('plo3')">
        <rect x="385" y="16" width="130" height="52" rx="7"/>

      { t:"Cushing's Syndrome — Symptoms & ACTH Suppression",
        b:"Cushing's symptoms: {obesity} with central fat redistribution, {diabetes} (insulin resistance), {hypertension}, {buffalo hump} (dorsocervical fat), {moon face} (facial adiposity), {thinning of skin}, easy {bruising}, osteoporosis, immunosuppression. In primary and iatrogenic Cushing's, high cortisol completely inhibits {ACTH} production; lack of trophic ACTH → {adrenal atrophy}. Risk: stopping exogenous GCs abruptly → {adrenal crisis}.",
        h:'Iatrogenic Cushing\'s is most common (from GC therapy). Adrenal atrophy during therapy means the patient\'s HPA axis cannot recover quickly — must taper GC therapy slowly.' },
      { t:"Adrenal Insufficiency Comparison — Table Quiz",
        b:`<div class="tblq-note"><div class="tblq-copy">Table quiz — Feature column stays visible. Compare primary (Addison's) vs secondary adrenal insufficiency and Cushing's syndrome.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Feature</th><th>Primary (Addison's)</th><th>Secondary</th><th>Cushing's Syndrome</th></tr></thead><tbody><tr><th scope="row">Cortisol</th><td>{Low}</td><td>{Low}</td><td>{High}</td></tr><tr><th scope="row">ACTH</th><td>{High ↑ (no feedback)}</td><td>{Low ↓}</td><td>{Low (primary/iatrogenic) or High (pituitary/ectopic)}</td></tr><tr><th scope="row">Aldosterone</th><td>{Low (adrenal damage)}</td><td>{Normal (not ACTH-regulated)}</td><td>{Normal or low}</td></tr><tr><th scope="row">Hyperpigmentation</th><td>{Yes — ↑ACTH → MCR1}</td><td>{No — ACTH is low}</td><td>{No (unless ectopic ACTH)}</td></tr><tr><th scope="row">Blood Pressure</th><td>{Low (hypotension)}</td><td>{Low}</td><td>{High (hypertension)}</td></tr><tr><th scope="row">Blood Glucose</th><td>{Low (hypoglycemia)}</td><td>{Low}</td><td>{High (diabetes/insulin resistance)}</td></tr></tbody></table></div>`,
        h:'Ectopic ACTH tumors produce very high ACTH → hyperpigmentation despite Cushing\'s syndrome — useful distinguishing feature. High-dose dexamethasone: suppresses pituitary Cushing\'s but NOT ectopic or primary.' }
    ]
  }
};

const LINKS = {
  'cholesterol':['plo1','PLO 1','amber'], 'Cholesterol':['plo1','PLO 1','amber'],
  'pregnenolone':['plo1','PLO 1','amber'], 'Pregnenolone':['plo1','PLO 1','amber'],
  'ACTH':['plo2','PLO 2','amber'], 'CRH':['plo2','PLO 2','amber'],
  'POMC':['plo2','PLO 2','amber'],
  'GR1':['plo3','PLO 3','amber'], 'GR2':['plo3','PLO 3','amber'],
  'CBG':['lo2','LO 2','teal'],
  'corticosteroid-binding globulin':['lo2','LO 2','teal'],
  'epinephrine':['lo1','LO 1','teal'], 'Epinephrine':['lo1','LO 1','teal'],
  'norepinephrine':['lo1','LO 1','teal'],
  'PNMT':['lo1','LO 1','teal'],
  '11-HSD1':['lo3','LO 3','teal'], '11-HSD2':['lo3','LO 3','teal'],
  'apparent mineralocorticoid excess (AME)':['lo3','LO 3','teal'],
  'hyperpigmentation':['lo4','LO 4','teal'],
  'gluconeogenesis':['plo4','PLO 4','amber'],
  'NFκB':['plo4','PLO 4','amber'],
  'lipocortin':['plo4','PLO 4','amber'],
};

/* ── STATE ── */
let cur=null, ci=0;
let tr={}, sc={};
let done=new Set();
let totRev=0, totKnew=0, totNeed=0;
let revQueue=[], revIdx=0, revTr={};

/* ── INIT ── */
function initNode(id){
  if(!tr[id]){tr[id]={}; sc[id]={};}
  const n=D[id].cards.length;
  for(let i=0;i<n;i++){
    if(!tr[id][i]) tr[id][i]=new Set();
    if(!sc[id][i]) sc[id][i]={};
  }
}

/* ── SELECT NODE ── */
function selNode(id){
  if(cur===id){closePanel();return;}
  cur=id; ci=0;
  initNode(id);
  const node=D[id];
  const panel=document.getElementById('cardPanel');
  const lbl=document.getElementById('panelLabel');
  lbl.textContent=node.label;
  lbl.className='panel-label '+(node.type==='PLO'?'pl-amber':'pl-teal');
  document.getElementById('panelTitle').textContent=node.sub;
  panel.classList.add('open');
  document.getElementById('btnRevTopic').disabled=false;
  render();
}
function closePanel(){
  document.getElementById('cardPanel').classList.remove('open');
  cur=null;
  document.getElementById('btnRevTopic').disabled=true;
}

/* ── RENDER ── */
function countTerms(body){
  return(body.match(/\{([^}]+)\}/g)||[]).length;
}
function render(){
  if(!cur)return;
  initNode(cur);
  const cards=D[cur].cards;
  const card=cards[ci];
  document.getElementById('cardTitle').textContent=card.t;
  document.getElementById('cardText').innerHTML=parseBody(card.b,cur,ci,{});
  const hint=document.getElementById('cardHint');
  if(card.h){hint.textContent=card.h;hint.style.display='block';}
  else{hint.style.display='none';}
  document.getElementById('cardCounterTxt').textContent=`Card ${ci+1} / ${cards.length}`;
  document.getElementById('btnPrev').disabled=(ci===0);
  document.getElementById('btnNext').disabled=(ci===cards.length-1);
  // progress dots
  const dotsEl=document.getElementById('progressDots');
  dotsEl.innerHTML='';
  cards.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot';
    const n=countTerms(cards[i].b);
    const rev=(tr[cur][i]||new Set()).size;
    if(rev>0&&rev<n) d.classList.add('partial');
    else if(n>0&&rev>=n) d.classList.add('done');
    d.onclick=((idx)=>()=>{ci=idx;render();})(i);
    d.style.cursor='pointer';
    dotsEl.appendChild(d);
  });
  updateCardActions();
  updateStats();
}

/* ── PARSE BODY ── */
function parseBody(body,nid,cidx,opts){
  if(body.includes('<div class="tblq')) return parseTblq(body,nid,cidx,opts);
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    const revealed=(opts.forReview ? (opts.revealedSet&&opts.revealedSet.has(idx)) : (tr[nid]&&tr[nid][cidx]&&tr[nid][cidx].has(idx)));
    const scored=(sc[nid]&&sc[nid][cidx]&&sc[nid][cidx][idx]);
    const isTarget=opts.forReview&&idx===opts.targetTermIdx;
    if(opts.forReview){
      if(isTarget){
        const cls=revealed?'occ unscored':'occ';
        return `<span class="${cls}" onclick="revealReviewTerm(${idx})">${t}</span>`;
      }
      return `<span style="color:var(--text-2)">${t}</span>`;
    }
    // normal mode
    let cls='occ';
    if(revealed){
      if(scored==='knew') cls='occ rev';
      else if(scored==='needed') cls='occ needed';
      else cls='occ unscored';
    }
    let html=`<span class="${cls}" onclick="revealTerm(event,'${nid}',${cidx},${idx})">${t}</span>`;
    if(revealed&&!scored){
      html+=`<span class="score-row"><button class="sc-btn sc-knew" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button><button class="sc-btn sc-need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button></span>`;
    }
    if(revealed&&LINKS[t]&&LINKS[t][0]!==nid){
      const lk=LINKS[t];
      html+=`<a class="jump-link" onclick="selNode('${lk[0]}')" style="border-color:var(--${lk[2]}-mid);color:var(--${lk[2]});background:var(--${lk[2]}-soft)">→ ${lk[1]}</a>`;
    }
    return html;
  });
}

function parseTblq(body,nid,cidx,opts){
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    const revealed=(opts.forReview ? (opts.revealedSet&&opts.revealedSet.has(idx)) : (tr[nid]&&tr[nid][cidx]&&tr[nid][cidx].has(idx)));
    const scored=(sc[nid]&&sc[nid][cidx]&&sc[nid][cidx][idx]);
    let cls='occ';
    if(revealed){
      if(scored==='knew') cls='occ rev';
      else if(scored==='needed') cls='occ needed';
      else cls='occ unscored';
    }
    let html=`<span class="${cls}" onclick="revealTerm(event,'${nid}',${cidx},${idx})">${t}</span>`;
    if(revealed&&!scored&&!opts.forReview){
      html+=`<div class="score-row"><button class="sc-btn sc-knew" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button><button class="sc-btn sc-need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button></div>`;
    }
    return html;
  });
}

/* ── REVEAL TERM ── */
function revealTerm(e,nid,cidx,tidx){
  e.stopPropagation();
  initNode(nid);
  if(tr[nid][cidx].has(tidx)) return;
  tr[nid][cidx].add(tidx);
  totRev++;
  if(nid===cur&&cidx===ci) render();
  else updateStats();
  checkDone(nid);
  saveProgress();
}

/* ── SCORE ── */
function scoreIt(e,nid,cidx,tidx,score){
  e.stopPropagation();
  if(sc[nid][cidx][tidx]) return;
  sc[nid][cidx][tidx]=score;
  if(score==='knew') totKnew++;
  else totNeed++;
  if(nid===cur&&cidx===ci) render();
  else updateStats();
  saveProgress();
}

/* ── CARD ACTIONS ── */
function cardMetrics(){
  if(!cur) return {total:0,revealed:0,unscored:0,knew:0,needed:0,allRevealed:false};
  initNode(cur);
  const body=D[cur].cards[ci].b;
  const total=countTerms(body);
  const revSet=tr[cur][ci]||new Set();
  const revealed=revSet.size;
  let knew=0,needed=0,unscored=0;
  revSet.forEach(tidx=>{
    const s=sc[cur][ci][tidx];
    if(s==='knew') knew++;
    else if(s==='needed') needed++;
    else unscored++;
  });
  return{total,revealed,unscored,knew,needed,allRevealed:(total>0&&revealed>=total)};
}
function updateCardActions(){
  const m=cardMetrics();
  const pills=document.getElementById('metaPills');
  pills.innerHTML='';
  const add=(txt,cls)=>{const p=document.createElement('span');p.className='meta-pill '+cls;p.textContent=txt;pills.appendChild(p);};
  add(`${m.revealed}/${m.total} revealed`,'p-rev');
  if(m.knew>0) add(`${m.knew} knew`,'p-knew');
  if(m.needed>0) add(`${m.needed} needed help`,'p-need');
  if(m.unscored>0) add(`${m.unscored} to score`,'p-wait');
  document.getElementById('btnRevealCard').disabled=(m.total===0||m.allRevealed);
  document.getElementById('btnKnewAll').disabled=!m.allRevealed;
  document.getElementById('btnResetCard').disabled=(m.revealed===0&&m.knew===0&&m.needed===0);
}

function revealCard(){
  if(!cur) return;
  initNode(cur);
  const body=D[cur].cards[ci].b;
  const n=countTerms(body);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){tr[cur][ci].add(i);totRev++;}
  }
  checkDone(cur);
  render();
  saveProgress();
}
function knewAllCurrentCard(){
  if(!cur) return;
  initNode(cur);
  const body=D[cur].cards[ci].b;
  const n=countTerms(body);
  for(let i=0;i<n;i++){
    const prev=sc[cur][ci][i];
    if(prev==='knew') continue;
    if(prev==='needed') totNeed--;
    sc[cur][ci][i]='knew';
    totKnew++;
  }
  render();
  saveProgress();
}
function resetCard(){
  if(!cur) return;
  initNode(cur);
  const body=D[cur].cards[ci].b;
  const n=countTerms(body);
  for(let i=0;i<n;i++){
    if(tr[cur][ci].has(i)){tr[cur][ci].delete(i);totRev=Math.max(0,totRev-1);}
    const s=sc[cur][ci][i];
    if(s==='knew') totKnew=Math.max(0,totKnew-1);
    else if(s==='needed') totNeed=Math.max(0,totNeed-1);
    delete sc[cur][ci][i];
  }
  done.delete(cur);
  document.getElementById('n-'+cur)&&document.getElementById('n-'+cur).classList.remove('done-node');
  render();
  saveProgress();
}

/* ── NAVIGATION ── */
function prevCard(){ if(ci>0){ci--;render();} }
function nextCard(){ if(cur&&ci<D[cur].cards.length-1){ci++;render();} }

/* ── BULK REVEALS ── */
function revealTopicAll(){
  if(!cur) return;
  initNode(cur);
  D[cur].cards.forEach((_,cidx)=>{
    const n=countTerms(D[cur].cards[cidx].b);
    for(let i=0;i<n;i++){
      if(!tr[cur][cidx].has(i)){tr[cur][cidx].add(i);totRev++;}
    }
  });
  checkDone(cur); render(); saveProgress();
}
function revealDeckAll(){
  Object.keys(D).forEach(id=>{
    initNode(id);
    D[id].cards.forEach((_,cidx)=>{
      const n=countTerms(D[id].cards[cidx].b);
      for(let i=0;i<n;i++){
        if(!tr[id][cidx].has(i)){tr[id][cidx].add(i);totRev++;}
      }
    });
    checkDone(id);
  });
  render(); saveProgress();
}

/* ── DONE CHECK ── */
function checkDone(id){
  if(done.has(id)) return;
  const all=D[id].cards.every((_,cidx)=>{
    const n=countTerms(D[id].cards[cidx].b);
    return n===0||(tr[id][cidx]&&tr[id][cidx].size>=n);
  });
  if(all){done.add(id);document.getElementById('n-'+id)&&document.getElementById('n-'+id).classList.add('done-node');}
}

/* ── STATS ── */
function updateStats(){
  document.getElementById('stRev').textContent=`${totRev} revealed`;
  document.getElementById('stKnew').textContent=`${totKnew} knew`;
  document.getElementById('stNeed').textContent=`${totNeed} needed`;
  document.getElementById('stDone').textContent=`${done.size} / ${Object.keys(D).length} done`;
  const rBtn=document.getElementById('btnReview');
  if(totNeed>0){rBtn.textContent=`Review weak spots (${totNeed})`;rBtn.style.display='inline-block';}
  else{rBtn.style.display='none';}
}

/* ── RESET ALL ── */
function resetAll(){
  if(!confirm('Reset all progress?')) return;
  tr={}; sc={}; done=new Set(); totRev=0; totKnew=0; totNeed=0;
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('done-node'));
  closeReview();
  if(cur) render(); updateStats();
  document.cookie=COOKIE+'=; max-age=0; path=/; SameSite=Lax';
}

/* ── REVIEW MODE ── */
function startReview(){
  revQueue=[];
  Object.keys(D).forEach(id=>{
    initNode(id);
    D[id].cards.forEach((card,cidx)=>{
      let i=0;
      card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
        const idx=i++;
        if(sc[id]&&sc[id][cidx]&&sc[id][cidx][idx]==='needed'){
          revQueue.push({nid:id,cidx,tidx:idx,term:t,title:card.t});
        }
      });
    });
  });
  shuffle(revQueue);
  revIdx=0; revTr={};
  if(revQueue.length===0) return;
  document.getElementById('reviewPanel').classList.add('open');
  renderReview();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function closeReview(){document.getElementById('reviewPanel').classList.remove('open');}
function reviewPrev(){if(revIdx>0){revIdx--;renderReview();}}
function reviewNext(){if(revIdx<revQueue.length-1){revIdx++;renderReview();}}
function revealReviewTerm(idx){
  const key=revIdx;
  if(!revTr[key]) revTr[key]=new Set();
  revTr[key].add(idx);
  renderReview();
}
function renderReview(){
  const q=revQueue[revIdx];
  if(!q) return;
  const card=D[q.nid].cards[q.cidx];
  const node=D[q.nid];
  document.getElementById('rSubBar').textContent=`${node.label} — ${node.sub} · Card: "${card.t}" · Term to recall: ${q.term}`;
  document.getElementById('rCardTitle').textContent=card.t;
  const revSet=revTr[revIdx]||new Set();
  document.getElementById('rCardText').innerHTML=parseBody(card.b,q.nid,q.cidx,{forReview:true,targetTermIdx:q.tidx,revealedSet:revSet});
  document.getElementById('rCounter').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rBtnPrev').disabled=revIdx===0;
  document.getElementById('rBtnNext').disabled=revIdx===revQueue.length-1;
}

/* ── COOKIE PERSISTENCE ── */
const COOKIE='hpa_anki_v1';
function saveProgress(){
  const r={},s={};
  Object.keys(tr).forEach(id=>{
    r[id]=[]; s[id]=[];
    const nc=D[id].cards.length;
    for(let c=0;c<nc;c++){
      const set=tr[id][c]||new Set();
      r[id][c]=[...set].join('.');
      const scores=sc[id][c]||{};
      s[id][c]=Object.keys(scores).map(k=>k+(scores[k]==='knew'?'k':'n')).join('.');
    }
  });
  const payload=JSON.stringify({c:cur,i:ci,r,s});
  document.cookie=COOKIE+'='+encodeURIComponent(payload)+'; max-age='+60*60*24*180+'; path=/; SameSite=Lax';
}
function loadProgress(){
  const match=document.cookie.split(';').find(c=>c.trim().startsWith(COOKIE+'='));
  if(!match) return;
  try{
    const payload=JSON.parse(decodeURIComponent(match.split('=').slice(1).join('=')));
    cur=payload.c||null; ci=payload.i||0;
    Object.keys(payload.r||{}).forEach(id=>{
      if(!D[id]) return;
      initNode(id);
      (payload.r[id]||[]).forEach((str,cidx)=>{
        if(str) str.split('.').forEach(v=>{if(v!=='') tr[id][cidx].add(parseInt(v));});
      });
      (payload.s[id]||[]).forEach((str,cidx)=>{
        if(str) str.split('.').forEach(tok=>{
          if(!tok) return;
          const isKnew=tok.endsWith('k');
          const idx=parseInt(tok.slice(0,-1));
          sc[id][cidx][idx]=isKnew?'knew':'needed';
        });
      });
    });
  }catch(e){console.warn('Progress load error',e);}
}
function recalcState(){
  totRev=0;totKnew=0;totNeed=0;done=new Set();
  Object.keys(D).forEach(id=>{
    initNode(id);
    D[id].cards.forEach((_,cidx)=>{
      (tr[id][cidx]||new Set()).forEach(tidx=>{
        totRev++;
        const s=(sc[id][cidx]||{})[tidx];
        if(s==='knew') totKnew++;
        else if(s==='needed') totNeed++;
      });
    });
    checkDone(id);
    if(done.has(id)) document.getElementById('n-'+id)&&document.getElementById('n-'+id).classList.add('done-node');
  });
  updateStats();
}
function restoreSession(){
  loadProgress();
  recalcState();
  if(cur&&D[cur]){
    selNode(cur);
    ci=Math.min(ci,D[cur].cards.length-1);
    render();
  }
}

/* ── THEME ── */
function setTheme(t){
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));
  if(t==='slate') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('hpa-anki-theme',t);}catch(_){}
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  const revOpen=document.getElementById('reviewPanel').classList.contains('open');
  if(revOpen){
    if(e.key==='ArrowLeft') reviewPrev();
    else if(e.key==='ArrowRight') reviewNext();
    else if(e.key==='Escape') closeReview();
    return;
  }
  if(e.key==='ArrowLeft') prevCard();
  else if(e.key==='ArrowRight') nextCard();
  else if(e.key==='Escape') closePanel();
});

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded',()=>{
  const totalCards=Object.values(D).reduce((n,node)=>n+node.cards.length,0);
  document.getElementById('deckMeta').textContent=
    `Active recall map · ${Object.keys(D).length} topics · ${totalCards} cards`;
  try{const t=localStorage.getItem('hpa-anki-theme');if(t)setTheme(t);}catch(_){}
  restoreSession();
  updateStats();
});
</script>
</body>
</html>
