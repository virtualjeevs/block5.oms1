<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contextual Anki — Morganelli: Cortisol &amp; HPA Axis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --surface:#131929;
  --surface-2:#19223a;
  --surface-3:#1f2a42;
  --surface-4:#24314e;
  --amber:#f6a533;
  --amber-soft:rgba(246,165,51,.13);
  --amber-mid:rgba(246,165,51,.25);
  --amber-dim:rgba(246,165,51,.55);
  --teal:#2dd4bf;
  --teal-soft:rgba(45,212,191,.12);
  --teal-mid:rgba(45,212,191,.22);
  --teal-dim:rgba(45,212,191,.5);
  --green:#34d399;
  --green-soft:rgba(52,211,153,.13);
  --green-mid:rgba(52,211,153,.22);
  --red:#f87171;
  --red-soft:rgba(248,113,113,.12);
  --red-mid:rgba(248,113,113,.22);
  --text:#dde5f0;
  --text-2:#7e90a9;
  --text-3:#3e5065;
  --border:#1c2a40;
  --border-2:#243348;
  --hero-glow-a:rgba(45,212,191,.08);
  --hero-glow-b:rgba(246,165,51,.09);
  --bg-top:#0b0f1a;
  --bg-bottom:#0d1321;
  --map-shadow:0 20px 45px rgba(0,0,0,.22);
  --panel-shadow:0 22px 48px rgba(0,0,0,.24);
  --header-shadow:0 22px 50px rgba(0,0,0,.24);
}
html[data-theme="cream"]{
  --bg:#f4efe4;
  --surface:#fffaf1;
  --surface-2:#f6efe2;
  --surface-3:#efe5d3;
  --surface-4:#e4d5ba;
  --amber:#b86519;
  --amber-soft:rgba(184,101,25,.13);
  --amber-mid:rgba(184,101,25,.22);
  --amber-dim:rgba(184,101,25,.45);
  --teal:#0f8a7b;
  --teal-soft:rgba(15,138,123,.12);
  --teal-mid:rgba(15,138,123,.2);
  --teal-dim:rgba(15,138,123,.42);
  --green:#21885a;
  --green-soft:rgba(33,136,90,.12);
  --green-mid:rgba(33,136,90,.22);
  --red:#c65a52;
  --red-soft:rgba(198,90,82,.12);
  --red-mid:rgba(198,90,82,.22);
  --text:#2f2a24;
  --text-2:#6c5f51;
  --text-3:#a28d78;
  --border:#e4d5ba;
  --border-2:#d6c2a1;
  --hero-glow-a:rgba(15,138,123,.08);
  --hero-glow-b:rgba(184,101,25,.08);
  --bg-top:#f7f2e8;
  --bg-bottom:#efe7d9;
  --map-shadow:0 18px 40px rgba(106,80,45,.11);
  --panel-shadow:0 20px 42px rgba(106,80,45,.12);
  --header-shadow:0 18px 42px rgba(106,80,45,.12);
  --header-a:rgba(255,250,241,.96);
  --header-b:rgba(246,239,226,.92);
  --card-a:rgba(255,251,244,.98);
  --card-b:rgba(246,239,226,.98);
  --card-action-bg:rgba(239,229,211,.86);
  --nav-bg:rgba(246,239,226,.95);
  --nav-bg-hover:rgba(239,229,211,.98);
  --nav-text:#5f5141;
  --showall-bg:rgba(255,250,241,.92);
  --showall-text:#5f5141;
  --meta-bg:rgba(255,250,241,.8);
  --table-head-a:#0f8a7b;
  --table-head-b:#b86519;
}
html[data-theme="forest"]{
  --bg:#081512;
  --surface:#0f201b;
  --surface-2:#16302a;
  --surface-3:#1d4037;
  --surface-4:#28544a;
  --amber:#e4b04b;
  --amber-soft:rgba(228,176,75,.12);
  --amber-mid:rgba(228,176,75,.22);
  --amber-dim:rgba(228,176,75,.45);
  --teal:#52d6b7;
  --teal-soft:rgba(82,214,183,.12);
  --teal-mid:rgba(82,214,183,.2);
  --teal-dim:rgba(82,214,183,.42);
  --green:#7ae582;
  --green-soft:rgba(122,229,130,.12);
  --green-mid:rgba(122,229,130,.22);
  --red:#ff8b7a;
  --red-soft:rgba(255,139,122,.12);
  --red-mid:rgba(255,139,122,.22);
  --text:#e4f2ec;
  --text-2:#8fb6aa;
  --text-3:#54756b;
  --border:#1d3a32;
  --border-2:#295049;
  --hero-glow-a:rgba(82,214,183,.08);
  --hero-glow-b:rgba(228,176,75,.08);
  --bg-top:#081512;
  --bg-bottom:#0b1c18;
  --header-a:rgba(15,32,27,.96);
  --header-b:rgba(10,24,21,.92);
  --card-a:rgba(22,48,42,.98);
  --card-b:rgba(15,32,27,.98);
  --card-action-bg:rgba(29,64,55,.82);
  --nav-bg:rgba(22,48,42,.95);
  --nav-bg-hover:rgba(29,64,55,.98);
  --nav-text:#d0e9e0;
  --showall-bg:rgba(15,32,27,.86);
  --showall-text:#c7e7dc;
  --meta-bg:rgba(255,255,255,.04);
  --table-head-a:#1f7a67;
  --table-head-b:#d79f42;
}
html:not([data-theme]),html[data-theme="slate"]{
  --header-a:rgba(25,34,58,.78);
  --header-b:rgba(19,25,41,.56);
  --card-a:rgba(25,34,58,.98);
  --card-b:rgba(21,29,47,.98);
  --card-action-bg:rgba(31,42,66,.55);
  --nav-bg:rgba(25,34,58,.85);
  --nav-bg-hover:rgba(31,42,66,.98);
  --nav-text:#dde5f0;
  --showall-bg:rgba(255,255,255,.03);
  --showall-text:#7e90a9;
  --meta-bg:rgba(221,229,240,.04);
  --table-head-a:#2863d8;
  --table-head-b:#3d7bf4;
}
html{font-size:17px;-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 80px;
}
.wrap{width:100%;max-width:860px}

/* ── Header ── */
header{
  margin-bottom:32px;text-align:center;
  background:linear-gradient(180deg, var(--header-a), var(--header-b));
  border:1px solid var(--border-2);
  box-shadow:var(--header-shadow);
  border-radius:24px;
  padding:24px 20px 20px;
}
.hero-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap
}
.hero-copy{flex:1;min-width:240px}
.theme-switch{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end
}
.theme-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.theme-btn:hover{color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.theme-btn.active{
  background:var(--teal-soft);border-color:rgba(45,212,191,.24);color:var(--teal)
}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:10px;
}
h1{
  font-family:'Crimson Pro',serif;font-weight:600;
  font-size:clamp(32px,5vw,48px);line-height:1.05;
  letter-spacing:-.025em;color:var(--text);margin-bottom:6px;
}
.sub{font-size:14px;color:var(--text-2)}

/* ── Legend ── */
.legend{display:flex;gap:18px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-2)}
.lswatch{width:9px;height:9px;border-radius:50%}

/* ── Map ── */
.map-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:20px 16px 14px;margin-bottom:12px;
  overflow:hidden;
  box-shadow:var(--map-shadow);
}
/* SVG classes */
.c-gray rect{fill:var(--surface-3);stroke:var(--border-2);stroke-width:.5}
.c-gray .th{fill:var(--text);font-family:'Crimson Pro',serif;font-size:13px;font-weight:600}
.c-gray .ts{fill:var(--text-2);font-family:'DM Sans',sans-serif;font-size:10px}
.c-amber rect{fill:var(--amber-soft);stroke:var(--amber-dim);stroke-width:.75}
.c-amber .th{fill:var(--amber);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-amber .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.c-teal rect{fill:var(--teal-soft);stroke:var(--teal-dim);stroke-width:.75}
.c-teal .th{fill:var(--teal);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-teal .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.conn{stroke:var(--border-2);stroke-width:1;fill:none;opacity:.7}
.node{cursor:pointer;transition:filter .15s}
.node:hover{filter:brightness(1.25)}
.sel-node.c-amber rect{stroke:var(--amber)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(246,165,51,.5))}
.sel-node.c-teal rect{stroke:var(--teal)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(45,212,191,.4))}
.done-node{opacity:.45}
.hint-lbl{fill:var(--text-3);font-family:'DM Mono',monospace;font-size:9.5px;font-style:italic}

/* ── Panel ── */
.panel,.review-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:22px 20px;margin-bottom:12px;
  display:none;
  box-shadow:var(--panel-shadow);
}
.panel.open{display:block;animation:rise .22s ease-out}
.review-panel.open{display:block;border-color:rgba(246,165,51,.25);animation:rise .22s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.phead{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.badge{
  font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
}
.b-plo{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(246,165,51,.28)}
.b-lo{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(45,212,191,.25)}
.ptitle{font-size:15px;font-weight:500;color:var(--text);flex:1;line-height:1.4}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border-2);transition:background .2s}
.dot.active{background:var(--text)}
.dot.done{background:var(--green)}
.dot.partial{background:var(--amber)}
.xbtn{
  background:none;border:none;cursor:pointer;color:var(--text-3);
  font-size:20px;line-height:1;padding:2px 7px;border-radius:5px;
  transition:color .12s,background .12s;
}
.xbtn:hover{color:var(--text);background:var(--surface-3)}

/* ── Card ── */
.card{
  background:linear-gradient(180deg, var(--card-a), var(--card-b));
  border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.ctitle{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
}
.cbody{font-size:16px;line-height:1.9;color:var(--text)}

.card-actions{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
  gap:12px;margin-top:12px;padding:12px 14px;border-radius:14px;
  border:1px solid var(--border);background:var(--card-action-bg)
}
.card-meta{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--text-2);
  font-size:11px;font-family:'DM Mono',monospace
}
.meta-pill{
  padding:5px 10px;border-radius:999px;border:1px solid var(--border-2);
  background:var(--meta-bg)
}
.meta-pill strong{color:var(--text)}
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.action-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border-2);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:8px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.action-btn:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--surface-4)}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.action-btn.primary{
  background:var(--teal-soft);border-color:rgba(45,212,191,.22);color:var(--teal)
}
.action-btn.primary:hover:not(:disabled){background:var(--teal-mid);color:#dffef8}
.action-btn.amber{
  background:var(--amber-soft);border-color:rgba(246,165,51,.25);color:var(--amber)
}
.action-btn.amber:hover:not(:disabled){background:var(--amber-mid);color:#fff3df}
.action-btn.ghost{
  color:var(--text-3)
}

/* Table quiz */
.tblq-note{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:14px;
  line-height:1.5;
}
.tblq-copy{color:var(--text-2);flex:1;min-width:220px}
.tblq-actions{display:none}
.tblq-pill,.tblq-btn{
  border-radius:999px;padding:8px 14px;font-size:11px;
  font-family:'DM Mono',monospace
}
.tblq-pill{
  background:var(--teal-soft);border:1px solid rgba(45,212,191,.25);color:var(--teal)
}
.tblq-btn{
  background:none;border:1px solid var(--border-2);color:var(--text-2);cursor:pointer
}
.tblq-btn:hover{background:var(--surface-2);color:var(--text)}
.review-panel .tblq-actions{display:none}
.tblq-wrap{
  overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)
}
.tblq{
  width:100%;border-collapse:collapse;font-size:15px;line-height:1.6
}
.tblq thead th{
  background:linear-gradient(135deg,var(--table-head-a),var(--table-head-b));
  color:#f6f9ff;padding:14px 16px;text-align:left;font-weight:600;
  border-right:1px solid rgba(255,255,255,.08)
}
.tblq thead th:last-child{border-right:none}
.tblq tbody th[scope="row"]{
  background:rgba(221,229,240,.06);color:var(--text);font-weight:600;
  padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq tbody td{
  background:rgba(255,255,255,.02);padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq td .occ{
  display:block;text-align:center;white-space:normal;padding:10px 12px;min-width:180px
}
.tblq td .score-row{
  display:flex;justify-content:center;flex-wrap:wrap;margin:8px 0 0
}

/* Occluded terms */
.occ{
  display:inline-block;min-width:3ch;
  background:var(--text);color:transparent;
  border:1px solid transparent;
  border-radius:3px;cursor:pointer;padding:1px 6px;
  white-space:nowrap;user-select:none;
  vertical-align:baseline;
  transition:background .15s,color .15s,border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15)}
.occ.rev{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.25)}
.occ.needed{background:var(--amber-soft);color:var(--amber);cursor:default;border-color:rgba(246,165,51,.25)}
.occ.unscored{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.2)}

/* Score buttons */
.score-row{
  display:inline-flex;gap:3px;margin-left:5px;
  vertical-align:middle;animation:pop .15s ease-out;
}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.sbtn{
  font-size:9px;padding:1px 6px;border-radius:3px;cursor:pointer;
  font-family:'DM Mono',monospace;transition:background .1s,border-color .1s;
}
.sbtn.know{
  background:var(--green-soft);color:var(--green);
  border:1px solid rgba(52,211,153,.3);
}
.sbtn.know:hover{background:var(--green-mid)}
.sbtn.need{
  background:var(--red-soft);color:var(--red);
  border:1px solid rgba(248,113,113,.25);
}
.sbtn.need:hover{background:var(--red-mid)}

/* Jump links */
.jump{
  display:inline-flex;align-items:center;
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);background:var(--surface-3);
  border:1px solid var(--border-2);border-radius:3px;
  padding:1px 5px;margin-left:3px;cursor:pointer;
  vertical-align:middle;transition:all .12s;white-space:nowrap;
}
.jump.amber:hover{color:var(--amber);border-color:var(--amber-dim);background:var(--amber-soft)}
.jump.teal:hover{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-soft)}

/* Hint */
.hint{
  font-size:13px;color:var(--text-2);background:var(--surface-3);
  border-left:2px solid var(--border-2);border-radius:0 7px 7px 0;
  padding:9px 14px;margin-top:14px;line-height:1.65;
}
.hlbl{
  font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text-3);display:block;margin-bottom:4px;
}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
.nbtn{
  background:var(--nav-bg);border:1px solid var(--border);
  color:var(--nav-text);font-family:'DM Sans',sans-serif;font-size:13px;
  padding:9px 16px;border-radius:10px;cursor:pointer;
  transition:background .12s,color .12s;
}
.nbtn:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text)}
.nbtn:disabled{opacity:.25;cursor:not-allowed}
.nmc{display:flex;gap:10px;align-items:center}
.ncnt{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.showall{
  background:var(--showall-bg);border:1px solid var(--border);
  color:var(--showall-text);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .12s;
}
.showall:hover{color:var(--text);border-color:var(--border-2)}

/* Stats */
.stats{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 18px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:10px;
  box-shadow:0 18px 40px rgba(0,0,0,.2);
}
.stat{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.stat strong{color:var(--text)}
.sep{color:var(--border-2)}
.sactions{display:flex;gap:8px;align-items:center;margin-left:auto}
.sbtn-lite{
  background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;
  color:var(--text-2);font-family:'DM Mono',monospace;border-radius:999px;
  padding:7px 12px;transition:all .12s
}
.sbtn-lite:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.sbtn-lite:disabled{opacity:.35;cursor:not-allowed}
.review-btn{
  background:var(--amber-soft);border:1px solid rgba(246,165,51,.28);
  color:var(--amber);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;
  transition:all .12s;display:none;align-items:center;gap:5px;
}
.review-btn.vis{display:inline-flex}
.review-btn:hover{background:var(--amber-mid)}
.reset-btn{
  background:none;border:none;cursor:pointer;font-size:11px;
  color:var(--text-3);font-family:'DM Mono',monospace;
  text-decoration:underline;text-underline-offset:2px;
}
.reset-btn:hover{color:var(--text-2)}

/* Review panel */
.rhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rtitle{
  font-family:'Crimson Pro',serif;font-size:17px;font-weight:600;
  color:var(--amber);flex:1;
}
.rprog{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2)}
.rsub{
  font-size:11px;color:var(--text-2);font-family:'DM Mono',monospace;
  background:var(--surface-3);border:1px solid var(--border);
  padding:7px 12px;border-radius:7px;margin-bottom:14px;line-height:1.5;
}

/* Footer hint */
.kbhint{
  text-align:center;font-size:10px;color:var(--text-3);

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const D={
  zones:{label:'Zones & Synth',sub:'Adrenal zones, steroid synthesis, and rate-limiting enzymes',type:'PLO',cards:[
    {t:'Why cortisol is indispensable',b:'Cortisol is the primary {glucocorticoid} hormone in humans. It is essential for life, affects essentially all {nucleated cells}, regulates metabolism at multiple levels, dampens {inflammation}, supports {cardiovascular responsiveness}, and helps the body deal with physical and psychological stressors.',h:'Steve-note: cortisol = major glucocorticoid. The adrenal cortex and medulla should be studied together because cortical cortisol supports medullary PNMT.'},
    {t:'Adrenal zone mnemonic',b:'Memory tool — Salt, Sugar/Stress, Sex: Zona {glomerulosa} → {aldosterone} · Zona {fasciculata} → {cortisol} · Zona {reticularis} → {androgens (DHEA, androstenedione)} · Medulla → {catecholamines (epinephrine)}.',h:'Salt = glomerulosa, Sugar/Stress = fasciculata, Sex = reticularis. This is the exact Morganelli study-language.'},
    {t:'Rate-limiting step and StAR',b:'Cholesterol is transported into the mitochondria by {StAR (Steroidogenic Acute Regulatory) protein}. The enzyme {cholesterol desmolase} (CYP11A1) converts cholesterol into {pregnenolone}, the precursor for all steroid hormones. This step is stimulated by {ACTH}.',h:'Cholesterol desmolase = rate-limiting step. ACTH drives the entire synthesis process forward.'},
    {t:'Zone logic — enzyme distribution',b:'All zones can convert pregnenolone to progesterone via {3β-HSD}. Fasciculata and reticularis contain {17α-hydroxylase}; this is why cortisol and androgen pathways live there. Glomerulosa does not have 17α-hydroxylase, so it makes {aldosterone} instead. Negative feedback comes from {cortisol only} — not from aldosterone or adrenal androgens.',h:'The presence or absence of 17α-hydroxylase determines what each zone can produce. This is a Morganelli favorite.'},
    {t:'Table quiz: synthesis pathways',b:'<div class="tblq-note"><div class="tblq-copy">Steroid synthesis pathways — tap cells to test zone-specific enzyme steps.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Pathway</th><th>Zone</th><th>Key Enzyme Steps</th></tr></thead><tbody><tr><th scope="row">Mineralocorticoid</th><td>{Zona glomerulosa}</td><td>{Progesterone → DOC (21-OH) → Corticosterone (11β-OH) → Aldosterone (18-OH/dehydrogenase)}</td></tr><tr><th scope="row">Glucocorticoid</th><td>{Zona fasciculata}</td><td>{17-OH progesterone (17α-hydroxylase) → 11-deoxycortisol (21-OH) → Cortisol (11β-OH)}</td></tr><tr><th scope="row">Androgen</th><td>{Zona reticularis}</td><td>{Pregnenolone → DHEA (17,20-lyase) → Androstenedione → peripheral conversion to testosterone/estradiol}</td></tr></tbody></table></div>',h:'21-hydroxylase appears in both mineralocorticoid and glucocorticoid pathways — this is why 21-OH deficiency affects both.'}
  ]},
  hpa:{label:'HPA Axis',sub:'CRH, ACTH, HPA axis regulation, and POMC cleavage',type:'PLO',cards:[
    {t:'HPA axis sequence',b:'1. Hypothalamus detects stress and secretes {CRH} from the {paraventricular nucleus}. 2. CRH travels through the {hypophyseal portal system} to the anterior pituitary. 3. Pituitary releases {ACTH} into the systemic circulation. 4. ACTH binds {MC2R} on adrenal cortical cells and triggers cortisol synthesis. 5. High cortisol levels inhibit CRH and ACTH release by {negative feedback}.',h:'LO 8: The HPA axis consists of three parts — hypothalamus, pituitary, adrenal cortex. CRH is stimulated by stress and circadian rhythm.'},
    {t:'POMC cleavage pearl',b:'Pro-opiomelanocortin (POMC) is a precursor polypeptide synthesized in {corticotroph cells}. Cleavage products include {ACTH}, {MSH}, {β-endorphins}, and {lipotropins}. Addison\'s disease causes {hyperpigmentation} because high ACTH contains the {α-MSH} sequence and overstimulates melanocytes.',h:'This is why primary adrenal insufficiency — but NOT secondary — causes hyperpigmentation. Secondary AI has low ACTH.'},
    {t:'Table quiz: HPA hormones',b:'<div class="tblq-note"><div class="tblq-copy">HPA axis hormones — test source, target, and function.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Hormone</th><th>Source</th><th>Target</th><th>Function</th></tr></thead><tbody><tr><th scope="row">CRH</th><td>{Hypothalamus (paraventricular nucleus)}</td><td>{Anterior pituitary}</td><td>{Stimulates ACTH secretion; driven by stress and circadian rhythm}</td></tr><tr><th scope="row">ACTH</th><td>{Anterior pituitary}</td><td>{Adrenal cortex (zona fasciculata)}</td><td>{Stimulates cortisol production via MC2R; trophic for adrenal cortex}</td></tr></tbody></table></div>',h:'ACTH is trophic — prolonged absence leads to adrenal atrophy (iatrogenic Cushing mechanism).'}
  ]},
  transport:{label:'Transport & GR',sub:'Bound vs free cortisol, GR signaling, receptor selectivity',type:'PLO',cards:[
    {t:'Bound vs free cortisol (LO 6)',b:'About {90%} of plasma cortisol is bound and inactive. The majority binds {CBG (transcortin)} (~80%), with a smaller fraction to {albumin} (~10%). Only the {free} fraction (~10%) is biologically active — it diffuses into cells and binds glucocorticoid receptors.',h:'LO 6: An increase in CBG decreases free cortisol; a decrease in CBG increases free cortisol. CBG-bound cortisol = reservoir.'},
    {t:'CBG reservoir logic',b:'An increase in CBG by itself {decreases} free cortisol. A decrease in CBG {increases} free cortisol. Cortisol bound to CBG serves as a {reservoir} — it prolongs half-life and prevents rapid metabolism or excretion.',h:'Steve-note color call: bound cortisol = inactive reservoir, free cortisol = active.'},
    {t:'GR signaling mechanism',b:'Cortisol diffuses through the plasma membrane because it is a {lipophilic steroid hormone}. It binds an intracellular glucocorticoid receptor associated with {heat shock proteins}. The receptor complex dimerizes and moves to the {nucleus}. The cortisol-GR complex binds {GREs (glucocorticoid response elements)} and acts as a {transcription factor}.',h:'Genes for gluconeogenesis, metabolism, and anti-inflammatory proteins are upregulated; pro-inflammatory genes are suppressed.'},
    {t:'GR subtypes',b:'GRα / GR1 binds cortisol with {high affinity} and mediates major glucocorticoid metabolic and anti-inflammatory actions. It also binds {aldosterone}. GRβ / GR2 is a {dominant-negative inhibitor} of GRα signaling — increased expression is associated with {glucocorticoid resistance}.',h:'The specificity pearl: cortisol production far exceeds aldosterone, so the body needs 11β-HSD2 to protect MR in the kidney.'},
    {t:'Table quiz: cortisol forms',b:'<div class="tblq-note"><div class="tblq-copy">Forms of cortisol in the bloodstream.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Form</th><th>% in Blood</th><th>Binding</th><th>Significance</th></tr></thead><tbody><tr><th scope="row">Bound (inactive)</th><td>{~90%}</td><td>{CBG (~80%) + Albumin (~10%)}</td><td>{Reservoir; prolongs half-life; prevents rapid metabolism}</td></tr><tr><th scope="row">Free (active)</th><td>{~10%}</td><td>{Unbound, circulating freely}</td><td>{Biologically active; diffuses into cells; binds GR; exerts effects}</td></tr></tbody></table></div>',h:'LO 6 table — the key clinical distinction is that only free cortisol is biologically active.'}
  ]},
  effects:{label:'Effects',sub:'Adrenal medulla, catecholamines, PNMT, and cortisol physiologic effects',type:'PLO',cards:[
    {t:'Catecholamine release sequence',b:'Stress activates {sympathetic outflow}. Preganglionic sympathetic neurons release {ACh} onto adrenal {chromaffin cells}. ACh binds {nicotinic receptors} and triggers calcium influx. Vesicles release {epinephrine} (~80%) and {norepinephrine} (~20%) into blood.',h:'Dopamine is a small fraction and mainly serves as a precursor for norepinephrine.'},
    {t:'PNMT pearl',b:'The catecholamine synthesis pathway: {Tyrosine} → DOPA → {Dopamine} → Norepinephrine → {Epinephrine}. The final step is catalyzed by {PNMT (phenylethanolamine-N-methyltransferase)}, which converts NE to epinephrine. PNMT production in chromaffin cells is stimulated and maintained by {cortisol}.',h:'This is the cortex-medulla connection: cortisol from the zona fasciculata maintains PNMT expression in the medulla.'},
    {t:'Energy metabolism (LO 7)',b:'Cortisol elevates blood glucose and produces a {glucose-sparing} state. It stimulates {gluconeogenesis} by increasing PEPCK and G6Pase. Paradoxically, it also stimulates {glycogen synthesis} in liver. It inhibits {GLUT4} expression and insulin production, supporting {insulin resistance}. It stimulates {hormone-sensitive lipase} and {β-oxidation}.',h:'LO 7: Cortisol shifts peripheral tissues away from glucose toward fatty acid oxidation, preserving glucose for the brain.'},
    {t:'Anti-inflammatory & immune (LO 7)',b:'Cortisol inhibits {phospholipase A2} → fewer prostanoids. It inhibits {NF-κB activation} → fewer proinflammatory cytokines. It inhibits {neutrophil transmigration} even though circulating neutrophils may rise. It induces {apoptosis of lymphoid and myeloid cells}.',h:'Exam pearl: cortisol stimulates anti-inflammatory cytokines (IL-4, IL-10, IL-13) while suppressing pro-inflammatory ones (TNF-α, IL-1, IL-6).'},
    {t:'Cardiovascular & permissive effects',b:'Cortisol supports sympathetic responsiveness by increasing {adrenergic receptor expression}. It supports {angiotensin II} responsiveness and stimulates {PNMT} production. Cortisol deficiency causes {hypotension} because glucocorticoids are needed for normal vascular responsiveness to catecholamines.',h:'Primary effects = direct (e.g. gluconeogenesis). Permissive effects = cortisol enhances another hormone\'s action (e.g. adrenergic receptor upregulation).'},
    {t:'Table quiz: cortisol effects summary',b:'<div class="tblq-note"><div class="tblq-copy">Comprehensive cortisol effects by category.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Category</th><th>Effects</th><th>Mechanism</th></tr></thead><tbody><tr><th scope="row">Carbohydrate / Lipid</th><td>{↑Blood glucose, ↑gluconeogenesis, ↑glycogen synthesis, ↑lipolysis, ↓GLUT4/insulin}</td><td>{↑PEPCK/G6Pase, ↑glycogen synthase, ↑HSL, ↓GLUT4 in muscle/adipose}</td></tr><tr><th scope="row">Immune / Anti-inflammatory</th><td>{↓Inflammation, ↓NF-κB, ↓neutrophil transmigration, ↑apoptosis lymphoid/myeloid}</td><td>{Blocks PLA2, suppresses NF-κB, ↓adhesion molecules, ↓TNF-α/IL-1/IL-6}</td></tr><tr><th scope="row">Cardiovascular</th><td>{↑Blood pressure, ↑vascular responsiveness, ↑PNMT}</td><td>{↑α1-adrenergic receptors, ↑catecholamine sensitivity, ↑Na⁺ retention}</td></tr></tbody></table></div>',h:'This table preserves the Steve-note color hierarchy: metabolism, lipid effects, immune, anti-inflammatory, blood pressure.'}
  ]},
  hsd:{label:'11β-HSD',sub:'How the kidney protects aldosterone signaling (LO 9)',type:'LO',cards:[
    {t:'11β-HSD1 vs 11β-HSD2 (LO 9)',b:'11β-HSD1 is found in {most cell types} and performs {reversible} conversion between cortisol and cortisone — it can {regenerate cortisol} and increase cortisol action. 11β-HSD2 is found in {kidney and placenta} and performs {irreversible} conversion of cortisol → {cortisone}. This prevents cortisol from activating the {mineralocorticoid receptor} and allows aldosterone to act appropriately.',h:'LO 9: Reversible vs irreversible is the exact distinction worth locking down. 11β-HSD2 = the kidney\'s gatekeeper for aldosterone.'},
    {t:'Overflow pathophysiology',b:'Too much cortisol can {overwhelm 11β-HSD2} in the kidney → cortisol begins activating {mineralocorticoid signaling} inappropriately → {Na⁺ and water retention}, hypertension, and hypokalemia.',h:'This is how excess cortisol (Cushing) can cause hypertension — it saturates the protective enzyme and acts like aldosterone.'},
    {t:'Table quiz: 11β-HSD comparison',b:'<div class="tblq-note"><div class="tblq-copy">11β-HSD enzymes — test location, directionality, and consequence.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Enzyme</th><th>Location</th><th>Action</th><th>Net Consequence</th></tr></thead><tbody><tr><th scope="row">11β-HSD1</th><td>{Most cell types}</td><td>{Reversible: cortisol ↔ cortisone}</td><td>{Can regenerate cortisol; ↑ cortisol action locally}</td></tr><tr><th scope="row">11β-HSD2</th><td>{Kidney, placenta}</td><td>{Irreversible: cortisol → cortisone only}</td><td>{Prevents cortisol from activating MR; allows aldosterone to act}</td></tr></tbody></table></div>',h:'Receptor selectivity and 11β-HSD protection are tightly linked in how Morganelli explains steroid specificity.'}
  ]},
  insuff:{label:'Insufficiency',sub:'Primary (Addison), secondary, and acute adrenal crisis',type:'LO',cards:[
    {t:'Addison disease (primary AI)',b:'Primary adrenal insufficiency is most commonly caused by {autoimmune destruction} of the adrenal cortex. ACTH is {elevated (↑)}, which causes {hyperpigmentation} via POMC/MSH. Classic presentation: fatigue, weight loss, {hypotension}, {salt craving}, and hypoglycemia. Electrolytes show {hyponatremia and hyperkalemia} because aldosterone is also decreased.',h:'Think: the gland is destroyed → everything upstream rises to try to compensate. ACTH ↑ → MSH ↑ → dark skin.'},
    {t:'Secondary AI',b:'Secondary adrenal insufficiency results from {pituitary dysfunction / low ACTH}. Cortisol is low, ACTH is {low (↓)}. Aldosterone is {usually normal} because it is regulated by the renin-angiotensin system, not ACTH. There is {no} hyperpigmentation because ACTH is not elevated.',h:'Key differentiator from primary: no hyperpigmentation, normal aldosterone, milder electrolyte changes.'},
    {t:'Acute adrenal crisis',b:'Adrenal crisis is a sudden, {life-threatening} drop in cortisol. It is triggered by {stress (infection, trauma, surgery)} in a patient with adrenal insufficiency. Treatment: rapid {IV hydrocortisone} + {fluid support}.',h:'Classic scenario: patient on chronic steroids undergoes surgery without stress-dose steroids → crisis.'},
    {t:'Table quiz: primary vs secondary AI',b:'<div class="tblq-note"><div class="tblq-copy">Primary vs secondary adrenal insufficiency — the defining comparison.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Feature</th><th>Primary (Addison)</th><th>Secondary</th></tr></thead><tbody><tr><th scope="row">Site of problem</th><td>{Direct damage to adrenal cortex}</td><td>{Pituitary dysfunction / low ACTH}</td></tr><tr><th scope="row">Cortisol</th><td>{↓}</td><td>{↓}</td></tr><tr><th scope="row">ACTH</th><td>{↑}</td><td>{↓}</td></tr><tr><th scope="row">Aldosterone</th><td>{↓}</td><td>{Usually normal}</td></tr><tr><th scope="row">Hyperpigmentation</th><td>{Yes}</td><td>{No}</td></tr><tr><th scope="row">Electrolytes</th><td>{Hyponatremia, hyperkalemia}</td><td>{Often no major abnormality}</td></tr><tr><th scope="row">Hypotension</th><td>{Prominent}</td><td>{Mild or absent}</td></tr></tbody></table></div>',h:'This is the highest-yield comparison table — know every row for exam day.'}
  ]},
  cushing:{label:'Cushing',sub:'Cushing disease, syndrome, and iatrogenic Cushing (LO 11)',type:'LO',cards:[
    {t:'Definitions (LO 11)',b:'Cushing\'s syndrome = condition caused by {excess cortisol}, regardless of the underlying cause. Cushing\'s disease = excess ACTH production by a {pituitary adenoma}. Iatrogenic Cushing\'s syndrome = chronic {exogenous glucocorticoid} exposure.',h:'LO 11: Disease ≠ Syndrome. Disease is specifically the pituitary adenoma subtype of the syndrome.'},
    {t:'Clinical pattern of cortisol excess',b:'Both forms present with: obesity and body fat {redistribution}, {hyperglycemia}/diabetes, {hypertension}, thin skin, bruising, {bone loss}, and mood/cognitive changes.',h:'Think: all the things cortisol does at physiologic levels become pathologic at supraphysiologic levels.'},
    {t:'HPA axis differences',b:'In Cushing\'s disease, the pituitary {overproduces ACTH}, overstimulating the adrenals. CRH is {↓} from excess cortisol negative feedback. In iatrogenic Cushing\'s, exogenous glucocorticoids {suppress ACTH and CRH}, leading to {adrenal atrophy} over time.',h:'The iatrogenic pathway: chronic prednisone → ACTH ↓↓ → adrenal atrophy → if steroids stopped abruptly → adrenal crisis.'},
    {t:'Table quiz: Cushing disease vs iatrogenic',b:'<div class="tblq-note"><div class="tblq-copy">Cushing\'s Disease vs Iatrogenic Cushing\'s — ACTH is the key differentiator.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Feature</th><th>Cushing Disease</th><th>Iatrogenic Cushing</th></tr></thead><tbody><tr><th scope="row">Cortisol</th><td>{↑}</td><td>{↑ (from exogenous steroid)}</td></tr><tr><th scope="row">ACTH</th><td>{↑ (from tumor)}</td><td>{↓↓ (strong negative feedback)}</td></tr><tr><th scope="row">CRH</th><td>{↓}</td><td>{↓}</td></tr><tr><th scope="row">HPA axis effect</th><td>{Pituitary overproduces ACTH, overstimulating adrenals}</td><td>{Exogenous GCs suppress ACTH/CRH → adrenal atrophy}</td></tr></tbody></table></div>',h:'ACTH direction is the exam differentiator: ↑ in disease (tumor), ↓↓ in iatrogenic (feedback suppression).'}
  ]},
  logic:{label:'Endo Logic',sub:'Primary, secondary, tertiary — the general endocrine pattern',type:'LO',cards:[
    {t:'Fast logic rules',b:'PRIMARY (gland issue): last organ fails, so upstream hormones {rise} from loss of negative feedback. SECONDARY (pituitary issue): pituitary fails, so pituitary hormone and final hormone both {fall}; hypothalamic hormone {rises}. TERTIARY (hypothalamus issue): hypothalamus fails, so {the entire axis falls}.',h:'This pattern applies to every endocrine axis — thyroid, gonadal, adrenal. Master it once and it works everywhere.'},
    {t:'Table quiz: hormone level patterns',b:'<div class="tblq-note"><div class="tblq-copy">Where is the lesion? Use hormone levels to localize the defect.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Disease Type</th><th>Hypothalamus Hormone</th><th>Pituitary Hormone</th><th>Final Hormone</th></tr></thead><tbody><tr><th scope="row">Primary (gland issue)</th><td>{Increased (↑)}</td><td>{Increased (↑)}</td><td>{Decreased (↓)}</td></tr><tr><th scope="row">Secondary (pituitary)</th><td>{Increased (↑)}</td><td>{Decreased (↓)}</td><td>{Decreased (↓)}</td></tr><tr><th scope="row">Tertiary (hypothalamus)</th><td>{Decreased (↓)}</td><td>{Decreased (↓)}</td><td>{Decreased (↓)}</td></tr></tbody></table></div>',h:'Primary = everything upstream ↑. Secondary = only hypothalamic hormone ↑. Tertiary = everything ↓.'}
  ]}
};

const LINKS={
  'ACTH':['hpa','HPA Axis','amber'],
  'CRH':['hpa','HPA Axis','amber'],
  'MC2R':['hpa','HPA Axis','amber'],
  'negative feedback':['hpa','HPA Axis','amber'],
  'cortisol':['zones','Zones & Synth','amber'],
  'aldosterone':['zones','Zones & Synth','amber'],
  'PNMT':['effects','Effects','amber'],
  'epinephrine':['effects','Effects','amber'],
  'gluconeogenesis':['effects','Effects','amber'],
  'NF-κB activation':['effects','Effects','amber'],
  'hyperpigmentation':['insuff','Insufficiency','teal'],
  'adrenal atrophy':['cushing','Cushing','teal'],
  'mineralocorticoid receptor':['hsd','11β-HSD','teal'],
  '11β-HSD2':['hsd','11β-HSD','teal'],
  'hypotension':['insuff','Insufficiency','teal'],
  'pituitary adenoma':['cushing','Cushing','teal'],
  'excess cortisol':['cushing','Cushing','teal'],
  'α-MSH':['hpa','HPA Axis','amber'],
  'corticotroph cells':['hpa','HPA Axis','amber']
};

const DECK_ID='morganelli_hpa_cortisol';
const THEME_STORAGE_KEY=`${DECK_ID}_theme`;

function setTheme(theme){
  const next=theme||'slate';
  if(next==='slate') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',next);
  document.querySelectorAll('.theme-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.theme===next);
  });
  try{localStorage.setItem(THEME_STORAGE_KEY,next);}catch(e){}
}

try{
  setTheme(localStorage.getItem(THEME_STORAGE_KEY)||'slate');
}catch(e){
  setTheme('slate');
}

document.getElementById('deckMeta').textContent=`Active recall map · ${Object.keys(D).length} topics · ${Object.values(D).reduce((n,node)=>n+node.cards.length,0)} cards`;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let cur=null, ci=0;
let tr={};       // tr[nid][cardIdx] = Set<termIdx>
let sc={};       // sc[nid][cardIdx][termIdx] = 'knew'|'needed'
let done=new Set();
let totRev=0, totKnew=0, totNeed=0;
let revQueue=[], revIdx=0, revTr={};
const PROGRESS_COOKIE=`${DECK_ID}_progress_v1`;

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function nT(b){return(b.match(/\{[^}]+\}/g)||[]).length}

function initNode(id){
  if(!tr[id]){
    tr[id]={};sc[id]={};
    D[id].cards.forEach((_,i)=>{tr[id][i]=new Set();sc[id][i]={}});
  }
}

function setCookie(name,value,days){
  const maxAge=days*24*60*60;
  document.cookie=`${name}=${encodeURIComponent(value)}; path=/; max-age=${maxAge}; SameSite=Lax`;
}

function getCookie(name){
  const prefix=`${name}=`;
  return document.cookie.split('; ').reduce((found,part)=>{
    if(found!==null) return found;
    return part.indexOf(prefix)===0 ? decodeURIComponent(part.slice(prefix.length)) : null;
  },null);
}

function clearCookie(name){
  document.cookie=`${name}=; path=/; max-age=0; SameSite=Lax`;
}

function serializeProgress(){
  const state={c:cur||'',i:ci||0,r:{},s:{}};
  Object.keys(tr).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const set=tr[nid][cardIdx];
      return set&&set.size ? Array.from(set).sort((a,b)=>a-b).join('.') : '';
    });
    if(rows.some(Boolean)) state.r[nid]=rows;
  });
  Object.keys(sc).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const obj=sc[nid][cardIdx]||{};
      const packed=Object.keys(obj).sort((a,b)=>parseInt(a)-parseInt(b)).map(idx=>`${idx}${obj[idx]==='knew'?'k':'n'}`).join('.');
      return packed;
    });
    if(rows.some(Boolean)) state.s[nid]=rows;
  });
  return JSON.stringify(state);
}

function saveProgress(){
  try{
    setCookie(PROGRESS_COOKIE,serializeProgress(),180);
  }catch(e){}
}

function loadProgress(){
  const raw=getCookie(PROGRESS_COOKIE);
  if(!raw) return;
  try{
    const state=JSON.parse(raw);
    tr={};sc={};

    Object.keys(D).forEach(nid=>{
      initNode(nid);
      const revealedRows=(state.r&&state.r[nid])||[];
      revealedRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(v=>{
          if(v==='') return;
          tr[nid][cardIdx].add(parseInt(v,10));
        });
      });

      const scoredRows=(state.s&&state.s[nid])||[];
      scoredRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(token=>{
          if(!token) return;
          const score=token.slice(-1)==='k' ? 'knew' : 'needed';
          const idx=parseInt(token.slice(0,-1),10);
          if(!Number.isNaN(idx)) sc[nid][cardIdx][idx]=score;
        });
      });
    });

    if(state.c&&D[state.c]){
      cur=state.c;
      ci=Math.max(0,Math.min(D[cur].cards.length-1,parseInt(state.i,10)||0));
    }
  }catch(e){
    clearCookie(PROGRESS_COOKIE);
  }
}

function cardMetrics(nid,cidx){
  initNode(nid);
  const total=nT(D[nid].cards[cidx].b);
  const revealed=tr[nid][cidx].size;
  let unscored=0, knew=0, needed=0;
  for(let i=0;i<total;i++){
    const score=sc[nid][cidx][i];
    if(score==='knew') knew++;
    else if(score==='needed') needed++;
    else if(tr[nid][cidx].has(i)) unscored++;
  }
  return {total,revealed,unscored,knew,needed,allRevealed:total>0&&revealed>=total};
}

function parseBody(body, nid, cidx, opts={}){
  // opts: {forReview, targetTermIdx}
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    let revealed, scored;

    if(opts.forReview){
      revealed=opts.revealedSet ? opts.revealedSet.has(idx) : false;
      scored=null;
    } else {
      revealed=tr[nid]&&tr[nid][cidx]&&tr[nid][cidx].has(idx);
      scored=revealed&&sc[nid]&&sc[nid][cidx] ? (sc[nid][cidx][idx]||null) : null;
    }

    const link=LINKS[t];
    const showJump=revealed&&link&&link[0]!==nid;
    const isTarget=opts.forReview&&opts.targetTermIdx===idx;

    let cls='occ';
    if(revealed||isTarget){
      if(scored==='knew') cls+=' rev';
      else if(scored==='needed') cls+=' needed';
      else cls+=' unscored';
    }

    const da=opts.forReview?'':`data-nid="${nid}" data-ci="${cidx}" data-i="${idx}"`;
    const onclick=(!revealed&&!opts.forReview)?` onclick="revTerm(this)"`
      :(opts.forReview&&isTarget&&!opts.revealedSet?.has(idx))?' onclick="revRevTerm(this)"':'';

    let html=`<span class="${cls}"${da}${onclick}>${t}</span>`;

    if(revealed&&!scored&&!opts.forReview){
      html+=`<span class="score-row" data-nid="${nid}" data-ci="${cidx}" data-i="${idx}">`+
        `<button class="sbtn know" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button>`+
        `<button class="sbtn need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button>`+
        `</span>`;
    }
    if(showJump){
      html+=`<span class="jump ${link[2]}" onclick="jumpNode('${link[0]}',event)" title="Jump to ${link[1]}">→ ${link[1]}</span>`;
    }
    return html;
  });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const d=D[cur].cards[ci];
  const m=cardMetrics(cur,ci);

  // Dots
  document.getElementById('dots').innerHTML=D[cur].cards.map((_,i)=>{
    const tot=nT(D[cur].cards[i].b),got=tr[cur][i].size;
    const cls=i===ci?'active':got>=tot&&tot>0?'done':got>0?'partial':'';
    return `<span class="dot ${cls}"></span>`;
  }).join('');

  document.getElementById('cnt').textContent=`${ci+1} / ${D[cur].cards.length}`;
  document.getElementById('bprev').disabled=ci===0;
  document.getElementById('bnext').disabled=ci===D[cur].cards.length-1;
  document.getElementById('revealTopicBtn').disabled=!cur;

  document.getElementById('ccard').innerHTML=
    `<div class="ctitle">${d.t}</div>`+
    `<div class="cbody">${parseBody(d.b,cur,ci)}</div>`+
    (d.h?`<div class="hint"><span class="hlbl">Clinical note</span>${d.h}</div>`:'');

  document.getElementById('cardActions').innerHTML=
    `<div class="card-meta">`+
      `<span class="meta-pill"><strong>${m.revealed}</strong> / ${m.total} revealed</span>`+
      `<span class="meta-pill"><strong>${m.knew}</strong> knew</span>`+
      `<span class="meta-pill"><strong>${m.needed}</strong> needed help</span>`+
      (m.unscored?`<span class="meta-pill"><strong>${m.unscored}</strong> waiting to score</span>`:'')+
    `</div>`+
    `<div class="action-row">`+
      `<button class="action-btn primary" onclick="revealAll()" ${m.total===0||m.allRevealed?'disabled':''}>Reveal this card</button>`+
      `<button class="action-btn amber" onclick="knewAllCurrentCard()" ${!m.allRevealed?'disabled':''}>Knew all</button>`+
      `<button class="action-btn ghost" onclick="resetCard()" ${m.revealed===0&&m.knew===0&&m.needed===0?'disabled':''}>Reset this card</button>`+
    `</div>`;
}

function renderReview(){
  if(!revQueue.length) return;
  const q=revQueue[revIdx];
  const revSet=revTr[revIdx]||new Set();

  document.getElementById('rprog').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rcnt').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rsub').innerHTML=
    `<strong>${D[q.nid].label} — ${q.card.t}</strong><br>`+
    `Term to recall: <span style="color:var(--amber)">${q.term}</span>`;
  document.getElementById('rbprev').disabled=revIdx===0;
  document.getElementById('rbnext').disabled=revIdx===revQueue.length-1;

  // Build card body: only the target term is blanked; others shown in dim text
  let i=0;
  const body=q.card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    const isTarget=idx===q.tidx;
    const isRevealed=revSet.has(idx);
    if(isTarget){
      if(isRevealed){
        return `<span class="occ needed">${t}</span>`;
      } else {
        return `<span class="occ" onclick="revRevTerm()" style="cursor:pointer">${t}</span>`;
      }
    }
    return `<span style="color:var(--text-2)">${t}</span>`;
  });

  document.getElementById('rccard').innerHTML=
    `<div class="ctitle">${q.card.t}</div>`+
    `<div class="cbody">${body}</div>`+
    (q.card.h?`<div class="hint"><span class="hlbl">Clinical note</span>${q.card.h}</div>`:'');
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function selNode(id){
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  document.getElementById('n-'+id).classList.add('sel-node');
  cur=id;ci=0;
  initNode(id);
  const p=document.getElementById('panel');
  p.classList.add('open');
  const d=D[id];
  const b=document.getElementById('bdg');
  b.textContent=d.label;
  b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
  document.getElementById('ptitle').textContent=d.sub;
  render();
  saveProgress();
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function jumpNode(id,e){
  e.stopPropagation();
  selNode(id);
}

function revTerm(s){
  if(s.classList.contains('rev')||s.classList.contains('needed')||s.classList.contains('unscored')) return;
  const nid=s.dataset.nid,cidx=parseInt(s.dataset.ci),tidx=parseInt(s.dataset.i);
  initNode(nid);
  tr[nid][cidx].add(tidx);
  totRev++;
  updStats();
  render();
}

function scoreIt(e,nid,cidx,tidx,score){
  e.stopPropagation();
  if(sc[nid][cidx][tidx]) return; // already scored
  sc[nid][cidx][tidx]=score;
  if(score==='knew') totKnew++;
  else totNeed++;
  chkDone(nid);
  updStats();
  render();
}

function revealAll(){
  const d=D[cur].cards[ci];
  const n=nT(d.b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){tr[cur][ci].add(i);totRev++;}
  }
  chkDone(cur);updStats();render();
}

function knewAllCurrentCard(){
  if(!cur) return;
  initNode(cur);
  const n=nT(D[cur].cards[ci].b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){
      tr[cur][ci].add(i);
      totRev++;
    }
    const prev=sc[cur][ci][i];
    if(prev==='needed') totNeed--;
    if(prev!=='knew') totKnew++;
    sc[cur][ci][i]='knew';
  }
  chkDone(cur);
  updStats();
  render();
}

function revealNodeCards(nid){
  initNode(nid);
  D[nid].cards.forEach((card,cidx)=>{
    const n=nT(card.b);
    for(let i=0;i<n;i++){
      if(!tr[nid][cidx].has(i)){
        tr[nid][cidx].add(i);
        totRev++;
      }
    }
    chkDone(nid);
  });
}

function revealTopic(){
  if(!cur) return;
  revealNodeCards(cur);
  updStats();
  render();
}

function revealDeck(){
  Object.keys(D).forEach(nid=>revealNodeCards(nid));
  updStats();
  if(cur) render();
}

function goCard(dir){
  ci=Math.max(0,Math.min(D[cur].cards.length-1,ci+dir));
  render();
  saveProgress();
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  cur=null;
  document.getElementById('revealTopicBtn').disabled=true;
  saveProgress();
}

function chkDone(id){
  const all=D[id].cards.every((_,i)=>{
    const t=nT(D[id].cards[i].b);
    return t===0||tr[id][i].size>=t;
  });
  if(all){
    done.add(id);
    document.getElementById('n-'+id).classList.add('done-node');
  }
}

function countNeeded(){
  let n=0;
  Object.keys(sc).forEach(nid=>Object.keys(sc[nid]).forEach(cidx=>
    Object.values(sc[nid][cidx]).forEach(v=>{if(v==='needed')n++})
  ));
  return n;
}

function updStats(){
  document.getElementById('st-rev').textContent=totRev;
  document.getElementById('st-knew').textContent=totKnew;
  document.getElementById('st-need').textContent=totNeed;
  document.getElementById('st-done').textContent=done.size;
  const n=countNeeded();
  document.getElementById('rcount').textContent=n;
  document.getElementById('reviewBtn').classList.toggle('vis',n>0);
  saveProgress();
}

function recalcState(){
  totRev=0;totKnew=0;totNeed=0;done=new Set();
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('done-node'));

  Object.keys(D).forEach(nid=>{
    let all=true;
    D[nid].cards.forEach((card,i)=>{
      const got=tr[nid]&&tr[nid][i]?tr[nid][i].size:0;
      const tot=nT(card.b);
      totRev+=got;
      Object.values(sc[nid]&&sc[nid][i]?sc[nid][i]:{}).forEach(v=>{
        if(v==='knew') totKnew++;
        else if(v==='needed') totNeed++;
      });
      if(!(tot===0||got>=tot)) all=false;
    });
    if(all){
      done.add(nid);
      const el=document.getElementById('n-'+nid);
      if(el) el.classList.add('done-node');
    }
  });

  updStats();
}

function resetCard(){
  if(!cur) return;
  initNode(cur);
  tr[cur][ci]=new Set();
  sc[cur][ci]={};
  closeReview();
  recalcState();
  render();
}

function resetAll(){
  tr={};sc={};done.clear();
  totRev=0;totKnew=0;totNeed=0;
  document.querySelectorAll('svg .node').forEach(g=>{
    g.classList.remove('sel-node','done-node');
  });
  document.getElementById('revealTopicBtn').disabled=!cur;
  updStats();
  closeReview();
  if(cur){initNode(cur);render();}
}

// ═══════════════════════════════════════════════════
// REVIEW (SPACED REP)
// ═══════════════════════════════════════════════════
function startReview(){
  revQueue=[];
  Object.keys(sc).forEach(nid=>{
    Object.keys(sc[nid]).forEach(cidx=>{
      const card=D[nid].cards[parseInt(cidx)];
      let termIdx=0;
      card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
        const i=termIdx++;
        if(sc[nid][cidx][i]==='needed'){
          revQueue.push({nid,cidx:parseInt(cidx),tidx:i,term:t,card});
        }
      });
    });
  });
  // Fisher-Yates shuffle
  for(let i=revQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [revQueue[i],revQueue[j]]=[revQueue[j],revQueue[i]];
  }
  revIdx=0;revTr={};
  if(!revQueue.length) return;
  const rp=document.getElementById('reviewPanel');
  rp.classList.add('open');
  rp.scrollIntoView({behavior:'smooth',block:'nearest'});
  renderReview();
}

function revRevTerm(){
  if(!revTr[revIdx]) revTr[revIdx]=new Set();
  revTr[revIdx].add(revQueue[revIdx].tidx);
  renderReview();
}

function revAllReview(){revRevTerm();}

function goReview(dir){
  revIdx=Math.max(0,Math.min(revQueue.length-1,revIdx+dir));
  renderReview();
}

function closeReview(){
  document.getElementById('reviewPanel').classList.remove('open');
}

function restoreSession(){
  loadProgress();
  recalcState();
  if(cur&&D[cur]){
    document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
    const nodeEl=document.getElementById('n-'+cur);
    if(nodeEl) nodeEl.classList.add('sel-node');
    const d=D[cur];
    const p=document.getElementById('panel');
    p.classList.add('open');
    const b=document.getElementById('bdg');
    b.textContent=d.label;
    b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
    document.getElementById('ptitle').textContent=d.sub;
    document.getElementById('revealTopicBtn').disabled=false;
    render();
  }else{
    document.getElementById('revealTopicBtn').disabled=true;
  }
}

restoreSession();

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inRev=document.getElementById('reviewPanel').classList.contains('open');
  if(inRev){
    if(e.key==='ArrowLeft'){e.preventDefault();goReview(-1)}
    else if(e.key==='ArrowRight'){e.preventDefault();goReview(1)}
    else if(e.key==='Escape') closeReview();
    return;
  }
  if(!cur) return;
  if(e.key==='ArrowLeft'){e.preventDefault();goCard(-1)}
  else if(e.key==='ArrowRight'){e.preventDefault();goCard(1)}
  else if(e.key==='Escape') closePanel();
});
</script>
</body>
