<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Head & Neck Cranial Nerves · Block 5 · Week 40</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* === THEMES === */
:root {
  --amber:#f59e0b; --amber-soft:rgba(245,158,11,.18);
  --teal:#14b8a6;  --teal-soft:rgba(20,184,166,.18);
  --green:#10b981; --green-soft:rgba(16,185,129,.18);
  --red:#ef4444;
  --panel-w:460px;
  --header-shadow:0 22px 50px rgba(0,0,0,.24);
}
html[data-theme="slate"]{
  --bg-top:#0f172a;--bg-bottom:#1e293b;
  --text:#e2e8f0;--text-rgb:226,232,240;
  --text-muted:#94a3b8;--text-faint:#475569;
  --surface:#1e293b;--surface-2:#334155;
  --border:rgba(148,163,184,.15);
  --hero-glow-a:rgba(99,102,241,.18);--hero-glow-b:rgba(20,184,166,.14);
  --header-a:#0f172a;--header-b:#1e293b;
  --card-a:#1e293b;--card-b:#273248;
  --card-action-bg:#0f172a;
  --nav-bg:rgba(255,255,255,.06);--nav-bg-hover:rgba(255,255,255,.12);
  --nav-text:#e2e8f0;
  --showall-bg:rgba(245,158,11,.12);--showall-text:#f59e0b;
  --meta-bg:rgba(255,255,255,.07);
  --table-head-a:#0f172a;--table-head-b:#1e293b;
}
html[data-theme="cream"]{
  --bg-top:#faf6f0;--bg-bottom:#f0e8d8;
  --text:#1c1a16;--text-rgb:28,26,22;
  --text-muted:#6b5f4a;--text-faint:#b0a090;
  --surface:#ffffff;--surface-2:#f5efe4;
  --border:rgba(139,115,80,.18);
  --hero-glow-a:rgba(245,158,11,.12);--hero-glow-b:rgba(20,184,166,.10);
  --header-a:#4a3728;--header-b:#6b5240;
  --card-a:#fffdf8;--card-b:#f8f2e8;
  --card-action-bg:#f0e8d8;
  --nav-bg:rgba(0,0,0,.05);--nav-bg-hover:rgba(0,0,0,.1);
  --nav-text:#3a2d1e;
  --showall-bg:rgba(245,158,11,.12);--showall-text:#8b6020;
  --meta-bg:rgba(0,0,0,.06);
  --table-head-a:#4a3728;--table-head-b:#6b5240;
}
html[data-theme="forest"]{
  --bg-top:#0a1a0f;--bg-bottom:#112218;
  --text:#d4e8d4;--text-rgb:212,232,212;
  --text-muted:#7fa87f;--text-faint:#3a5c3a;
  --surface:#112218;--surface-2:#1a3020;
  --border:rgba(100,160,100,.15);
  --hero-glow-a:rgba(16,185,129,.15);--hero-glow-b:rgba(20,184,166,.12);
  --header-a:#0a1a0f;--header-b:#112218;
  --card-a:#112218;--card-b:#1a3020;
  --card-action-bg:#0a1a0f;
  --nav-bg:rgba(255,255,255,.05);--nav-bg-hover:rgba(255,255,255,.1);
  --nav-text:#d4e8d4;
  --showall-bg:rgba(16,185,129,.12);--showall-text:#10b981;
  --meta-bg:rgba(255,255,255,.06);
  --table-head-a:#0a1a0f;--table-head-b:#112218;
}

/* === RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at top left,var(--hero-glow-a),transparent 26rem),
    radial-gradient(circle at top right,var(--hero-glow-b),transparent 24rem),
    linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  font-size:15px;
  line-height:1.65;
}

/* === HEADER === */
header{background:linear-gradient(160deg,var(--header-a),var(--header-b));box-shadow:var(--header-shadow);padding:2.2rem 2rem 1.6rem;}
.hero-top{max-width:920px;margin:0 auto;display:flex;align-items:flex-start;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.45rem;}
h1{font-family:'Crimson Pro',serif;font-size:clamp(1.75rem,3.5vw,2.5rem);font-weight:600;line-height:1.15;color:var(--text);margin-bottom:.3rem;}
#deckMeta{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-muted);}
.theme-switch{display:flex;gap:.35rem;padding-top:.2rem;flex-shrink:0;}
.theme-btn{background:var(--nav-bg);border:1px solid var(--border);color:var(--nav-text);font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.06em;padding:.35rem .65rem;border-radius:6px;cursor:pointer;transition:background .15s,border-color .15s;}
.theme-btn:hover,.theme-btn.active{background:var(--nav-bg-hover);border-color:var(--amber);color:var(--amber);}

/* === LEGEND === */
.legend{display:flex;justify-content:center;gap:2rem;padding:.85rem 2rem .55rem;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.06em;color:var(--text-muted);}
.lswatch{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

/* === MAP === */
.map-wrap{max-width:720px;margin:.5rem auto 0;padding:0 1rem;}
.map-wrap svg{width:100%;height:auto;overflow:visible;}
.conn{stroke:var(--border);stroke-width:1.5;}
.node{cursor:pointer;}
.node rect{transition:filter .15s;}
.node:hover rect{filter:brightness(1.18);}
.node text{pointer-events:none;font-family:'DM Mono',monospace;}
.c-amber rect{fill:rgba(245,158,11,.12);stroke:var(--amber);stroke-width:1.5;rx:8;}
.c-amber .n-label{fill:var(--amber);font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
.c-amber .n-sub{fill:var(--text-muted);font-size:9px;}
.c-teal rect{fill:rgba(20,184,166,.1);stroke:var(--teal);stroke-width:1.5;rx:8;}
.c-teal .n-label{fill:var(--teal);font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
.c-teal .n-sub{fill:var(--text-muted);font-size:9px;}
.c-gray rect{fill:rgba(148,163,184,.08);stroke:var(--text-faint);stroke-width:1.5;rx:8;}
.c-gray .n-label{fill:var(--text-muted);font-size:10px;font-weight:500;letter-spacing:.05em;}
.c-gray .n-sub{fill:var(--text-faint);font-size:8.5px;}
.done-node{opacity:.42;}
.hint-lbl{font-family:'DM Mono',monospace;font-size:8px;fill:var(--text-faint);}

/* === STATS BAR === */
.stats-bar{display:flex;justify-content:center;gap:.55rem;padding:.65rem 2rem;flex-wrap:wrap;}
.stat-pill{font-family:'DM Mono',monospace;font-size:.68rem;padding:.26rem .6rem;border-radius:20px;background:var(--meta-bg);color:var(--text-muted);letter-spacing:.04em;}
.stat-pill span{color:var(--text);font-weight:500;}

/* === GLOBAL ACTIONS === */
.global-actions{display:flex;justify-content:center;gap:.45rem;padding:.6rem 2rem .8rem;flex-wrap:wrap;}

/* === PANEL === */
.panel{max-width:var(--panel-w);margin:.8rem auto 0;padding:0 1rem 2.5rem;display:none;}
.panel.open{display:block;}
.panel-header{background:linear-gradient(135deg,var(--header-a),var(--header-b));border-radius:14px 14px 0 0;padding:.9rem 1.2rem .75rem;}
.panel-eyebrow{font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:.28rem;}
.panel-title{font-family:'Crimson Pro',serif;font-size:1.28rem;font-weight:600;color:var(--text);}
.card-wrap{background:linear-gradient(160deg,var(--card-a),var(--card-b));border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;}
.card-meta{padding:.55rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-meta-left{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.meta-pill{font-family:'DM Mono',monospace;font-size:.64rem;letter-spacing:.06em;padding:.2rem .48rem;border-radius:20px;background:var(--meta-bg);color:var(--text-muted);}
.meta-pill.rev{background:rgba(20,184,166,.1);color:var(--teal);}
.meta-pill.knew{background:var(--green-soft);color:var(--green);}
.meta-pill.need{background:rgba(245,158,11,.12);color:var(--amber);}
.meta-pill.unscored{background:var(--green-soft);color:var(--green);}
.card-progress-dots{display:flex;gap:.26rem;flex-wrap:wrap;max-width:120px;}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--text-faint);transition:background .2s;}
.cdot.partial{background:var(--amber);}
.cdot.done{background:var(--green);}
.card-body{padding:1rem 1.2rem .9rem;}
.card-title{font-family:'DM Mono',monospace;font-size:.73rem;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:.55rem;}
.card-text{font-size:.92rem;line-height:1.78;color:var(--text);}
.card-hint{margin-top:.8rem;padding:.55rem .8rem;background:var(--meta-bg);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;font-size:.8rem;color:var(--text-muted);font-style:italic;}

/* === OCCLUSION === */
.occ{display:inline-block;min-width:3ch;background:var(--text);color:transparent;border:1px solid transparent;border-radius:3px;cursor:pointer;padding:1px 6px;white-space:nowrap;user-select:none;vertical-align:baseline;transition:background .15s,color .15s,border-color .15s;}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15);}
.occ.rev{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(16,185,129,.25);}
.occ.needed{background:rgba(245,158,11,.18);color:var(--amber);cursor:default;border-color:rgba(245,158,11,.35);}
.occ.unscored{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(16,185,129,.18);}
.tblq td .occ{display:block;text-align:center;white-space:normal;padding:10px 12px;min-width:180px;}
.score-btns{display:inline-flex;gap:.28rem;margin-left:.3rem;vertical-align:baseline;}
.sbtn{font-family:'DM Mono',monospace;font-size:.64rem;padding:.16rem .4rem;border-radius:4px;border:none;cursor:pointer;line-height:1;font-weight:500;}
.sbtn-knew{background:var(--green-soft);color:var(--green);}
.sbtn-knew:hover{background:rgba(16,185,129,.28);}
.sbtn-need{background:rgba(245,158,11,.15);color:var(--amber);}
.sbtn-need:hover{background:rgba(245,158,11,.28);}
.jump-link{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--teal);text-decoration:underline;cursor:pointer;margin-left:.28rem;white-space:nowrap;}
.jump-link:hover{color:var(--amber);}

/* === CARD ACTIONS === */
.card-actions{background:var(--card-action-bg);padding:.7rem 1.2rem;display:flex;flex-wrap:wrap;gap:.45rem;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.action-left,.action-right{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}
.btn{font-family:'DM Mono',monospace;font-size:.68rem;padding:.35rem .7rem;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-weight:500;letter-spacing:.04em;transition:background .14s,border-color .14s,opacity .14s;white-space:nowrap;}
.btn-reveal{background:var(--nav-bg);color:var(--text);}
.btn-reveal:hover{background:var(--nav-bg-hover);}
.btn-reveal:disabled{opacity:.32;cursor:not-allowed;}
.btn-knew-all{background:var(--showall-bg);color:var(--showall-text);border-color:rgba(245,158,11,.22);}
.btn-knew-all:hover{background:rgba(245,158,11,.2);}
.btn-knew-all:disabled{opacity:.32;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-muted);border-color:transparent;}
.btn-ghost:hover{color:var(--text);background:var(--nav-bg);}
.btn-muted{background:var(--nav-bg);color:var(--text-muted);}
.btn-muted:hover{background:var(--nav-bg-hover);color:var(--text);}
.btn-muted:disabled{opacity:.32;cursor:not-allowed;}
.btn-teal{background:rgba(20,184,166,.1);color:var(--teal);border-color:rgba(20,184,166,.22);}
.btn-teal:hover{background:rgba(20,184,166,.2);}
.card-nav{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1.2rem;border-top:1px solid var(--border);}
.nav-btn{background:var(--nav-bg);border:1px solid var(--border);color:var(--nav-text);font-family:'DM Mono',monospace;font-size:.7rem;padding:.35rem .75rem;border-radius:7px;cursor:pointer;transition:background .14s;}
.nav-btn:hover{background:var(--nav-bg-hover);}
.nav-btn:disabled{opacity:.28;cursor:not-allowed;}
.card-counter{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-muted);}

/* === REVIEW PANEL === */
.review-panel{max-width:var(--panel-w);margin:.8rem auto 0;padding:0 1rem 2.5rem;display:none;}
.review-panel.open{display:block;}
.review-header{background:linear-gradient(135deg,var(--header-a),var(--header-b));border-radius:14px 14px 0 0;padding:.9rem 1.2rem .75rem;display:flex;justify-content:space-between;align-items:flex-start;}
.review-eyebrow{font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:.28rem;}
.review-title{font-family:'Crimson Pro',serif;font-size:1.24rem;font-weight:600;color:var(--text);}
.review-ctx{padding:.45rem 1.2rem;background:rgba(245,158,11,.06);border-bottom:1px solid var(--border);}
.rsub{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text-muted);letter-spacing:.04em;}
.review-body{background:linear-gradient(160deg,var(--card-a),var(--card-b));border:1px solid var(--border);border-top:none;padding:1rem 1.2rem;}
.review-title-inner{font-family:'DM Mono',monospace;font-size:.73rem;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:.55rem;}
.review-text{font-size:.92rem;line-height:1.78;color:var(--text);}
.dim-term{color:var(--text-faint);}
.review-nav{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1.2rem;border-top:1px solid var(--border);background:var(--card-action-bg);border-radius:0 0 14px 14px;}
.review-counter{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-muted);}

@media(max-width:720px){
  .card-actions{flex-direction:column;}
  .action-left,.action-right{width:100%;}
}
</style>
</head>
<body>

<header>
  <div class="hero-top">
    <div class="hero-copy">
      <div class="eyebrow">UNE COM · Block 5 · Week 40 · OCS</div>
      <h1>Head &amp; Neck Cranial Nerves</h1>
      <p id="deckMeta" class="sub"></p>
    </div>
    <div class="theme-switch">
      <button class="theme-btn active" data-theme="slate" onclick="setTheme('slate')">Slate</button>
      <button class="theme-btn" data-theme="cream" onclick="setTheme('cream')">Cream</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
    </div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="lswatch" style="background:var(--amber)"></div>Program Learning Outcomes (PLO)</div>
  <div class="legend-item"><div class="lswatch" style="background:var(--teal)"></div>Lecture Objectives (LO)</div>
</div>

<!-- SVG MAP -->
<div class="map-wrap">
<svg viewBox="0 0 680 322" xmlns="http://www.w3.org/2000/svg">
  <!-- Connectors PLO → Center -->
  <line class="conn" x1="120" y1="112" x2="232" y2="128"/>
  <line class="conn" x1="340" y1="112" x2="340" y2="128"/>
  <line class="conn" x1="560" y1="112" x2="448" y2="128"/>
  <!-- Connectors LO → Center -->
  <line class="conn" x1="120" y1="240" x2="232" y2="186"/>
  <line class="conn" x1="340" y1="240" x2="340" y2="186"/>
  <line class="conn" x1="560" y1="240" x2="448" y2="186"/>

  <!-- PLO nodes — top row -->
  <g id="n-plo1" class="node c-amber" onclick="selNode('plo1')">
    <rect x="35" y="16" width="170" height="96" rx="8"/>
    <text class="n-label" x="120" y="40" text-anchor="middle">PLO 1</text>
    <text class="n-sub" x="120" y="54" text-anchor="middle">Parotid Gland &amp;</text>
    <text class="n-sub" x="120" y="66" text-anchor="middle">CN VII Relationship</text>
    <circle class="pdot" id="pd-plo1-0" cx="96"  cy="93" r="4" fill="var(--text-faint)"/>

    <circle class="pdot" id="pd-plo1-2" cx="120" cy="93" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-plo1-3" cx="132" cy="93" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-plo1-4" cx="144" cy="93" r="4" fill="var(--text-faint)"/>
  </g>

  <g id="n-plo2" class="node c-amber" onclick="selNode('plo2')">
    <rect x="255" y="16" width="170" height="96" rx="8"/>

    <text class="n-sub" x="340" y="54" text-anchor="middle">Facial Nerve (CN VII)</text>
    <text class="n-sub" x="340" y="66" text-anchor="middle">Course &amp; Fibers</text>
    <circle class="pdot" id="pd-plo2-0" cx="316" cy="93" r="4" fill="var(--text-faint)"/>

    <circle class="pdot" id="pd-plo2-2" cx="340" cy="93" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-plo2-3" cx="352" cy="93" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-plo2-4" cx="364" cy="93" r="4" fill="var(--text-faint)"/>
  </g>

  <g id="n-plo3" class="node c-amber" onclick="selNode('plo3')">
    <rect x="475" y="16" width="170" height="96" rx="8"/>
    <text class="n-label" x="560" y="40" text-anchor="middle">PLO 3</text>
    <text class="n-sub" x="560" y="54" text-anchor="middle">Trigeminal Nerve</text>

    <circle class="pdot" id="pd-plo3-0" cx="536" cy="93" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-plo3-1" cx="548" cy="93" r="4" fill="var(--text-faint)"/>

    <circle class="pdot" id="pd-plo3-4" cx="584" cy="93" r="4" fill="var(--text-faint)"/>

  <!-- Center node -->
  <g id="n-center" class="node c-gray">

    <text class="n-label" x="340" y="150" text-anchor="middle">Head &amp; Neck Cranial Nerves</text>
    <text class="n-sub" x="340" y="165" text-anchor="middle">Block 5 · Week 40 · Objectives 40B–C, 40D–E, 40F</text>
  </g>

  <!-- LO nodes — bottom row -->
  <g id="n-lo1" class="node c-teal" onclick="selNode('lo1')">
    <rect x="35" y="240" width="170" height="72" rx="8"/>
    <text class="n-label" x="120" y="260" text-anchor="middle">LO 1</text>
    <text class="n-sub" x="120" y="274" text-anchor="middle">CN IX Secretomotor</text>

    <circle class="pdot" id="pd-lo1-0" cx="96"  cy="302" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-lo1-1" cx="108" cy="302" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-lo1-2" cx="120" cy="302" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-lo1-3" cx="132" cy="302" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-lo1-4" cx="144" cy="302" r="4" fill="var(--text-faint)"/>
  </g>

  <g id="n-lo2" class="node c-teal" onclick="selNode('lo2')">
    <rect x="255" y="240" width="170" height="72" rx="8"/>
    <text class="n-label" x="340" y="260" text-anchor="middle">LO 2</text>
    <text class="n-sub" x="340" y="274" text-anchor="middle">CN VII Lesion</text>
    <text class="n-sub" x="340" y="286" text-anchor="middle">Localization</text>
    <circle class="pdot" id="pd-lo2-0" cx="316" cy="302" r="4" fill="var(--text-faint)"/>
    <circle class="pdot" id="pd-lo2-1" cx="328" cy="302" r="4" fill="var(--text-faint)"/>

/* === THEME === */
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));
  try{localStorage.setItem('anki-theme-cn40',t);}catch(e){}
}

/* === NODE SELECTION === */
function selNode(nid){
  initNode(nid);
  cur=nid; ci=0;
  document.getElementById('mainPanel').classList.add('open');
  document.getElementById('reviewPanel').classList.remove('open');
  document.getElementById('btn-reveal-topic').disabled=false;
  const node=D[nid];
  document.getElementById('panelEyebrow').textContent=node.type+' · '+node.label;
  document.getElementById('panelTitle').textContent=node.sub;
  render();
}

function closePanel(){
  document.getElementById('mainPanel').classList.remove('open');
  cur=null;
  document.getElementById('btn-reveal-topic').disabled=true;
}

/* === RENDER === */

  if(!cur) return;
  const node=D[cur], card=node.cards[ci];

    const terms=countTerms(c.b);
    const rev=tr[cur][i]?tr[cur][i].size:0;
    const scored=Object.keys(sc[cur][i]||{}).length;
    if(scored>0&&scored>=terms&&terms>0) d.classList.add('done');
    else if(rev>0) d.classList.add('partial');
    if(i===ci) d.style.outline='2px solid var(--amber)';
    dotsEl.appendChild(d);
  });
  // meta pills
  const terms=countTerms(card.b);
  const revSet=tr[cur][ci];
  const revCount=revSet?revSet.size:0;
  const knewCount=Object.values(sc[cur][ci]||{}).filter(v=>v==='knew').length;
  const needCount=Object.values(sc[cur][ci]||{}).filter(v=>v==='needed').length;
  const unscoredCount=revCount-knewCount-needCount;
  document.getElementById('cardMetaPills').innerHTML=
    `<span class="meta-pill">${terms} term${terms!==1?'s':''}</span>`+
    (revCount?`<span class="meta-pill rev">rev ${revCount}</span>`:'')+
    (knewCount?`<span class="meta-pill knew">✓ ${knewCount}</span>`:'')+
    (needCount?`<span class="meta-pill need">✗ ${needCount}</span>`:'')+
    (unscoredCount>0?`<span class="meta-pill unscored">~ ${unscoredCount}</span>`:'');
  // buttons
  document.getElementById('btnRevealCard').disabled=(revCount>=terms);
  const allScored=Object.keys(sc[cur][ci]||{}).length>=terms&&terms>0;
  document.getElementById('btnKnewAll').disabled=!(revCount>=terms)&&!allScored;
  recalcState(); updateStats(); updateDots(); updateDoneNodes();
}

/* === PARSE BODY === */
function parseBody(body,nid,cidx,opts={}){
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    if(opts.forReview){
      const isTarget=(idx===opts.targetTermIdx);
      if(isTarget){
        const revealed=opts.revealedSet&&opts.revealedSet.has(idx);
        if(!revealed) return `<span class="occ" onclick="revealReviewTerm(${idx})">${t}</span>`;
        return `<span class="occ rev">${t}</span>`;
      }
      return `<span class="dim-term">${t}</span>`;
    }
    // Normal mode
    const revSet=tr[nid][cidx];
    const revealed=revSet&&revSet.has(idx);
    const score=(sc[nid][cidx]||{})[idx];
    if(!revealed) return `<span class="occ" onclick="revealTerm(event,'${nid}',${cidx},${idx})">${t}</span>`;
    const cls=score==='knew'?'rev':score==='needed'?'needed':'unscored';
    const scoreBtns=(!score&&!opts.forReview)?
      `<span class="score-btns"><button class="sbtn sbtn-knew" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button><button class="sbtn sbtn-need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button></span>`:'';
    const link=LINKS[t];
    const jumpLink=(revealed&&link&&link[0]!==nid)?
      `<span class="jump-link" onclick="selNode('${link[0]}')" title="Go to ${link[1]}">→ ${link[1]}</span>`:'';
    return `<span class="occ ${cls}">${t}</span>${scoreBtns}${jumpLink}`;
  });
}

/* === REVEAL & SCORE === */
function revealTerm(e,nid,cidx,idx){
  e.stopPropagation();
  initNode(nid);
  tr[nid][cidx].add(idx);
  saveProgress(); render();
}

function scoreIt(e,nid,cidx,idx,score){
  e.stopPropagation();
  initNode(nid);
  sc[nid][cidx][idx]=score;
  saveProgress(); render();
}

function revealCard(){
  if(!cur) return;
  initNode(cur);
  const terms=countTerms(D[cur].cards[ci].b);
  for(let i=0;i<terms;i++) tr[cur][ci].add(i);
  saveProgress(); render();
}

function resetCard(){
  if(!cur) return;
  initNode(cur);
  tr[cur][ci]=new Set(); sc[cur][ci]={};
  saveProgress(); render();
}

function knewAllCurrentCard(){
  if(!cur) return;
  initNode(cur);
  const terms=countTerms(D[cur].cards[ci].b);
  for(let i=0;i<terms;i++){
    tr[cur][ci].add(i);
    sc[cur][ci][i]='knew';
  }
  saveProgress(); render();
}

function revealNode(){
  if(!cur) return;
  initNode(cur);
  D[cur].cards.forEach((card,cidx)=>{
    const terms=countTerms(card.b);
    for(let i=0;i<terms;i++) tr[cur][cidx].add(i);
  });
  saveProgress(); render();
}

function revealDeck(){
  Object.keys(D).forEach(nid=>{
    initNode(nid);
    D[nid].cards.forEach((card,cidx)=>{
      const terms=countTerms(card.b);
      for(let i=0;i<terms;i++) tr[nid][cidx].add(i);
    });
  });
  saveProgress();
  if(cur) render();
  recalcState(); updateStats(); updateDots(); updateDoneNodes();
}

function resetAll(){
  Object.keys(D).forEach(nid=>{
    tr[nid]={}; sc[nid]={};
    D[nid].cards.forEach((_,i)=>{ tr[nid][i]=new Set(); sc[nid][i]={}; });
  });
  done.clear(); totRev=0; totKnew=0; totNeed=0;
  deleteCookie('anki-cn40');
  if(cur) render();
  updateStats(); updateDots(); updateDoneNodes();
}

/* === NAVIGATION === */
function navCard(dir){
  if(!cur) return;
  ci=Math.max(0,Math.min(D[cur].cards.length-1,ci+dir));
  render();
}

/* === REVIEW MODE === */
function buildRevQueue(){
  const q=[];
  Object.keys(D).forEach(nid=>{
    initNode(nid);
    D[nid].cards.forEach((card,cidx)=>{
      const terms=countTerms(card.b);
      for(let tidx=0;tidx<terms;tidx++){
        const score=(sc[nid][cidx]||{})[tidx];
        const revealed=tr[nid][cidx]&&tr[nid][cidx].has(tidx);
        if(score==='needed'||(revealed&&!score)){
          q.push({nid,cidx,tidx,score});
        }
      }
    });
  });
  for(let i=q.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [q[i],q[j]]=[q[j],q[i]];
  }
  return q;
}

function startReview(){
  revQueue=buildRevQueue();
  if(revQueue.length===0){
    alert('No weak spots to review yet. Reveal and score some cards first!');
    return;
  }
  revIdx=0; revTr={};
  document.getElementById('mainPanel').classList.remove('open');
  document.getElementById('reviewPanel').classList.add('open');
  renderReview();
}

function renderReview(){
  if(revIdx>=revQueue.length){
    document.getElementById('revCardTitle').textContent='🎉 Review Complete!';
    document.getElementById('revCardText').innerHTML='You have reviewed all '+revQueue.length+' weak spots.';
    document.getElementById('rsub').textContent='';
    document.getElementById('revCounter').textContent=revQueue.length+' / '+revQueue.length;
    return;
  }
  const item=revQueue[revIdx];
  const {nid,cidx,tidx}=item;
  const node=D[nid], card=node.cards[cidx];
  document.getElementById('rsub').textContent=node.label+' · '+node.sub+' · Card '+(cidx+1);
  document.getElementById('revCardTitle').textContent=card.t;
  const key=nid+'-'+cidx+'-'+tidx;
  if(!revTr[key]) revTr[key]=new Set();
  document.getElementById('revCardText').innerHTML=parseBody(card.b,nid,cidx,{
    forReview:true, targetTermIdx:tidx, revealedSet:revTr[key]
  });
  document.getElementById('revCounter').textContent=(revIdx+1)+' / '+revQueue.length;
}

function revealReviewTerm(idx){
  const item=revQueue[revIdx];
  const key=item.nid+'-'+item.cidx+'-'+item.tidx;
  if(!revTr[key]) revTr[key]=new Set();
  revTr[key].add(idx);
  initNode(item.nid);
  tr[item.nid][item.cidx].add(idx);
  renderReview();
}

function navReview(dir){
  revIdx=Math.max(0,Math.min(revQueue.length,revIdx+dir));
  renderReview();
}

function closeReview(){
  document.getElementById('reviewPanel').classList.remove('open');
}

/* === HELPERS === */
function countTerms(body){
  const m=body.match(/\{[^}]+\}/g);
  return m?m.length:0;
}

function recalcState(){
  totRev=0; totKnew=0; totNeed=0; done.clear();
  Object.keys(D).forEach(nid=>{
    initNode(nid);
    let nodeDone=true;
    D[nid].cards.forEach((card,cidx)=>{
      const terms=countTerms(card.b);
      const rev=tr[nid][cidx]?tr[nid][cidx].size:0;
      const scores=sc[nid][cidx]||{};
      totRev+=rev; totKnew+=Object.values(scores).filter(v=>v==='knew').length;
      totNeed+=Object.values(scores).filter(v=>v==='needed').length;
      if(rev<terms) nodeDone=false;
    });
    if(nodeDone) done.add(nid);
  });
}

function getTotalTerms(){
  return Object.keys(D).reduce((n,nid)=>n+D[nid].cards.reduce((m,c)=>m+countTerms(c.b),0),0);
}

function updateStats(){
  document.getElementById('st-rev').textContent=totRev;
  document.getElementById('st-knew').textContent=totKnew;
  document.getElementById('st-need').textContent=totNeed;
  document.getElementById('st-done').textContent=done.size;
  document.getElementById('st-total').textContent=Object.keys(D).length;
}

function updateDots(){
  Object.keys(D).forEach(nid=>{
    initNode(nid);
    D[nid].cards.forEach((card,cidx)=>{
      const terms=countTerms(card.b);
      const rev=tr[nid][cidx]?tr[nid][cidx].size:0;
      const scored=Object.keys(sc[nid][cidx]||{}).length;
      const el=document.getElementById('pd-'+nid+'-'+cidx);
      if(!el) return;
      if(scored>=terms&&terms>0) el.setAttribute('fill','var(--green)');
      else if(rev>0) el.setAttribute('fill','var(--amber)');
      else el.setAttribute('fill','var(--text-faint)');
    });
  });
}

function updateDoneNodes(){
  Object.keys(D).forEach(nid=>{
    const el=document.getElementById('n-'+nid);
    if(el) el.classList.toggle('done-node',done.has(nid));
  });
}

/* === COOKIE PERSISTENCE === */
function saveCookie(name,val,days){
  const d=new Date();
  d.setTime(d.getTime()+days*86400000);
  document.cookie=name+'='+encodeURIComponent(val)+';expires='+d.toUTCString()+';path=/;SameSite=Lax';
}
function getCookie(name){
  const m=document.cookie.match(new RegExp('(^|;)\\s*'+name+'=([^;]+)'));
  return m?decodeURIComponent(m[2]):null;
}
function deleteCookie(name){
  document.cookie=name+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;SameSite=Lax';
}

function saveProgress(){
  const payload={};
  Object.keys(D).forEach(nid=>{
    if(!tr[nid]) return;
    const cardData={};
    D[nid].cards.forEach((_,cidx)=>{
      cardData[cidx]={r:[...(tr[nid][cidx]||[])],s:sc[nid][cidx]||{}};
    });
    payload[nid]=cardData;
  });
  saveCookie('anki-cn40',JSON.stringify(payload),180);
}

function loadProgress(){
  const raw=getCookie('anki-cn40');
  if(!raw) return;
  try{
    const payload=JSON.parse(raw);
    Object.keys(payload).forEach(nid=>{
      if(!D[nid]) return;
      initNode(nid);
      Object.keys(payload[nid]).forEach(cidxStr=>{
        const cidx=parseInt(cidxStr);
        const {r,s}=payload[nid][cidxStr];
        tr[nid][cidx]=new Set(r||[]);
        sc[nid][cidx]=s||{};
      });
    });
  }catch(e){}
  recalcState();
}

/* === KEYBOARD === */
document.addEventListener('keydown',e=>{
  const revOpen=document.getElementById('reviewPanel').classList.contains('open');
  const mainOpen=document.getElementById('mainPanel').classList.contains('open');
  if(e.key==='Escape'){
    if(revOpen) closeReview();
    else if(mainOpen) closePanel();
  }
  if(e.key==='ArrowRight'){
    if(revOpen) navReview(1);
    else if(mainOpen) navCard(1);
  }
  if(e.key==='ArrowLeft'){
    if(revOpen) navReview(-1);
    else if(mainOpen) navCard(-1);
  }
});

/* === BOOT === */
document.addEventListener('DOMContentLoaded',()=>{
  try{const t=localStorage.getItem('anki-theme-cn40');if(t) setTheme(t);}catch(e){}
  loadProgress();
  const nNodes=Object.keys(D).length;
  const nCards=Object.values(D).reduce((n,node)=>n+node.cards.length,0);
  document.getElementById('deckMeta').textContent=
    'Active recall map · '+nNodes+' topics · '+nCards+' cards';
  Object.keys(D).forEach(initNode);
  updateStats(); updateDots(); updateDoneNodes();
});
</script>
