<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --surface:#131929;
  --surface-2:#19223a;
  --surface-3:#1f2a42;
  --surface-4:#24314e;
  --amber:#f6a533;
  --amber-soft:rgba(246,165,51,.13);
  --amber-mid:rgba(246,165,51,.25);
  --amber-dim:rgba(246,165,51,.55);
  --teal:#2dd4bf;
  --teal-soft:rgba(45,212,191,.12);
  --teal-mid:rgba(45,212,191,.22);
  --teal-dim:rgba(45,212,191,.5);
  --green:#34d399;
  --green-soft:rgba(52,211,153,.13);
  --green-mid:rgba(52,211,153,.22);
  --red:#f87171;
  --red-soft:rgba(248,113,113,.12);
  --red-mid:rgba(248,113,113,.22);
  --text:#dde5f0;
  --text-2:#7e90a9;
  --text-3:#3e5065;
  --border:#1c2a40;
  --border-2:#243348;
  --hero-glow-a:rgba(45,212,191,.08);
  --hero-glow-b:rgba(246,165,51,.09);
  --bg-top:#0b0f1a;
  --bg-bottom:#0d1321;
  --map-shadow:0 20px 45px rgba(0,0,0,.22);
  --panel-shadow:0 22px 48px rgba(0,0,0,.24);
  --header-shadow:0 22px 50px rgba(0,0,0,.24);
}
html[data-theme="cream"]{
  --bg:#f4efe4;
  --surface:#fffaf1;
  --surface-2:#f6efe2;
  --surface-3:#efe5d3;
  --surface-4:#e4d5ba;
  --amber:#b86519;
  --amber-soft:rgba(184,101,25,.13);
  --amber-mid:rgba(184,101,25,.22);
  --amber-dim:rgba(184,101,25,.45);
  --teal:#0f8a7b;
  --teal-soft:rgba(15,138,123,.12);
  --teal-mid:rgba(15,138,123,.2);
  --teal-dim:rgba(15,138,123,.42);
  --green:#21885a;
  --green-soft:rgba(33,136,90,.12);
  --green-mid:rgba(33,136,90,.22);
  --red:#c65a52;
  --red-soft:rgba(198,90,82,.12);
  --red-mid:rgba(198,90,82,.22);
  --text:#2f2a24;
  --text-2:#6c5f51;
  --text-3:#a28d78;
  --border:#e4d5ba;
  --border-2:#d6c2a1;
  --hero-glow-a:rgba(15,138,123,.08);
  --hero-glow-b:rgba(184,101,25,.08);
  --bg-top:#f7f2e8;
  --bg-bottom:#efe7d9;
  --map-shadow:0 18px 40px rgba(106,80,45,.11);
  --panel-shadow:0 20px 42px rgba(106,80,45,.12);
  --header-shadow:0 18px 42px rgba(106,80,45,.12);
  --header-a:rgba(255,250,241,.96);
  --header-b:rgba(246,239,226,.92);
  --card-a:rgba(255,251,244,.98);
  --card-b:rgba(246,239,226,.98);
  --card-action-bg:rgba(239,229,211,.86);
  --nav-bg:rgba(246,239,226,.95);
  --nav-bg-hover:rgba(239,229,211,.98);
  --nav-text:#5f5141;
  --showall-bg:rgba(255,250,241,.92);
  --showall-text:#5f5141;
  --meta-bg:rgba(255,250,241,.8);
  --table-head-a:#0f8a7b;
  --table-head-b:#b86519;
}
html[data-theme="forest"]{
  --bg:#081512;
  --surface:#0f201b;
  --surface-2:#16302a;
  --surface-3:#1d4037;
  --surface-4:#28544a;
  --amber:#e4b04b;
  --amber-soft:rgba(228,176,75,.12);
  --amber-mid:rgba(228,176,75,.22);
  --amber-dim:rgba(228,176,75,.45);
  --teal:#52d6b7;
  --teal-soft:rgba(82,214,183,.12);
  --teal-mid:rgba(82,214,183,.2);
  --teal-dim:rgba(82,214,183,.42);
  --green:#7ae582;
  --green-soft:rgba(122,229,130,.12);
  --green-mid:rgba(122,229,130,.22);
  --red:#ff8b7a;
  --red-soft:rgba(255,139,122,.12);
  --red-mid:rgba(255,139,122,.22);
  --text:#e4f2ec;
  --text-2:#8fb6aa;
  --text-3:#54756b;
  --border:#1d3a32;
  --border-2:#295049;
  --hero-glow-a:rgba(82,214,183,.08);
  --hero-glow-b:rgba(228,176,75,.08);
  --bg-top:#081512;
  --bg-bottom:#0b1c18;
  --header-a:rgba(15,32,27,.96);
  --header-b:rgba(10,24,21,.92);
  --card-a:rgba(22,48,42,.98);
  --card-b:rgba(15,32,27,.98);
  --card-action-bg:rgba(29,64,55,.82);
  --nav-bg:rgba(22,48,42,.95);
  --nav-bg-hover:rgba(29,64,55,.98);
  --nav-text:#d0e9e0;
  --showall-bg:rgba(15,32,27,.86);
  --showall-text:#c7e7dc;
  --meta-bg:rgba(255,255,255,.04);
  --table-head-a:#1f7a67;
  --table-head-b:#d79f42;
}
html:not([data-theme]),html[data-theme="slate"]{
  --header-a:rgba(25,34,58,.78);
  --header-b:rgba(19,25,41,.56);
  --card-a:rgba(25,34,58,.98);
  --card-b:rgba(21,29,47,.98);
  --card-action-bg:rgba(31,42,66,.55);
  --nav-bg:rgba(25,34,58,.85);
  --nav-bg-hover:rgba(31,42,66,.98);
  --nav-text:#dde5f0;
  --showall-bg:rgba(255,255,255,.03);
  --showall-text:#7e90a9;
  --meta-bg:rgba(221,229,240,.04);
  --table-head-a:#2863d8;
  --table-head-b:#3d7bf4;
}
html{font-size:17px;-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 80px;
}
.wrap{width:100%;max-width:860px}

/* ── Header ── */
header{
  margin-bottom:32px;text-align:center;
  background:linear-gradient(180deg, var(--header-a), var(--header-b));
  border:1px solid var(--border-2);
  box-shadow:var(--header-shadow);
  border-radius:24px;
  padding:24px 20px 20px;
}
.hero-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap
}
.hero-copy{flex:1;min-width:240px}
.theme-switch{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end
}
.theme-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.theme-btn:hover{color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.theme-btn.active{
  background:var(--teal-soft);border-color:rgba(45,212,191,.24);color:var(--teal)
}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:10px;
}
h1{
  font-family:'Crimson Pro',serif;font-weight:600;
  font-size:clamp(32px,5vw,48px);line-height:1.05;
  letter-spacing:-.025em;color:var(--text);margin-bottom:6px;
}
.sub{font-size:14px;color:var(--text-2)}

/* ── Legend ── */
.legend{display:flex;gap:18px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-2)}
.lswatch{width:9px;height:9px;border-radius:50%}

/* ── Map ── */
.map-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:20px 16px 14px;margin-bottom:12px;
  overflow:hidden;
  box-shadow:var(--map-shadow);
}
/* SVG classes */
.c-gray rect{fill:var(--surface-3);stroke:var(--border-2);stroke-width:.5}
.c-gray .th{fill:var(--text);font-family:'Crimson Pro',serif;font-size:13px;font-weight:600}
.c-gray .ts{fill:var(--text-2);font-family:'DM Sans',sans-serif;font-size:10px}
.c-amber rect{fill:var(--amber-soft);stroke:var(--amber-dim);stroke-width:.75}
.c-amber .th{fill:var(--amber);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-amber .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.c-teal rect{fill:var(--teal-soft);stroke:var(--teal-dim);stroke-width:.75}
.c-teal .th{fill:var(--teal);font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500}
.c-teal .ts{fill:var(--text);font-family:'DM Sans',sans-serif;font-size:10px}
.conn{stroke:var(--border-2);stroke-width:1;fill:none;opacity:.7}
.node{cursor:pointer;transition:filter .15s}
.node:hover{filter:brightness(1.25)}
.sel-node.c-amber rect{stroke:var(--amber)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(246,165,51,.5))}
.sel-node.c-teal rect{stroke:var(--teal)!important;stroke-width:2!important;filter:drop-shadow(0 0 7px rgba(45,212,191,.4))}
.done-node{opacity:.45}
.hint-lbl{fill:var(--text-3);font-family:'DM Mono',monospace;font-size:9.5px;font-style:italic}

/* ── Panel ── */
.panel,.review-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:22px 20px;margin-bottom:12px;
  display:none;
  box-shadow:var(--panel-shadow);
}
.panel.open{display:block;animation:rise .22s ease-out}
.review-panel.open{display:block;border-color:rgba(246,165,51,.25);animation:rise .22s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.phead{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.badge{
  font-family:'DM Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
}
.b-plo{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(246,165,51,.28)}
.b-lo{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(45,212,191,.25)}
.ptitle{font-size:15px;font-weight:500;color:var(--text);flex:1;line-height:1.4}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border-2);transition:background .2s}
.dot.active{background:var(--text)}
.dot.done{background:var(--green)}
.dot.partial{background:var(--amber)}
.xbtn{
  background:none;border:none;cursor:pointer;color:var(--text-3);
  font-size:20px;line-height:1;padding:2px 7px;border-radius:5px;
  transition:color .12s,background .12s;
}
.xbtn:hover{color:var(--text);background:var(--surface-3)}

/* ── Card ── */
.card{
  background:linear-gradient(180deg, var(--card-a), var(--card-b));
  border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.ctitle{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
}
.cbody{font-size:16px;line-height:1.9;color:var(--text)}

.card-actions{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
  gap:12px;margin-top:12px;padding:12px 14px;border-radius:14px;
  border:1px solid var(--border);background:var(--card-action-bg)
}
.card-meta{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--text-2);
  font-size:11px;font-family:'DM Mono',monospace
}
.meta-pill{
  padding:5px 10px;border-radius:999px;border:1px solid var(--border-2);
  background:var(--meta-bg)
}
.meta-pill strong{color:var(--text)}
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.action-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border-2);
  color:var(--text-2);font-size:11px;font-family:'DM Mono',monospace;
  padding:8px 12px;border-radius:999px;cursor:pointer;transition:all .14s
}
.action-btn:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--surface-4)}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.action-btn.primary{
  background:var(--teal-soft);border-color:rgba(45,212,191,.22);color:var(--teal)
}
.action-btn.primary:hover:not(:disabled){background:var(--teal-mid);color:#dffef8}
.action-btn.amber{
  background:var(--amber-soft);border-color:rgba(246,165,51,.25);color:var(--amber)
}
.action-btn.amber:hover:not(:disabled){background:var(--amber-mid);color:#fff3df}
.action-btn.ghost{
  color:var(--text-3)
}

/* Table quiz */
.tblq-note{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:14px;
  line-height:1.5;
}
.tblq-copy{color:var(--text-2);flex:1;min-width:220px}
.tblq-actions{display:none}
.tblq-pill,.tblq-btn{
  border-radius:999px;padding:8px 14px;font-size:11px;
  font-family:'DM Mono',monospace
}
.tblq-pill{
  background:var(--teal-soft);border:1px solid rgba(45,212,191,.25);color:var(--teal)
}
.tblq-btn{
  background:none;border:1px solid var(--border-2);color:var(--text-2);cursor:pointer
}
.tblq-btn:hover{background:var(--surface-2);color:var(--text)}
.review-panel .tblq-actions{display:none}
.tblq-wrap{
  overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)
}
.tblq{
  width:100%;border-collapse:collapse;font-size:15px;line-height:1.6
}
.tblq thead th{
  background:linear-gradient(135deg,var(--table-head-a),var(--table-head-b));
  color:#f6f9ff;padding:14px 16px;text-align:left;font-weight:600;
  border-right:1px solid rgba(255,255,255,.08)
}
.tblq thead th:last-child{border-right:none}
.tblq tbody th[scope="row"]{
  background:rgba(221,229,240,.06);color:var(--text);font-weight:600;
  padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq tbody td{
  background:rgba(255,255,255,.02);padding:14px 16px;vertical-align:top;border-top:1px solid var(--border)
}
.tblq td .occ{
  display:block;text-align:center;white-space:normal;padding:10px 12px;min-width:180px
}
.tblq td .score-row{
  display:flex;justify-content:center;flex-wrap:wrap;margin:8px 0 0
}

/* Occluded terms */
.occ{
  display:inline-block;min-width:3ch;
  background:var(--text);color:transparent;
  border:1px solid transparent;
  border-radius:3px;cursor:pointer;padding:1px 6px;
  white-space:nowrap;user-select:none;
  vertical-align:baseline;
  transition:background .15s,color .15s,border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15)}
.occ.rev{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.25)}
.occ.needed{background:var(--amber-soft);color:var(--amber);cursor:default;border-color:rgba(246,165,51,.25)}
.occ.unscored{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.2)}

/* Score buttons */
.score-row{
  display:inline-flex;gap:3px;margin-left:5px;
  vertical-align:middle;animation:pop .15s ease-out;
}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.sbtn{
  font-size:9px;padding:1px 6px;border-radius:3px;cursor:pointer;
  font-family:'DM Mono',monospace;transition:background .1s,border-color .1s;
}
.sbtn.know{
  background:var(--green-soft);color:var(--green);
  border:1px solid rgba(52,211,153,.3);
}
.sbtn.know:hover{background:var(--green-mid)}
.sbtn.need{
  background:var(--red-soft);color:var(--red);
  border:1px solid rgba(248,113,113,.25);
}
.sbtn.need:hover{background:var(--red-mid)}

/* Jump links */
.jump{
  display:inline-flex;align-items:center;
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-3);background:var(--surface-3);
  border:1px solid var(--border-2);border-radius:3px;
  padding:1px 5px;margin-left:3px;cursor:pointer;
  vertical-align:middle;transition:all .12s;white-space:nowrap;
}
.jump.amber:hover{color:var(--amber);border-color:var(--amber-dim);background:var(--amber-soft)}
.jump.teal:hover{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-soft)}

/* Hint */
.hint{
  font-size:13px;color:var(--text-2);background:var(--surface-3);
  border-left:2px solid var(--border-2);border-radius:0 7px 7px 0;
  padding:9px 14px;margin-top:14px;line-height:1.65;
}
.hlbl{
  font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text-3);display:block;margin-bottom:4px;
}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
.nbtn{
  background:var(--nav-bg);border:1px solid var(--border);
  color:var(--nav-text);font-family:'DM Sans',sans-serif;font-size:13px;
  padding:9px 16px;border-radius:10px;cursor:pointer;
  transition:background .12s,color .12s;
}
.nbtn:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text)}
.nbtn:disabled{opacity:.25;cursor:not-allowed}
.nmc{display:flex;gap:10px;align-items:center}
.ncnt{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.showall{
  background:var(--showall-bg);border:1px solid var(--border);
  color:var(--showall-text);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:all .12s;
}
.showall:hover{color:var(--text);border-color:var(--border-2)}

/* Stats */
.stats{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:13px 18px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  margin-bottom:10px;
  box-shadow:0 18px 40px rgba(0,0,0,.2);
}
.stat{font-size:12px;color:var(--text-2);font-family:'DM Mono',monospace}
.stat strong{color:var(--text)}
.sep{color:var(--border-2)}
.sactions{display:flex;gap:8px;align-items:center;margin-left:auto}
.sbtn-lite{
  background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;
  color:var(--text-2);font-family:'DM Mono',monospace;border-radius:999px;
  padding:7px 12px;transition:all .12s
}
.sbtn-lite:hover:not(:disabled){color:var(--text);background:var(--surface-3);border-color:var(--border-2)}
.sbtn-lite:disabled{opacity:.35;cursor:not-allowed}
.review-btn{
  background:var(--amber-soft);border:1px solid rgba(246,165,51,.28);
  color:var(--amber);font-size:11px;font-family:'DM Sans',sans-serif;
  padding:7px 12px;border-radius:999px;cursor:pointer;
  transition:all .12s;display:none;align-items:center;gap:5px;
}
.review-btn.vis{display:inline-flex}
.review-btn:hover{background:var(--amber-mid)}
.reset-btn{
  background:none;border:none;cursor:pointer;font-size:11px;
  color:var(--text-3);font-family:'DM Mono',monospace;
  text-decoration:underline;text-underline-offset:2px;
}
.reset-btn:hover{color:var(--text-2)}

/* Review panel */
.rhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rtitle{
  font-family:'Crimson Pro',serif;font-size:17px;font-weight:600;
  color:var(--amber);flex:1;
}
.rprog{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2)}
.rsub{
  font-size:11px;color:var(--text-2);font-family:'DM Mono',monospace;
  background:var(--surface-3);border:1px solid var(--border);
  padding:7px 12px;border-radius:7px;margin-bottom:14px;line-height:1.5;
}

/* Footer hint */

const D={
  lo1:{label:'LO 1',sub:'Common viral & bacterial pathogens causing STIs',type:'LO',cards:[
    {t:'Master Pathogen Table',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>STI / Condition</th><th>Causative Pathogen</th><th>Type</th><th>Key Structural Feature</th></tr></thead><tbody><tr><th scope="row">Genital Herpes</th><td>{HSV-1, HSV-2}</td><td>{Viral}</td><td>{Enveloped, dsDNA}</td></tr><tr><th scope="row">HPV</th><td>{Human papillomavirus}</td><td>{Viral}</td><td>{No envelope (naked), dsDNA}</td></tr><tr><th scope="row">HIV/AIDS</th><td>{Human immunodeficiency virus}</td><td>{Viral}</td><td>{Retrovirus, 2 strands ssRNA, enveloped}</td></tr><tr><th scope="row">Hepatitis</th><td>{Hepatitis viruses}</td><td>{Viral}</td><td>{Various (enveloped/non-enveloped)}</td></tr><tr><th scope="row">Chlamydia</th><td>{Chlamydia trachomatis}</td><td>{Bacterial}</td><td>{Gram (−), obligate intracellular}</td></tr><tr><th scope="row">Gonorrhea</th><td>{Neisseria gonorrhoeae}</td><td>{Bacterial}</td><td>{Gram (−) diplococci (coffee beans), nonmotile}</td></tr><tr><th scope="row">Syphilis</th><td>{Treponema pallidum}</td><td>{Bacterial}</td><td>{Gram (−), spiral spirochete, visualized with silver stain}</td></tr><tr><th scope="row">Trichomoniasis</th><td>{Trichomonas vaginalis}</td><td>{Protozoan}</td><td>{Flagellated protozoan, extracellular, no cyst form}</td></tr></tbody></table></div>'},
    {t:'High-Yield Pathogen Facts',b:'{Chlamydia} is the most common reported STI in the US. {Gonorrhea} is most common among {adolescents and young adults}. {HPV} is the only {naked (non-enveloped) dsDNA} virus here — it lacks an envelope.'}
  ]},
  lo2:{label:'LO 2',sub:'Virulence factors & host defense evasion',type:'LO',cards:[
    {t:'HSV — Structure & Immune Evasion',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Virulence / Structure</th><th>Immune Evasion Mechanism</th></tr></thead><tbody><tr><th scope="row">Entry via receptor-mediated endocytosis or endosome formation</th><td>{Establishes latency in sensory neurons — hides from immune system}</td></tr><tr><th scope="row">Replicates in dermis/epidermis → cellular destruction → inflammation</th><td>{During latency: only LAT transcripts produced, no viral proteins → invisible to immune cells}</td></tr><tr><th scope="row">Both lytic (productive) and latent (dormant) life cycles</th><td>{VP16 tegument transcription factor active only in lytic stage, not in neurons during latency}</td></tr><tr><th scope="row">High viral load in vesicles</th><td>{Reactivates periodically due to host factors → returns to primary site → lytic replication until immune response forces it back into latency}</td></tr></tbody></table></div>',h:'Host defense: IFN signaling inhibits viral spread. TLRs bind HSV-1 proteins or viral nucleic acid and activate innate immune response by inducing chemokines and proinflammatory cytokines.'},
    {t:'HPV — Virulence Factors & Oncogenes',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Virulence Factor</th><th>Mechanism</th></tr></thead><tbody><tr><th scope="row">Early genes (E1-E7): virus replication</th><td>{E1 = helicase; E2 = transcriptional activator; E4 = viral release; E5 = immune evasion}</td></tr><tr><th scope="row">Late genes (L1/L2): structural proteins</th><td>{L1 = major capsid protein (self-assembles into capsids; immunogen in HPV vaccine)}</td></tr><tr><th scope="row">E6 oncogene</th><td>{Mediates degradation of p53 → uncontrolled proliferation, resistance to apoptosis. Also stimulates TERT (telomerase) expression.}</td></tr><tr><th scope="row">E7 oncogene</th><td>{Binds Rb → frees E2F transcription factor → unrestricted entry into S-phase}</td></tr></tbody></table></div>',h:'Immune evasion: very low viral protein production, no viremia. No cell death → no inflammation → no danger signal. E6 and E7 downregulate type I interferon responses. No activation of Langerhans cells or dendritic cells.'},
    {t:'HIV — Virulence Factors',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Virulence Factor</th><th>Role</th></tr></thead><tbody><tr><th scope="row">gp120 / gp41</th><td>{Viral attachment to host cells}</td></tr><tr><th scope="row">Host receptor: CD4</th><td>{Primary receptor on T-helper cells, macrophages, DCs}</td></tr><tr><th scope="row">Reverse transcriptase</th><td>{Synthesizes DNA from genome RNA}</td></tr><tr><th scope="row">Integrase</th><td>{Integration of proviral DNA into host genome}</td></tr><tr><th scope="row">p24</th><td>{Nucleocapsid antigen — important serologic marker}</td></tr></tbody></table></div>',h:'Entry mechanisms at mucosal sites: (a) direct infection of epithelial cells, (b) transcytosis across epithelial cells or M cells, (c) epithelial transmigration of infected donor cells, (d) uptake by intra-epithelial Langerhans cells, (e) access via abrasions.'},
    {t:'Chlamydia — EB to RB Life Cycle',b:'Chlamydia trachomatis is Gram (−) and {obligate intracellular}. The {Elementary Body (EB)} is the {infectious, non-dividing} form — survives extracellularly, initiates infection by attaching to host plasma membrane. The {Reticulate Body (RB)} is the {non-infectious, proliferative} form — multiplies inside host cell by {binary fission}. T3SS effectors injected into cytoplasm upon EB entry modify {inclusion membrane} to prevent {lysosomal degradation}.',h:'Life cycle: EB attaches → enters vacuole, differentiates into RB → RB proliferates by binary fission, differentiates back to EB → release of intracellular chlamydiae → host cell death.'},
    {t:'Neisseria gonorrhoeae — Virulence',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Virulence Factor</th><th>Mechanism</th></tr></thead><tbody><tr><th scope="row">Pili</th><td>{Adherence to urogenital epithelium; antigenic variation helps escape immune response}</td></tr><tr><th scope="row">Opacity (Opa) proteins</th><td>{Mediates uptake into cells; evades immune response}</td></tr><tr><th scope="row">Porin proteins</th><td>{Prevents phagolysosome formation}</td></tr><tr><th scope="row">Reduction modifiable proteins (Rmp)</th><td>{Blocks host bactericidal antibodies}</td></tr></tbody></table></div>',h:'Pathogenesis cascade: colonizes epithelium → invasion and transcytosis → releases peptidoglycan, LOS, and OMVs → activates TLR and NOD signaling → cytokine/chemokine release → massive neutrophil influx → neutrophil-rich, purulent exudate.'},
    {t:'Treponema pallidum — Key Virulence Concepts',b:'T. pallidum is a {Gram (−), spiral spirochete} usually visualized with {silver stain or dark field microscopy}. It infects the {endothelium of small blood vessels}, causing {proliferative endarteritis} in all stages of syphilis. The organism produces {no important toxins or enzymes}. Pathology results from {ischemia} produced by vascular lesions. {TprK} enables {antigenic variation} → immune evasion of spirochetes.',h:'Key: chancres and rashes are superficial sites of infection from intense inflammatory response. Immune response reduces bacterial burden but does not eliminate systemic infection.'},
    {t:'Trichomonas vaginalis — Virulence',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Virulence Factor</th><th>Mechanism</th></tr></thead><tbody><tr><th scope="row">LPG (lipophosphoglycan)</th><td>{Binds host receptor galectin-1 → adhesion to epithelium}</td></tr><tr><th scope="row">Membrane proteins</th><td>{Additional adhesion factors required for parasite survival near host cells}</td></tr><tr><th scope="row">Proteases</th><td>{Released by parasite; may be associated with pathogenesis}</td></tr></tbody></table></div>',h:'T. vaginalis: flagellated protozoan, extracellular, pear-shaped with a central nucleus and four anterior flagella. Exists only as a trophozoite — no cyst form. Found only in humans, no animal reservoir.'}
  ]},
  lo3:{label:'LO 3',sub:'Pathogenesis, clinical presentation & complications',type:'LO',cards:[
    {t:'HSV — Clinical Features & Cytopathic Effect',b:'HSV presents with {fever, malaise, tender inguinal lymph nodes} 3-7 days after exposure. Lesions: {red papules → vesicles → painful ulcers}; heal spontaneously in 1-3 weeks. Cytopathic effect: {Cowdry type A} inclusions = eosinophilic intranuclear inclusions. Cell fusion → {multinucleate syncytia}. Tzanck smear: cells from base of vesicle stained with Giemsa → {multinucleated giant cells}.',h:'Neonatal herpes: HSV-2 in genital tract during delivery → severe neurological disability or death. Risk is highest when the mother is infected for the first time during pregnancy. Most infections are asymptomatic despite active shedding.'},
    {t:'HPV — Clinical Presentation',b:'{HPV-6 and HPV-11} → {anogenital warts (condylomata acuminata)} and laryngeal papillomas. High-risk {HPV-16 and HPV-18} → {squamous cell carcinoma} of the cervix, head and neck, anogenital region. Histology: {Koilocytes} = small condensed nucleus + large perinuclear cytoplasmic vacuole. {Acetowhite lesion} on colposcopy — acetic acid causes swelling of abnormal squamous epithelial areas.',h:'In cancer cells: viral DNA integrates → large amounts E6/E7 → inactivate p53 and Rb → malignant transformation. No late proteins, no progeny virions produced in cancer cells.'},
    {t:'HIV — Clinical Stages',b:'Early acute stage (resolves ~2 wks): {fever, lethargy, sore throat, generalized lymphadenopathy}. Rash: {maculopapular} on trunk, arms, legs — but NOT on {palms and soles}. Middle/latent: {asymptomatic}; CD4 counts gradually decline. Late stage (AIDS): {opportunistic infections} due to immunodeficiency.',h:'HIV acute rash = trunk/arms/legs, spares palms and soles. Secondary syphilis rash = includes palms and soles. Classic exam differentiator.'},
    {t:'Chlamydia — Clinical Presentation & LGV',b:'PWU: often {asymptomatic}; cervicitis with {mucopurulent discharge}, easily induced {endocervical bleeding}; complications include {PID} and {perihepatic inflammation}. PWP: {epididymitis and prostatitis} (clear discharge); also urethritis, proctitis, pharyngitis, conjunctivitis. LGV caused by C. trachomatis {L1-L3 serovars}: primary papule heals spontaneously → second stage: {tender local lymphadenopathy} + fever, headache, myalgia.',h:'LGV if untreated → fibrosis and strictures in anogenital tract. Infection leads to antibody and cell-mediated reactions but NOT to resistance to reinfection.'},
    {t:'Neisseria gonorrhoeae — Clinical Presentation',b:'Gonorrhea discharge: {purulent (thick, creamy)}. Chlamydia discharge: {clear/mucopurulent}. PWU: often {asymptomatic}; if symptomatic: cervicitis with purulent vaginal discharge; complication = {ascending infection, salpingitis}. PWP: {urethritis with purulent discharge}; may develop epididymitis, prostatitis, urethral stricture. Pathogenesis: releases {peptidoglycan, LOS, and OMVs} → massive {neutrophil influx} → facilitates transmission.',h:'Neonatal gonococcal conjunctivitis can occur during delivery.'},
    {t:'Treponema pallidum — Stages of Syphilis',b:'Primary (~3 wks): single, firm, {non-tender chancre} at inoculation site; heals with or without treatment. Secondary (2-10 wks): painless lesions on skin, mucosa, {palms and soles}; {condylomata lata} = moist papules on genitals, rich in spirochetes. Latent: early latent (1-2 yrs) can relapse; late latent = {not infectious}. Tertiary (5+ yrs): {gummas} (nodular, delayed hypersensitivity); {neurosyphilis} (tabes dorsalis, general paresis); {cardiovascular syphilis} (syphilitic aortitis → aortic valve insufficiency).',h:'Congenital syphilis: Hutchinson\'s teeth, mulberry molars, saber shins, saddle nose, rhagades, snuffles, frontal bossing; hepatosplenomegaly, interstitial keratitis, eighth nerve deafness. All pregnant women tested for syphilis at least twice.'},
    {t:'Trichomonas vaginalis — Clinical Presentation',b:'In PWU: {yellow frothy vaginal discharge}, vulvovaginal discomfort, dysuria and dyspareunia. PE: {Strawberry cervix} — fiery red appearance due to dilation of cervical mucosa blood vessels. In pregnancy: risk for {preterm delivery}. In PWP: usually {asymptomatic} (~10% have urethritis). Dx: wet mount shows {pear-shaped trophozoites} with {jerky motion}.',h:'Trichomoniasis is one of the most common infections worldwide — roughly 25-50% of women in the US harbor the organism.'},
    {t:'PID — Presentation & Complications',b:'PID = infectious and inflammatory disorder of the {uterus, fallopian tubes, and adjacent pelvic structures}. Presentation: {lower abdominal pain} (dull, aching, crampy, bilateral, constant); abnormal vaginal discharge (~75%); postcoital bleeding (~40%); fever >38 C (~30%, late finding). Gonococcal PID: {more abrupt onset, more toxic symptoms}. Symptoms often near {end of menses or first 10 days after menstruation}. Complications: {perihepatitis (RUQ pain)}; repeated episodes → {infertility and ectopic pregnancy}.'},
    {t:'High-Yield Discharge Comparison',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>STI</th><th>Discharge Character</th><th>Key Distinguisher</th></tr></thead><tbody><tr><th scope="row">C. trachomatis</th><td>{Mucopurulent (PWU) / Clear (PWP)}</td><td>{Easily induced endocervical bleeding; often asymptomatic}</td></tr><tr><th scope="row">N. gonorrhoeae</th><td>{Purulent (thick, heavy)}</td><td>{Neutrophil-rich purulent exudate; intracellular diplococci on Gram stain}</td></tr><tr><th scope="row">T. vaginalis</th><td>{Yellow, frothy}</td><td>{Strawberry cervix; jerky trophozoites on wet mount}</td></tr><tr><th scope="row">BV</th><td>{Thin, grayish-white, fishy odor}</td><td>{Positive whiff test; clue cells}</td></tr><tr><th scope="row">HSV</th><td>{Whitish mucopurulent (cervical/vaginal lesions)}</td><td>{Painful vesicles/ulcers are the primary finding; Tzanck smear}</td></tr></tbody></table></div>'}
  ]},
  lo4:{label:'LO 4',sub:'Preventative measures for STIs',type:'LO',cards:[
    {t:'HPV Vaccination — Gardasil 9 Schedule',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Category</th><th>Details</th></tr></thead><tbody><tr><th scope="row">Routine vaccination</th><td>{Age 11-12 years; can be started at age 9}</td></tr><tr><th scope="row">Catch-up vaccination</th><td>{Age 13-26 years, if not adequately vaccinated}</td></tr><tr><th scope="row">Shared clinical decision-making</th><td>{Some adults age 27-45 years, if not adequately vaccinated}</td></tr></tbody></table></div>',h:'Gardasil 9-valent HPV vaccine is currently approved in the US.'},
    {t:'HPV Vaccination — Dosing Details',b:'Age 9-14 at initial vaccination: {2-dose series} at {0 and 6-12 months}. Age 15+ at initial vaccination: {3-dose series} at {0, 1-2 months, and 6 months}. Immunocompromising conditions (including HIV): {3-dose series} even for ages 9-14. History of sexual abuse/assault: start at age {9}. Pregnancy: HPV vaccination {not recommended until after pregnancy}; no intervention needed if vaccinated while pregnant.'},
    {t:'General STI Prevention Strategies',b:'<div class="tblq-note"><div class="tblq-copy">Click each blank cell to reveal — use Reveal this card or Knew all to score.</div><div class="tblq-actions"><span class="tblq-pill">Quiz Mode On</span><button class="tblq-btn" onclick="event.stopPropagation();revealAll()">Reveal All</button><button class="tblq-btn" onclick="event.stopPropagation();resetCard()">Reset</button></div></div><div class="tblq-wrap"><table class="tblq"><thead><tr><th>Strategy</th><th>Details</th></tr></thead><tbody><tr><th scope="row">Vaccination</th><td>{HPV (Gardasil 9), Hepatitis B}</td></tr><tr><th scope="row">Barrier protection</th><td>{Condoms, dental dams; PrEP/PEP for HIV}</td></tr><tr><th scope="row">Reduce partners</th><td>{Monogamy decreases exposure risk}</td></tr><tr><th scope="row">Regular screening</th><td>{Especially for Chlamydia (often asymptomatic); all pregnant women tested for syphilis 2x or more}</td></tr></tbody></table></div>'}
  ]}
};

function setTheme(theme){
  const next=theme||'slate';
  if(next==='slate') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',next);
  document.querySelectorAll('.theme-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.theme===next);
  });
  try{localStorage.setItem(THEME_STORAGE_KEY,next);}catch(e){}
}

try{
  setTheme(localStorage.getItem(THEME_STORAGE_KEY)||'slate');
}catch(e){

}

document.getElementById('deckMeta').textContent=`Active recall map · ${Object.keys(D).length} topics · ${Object.values(D).reduce((n,node)=>n+node.cards.length,0)} cards`;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let cur=null, ci=0;
let tr={};       // tr[nid][cardIdx] = Set<termIdx>
let sc={};       // sc[nid][cardIdx][termIdx] = 'knew'|'needed'
let done=new Set();
let totRev=0, totKnew=0, totNeed=0;
let revQueue=[], revIdx=0, revTr={};
const PROGRESS_COOKIE=`${DECK_ID}_progress_v1`;

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function nT(b){return(b.match(/\{[^}]+\}/g)||[]).length}

function initNode(id){
  if(!tr[id]){
    tr[id]={};sc[id]={};
    D[id].cards.forEach((_,i)=>{tr[id][i]=new Set();sc[id][i]={}});
  }
}

function setCookie(name,value,days){
  const maxAge=days*24*60*60;
  document.cookie=`${name}=${encodeURIComponent(value)}; path=/; max-age=${maxAge}; SameSite=Lax`;
}

function getCookie(name){
  const prefix=`${name}=`;
  return document.cookie.split('; ').reduce((found,part)=>{
    if(found!==null) return found;
    return part.indexOf(prefix)===0 ? decodeURIComponent(part.slice(prefix.length)) : null;
  },null);
}

function clearCookie(name){
  document.cookie=`${name}=; path=/; max-age=0; SameSite=Lax`;
}

function serializeProgress(){
  const state={c:cur||'',i:ci||0,r:{},s:{}};
  Object.keys(tr).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const set=tr[nid][cardIdx];
      return set&&set.size ? Array.from(set).sort((a,b)=>a-b).join('.') : '';
    });
    if(rows.some(Boolean)) state.r[nid]=rows;
  });
  Object.keys(sc).forEach(nid=>{
    const rows=D[nid].cards.map((_,cardIdx)=>{
      const obj=sc[nid][cardIdx]||{};
      const packed=Object.keys(obj).sort((a,b)=>parseInt(a)-parseInt(b)).map(idx=>`${idx}${obj[idx]==='knew'?'k':'n'}`).join('.');
      return packed;
    });
    if(rows.some(Boolean)) state.s[nid]=rows;
  });
  return JSON.stringify(state);
}

function saveProgress(){
  try{
    setCookie(PROGRESS_COOKIE,serializeProgress(),180);
  }catch(e){}
}

function loadProgress(){
  const raw=getCookie(PROGRESS_COOKIE);
  if(!raw) return;
  try{
    const state=JSON.parse(raw);
    tr={};sc={};

    Object.keys(D).forEach(nid=>{
      initNode(nid);
      const revealedRows=(state.r&&state.r[nid])||[];
      revealedRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(v=>{
          if(v==='') return;
          tr[nid][cardIdx].add(parseInt(v,10));
        });
      });

      const scoredRows=(state.s&&state.s[nid])||[];
      scoredRows.forEach((row,cardIdx)=>{
        if(!row) return;
        row.split('.').forEach(token=>{
          if(!token) return;
          const score=token.slice(-1)==='k' ? 'knew' : 'needed';
          const idx=parseInt(token.slice(0,-1),10);
          if(!Number.isNaN(idx)) sc[nid][cardIdx][idx]=score;
        });
      });
    });

    if(state.c&&D[state.c]){
      cur=state.c;
      ci=Math.max(0,Math.min(D[cur].cards.length-1,parseInt(state.i,10)||0));
    }
  }catch(e){
    clearCookie(PROGRESS_COOKIE);
  }
}

function cardMetrics(nid,cidx){
  initNode(nid);
  const total=nT(D[nid].cards[cidx].b);
  const revealed=tr[nid][cidx].size;
  let unscored=0, knew=0, needed=0;
  for(let i=0;i<total;i++){
    const score=sc[nid][cidx][i];
    if(score==='knew') knew++;
    else if(score==='needed') needed++;
    else if(tr[nid][cidx].has(i)) unscored++;
  }
  return {total,revealed,unscored,knew,needed,allRevealed:total>0&&revealed>=total};
}

function parseBody(body, nid, cidx, opts={}){
  // opts: {forReview, targetTermIdx}
  let i=0;
  return body.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    let revealed, scored;

    if(opts.forReview){
      revealed=opts.revealedSet ? opts.revealedSet.has(idx) : false;
      scored=null;
    } else {
      revealed=tr[nid]&&tr[nid][cidx]&&tr[nid][cidx].has(idx);
      scored=revealed&&sc[nid]&&sc[nid][cidx] ? (sc[nid][cidx][idx]||null) : null;
    }

    const link=LINKS[t];
    const showJump=revealed&&link&&link[0]!==nid;
    const isTarget=opts.forReview&&opts.targetTermIdx===idx;

    let cls='occ';
    if(revealed||isTarget){
      if(scored==='knew') cls+=' rev';
      else if(scored==='needed') cls+=' needed';
      else cls+=' unscored';
    }

    const da=opts.forReview?'':`data-nid="${nid}" data-ci="${cidx}" data-i="${idx}"`;
    const onclick=(!revealed&&!opts.forReview)?` onclick="revTerm(this)"`
      :(opts.forReview&&isTarget&&!opts.revealedSet?.has(idx))?' onclick="revRevTerm(this)"':'';

    let html=`<span class="${cls}"${da}${onclick}>${t}</span>`;

    if(revealed&&!scored&&!opts.forReview){
      html+=`<span class="score-row" data-nid="${nid}" data-ci="${cidx}" data-i="${idx}">`+
        `<button class="sbtn know" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button>`+
        `<button class="sbtn need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button>`+
        `</span>`;
    }
    if(showJump){
      html+=`<span class="jump ${link[2]}" onclick="jumpNode('${link[0]}',event)" title="Jump to ${link[1]}">→ ${link[1]}</span>`;
    }
    return html;
  });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const d=D[cur].cards[ci];
  const m=cardMetrics(cur,ci);

  // Dots
  document.getElementById('dots').innerHTML=D[cur].cards.map((_,i)=>{
    const tot=nT(D[cur].cards[i].b),got=tr[cur][i].size;
    const cls=i===ci?'active':got>=tot&&tot>0?'done':got>0?'partial':'';
    return `<span class="dot ${cls}"></span>`;
  }).join('');

  document.getElementById('cnt').textContent=`${ci+1} / ${D[cur].cards.length}`;
  document.getElementById('bprev').disabled=ci===0;
  document.getElementById('bnext').disabled=ci===D[cur].cards.length-1;
  document.getElementById('revealTopicBtn').disabled=!cur;

  document.getElementById('ccard').innerHTML=
    `<div class="ctitle">${d.t}</div>`+
    `<div class="cbody">${parseBody(d.b,cur,ci)}</div>`+
    (d.h?`<div class="hint"><span class="hlbl">Clinical note</span>${d.h}</div>`:'');

  document.getElementById('cardActions').innerHTML=
    `<div class="card-meta">`+
      `<span class="meta-pill"><strong>${m.revealed}</strong> / ${m.total} revealed</span>`+
      `<span class="meta-pill"><strong>${m.knew}</strong> knew</span>`+
      `<span class="meta-pill"><strong>${m.needed}</strong> needed help</span>`+
      (m.unscored?`<span class="meta-pill"><strong>${m.unscored}</strong> waiting to score</span>`:'')+
    `</div>`+
    `<div class="action-row">`+
      `<button class="action-btn primary" onclick="revealAll()" ${m.total===0||m.allRevealed?'disabled':''}>Reveal this card</button>`+
      `<button class="action-btn amber" onclick="knewAllCurrentCard()" ${!m.allRevealed?'disabled':''}>Knew all</button>`+
      `<button class="action-btn ghost" onclick="resetCard()" ${m.revealed===0&&m.knew===0&&m.needed===0?'disabled':''}>Reset this card</button>`+
    `</div>`;
}

function renderReview(){
  if(!revQueue.length) return;
  const q=revQueue[revIdx];
  const revSet=revTr[revIdx]||new Set();

  document.getElementById('rprog').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rcnt').textContent=`${revIdx+1} / ${revQueue.length}`;
  document.getElementById('rsub').innerHTML=
    `<strong>${D[q.nid].label} — ${q.card.t}</strong><br>`+
    `Term to recall: <span style="color:var(--amber)">${q.term}</span>`;
  document.getElementById('rbprev').disabled=revIdx===0;
  document.getElementById('rbnext').disabled=revIdx===revQueue.length-1;

  // Build card body: only the target term is blanked; others shown in dim text
  let i=0;
  const body=q.card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
    const idx=i++;
    const isTarget=idx===q.tidx;
    const isRevealed=revSet.has(idx);
    if(isTarget){
      if(isRevealed){
        return `<span class="occ needed">${t}</span>`;
      } else {
        return `<span class="occ" onclick="revRevTerm()" style="cursor:pointer">${t}</span>`;
      }
    }
    return `<span style="color:var(--text-2)">${t}</span>`;
  });

  document.getElementById('rccard').innerHTML=
    `<div class="ctitle">${q.card.t}</div>`+
    `<div class="cbody">${body}</div>`+
    (q.card.h?`<div class="hint"><span class="hlbl">Clinical note</span>${q.card.h}</div>`:'');
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function selNode(id){
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  document.getElementById('n-'+id).classList.add('sel-node');
  cur=id;ci=0;
  initNode(id);
  const p=document.getElementById('panel');
  p.classList.add('open');
  const d=D[id];
  const b=document.getElementById('bdg');
  b.textContent=d.label;
  b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
  document.getElementById('ptitle').textContent=d.sub;
  render();
  saveProgress();
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function jumpNode(id,e){
  e.stopPropagation();
  selNode(id);
}

function revTerm(s){
  if(s.classList.contains('rev')||s.classList.contains('needed')||s.classList.contains('unscored')) return;
  const nid=s.dataset.nid,cidx=parseInt(s.dataset.ci),tidx=parseInt(s.dataset.i);
  initNode(nid);
  tr[nid][cidx].add(tidx);
  totRev++;
  updStats();
  render();
}

function scoreIt(e,nid,cidx,tidx,score){
  e.stopPropagation();
  if(sc[nid][cidx][tidx]) return; // already scored
  sc[nid][cidx][tidx]=score;
  if(score==='knew') totKnew++;
  else totNeed++;
  chkDone(nid);
  updStats();
  render();
}

function revealAll(){
  const d=D[cur].cards[ci];
  const n=nT(d.b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){tr[cur][ci].add(i);totRev++;}
  }
  chkDone(cur);updStats();render();
}

function knewAllCurrentCard(){
  if(!cur) return;
  initNode(cur);
  const n=nT(D[cur].cards[ci].b);
  for(let i=0;i<n;i++){
    if(!tr[cur][ci].has(i)){
      tr[cur][ci].add(i);
      totRev++;
    }
    const prev=sc[cur][ci][i];
    if(prev==='needed') totNeed--;
    if(prev!=='knew') totKnew++;
    sc[cur][ci][i]='knew';
  }
  chkDone(cur);
  updStats();
  render();
}

function revealNodeCards(nid){
  initNode(nid);
  D[nid].cards.forEach((card,cidx)=>{
    const n=nT(card.b);
    for(let i=0;i<n;i++){
      if(!tr[nid][cidx].has(i)){
        tr[nid][cidx].add(i);
        totRev++;
      }
    }
    chkDone(nid);
  });
}

function revealTopic(){
  if(!cur) return;
  revealNodeCards(cur);
  updStats();
  render();
}

function revealDeck(){
  Object.keys(D).forEach(nid=>revealNodeCards(nid));
  updStats();
  if(cur) render();
}

function goCard(dir){
  ci=Math.max(0,Math.min(D[cur].cards.length-1,ci+dir));
  render();
  saveProgress();
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
  cur=null;
  document.getElementById('revealTopicBtn').disabled=true;
  saveProgress();
}

function chkDone(id){
  const all=D[id].cards.every((_,i)=>{
    const t=nT(D[id].cards[i].b);
    return t===0||tr[id][i].size>=t;
  });
  if(all){
    done.add(id);
    document.getElementById('n-'+id).classList.add('done-node');
  }
}

function countNeeded(){
  let n=0;
  Object.keys(sc).forEach(nid=>Object.keys(sc[nid]).forEach(cidx=>
    Object.values(sc[nid][cidx]).forEach(v=>{if(v==='needed')n++})
  ));
  return n;
}

function updStats(){
  document.getElementById('st-rev').textContent=totRev;
  document.getElementById('st-knew').textContent=totKnew;
  document.getElementById('st-need').textContent=totNeed;
  document.getElementById('st-done').textContent=done.size;
  const n=countNeeded();
  document.getElementById('rcount').textContent=n;
  document.getElementById('reviewBtn').classList.toggle('vis',n>0);
  saveProgress();
}

function recalcState(){
  totRev=0;totKnew=0;totNeed=0;done=new Set();
  document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('done-node'));

  Object.keys(D).forEach(nid=>{
    let all=true;
    D[nid].cards.forEach((card,i)=>{
      const got=tr[nid]&&tr[nid][i]?tr[nid][i].size:0;
      const tot=nT(card.b);
      totRev+=got;
      Object.values(sc[nid]&&sc[nid][i]?sc[nid][i]:{}).forEach(v=>{
        if(v==='knew') totKnew++;
        else if(v==='needed') totNeed++;
      });
      if(!(tot===0||got>=tot)) all=false;
    });
    if(all){
      done.add(nid);
      const el=document.getElementById('n-'+nid);
      if(el) el.classList.add('done-node');
    }
  });

  updStats();
}

function resetCard(){
  if(!cur) return;
  initNode(cur);
  tr[cur][ci]=new Set();
  sc[cur][ci]={};
  closeReview();
  recalcState();
  render();
}

function resetAll(){
  tr={};sc={};done.clear();
  totRev=0;totKnew=0;totNeed=0;
  document.querySelectorAll('svg .node').forEach(g=>{
    g.classList.remove('sel-node','done-node');
  });
  document.getElementById('revealTopicBtn').disabled=!cur;
  updStats();
  closeReview();
  if(cur){initNode(cur);render();}
}

// ═══════════════════════════════════════════════════
// REVIEW (SPACED REP)
// ═══════════════════════════════════════════════════
function startReview(){
  revQueue=[];
  Object.keys(sc).forEach(nid=>{
    Object.keys(sc[nid]).forEach(cidx=>{
      const card=D[nid].cards[parseInt(cidx)];
      let termIdx=0;
      card.b.replace(/\{([^}]+)\}/g,(_,t)=>{
        const i=termIdx++;
        if(sc[nid][cidx][i]==='needed'){
          revQueue.push({nid,cidx:parseInt(cidx),tidx:i,term:t,card});
        }
      });
    });
  });
  // Fisher-Yates shuffle
  for(let i=revQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [revQueue[i],revQueue[j]]=[revQueue[j],revQueue[i]];
  }
  revIdx=0;revTr={};
  if(!revQueue.length) return;
  const rp=document.getElementById('reviewPanel');
  rp.classList.add('open');
  rp.scrollIntoView({behavior:'smooth',block:'nearest'});
  renderReview();
}

function revRevTerm(){
  if(!revTr[revIdx]) revTr[revIdx]=new Set();
  revTr[revIdx].add(revQueue[revIdx].tidx);
  renderReview();
}

function revAllReview(){revRevTerm();}

function goReview(dir){
  revIdx=Math.max(0,Math.min(revQueue.length-1,revIdx+dir));
  renderReview();
}

function closeReview(){
  document.getElementById('reviewPanel').classList.remove('open');
}

function restoreSession(){
  loadProgress();
  recalcState();
  if(cur&&D[cur]){
    document.querySelectorAll('svg .node').forEach(g=>g.classList.remove('sel-node'));
    const nodeEl=document.getElementById('n-'+cur);
    if(nodeEl) nodeEl.classList.add('sel-node');
    const d=D[cur];
    const p=document.getElementById('panel');
    p.classList.add('open');
    const b=document.getElementById('bdg');
    b.textContent=d.label;
    b.className='badge '+(d.type==='PLO'?'b-plo':'b-lo');
    document.getElementById('ptitle').textContent=d.sub;
    document.getElementById('revealTopicBtn').disabled=false;
    render();
  }else{
    document.getElementById('revealTopicBtn').disabled=true;
  }
}

restoreSession();

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inRev=document.getElementById('reviewPanel').classList.contains('open');
  if(inRev){
    if(e.key==='ArrowLeft'){e.preventDefault();goReview(-1)}
    else if(e.key==='ArrowRight'){e.preventDefault();goReview(1)}
    else if(e.key==='Escape') closeReview();
    return;
  }
  if(!cur) return;
  if(e.key==='ArrowLeft'){e.preventDefault();goCard(-1)}
  else if(e.key==='ArrowRight'){e.preventDefault();goCard(1)}
  else if(e.key==='Escape') closePanel();
});
</script>
</body>
</html>
