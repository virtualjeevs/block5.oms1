<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LO 41 Series · Palate & Nasal Cavity — Contextual Anki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── DESIGN TOKENS ── */
:root {
  --amber: #f59e0b; --amber-soft: rgba(245,158,11,.15);
  --teal:  #2dd4bf; --teal-soft:  rgba(45,212,191,.15);
  --gray:  #94a3b8; --gray-soft:  rgba(148,163,184,.12);
  --green: #34d399; --green-soft: rgba(52,211,153,.15);
  --red:   #f87171; --red-soft:   rgba(248,113,113,.15);
  --hero-glow-a: rgba(245,158,11,.12);
  --hero-glow-b: rgba(45,212,191,.10);
  --header-shadow: 0 22px 50px rgba(0,0,0,.24);
}

/* ── SLATE THEME (default) ── */
html[data-theme="slate"] {
  --bg-top:#0f172a; --bg-bottom:#1e293b;
  --surface:#1e293b; --surface2:#263347; --surface3:#0f172a;
  --border:rgba(148,163,184,.15); --border2:rgba(148,163,184,.08);
  --text:#e2e8f0; --text-2:#94a3b8; --text-3:#64748b;
  --header-a:#0f172a; --header-b:#1a2540;
  --card-a:#1e293b; --card-b:#263347;
  --card-action-bg:#0f172a;
  --nav-bg:#1e293b; --nav-bg-hover:#263347; --nav-text:#94a3b8;
  --showall-bg:rgba(245,158,11,.12); --showall-text:#f59e0b;
  --meta-bg:rgba(148,163,184,.1);
  --table-head-a:#1e293b; --table-head-b:#263347;
}
/* ── CREAM THEME ── */
html[data-theme="cream"] {
  --bg-top:#fdf6e3; --bg-bottom:#f5ede0;
  --surface:#fffbf4; --surface2:#f7f0e6; --surface3:#ede4d4;
  --border:rgba(139,90,43,.14); --border2:rgba(139,90,43,.07);
  --text:#3b2a1a; --text-2:#7c5c3e; --text-3:#a0836b;
  --header-a:#f5ede0; --header-b:#ebe0cc;
  --card-a:#fffbf4; --card-b:#f7f0e6;
  --card-action-bg:#f0e8d8;
  --nav-bg:#ede4d4; --nav-bg-hover:#e0d5c2; --nav-text:#7c5c3e;
  --showall-bg:rgba(245,158,11,.15); --showall-text:#b45309;
  --meta-bg:rgba(139,90,43,.1);
  --table-head-a:#ede4d4; --table-head-b:#e5d9c6;
  --hero-glow-a:rgba(245,158,11,.08); --hero-glow-b:rgba(180,83,9,.07);
}
/* ── FOREST THEME ── */
html[data-theme="forest"] {
  --bg-top:#0d1f12; --bg-bottom:#162b1e;
  --surface:#162b1e; --surface2:#1e3828; --surface3:#0d1f12;
  --border:rgba(134,198,120,.13); --border2:rgba(134,198,120,.07);
  --text:#d4edda; --text-2:#8ec99b; --text-3:#5d9a6e;
  --header-a:#0d1f12; --header-b:#172d1f;
  --card-a:#162b1e; --card-b:#1e3828;
  --card-action-bg:#0d1f12;
  --nav-bg:#1e3828; --nav-bg-hover:#26473a; --nav-text:#8ec99b;
  --showall-bg:rgba(45,212,191,.12); --showall-text:#2dd4bf;
  --meta-bg:rgba(134,198,120,.1);
  --table-head-a:#162b1e; --table-head-b:#1e3828;
  --hero-glow-a:rgba(45,212,191,.10); --hero-glow-b:rgba(52,211,153,.09);
}

/* ── BODY ── */
body {
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at top left,  var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
}

/* ── HEADER ── */
header {
  padding:2rem 2rem 1.5rem;
  background:linear-gradient(135deg, var(--header-a) 0%, var(--header-b) 100%);
  box-shadow:var(--header-shadow);
  border-bottom:1px solid var(--border);
}
.hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
.eyebrow { font-family:'DM Mono',monospace; font-size:.7rem; letter-spacing:.12em; color:var(--text-2); text-transform:uppercase; margin-bottom:.4rem; }
h1 { font-family:'Crimson Pro',serif; font-size:clamp(1.6rem,3vw,2.4rem); font-weight:700; line-height:1.2; color:var(--text); }
.sub { color:var(--text-2); font-size:.85rem; margin-top:.4rem; }
.theme-switch { display:flex; gap:.4rem; flex-shrink:0; margin-top:.3rem; }
.theme-btn { font-family:'DM Mono',monospace; font-size:.7rem; padding:.3rem .7rem; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-2); cursor:pointer; transition:all .2s; }
.theme-btn.active, .theme-btn:hover { background:var(--amber-soft); border-color:var(--amber); color:var(--amber); }

/* ── LEGEND ── */
.legend { display:flex; gap:1.5rem; padding:.7rem 2rem; border-bottom:1px solid var(--border2); flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:.5rem; font-size:.78rem; color:var(--text-2); font-family:'DM Mono',monospace; }
.lswatch { width:10px; height:10px; border-radius:50%; }

/* ── MAIN LAYOUT ── */
.wrap { max-width:900px; margin:0 auto; padding:1.5rem 1rem 4rem; }

/* ── STATS BAR ── */
.stats-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; align-items:center; font-family:'DM Mono',monospace; font-size:.72rem; }
.stat-pill { padding:.25rem .65rem; border-radius:20px; background:var(--meta-bg); color:var(--text-2); border:1px solid var(--border2); transition:all .2s; }
.stat-pill.s-rev  { background:var(--teal-soft);  color:var(--teal);  border-color:rgba(45,212,191,.25); }
.stat-pill.s-knew { background:var(--green-soft); color:var(--green); border-color:rgba(52,211,153,.25); }
.stat-pill.s-need { background:var(--red-soft);   color:var(--red);   border-color:rgba(248,113,113,.25); }
.stat-pill.s-done { background:var(--amber-soft); color:var(--amber); border-color:rgba(245,158,11,.25); }
.stats-spacer { flex:1; }
.btn-reset-all { font-family:'DM Mono',monospace; font-size:.7rem; padding:.25rem .7rem; border-radius:20px; background:transparent; border:1px solid var(--border); color:var(--text-3); cursor:pointer; transition:all .2s; }
.btn-reset-all:hover { border-color:var(--red); color:var(--red); }

/* ── SVG MAP ── */
.map-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:1.5rem; }
svg.mindmap { display:block; width:100%; cursor:default; }
.conn { stroke:var(--border); stroke-width:1.5; fill:none; }
.node { cursor:pointer; transition:opacity .2s; }
.node:hover rect { filter:brightness(1.12); }
.node.done-node { opacity:.42; }
.node rect { rx:8; ry:8; transition:filter .2s; }
.node text { font-family:'DM Mono',monospace; pointer-events:none; dominant-baseline:middle; text-anchor:middle; }
.node .n-label { font-size:10px; font-weight:600; }
.node .n-sub   { font-size:8.5px; }
.c-amber rect { fill:var(--amber-soft); stroke:var(--amber); stroke-width:1.5; }
.c-amber .n-label { fill:var(--amber); }
.c-amber .n-sub   { fill:var(--text-2); }
.c-teal  rect { fill:var(--teal-soft);  stroke:var(--teal);  stroke-width:1.5; }
.c-teal  .n-label { fill:var(--teal); }
.c-teal  .n-sub   { fill:var(--text-2); }
.c-gray  rect { fill:var(--gray-soft);  stroke:var(--gray);  stroke-width:1.5; }
.c-gray  .n-label { fill:var(--text); }
.c-gray  .n-sub   { fill:var(--text-2); }
.node.active-node rect { stroke-width:2.5 !important; filter:brightness(1.18); }
.hint-lbl { font-family:'DM Mono',monospace; font-size:8px; fill:var(--text-3); text-anchor:middle; }
.prog-dot { transition:fill .3s; }

/* ── PANEL ── */
.panel { display:none; background:linear-gradient(135deg, var(--card-a) 0%, var(--card-b) 100%); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.panel.open { display:block; }
.panel-head { padding:1rem 1.2rem .8rem; border-bottom:1px solid var(--border2); display:flex; align-items:center; gap:.7rem; }
.badge { font-family:'DM Mono',monospace; font-size:.68rem; font-weight:600; padding:.2rem .55rem; border-radius:12px; letter-spacing:.06em; }
.badge-amber { background:var(--amber-soft); color:var(--amber); border:1px solid rgba(245,158,11,.3); }
.badge-teal  { background:var(--teal-soft);  color:var(--teal);  border:1px solid rgba(45,212,191,.3); }
.panel-title { font-family:'Crimson Pro',serif; font-size:1.2rem; font-weight:600; color:var(--text); }
.close-btn { margin-left:auto; background:none; border:1px solid var(--border); color:var(--text-3); font-size:.75rem; font-family:'DM Mono',monospace; padding:.2rem .55rem; border-radius:8px; cursor:pointer; }
.close-btn:hover { border-color:var(--text-2); color:var(--text); }

/* ── CARD ── */
.card-wrap { padding:1.2rem; }
.card-meta { display:flex; gap:.5rem; margin-bottom:.8rem; flex-wrap:wrap; align-items:center; }
.meta-pill { font-family:'DM Mono',monospace; font-size:.68rem; padding:.18rem .5rem; border-radius:10px; background:var(--meta-bg); color:var(--text-2); border:1px solid var(--border2); }
.meta-pill.mp-rev  { background:var(--teal-soft);  color:var(--teal); }
.meta-pill.mp-knew { background:var(--green-soft); color:var(--green); }
.meta-pill.mp-need { background:var(--red-soft);   color:var(--red); }
.meta-pill.mp-wait { background:var(--amber-soft); color:var(--amber); }
.card-title { font-family:'DM Mono',monospace; font-size:.75rem; color:var(--text-2); margin-bottom:.65rem; letter-spacing:.04em; }
.card-body { font-size:.95rem; line-height:1.85; color:var(--text); }
.card-hint { margin-top:.9rem; padding:.65rem .9rem; background:var(--surface3); border-left:3px solid var(--teal); border-radius:0 8px 8px 0; font-size:.83rem; color:var(--text-2); line-height:1.6; }

/* ── OCCLUSION ── */
.occ {
  display:inline-block;
  min-width:3ch;
  background:var(--text);
  color:transparent;
  border:1px solid transparent;
  border-radius:3px;
  cursor:pointer;
  padding:1px 6px;
  white-space:nowrap;
  user-select:none;
  vertical-align:baseline;
  transition:background .15s, color .15s, border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover { filter:brightness(1.15); }
.occ.rev     { background:var(--green-soft); color:var(--green);  cursor:default; border-color:rgba(52,211,153,.25); }
.occ.needed  { background:var(--red-soft);   color:var(--red);    cursor:default; border-color:rgba(248,113,113,.25); }
.occ.unscored{ background:var(--teal-soft);  color:var(--teal);   cursor:default; border-color:rgba(45,212,191,.25); }
.occ.dim-term{ color:var(--text-3); background:transparent; border-color:transparent; cursor:default; }
.score-btns { display:inline-flex; gap:.3rem; margin-left:.4rem; vertical-align:middle; }
.score-btn { font-family:'DM Mono',monospace; font-size:.68rem; padding:.15rem .45rem; border-radius:6px; cursor:pointer; border:1px solid; transition:all .15s; }
.sb-knew { background:var(--green-soft); color:var(--green); border-color:rgba(52,211,153,.3); }
.sb-knew:hover { background:var(--green); color:#0d1f12; }
.sb-need { background:var(--red-soft);   color:var(--red);   border-color:rgba(248,113,113,.3); }
.sb-need:hover { background:var(--red);   color:#fff; }
.jump-link { font-family:'DM Mono',monospace; font-size:.68rem; margin-left:.3rem; padding:.15rem .45rem; border-radius:6px; background:var(--amber-soft); color:var(--amber); border:1px solid rgba(245,158,11,.3); cursor:pointer; text-decoration:none; display:inline-block; vertical-align:middle; }
.jump-link:hover { background:var(--amber); color:#0f172a; }

/* ── TABLE QUIZ ── */
.tblq-wrap { overflow-x:auto; margin:.6rem 0; }
.tblq { width:100%; border-collapse:collapse; font-size:.85rem; }
.tblq th { font-family:'DM Mono',monospace; font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; background:linear-gradient(135deg, var(--table-head-a), var(--table-head-b)); color:var(--text-2); padding:.55rem .9rem; border-bottom:2px solid var(--border); text-align:left; }
.tblq td { padding:.5rem .9rem; border-bottom:1px solid var(--border2); vertical-align:middle; color:var(--text); }
.tblq tr:last-child td { border-bottom:none; }
.tblq td .occ { display:block; text-align:center; white-space:normal; padding:10px 12px; min-width:180px; }

/* ── CARD ACTIONS ── */
.card-actions { padding:.8rem 1.2rem; background:var(--card-action-bg); border-top:1px solid var(--border2); display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
.act-btn { font-family:'DM Mono',monospace; font-size:.72rem; padding:.3rem .75rem; border-radius:20px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-2); transition:all .2s; white-space:nowrap; }
.act-btn:hover:not(:disabled) { border-color:var(--text-2); color:var(--text); }
.act-btn:disabled { opacity:.35; cursor:not-allowed; }
.act-btn.primary { background:var(--showall-bg); color:var(--showall-text); border-color:transparent; }
.act-btn.primary:hover:not(:disabled) { filter:brightness(1.1); }
.nav-btns { margin-left:auto; display:flex; gap:.4rem; }
.nav-btn { font-family:'DM Mono',monospace; font-size:.72rem; padding:.3rem .75rem; border-radius:20px; background:var(--nav-bg); color:var(--nav-text); border:1px solid var(--border); cursor:pointer; transition:all .2s; }
.nav-btn:hover:not(:disabled) { background:var(--nav-bg-hover); color:var(--text); }
.nav-btn:disabled { opacity:.35; cursor:not-allowed; }
.card-counter { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--text-3); padding:.3rem .5rem; }

/* ── REVIEW PANEL ── */
.review-panel { display:none; background:linear-gradient(135deg, var(--card-a), var(--card-b)); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-top:1rem; }
.review-panel.open { display:block; }
.review-head { padding:.8rem 1.2rem; background:var(--card-action-bg); border-bottom:1px solid var(--border2); display:flex; align-items:center; gap:.7rem; }
.review-title { font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:600; color:var(--text); }
.rsub { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--text-2); padding:.2rem .55rem; background:var(--meta-bg); border-radius:10px; border:1px solid var(--border2); }
.review-body { padding:1.2rem; }
.review-card-title { font-family:'DM Mono',monospace; font-size:.75rem; color:var(--text-2); margin-bottom:.6rem; }
.review-footer { padding:.7rem 1.2rem; background:var(--card-action-bg); border-top:1px solid var(--border2); display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
.review-prog { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--text-3); margin-left:auto; }

@media(max-width:720px){
  .card-actions, .review-footer { flex-direction:column; align-items:stretch; }
  .nav-btns { margin-left:0; }
  .act-btn, .nav-btn { text-align:center; }
}
/* ── DECK TABS ── */
.deck-tabs { display:flex; gap:.5rem; margin-bottom:1rem; }
.deck-tab { font-family:'DM Mono',monospace; font-size:.75rem; padding:.4rem 1rem; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-2); cursor:pointer; transition:all .2s; }
.deck-tab.active { background:var(--amber-soft); border-color:var(--amber); color:var(--amber); }
.deck-tab:hover:not(.active) { border-color:var(--text-2); color:var(--text); }

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hero-top">
    <div class="hero-copy">
      <div class="eyebrow">Block 5 · Head &amp; Neck Anatomy · LO 41B + 41C</div>
      <h1>Palate &amp; Nasal Cavity</h1>
      <p id="deckMeta" class="sub"></p>
    </div>
    <div class="theme-switch">
      <button class="theme-btn active" data-theme="slate" onclick="setTheme('slate')">Slate</button>
      <button class="theme-btn" data-theme="cream" onclick="setTheme('cream')">Cream</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
    </div>
  </div>
</header>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="lswatch" style="background:var(--amber)"></div>Gross Anatomy Topics</div>
  <div class="legend-item"><div class="lswatch" style="background:var(--teal)"></div>Histology &amp; Clinical</div>
</div>

<div class="wrap">

  <!-- DECK TABS -->
  <div class="deck-tabs">
    <button class="deck-tab active" data-deck="41b" onclick="switchDeck('41b')">LO 41B · The Palate</button>
    <button class="deck-tab" data-deck="41c" onclick="switchDeck('41c')">LO 41C · Nasal Cavity</button>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <span class="stat-pill" id="sp-rev">Revealed: 0</span>
    <span class="stat-pill s-knew" id="sp-knew">Knew: 0</span>
    <span class="stat-pill s-need" id="sp-need">Needed: 0</span>
    <span class="stat-pill s-done" id="sp-done">Done: 0 / 0</span>
    <div class="stats-spacer"></div>
    <button class="btn-reset-all" onclick="resetAll()">Reset all</button>
  </div>

  <!-- MIND MAP -->
  <div id="map-41b">
  <div class="map-wrap">
    <svg class="mindmap" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
      <!-- Connectors top row → center -->
      <line class="conn" x1="95"  y1="68" x2="280" y2="116"/>
      <line class="conn" x1="250" y1="68" x2="310" y2="116"/>
      <line class="conn" x1="430" y1="68" x2="370" y2="116"/>
      <line class="conn" x1="585" y1="68" x2="400" y2="116"/>
      <!-- Connectors bottom row → center -->
      <line class="conn" x1="95"  y1="198" x2="280" y2="152"/>
      <line class="conn" x1="250" y1="198" x2="310" y2="152"/>
      <line class="conn" x1="430" y1="198" x2="370" y2="152"/>
      <line class="conn" x1="585" y1="198" x2="400" y2="152"/>

      <!-- Top row: AMBER (Gross Anatomy) -->
      <g id="n-hard" class="node c-amber" onclick="selNode('hard')">
        <rect x="30" y="16" width="130" height="52"/>
        <text class="n-label" x="95" y="37">Hard Palate</text>
        <text class="n-sub"   x="95" y="53">Bony shelf anatomy</text>
        <!-- progress dots -->
        <circle class="prog-dot" id="pd-hard" cx="95" cy="63" r="3" fill="var(--border)"/>
      </g>

      <g id="n-soft" class="node c-amber" onclick="selNode('soft')">
        <rect x="185" y="16" width="130" height="52"/>
        <text class="n-label" x="250" y="37">Soft Palate</text>
        <text class="n-sub"   x="250" y="53">Aponeurotic structure</text>
        <circle class="prog-dot" id="pd-soft" cx="250" cy="63" r="3" fill="var(--border)"/>
      </g>

      <g id="n-muscles" class="node c-amber" onclick="selNode('muscles')">
        <rect x="365" y="16" width="130" height="52"/>
        <text class="n-label" x="430" y="37">Muscles</text>
        <text class="n-sub"   x="430" y="53">5 muscles + actions</text>
        <circle class="prog-dot" id="pd-muscles" cx="430" cy="63" r="3" fill="var(--border)"/>
      </g>

      <g id="n-neurovasc" class="node c-amber" onclick="selNode('neurovasc')">
        <rect x="520" y="16" width="130" height="52"/>
        <text class="n-label" x="585" y="37">Vessels &amp; Nerves</text>
        <text class="n-sub"   x="585" y="53">Supply to palate</text>
        <circle class="prog-dot" id="pd-neurovasc" cx="585" cy="63" r="3" fill="var(--border)"/>
      </g>

      <!-- Center node -->
      <g id="n-center" class="node c-gray" onclick="selNode('center')">
        <rect x="215" y="110" width="250" height="42"/>
        <text class="n-label" x="340" y="128">LO 41B — The Palate</text>
        <text class="n-sub"   x="340" y="144">Anatomy · Histology · Muscles</text>
      </g>

      <!-- Bottom row: TEAL (Histology & Clinical) -->
      <g id="n-hp-histo" class="node c-teal" onclick="selNode('hp-histo')">
        <rect x="30" y="198" width="130" height="52"/>
        <text class="n-label" x="95" y="219">Hard Palate</text>
        <text class="n-sub"   x="95" y="235">Histology layers</text>
        <circle class="prog-dot" id="pd-hp-histo" cx="95" cy="245" r="3" fill="var(--border)"/>
      </g>

      <g id="n-sp-histo" class="node c-teal" onclick="selNode('sp-histo')">
        <rect x="185" y="198" width="130" height="52"/>
        <text class="n-label" x="250" y="219">Soft Palate</text>
        <text class="n-sub"   x="250" y="235">Histology layers</text>

let cur = null, ci = 0;

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
function initNode(nid) {
  if (!tr[nid]) { tr[nid] = {}; sc[nid] = {}; }
}

function totalTerms() {
  let n = 0;
  for (const nid in D) D[nid].cards.forEach(c => { n += (c.b.match(/\{[^}]+\}/g)||[]).length; });
  return n;
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
  localStorage.setItem('anat-theme', t);
}
(function(){ const t = localStorage.getItem('anat-theme'); if(t) setTheme(t); })();

/* ═══════════════════════════════════════════════════
   NODE SELECTION
═══════════════════════════════════════════════════ */
function selNode(nid) {
  if (cur === nid) { closePanel(); return; }
  cur = nid; ci = 0;
  initNode(nid);
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active-node'));
  document.getElementById('n-' + nid)?.classList.add('active-node');
  openPanel();
  render();
}

function closePanel() {
  cur = null;
  document.getElementById('main-panel').classList.remove('open');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active-node'));
}

function openPanel() {
  document.getElementById('main-panel').classList.add('open');
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function render() {
  if (!cur) return;
  const node = D[cur];
  const card = node.cards[ci];
  const badge = document.getElementById('panel-badge');
  badge.textContent = node.label;
  badge.className = 'badge badge-' + (node.type === 'teal' ? 'teal' : 'amber');
  document.getElementById('panel-title').textContent = node.sub;
  document.getElementById('card-title').textContent = card.t;
  document.getElementById('card-body').innerHTML = parseBody(card.b, cur, ci, {});
  const hintEl = document.getElementById('card-hint');
  if (card.h) { hintEl.textContent = card.h; hintEl.style.display = ''; }
  else { hintEl.style.display = 'none'; }
  // counter
  document.getElementById('card-counter').textContent = (ci+1) + ' / ' + node.cards.length;
  document.getElementById('btn-prev').disabled = ci === 0;
  document.getElementById('btn-next').disabled = ci === node.cards.length - 1;
  // meta pills
  renderCardMeta();
  // knew-all button
  updateKnewAllBtn();
  updateStats();
  updateProgDots();
  updateRevBtn();
}

function renderCardMeta() {
  if (!cur) return;
  const terms = (D[cur].cards[ci].b.match(/\{[^}]+\}/g) || []).length;
  let rev = 0, knew = 0, need = 0;
  const revealed = tr[cur]?.[ci] || new Set();
  revealed.forEach(idx => {
    rev++;
    const s = sc[cur]?.[ci]?.[idx];
    if (s === 'knew') knew++;
    else if (s === 'needed') need++;
  });
  const wait = rev - knew - need;
  const html = [
    `<span class="meta-pill">Terms: ${terms}</span>`,
    rev ? `<span class="meta-pill mp-rev">Revealed: ${rev}</span>` : '',
    knew ? `<span class="meta-pill mp-knew">Knew: ${knew}</span>` : '',
    need ? `<span class="meta-pill mp-need">Needed: ${need}</span>` : '',
    wait ? `<span class="meta-pill mp-wait">Unscored: ${wait}</span>` : '',
  ].join('');
  document.getElementById('card-meta').innerHTML = html;
}

function updateKnewAllBtn() {
  if (!cur) return;
  const terms = (D[cur].cards[ci].b.match(/\{[^}]+\}/g) || []).length;
  const revealed = tr[cur]?.[ci] || new Set();
  const btn = document.getElementById('btn-knew-all');
  btn.disabled = revealed.size < terms;
}

function updateRevBtn() {
  const btn = document.getElementById('btn-review');
  const hasWeak = Object.keys(sc).some(nid =>
    Object.keys(sc[nid]).some(cidx =>
      Object.values(sc[nid][cidx]).some(v => v === 'needed')));
  btn.disabled = !hasWeak;
}

/* ═══════════════════════════════════════════════════
   PARSE BODY (occlusion engine)
═══════════════════════════════════════════════════ */
function parseBody(body, nid, cidx, opts) {
  opts = opts || {};
  let i = 0;
  return body.replace(/\{([^}]+)\}/g, (_, t) => {
    const idx = i++;
    const revealed = opts.forReview
      ? (opts.revealedSet && opts.revealedSet.has(idx))
      : (tr[nid]?.[cidx]?.has(idx));
    const scored = opts.forReview ? false : (sc[nid]?.[cidx]?.[idx]);
    const isTarget = opts.forReview && (idx === opts.targetTermIdx);

    if (opts.forReview && !isTarget) {
      return `<span style="color:var(--text-3);font-style:italic">${t}</span>`;
    }

    if (!revealed) {
      return `<span class="occ" onclick="revealTerm(event,'${nid}',${cidx},${idx})" data-term="${encodeURIComponent(t)}">${t}</span>`;
    }

    // revealed
    let cls = scored === 'knew' ? 'rev' : scored === 'needed' ? 'needed' : 'unscored';
    let scoreBtns = '';
    if (!scored && !opts.forReview) {
      scoreBtns = `<span class="score-btns">
        <button class="score-btn sb-knew" onclick="scoreIt(event,'${nid}',${cidx},${idx},'knew')">✓ knew</button>
        <button class="score-btn sb-need" onclick="scoreIt(event,'${nid}',${cidx},${idx},'needed')">✗ needed</button>
      </span>`;
    }
    let jumpLink = '';
    if (revealed && LINKS[t] && LINKS[t][0] !== nid) {
      jumpLink = `<span class="jump-link" onclick="selNode('${LINKS[t][0]}')" title="Jump to ${LINKS[t][1]}">→ ${LINKS[t][1]}</span>`;
    }
    return `<span class="occ ${cls}">${t}</span>${scoreBtns}${jumpLink}`;
  });
}

/* ═══════════════════════════════════════════════════
   TERM REVEAL + SCORING
═══════════════════════════════════════════════════ */
function revealTerm(e, nid, cidx, tidx) {
  e.stopPropagation();
  initNode(nid);
  if (!tr[nid][cidx]) tr[nid][cidx] = new Set();
  if (tr[nid][cidx].has(tidx)) return;
  tr[nid][cidx].add(tidx);
  totRev++;
  saveProgress();
  render();
}

function scoreIt(e, nid, cidx, tidx, score) {
  e.stopPropagation();
  initNode(nid);
  if (!sc[nid][cidx]) sc[nid][cidx] = {};
  const prev = sc[nid][cidx][tidx];
  if (prev === score) return;
  if (prev === 'knew')   totKnew--;
  if (prev === 'needed') totNeed--;
  sc[nid][cidx][tidx] = score;
  if (score === 'knew')   totKnew++;
  if (score === 'needed') totNeed++;
  checkNodeDone(nid);
  saveProgress();
  render();
}

function checkNodeDone(nid) {
  const node = D[nid];
  let allDone = true;
  for (let c = 0; c < node.cards.length; c++) {
    const terms = (node.cards[c].b.match(/\{[^}]+\}/g) || []).length;
    const revealed = tr[nid]?.[c] || new Set();
    if (revealed.size < terms) { allDone = false; break; }
  }
  if (allDone) { done.add(nid); document.getElementById('n-'+nid)?.classList.add('done-node'); }
  else { done.delete(nid); document.getElementById('n-'+nid)?.classList.remove('done-node'); }
}

/* ═══════════════════════════════════════════════════
   BULK ACTIONS
═══════════════════════════════════════════════════ */
function revealCard() {
  if (!cur) return;
  initNode(cur);
  const card = D[cur].cards[ci];
  const terms = (card.b.match(/\{[^}]+\}/g) || []).length;
  if (!tr[cur][ci]) tr[cur][ci] = new Set();
  for (let i = 0; i < terms; i++) {
    if (!tr[cur][ci].has(i)) { tr[cur][ci].add(i); totRev++; }
  }
  saveProgress(); render();
}

function revealTopic() {
  if (!cur) return;
  D[cur].cards.forEach((_, cidx) => {
    initNode(cur);
    const terms = (D[cur].cards[cidx].b.match(/\{[^}]+\}/g) || []).length;
    if (!tr[cur][cidx]) tr[cur][cidx] = new Set();
    for (let i = 0; i < terms; i++) {
      if (!tr[cur][cidx].has(i)) { tr[cur][cidx].add(i); totRev++; }
    }
  });
  saveProgress(); render();
}

function revealDeck() {
  for (const nid in D) {
    D[nid].cards.forEach((card, cidx) => {
      initNode(nid);
      const terms = (card.b.match(/\{[^}]+\}/g) || []).length;
      if (!tr[nid][cidx]) tr[nid][cidx] = new Set();
      for (let i = 0; i < terms; i++) {
        if (!tr[nid][cidx].has(i)) { tr[nid][cidx].add(i); totRev++; }
      }
    });
    checkNodeDone(nid);
  }
  saveProgress(); render();
}

function knewAllCurrentCard() {
  if (!cur) return;
  initNode(cur);
  const card = D[cur].cards[ci];
  const terms = (card.b.match(/\{[^}]+\}/g) || []).length;
  if (!tr[cur][ci]) tr[cur][ci] = new Set();
  if (!sc[cur][ci]) sc[cur][ci] = {};
  for (let i = 0; i < terms; i++) {
    tr[cur][ci].add(i);
    const prev = sc[cur][ci][i];
    if (prev === 'needed') totNeed--;
    if (!prev || prev !== 'knew') totKnew++;
    sc[cur][ci][i] = 'knew';
  }
  if (!tr[cur].counted) { totRev += terms; tr[cur].counted = true; }
  checkNodeDone(cur);
  saveProgress(); render();
}

function resetCard() {
  if (!cur) return;
  initNode(cur);
  const card = D[cur].cards[ci];
  const terms = (card.b.match(/\{[^}]+\}/g) || []).length;
  const rev = tr[cur][ci] ? tr[cur][ci].size : 0;
  totRev -= rev;
  if (sc[cur][ci]) {
    Object.values(sc[cur][ci]).forEach(s => {
      if (s === 'knew') totKnew--;
      if (s === 'needed') totNeed--;
    });
  }
  tr[cur][ci] = new Set();
  sc[cur][ci] = {};
  checkNodeDone(cur);
  saveProgress(); render();
}

function resetAll() {
  tr = {}; sc = {}; done = new Set();
  totRev = 0; totKnew = 0; totNeed = 0;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('done-node'));
  closeReview();
  saveProgress(); updateStats(); updateProgDots();
  if (cur) render();
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
function navCard(dir) {
  if (!cur) return;
  const max = D[cur].cards.length - 1;
  ci = Math.max(0, Math.min(max, ci + dir));
  render();
}

/* ═══════════════════════════════════════════════════
   STATS + PROGRESS DOTS
═══════════════════════════════════════════════════ */
function recalcState() {
  totRev = 0; totKnew = 0; totNeed = 0; done = new Set();
  for (const nid in tr) {
    for (const cidx in tr[nid]) {
      if (cidx === 'counted') continue;
      totRev += tr[nid][cidx].size;
    }
  }
  for (const nid in sc) {
    for (const cidx in sc[nid]) {
      for (const tidx in sc[nid][cidx]) {
        const s = sc[nid][cidx][tidx];
        if (s === 'knew') totKnew++;
        if (s === 'needed') totNeed++;
      }
    }
  }
  for (const nid in D) checkNodeDone(nid);
}

function updateStats() {
  const total = totalTerms();
  document.getElementById('sp-rev').textContent  = 'Revealed: ' + totRev;
  document.getElementById('sp-knew').textContent = 'Knew: ' + totKnew;
  document.getElementById('sp-need').textContent = 'Needed: ' + totNeed;
  document.getElementById('sp-done').textContent = 'Done: ' + done.size + ' / ' + Object.keys(D).length + ' nodes';
}

function updateProgDots() {
  for (const nid in D) {
    const dot = document.getElementById('pd-' + nid);
    if (!dot) continue;
    if (done.has(nid)) { dot.setAttribute('fill', 'var(--green)'); }
    else {
      const hasAny = D[nid].cards.some((_, ci) => (tr[nid]?.[ci]?.size || 0) > 0);
      dot.setAttribute('fill', hasAny ? 'var(--amber)' : 'var(--border)');
    }
  }
}

/* ═══════════════════════════════════════════════════
   REVIEW MODE
═══════════════════════════════════════════════════ */
function startReview() {
  revQueue = [];
  for (const nid in sc) {
    D[nid]?.cards.forEach((card, cidx) => {
      const terms = (card.b.match(/\{[^}]+\}/g) || []);
      terms.forEach((_, tidx) => {
        if (sc[nid]?.[cidx]?.[tidx] === 'needed') {
          revQueue.push({ nid, cidx, tidx });
        }
      });
    });
  }
  // shuffle
  for (let i = revQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [revQueue[i], revQueue[j]] = [revQueue[j], revQueue[i]];
  }
  revIdx = 0; revTr = {};
  if (revQueue.length === 0) { alert('No weak spots yet! Score some terms first.'); return; }
  document.getElementById('review-panel').classList.add('open');
  renderReview();
}

function closeReview() {
  document.getElementById('review-panel').classList.remove('open');
  revQueue = []; revIdx = 0; revTr = {};
}

function renderReview() {
  if (revIdx >= revQueue.length) {
    document.getElementById('r-card-body').innerHTML = '<p style="color:var(--green)">✓ Review complete!</p>';
    document.getElementById('r-card-title').textContent = '';
    document.getElementById('r-card-hint').style.display = 'none';
    document.getElementById('rsub').textContent = revQueue.length + ' / ' + revQueue.length;
    document.getElementById('r-prog').textContent = 'Done!';
    return;
  }
  const item = revQueue[revIdx];
  const card = D[item.nid].cards[item.cidx];
  const revealedSet = revTr[revIdx] || new Set();
  document.getElementById('r-card-title').textContent = D[item.nid].sub + ' — ' + card.t;
  document.getElementById('r-card-body').innerHTML = parseBody(card.b, item.nid, item.cidx, {
    forReview: true, targetTermIdx: item.tidx, revealedSet
  });
  const hintEl = document.getElementById('r-card-hint');
  if (card.h) { hintEl.textContent = card.h; hintEl.style.display = ''; }
  else { hintEl.style.display = 'none'; }
  document.getElementById('rsub').textContent = 'Context: ' + D[item.nid].label;
  document.getElementById('r-prog').textContent = (revIdx + 1) + ' / ' + revQueue.length;
}

function reviewNav(dir) {
  if (revQueue.length === 0) return;
  revIdx = Math.max(0, Math.min(revQueue.length, revIdx + dir));
  renderReview();
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (document.getElementById('review-panel').classList.contains('open')) {
    if (e.key === 'ArrowLeft')  { reviewNav(-1); return; }
    if (e.key === 'ArrowRight') { reviewNav(1);  return; }
    if (e.key === 'Escape')     { closeReview(); return; }
  }
  if (cur && document.getElementById('main-panel').classList.contains('open')) {
    if (e.key === 'ArrowLeft')  { navCard(-1); return; }
    if (e.key === 'ArrowRight') { navCard(1);  return; }
    if (e.key === 'Escape')     { closePanel(); return; }
  }
});

/* ═══════════════════════════════════════════════════
   PERSISTENCE (cookie)
═══════════════════════════════════════════════════ */
const COOKIE_KEY = 'anat41bc';

function saveProgress() {
  try {
    const trSerial = {};
    for (const nid in tr) {
      trSerial[nid] = {};
      for (const cidx in tr[nid]) {
        if (cidx === 'counted') continue;
        trSerial[nid][cidx] = [...tr[nid][cidx]];
      }
    }
    const payload = JSON.stringify({ tr: trSerial, sc });
    const exp = new Date(); exp.setDate(exp.getDate() + 180);
    document.cookie = `${COOKIE_KEY}=${encodeURIComponent(payload)};expires=${exp.toUTCString()};path=/;SameSite=Lax`;
  } catch(e) {}
}

function loadProgress() {
  try {
    const match = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith(COOKIE_KEY + '='));
    if (!match) return;
    const payload = JSON.parse(decodeURIComponent(match.slice(COOKIE_KEY.length + 1)));
    if (payload.tr) {
      for (const nid in payload.tr) {
        tr[nid] = {};
        for (const cidx in payload.tr[nid]) {
          tr[nid][cidx] = new Set(payload.tr[nid][cidx]);
        }
      }
    }
    if (payload.sc) sc = payload.sc;
    recalcState();
    updateStats();
    updateProgDots();
    updateRevBtn();
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════
   INIT ON LOAD
═══════════════════════════════════════════════════ */
const totalNodes = Object.keys(D).length;
const totalCards = Object.values(D).reduce((n,nd)=>n+nd.cards.length,0);
document.getElementById('deckMeta').textContent =
  `Active recall map · 2 LOs · ${totalNodes} topics · ${totalCards} cards`;

// Restore active deck
const savedDeck = localStorage.getItem('activeDeck');
if (savedDeck) switchDeck(savedDeck);

loadProgress();
</script>
