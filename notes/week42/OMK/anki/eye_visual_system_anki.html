<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye &amp; Visual System — Contextual Anki</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === TOKENS === */
:root {
  --amber: #f59e0b;
  --amber-soft: rgba(245,158,11,.15);
  --teal: #14b8a6;
  --teal-soft: rgba(20,184,166,.15);
  --green: #34d399;
  --green-soft: rgba(52,211,153,.12);
  --red: #f87171;
  --text-2: #64748b;
  --header-shadow: 0 22px 50px rgba(0,0,0,.24);
}

html[data-theme="slate"] {
  --bg-top:#0f172a; --bg-bottom:#0a0f1e; --text:#e2e8f0; --text-muted:#94a3b8;
  --surface:#1e293b; --border:rgba(255,255,255,.07);
  --hero-glow-a:rgba(20,184,166,.06); --hero-glow-b:rgba(245,158,11,.05);
  --header-a:#0e1f35; --header-b:#091528;
  --card-a:#1a2a3a; --card-b:#152030;
  --card-action-bg:rgba(255,255,255,.03);
  --nav-bg:rgba(255,255,255,.06); --nav-bg-hover:rgba(255,255,255,.12); --nav-text:#94a3b8;
  --showall-bg:rgba(20,184,166,.12); --showall-text:#14b8a6;
  --meta-bg:rgba(255,255,255,.06);
}
html[data-theme="cream"] {
  --bg-top:#faf8f3; --bg-bottom:#f0ece1; --text:#2d2a22; --text-muted:#7a7668;
  --surface:#ffffff; --border:rgba(0,0,0,.07);
  --hero-glow-a:rgba(20,184,166,.05); --hero-glow-b:rgba(245,158,11,.06);
  --header-a:#fffdf7; --header-b:#f5f0e4;
  --card-a:#ffffff; --card-b:#f9f6ef;
  --card-action-bg:rgba(0,0,0,.02);
  --nav-bg:rgba(0,0,0,.05); --nav-bg-hover:rgba(0,0,0,.10); --nav-text:#7a7668;
  --showall-bg:rgba(20,184,166,.10); --showall-text:#0d9488;
  --meta-bg:rgba(0,0,0,.05);
}
html[data-theme="forest"] {
  --bg-top:#0a1a14; --bg-bottom:#060e0a; --text:#d1fae5; --text-muted:#6ee7b7;
  --surface:#0f2a1a; --border:rgba(52,211,153,.08);
  --hero-glow-a:rgba(52,211,153,.08); --hero-glow-b:rgba(245,158,11,.04);
  --header-a:#0d2015; --header-b:#08140d;
  --card-a:#102214; --card-b:#0c1c10;
  --card-action-bg:rgba(52,211,153,.04);
  --nav-bg:rgba(52,211,153,.08); --nav-bg-hover:rgba(52,211,153,.16); --nav-text:#6ee7b7;
  --showall-bg:rgba(245,158,11,.12); --showall-text:#f59e0b;
  --meta-bg:rgba(52,211,153,.08);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); min-height:100vh;
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--header-a),var(--header-b));
  box-shadow:var(--header-shadow); padding:32px 28px 28px;
  border-bottom:1px solid var(--border);
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;max-width:1000px;margin:0 auto;flex-wrap:wrap}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;opacity:.85}
h1{font-family:'Crimson Pro',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:600;color:var(--text);line-height:1.15;margin-bottom:6px}
#deckMeta{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);letter-spacing:.04em}
.theme-switch{display:flex;gap:6px;flex-shrink:0;margin-top:4px}
.theme-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 12px;border-radius:4px;border:1px solid var(--border);background:var(--nav-bg);color:var(--text-muted);cursor:pointer;transition:all .15s;letter-spacing:.05em}
.theme-btn.active,.theme-btn:hover{background:var(--teal-soft);color:var(--teal);border-color:rgba(20,184,166,.3)}

/* LEGEND */
.legend{display:flex;gap:20px;justify-content:center;padding:14px 24px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.05em;border-bottom:1px solid var(--border);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:7px}
.lswatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* MAP */
.map-wrap{padding:20px 16px 8px;max-width:860px;margin:0 auto}
svg.concept-map{width:100%;height:auto;overflow:visible}
.node{cursor:pointer;transition:opacity .2s}
.node:hover rect{filter:brightness(1.12)}
.node rect{rx:7;ry:7;stroke-width:1.5;transition:filter .15s}
.node text{font-family:'DM Mono',monospace;pointer-events:none}
.c-teal rect{fill:var(--teal-soft);stroke:var(--teal)}
.c-teal .node-label{fill:var(--teal);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.c-teal .node-sub{fill:var(--text);font-size:9px}
.c-amber rect{fill:var(--amber-soft);stroke:var(--amber)}
.c-amber .node-label{fill:var(--amber);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.c-amber .node-sub{fill:var(--text);font-size:9px}
.c-gray rect{fill:rgba(148,163,184,.08);stroke:rgba(148,163,184,.3)}
.c-gray .node-label{fill:var(--text-muted);font-size:11px;font-weight:500;letter-spacing:.06em}
.c-gray .node-sub{fill:var(--text-muted);font-size:9px}
.conn{stroke:var(--border);stroke-width:1.2;stroke-dasharray:4 3}
.hint-lbl{font-family:'DM Mono',monospace;font-size:9px;fill:var(--text-muted);letter-spacing:.05em;opacity:.6}
.node-prog{font-family:'DM Mono',monospace;font-size:9px;fill:var(--teal);opacity:0;transition:opacity .2s}
.node-prog.vis{opacity:1}
.done-node{opacity:.45}

/* PANEL */
.panel,.review-panel{
  max-width:760px;margin:16px auto;
  background:linear-gradient(160deg,var(--card-a),var(--card-b));
  border:1px solid var(--border);border-radius:14px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.2)
}
.panel.hidden,.review-panel.hidden{display:none}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;background:linear-gradient(90deg,var(--header-a),var(--header-b));
  border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap
}
.panel-title{font-family:'Crimson Pro',serif;font-size:1.2rem;font-weight:600;color:var(--text)}
.panel-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:var(--teal-soft);color:var(--teal);border:1px solid rgba(20,184,166,.25)}
.close-btn{font-family:'DM Mono',monospace;font-size:18px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:2px 8px;border-radius:4px;transition:all .15s;margin-left:auto}
.close-btn:hover{background:rgba(248,113,113,.15);color:var(--red)}
.panel-actions{display:flex;gap:8px;padding:10px 20px;background:var(--card-action-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.panel-actions button{font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:var(--nav-bg);color:var(--nav-text);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.panel-actions button:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text)}
.panel-actions button:disabled{opacity:.35;cursor:default}
.btn-amber{background:var(--amber-soft)!important;color:var(--amber)!important;border-color:rgba(245,158,11,.25)!important}
.card-wrap{padding:20px;min-height:240px}
.card-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.card-title{font-family:'DM Mono',monospace;font-size:12px;color:var(--teal);margin-bottom:14px;letter-spacing:.06em}
.card-body{font-size:15px;line-height:1.85;color:var(--text)}
.card-hint{margin-top:14px;padding:10px 14px;background:var(--amber-soft);border-left:3px solid var(--amber);border-radius:4px;font-size:13px;color:var(--text-muted)}
.card-hint-label{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
.card-metrics{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.met{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:100px;background:var(--meta-bg);color:var(--text-muted)}
.met.green{background:var(--green-soft);color:var(--green)}
.met.amber{background:var(--amber-soft);color:var(--amber)}
.met.red{background:rgba(248,113,113,.12);color:var(--red)}
.card-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border)}
.nav-btn{font-family:'DM Mono',monospace;font-size:12px;padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--nav-bg);color:var(--nav-text);cursor:pointer;transition:all .15s}
.nav-btn:hover:not(:disabled){background:var(--nav-bg-hover);color:var(--text)}
.nav-btn:disabled{opacity:.3;cursor:default}
.card-counter{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)}
.prog-dots{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap}
.prog-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s}
.prog-dot.partial{background:var(--amber)}
.prog-dot.done{background:var(--green)}

/* OCCLUSION */
.occ{
  display:inline-block;min-width:3ch;
  background:var(--text);color:transparent;
  border:1px solid transparent;border-radius:3px;
  cursor:pointer;padding:1px 6px;
  white-space:nowrap;user-select:none;
  vertical-align:baseline;
  transition:background .15s,color .15s,border-color .15s
}
.occ:not(.rev):not(.needed):not(.unscored):hover{filter:brightness(1.15)}
.occ.rev{background:var(--green-soft);color:var(--green);cursor:default;border-color:rgba(52,211,153,.25)}
.occ.needed{background:rgba(248,113,113,.12);color:var(--red);cursor:default;border-color:rgba(248,113,113,.25)}
.occ.unscored{background:var(--green-soft);color:var(--green);border-color:rgba(52,211,153,.18);cursor:default}
.occ.dim{color:var(--text-2);background:transparent;border-color:transparent;cursor:default}

/* SCORE BUTTONS */
.score-btns{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle}
.sbtn{font-family:'DM Mono',monospace;font-size:10px;padding:1px 7px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .12s}
.sbtn-k{background:var(--green-soft);color:var(--green);border-color:rgba(52,211,153,.3)}
.sbtn-k:hover{background:rgba(52,211,153,.25)}
.sbtn-n{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3)}
.sbtn-n:hover{background:rgba(248,113,113,.25)}

/* JUMP LINKS */
.jlink{font-family:'DM Mono',monospace;font-size:10px;padding:1px 7px;border-radius:4px;cursor:pointer;border:1px solid;margin-left:5px;vertical-align:middle;transition:all .12s;text-decoration:none;display:inline-block}
.jlink.teal{background:var(--teal-soft);color:var(--teal);border-color:rgba(20,184,166,.3)}
.jlink.teal:hover{background:rgba(20,184,166,.25)}
.jlink.amber{background:var(--amber-soft);color:var(--amber);border-color:rgba(245,158,11,.3)}
.jlink.amber:hover{background:rgba(245,158,11,.25)}

/* STATS BAR */
.stats-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:14px 20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.04em;max-width:760px;margin:0 auto 8px}
.stat-pill{padding:4px 12px;border-radius:100px;background:var(--meta-bg);border:none;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)}
.stat-pill.green{background:var(--green-soft);color:var(--green)}
.stat-pill.red{background:rgba(248,113,113,.12);color:var(--red)}
.stat-pill.clickable{cursor:pointer;background:rgba(245,158,11,.10);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.stat-pill.clickable:hover{background:rgba(245,158,11,.2)}

/* REVIEW PANEL */
.rsub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);padding:8px 20px;background:var(--card-action-bg);border-bottom:1px solid var(--border);letter-spacing:.04em}
.review-actions{display:flex;gap:10px;padding:12px 20px;border-top:1px solid var(--border);justify-content:flex-end;flex-wrap:wrap}

/* RESET */
.reset-bar{display:flex;justify-content:center;padding:8px 20px 28px}
.reset-all-btn{font-family:'DM Mono',monospace;font-size:11px;padding:6px 18px;border-radius:6px;border:1px solid rgba(248,113,113,.25);background:rgba(248,113,113,.06);color:var(--red);cursor:pointer;transition:all .15s}
.reset-all-btn:hover{background:rgba(248,113,113,.15)}

@media(max-width:720px){.panel-actions{flex-direction:column}.review-actions{flex-direction:column}}
</style>
</head>
<body>

<header>
  <div class="hero-top">
    <div class="hero-copy">
      <div class="eyebrow">Block 5 · Physiology of the Senses · Dr. Ferland</div>
      <h1>Eye &amp; Visual System</h1>
      <p id="deckMeta" class="sub"></p>
    </div>
    <div class="theme-switch">
      <button class="theme-btn active" data-theme="slate" onclick="setTheme('slate')">Slate</button>
      <button class="theme-btn" data-theme="cream" onclick="setTheme('cream')">Cream</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
    </div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="lswatch" style="background:var(--amber)"></div>Program Learning Outcomes (PLO)</div>
  <div class="legend-item"><div class="lswatch" style="background:var(--teal)"></div>Learning Objectives (LO)</div>
</div>

<div class="map-wrap">
  <svg class="concept-map" viewBox="0 0 780 330" xmlns="http://www.w3.org/2000/svg">
    <!-- Connectors -->
    <line class="conn" x1="97"  y1="64" x2="380" y2="138"/>
    <line class="conn" x1="267" y1="64" x2="380" y2="138"/>
    <line class="conn" x1="437" y1="64" x2="380" y2="138"/>
    <line class="conn" x1="607" y1="64" x2="380" y2="138"/>
    <line class="conn" x1="82"  y1="256" x2="380" y2="182"/>
    <line class="conn" x1="222" y1="256" x2="380" y2="182"/>
    <line class="conn" x1="362" y1="256" x2="380" y2="182"/>
    <line class="conn" x1="502" y1="256" x2="380" y2="182"/>
    <line class="conn" x1="642" y1="256" x2="380" y2="182"/>

    <!-- Center node -->
    <g class="node c-gray" style="cursor:default">
      <rect x="195" y="138" width="370" height="44"/>
      <text class="node-label" x="380" y="157" text-anchor="middle">Eye &amp; Visual System</text>
      <text class="node-sub"   x="380" y="172" text-anchor="middle">Physiology of the Senses · LOs 1–9</text>
    </g>

    <!-- Top row -->
    <g id="n-lo1" class="node c-teal" onclick="selNode('lo1')">
      <rect x="22"  y="14" width="150" height="50"/>
      <text class="node-label" x="97"  y="34" text-anchor="middle">LO 1</text>
      <text class="node-sub"   x="97"  y="50" text-anchor="middle">Properties of Light</text>
      <text id="prog-lo1" class="node-prog" x="97"  y="71" text-anchor="middle"></text>
    </g>
    <g id="n-lo2" class="node c-teal" onclick="selNode('lo2')">
      <rect x="192" y="14" width="150" height="50"/>
      <text class="node-label" x="267" y="34" text-anchor="middle">LO 2</text>
      <text class="node-sub"   x="267" y="50" text-anchor="middle">Optical Features</text>
      <text id="prog-lo2" class="node-prog" x="267" y="71" text-anchor="middle"></text>
    </g>
    <g id="n-lo3" class="node c-teal" onclick="selNode('lo3')">
      <rect x="362" y="14" width="150" height="50"/>
      <text class="node-label" x="437" y="34" text-anchor="middle">LO 3</text>
      <text class="node-sub"   x="437" y="50" text-anchor="middle">Image Formation</text>
      <text id="prog-lo3" class="node-prog" x="437" y="71" text-anchor="middle"></text>
    </g>
    <g id="n-lo4" class="node c-teal" onclick="selNode('lo4')">
      <rect x="532" y="14" width="150" height="50"/>
      <text class="node-label" x="607" y="34" text-anchor="middle">LO 4</text>
      <text class="node-sub"   x="607" y="50" text-anchor="middle">Refractive Errors</text>
      <text id="prog-lo4" class="node-prog" x="607" y="71" text-anchor="middle"></text>
    </g>

    <!-- Bottom row -->
    <g id="n-lo5" class="node c-teal" onclick="selNode('lo5')">
      <rect x="18"  y="256" width="128" height="50"/>
      <text class="node-label" x="82"  y="276" text-anchor="middle">LO 5</text>
      <text class="node-sub"   x="82"  y="292" text-anchor="middle">Photoreceptors</text>
      <text id="prog-lo5" class="node-prog" x="82"  y="315" text-anchor="middle"></text>
    </g>
    <g id="n-lo6" class="node c-teal" onclick="selNode('lo6')">
      <rect x="158" y="256" width="128" height="50"/>
      <text class="node-label" x="222" y="276" text-anchor="middle">LO 6</text>
      <text class="node-sub"   x="222" y="292" text-anchor="middle">Retinal Anatomy</text>
      <text id="prog-lo6" class="node-prog" x="222" y="315" text-anchor="middle"></text>
    </g>
    <g id="n-lo7" class="node c-teal" onclick="selNode('lo7')">
      <rect x="298" y="256" width="128" height="50"/>
      <text class="node-label" x="362" y="276" text-anchor="middle">LO 7</text>
      <text class="node-sub"   x="362" y="292" text-anchor="middle">Phototransduction</text>
      <text id="prog-lo7" class="node-prog" x="362" y="315" text-anchor="middle"></text>
    </g>
    <g id="n-lo8" class="node c-teal" onclick="selNode('lo8')">
      <rect x="438" y="256" width="128" height="50"/>
      <text class="node-label" x="502" y="276" text-anchor="middle">LO 8</text>
      <text class="node-sub"   x="502" y="292" text-anchor="middle">Ganglion Cells</text>
      <text id="prog-lo8" class="node-prog" x="502" y="315" text-anchor="middle"></text>
    </g>
    <g id="n-lo9" class="node c-teal" onclick="selNode('lo9')">
      <rect x="578" y="256" width="128" height="50"/>
      <text class="node-label" x="642" y="276" text-anchor="middle">LO 9</text>
      <text class="node-sub"   x="642" y="292" text-anchor="middle">Center/Surround</text>
      <text id="prog-lo9" class="node-prog" x="642" y="315" text-anchor="middle"></text>
    </g>

    <text class="hint-lbl" x="390" y="323" text-anchor="middle">click node to open · &#8592; &#8594; navigate cards · Esc close</text>
  </svg>
</div>

<!-- Main panel -->
<div id="panel" class="panel hidden">
  <div class="panel-header">
    <span class="panel-badge" id="panel-badge"></span>
    <span class="panel-title" id="panel-title"></span>
    <button class="close-btn" onclick="selNode(cur)">&#x2715;</button>
  </div>
  <div class="panel-actions">
    <button onclick="revealCard()">Reveal this card</button>
    <button onclick="revealTopic()">Reveal topic</button>
    <button onclick="revealAll()">Reveal deck</button>
    <button id="btn-knew-all" class="btn-amber" onclick="knewAllCurrentCard()" disabled>Knew all &#10003;</button>
    <button onclick="resetCard(cur, ci)">Reset card</button>
  </div>
  <div class="card-wrap" id="card-wrap"></div>
  <div class="card-nav">
    <button class="nav-btn" id="btn-prev" onclick="prevCard()">&#8592; Prev</button>
    <span class="card-counter" id="card-counter"></span>
    <button class="nav-btn" id="btn-next" onclick="nextCard()">Next &#8594;</button>
  </div>
</div>

<!-- Review panel -->
<div id="review-panel" class="review-panel hidden">
  <div class="panel-header">
    <span class="panel-badge" style="background:rgba(245,158,11,.15);color:var(--amber);border-color:rgba(245,158,11,.25)">Review Mode</span>
    <span class="panel-title">Spaced Repetition</span>
    <button class="close-btn" onclick="closeReview()">&#x2715;</button>
  </div>
  <div class="rsub" id="rsub"></div>
  <div class="card-wrap" id="rev-card-wrap"></div>
  <div class="review-actions">
    <button class="nav-btn" id="rev-knew" onclick="scoreReview('knew')">&#10003; Knew it</button>
    <button class="nav-btn" id="rev-need" onclick="scoreReview('needed')" style="background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.25)">&#10007; Needed help</button>
    <button class="nav-btn" onclick="closeReview()">Close review</button>
  </div>
</div>

<!-- Stats bar -->
<div class="stats-bar">

// Cross-node jump links (case-sensitive)
const LINKS = {
  'rhodopsin':        ['lo5', 'LO 5', 'teal'],
  'RPE':              ['lo6', 'LO 6', 'teal'],
  'horizontal cells': ['lo6', 'LO 6', 'teal'],
  'action potentials':['lo8', 'LO 8', 'teal'],
  'CN II':            ['lo8', 'LO 8', 'teal'],
  'accommodation':    ['lo3', 'LO 3', 'teal']
};

// ============================================================
// STATE
// ============================================================
let cur = null, ci = 0;
let tr = {}, sc = {};
let done = new Set();
let totRev = 0, totKnew = 0, totNeed = 0;
let revQueue = [], revIdx = 0, revTr = {};

// ============================================================
// HELPERS
// ============================================================
function initNode(id) {
  if (!tr[id]) { tr[id] = {}; sc[id] = {}; }
}

function countTerms(body) {
  return (body.match(/\{[^}]+\}/g) || []).length;
}

function totalTerms() {
  return Object.values(D).reduce((n, node) => n + node.cards.reduce((m, c) => m + countTerms(c.b), 0), 0);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function recalcState() {
  totRev = 0; totKnew = 0; totNeed = 0;
  done = new Set();
  Object.keys(D).forEach(function(nid) {
    if (!tr[nid]) return;
    var allRev = true;
    D[nid].cards.forEach(function(card, cidx) {
      var n = countTerms(card.b);
      var revSet = tr[nid][cidx] || new Set();
      var scMap  = sc[nid][cidx] || {};
      totRev += revSet.size;
      revSet.forEach(function(tidx) {
        if (scMap[tidx] === 'knew')   totKnew++;
        else if (scMap[tidx] === 'needed') totNeed++;
      });
      if (revSet.size < n) allRev = false;
    });
    if (allRev && D[nid].cards.length > 0) done.add(nid);
  });
  updateStats();
}

function updateStats() {
  document.getElementById('stat-rev').textContent  = 'Revealed: ' + totRev;
  document.getElementById('stat-knew').textContent = 'Knew: ' + totKnew;
  document.getElementById('stat-need').textContent = 'Needed: ' + totNeed;
  document.getElementById('stat-done').textContent = 'Done: ' + done.size + ' / ' + Object.keys(D).length;
  Object.keys(D).forEach(function(nid) {
    var el = document.getElementById('n-' + nid);
    if (el) { done.has(nid) ? el.classList.add('done-node') : el.classList.remove('done-node'); }
    updateNodeProg(nid);
  });
}

function updateNodeProg(nid) {
  initNode(nid);
  var rev = 0, total = 0;
  D[nid].cards.forEach(function(card, cidx) {
    total += countTerms(card.b);
    rev   += (tr[nid][cidx] || new Set()).size;
  });
  var el = document.getElementById('prog-' + nid);
  if (!el) return;
  if (rev === 0) { el.classList.remove('vis'); return; }
  el.classList.add('vis');
  el.textContent = rev + '/' + total;
}

// ============================================================
// PARSE BODY
// ============================================================
function parseBody(body, nid, cidx, opts) {
  opts = opts || {};
  var i = 0;
  return body.replace(/\{([^}]+)\}/g, function(_, t) {
    var idx = i++;
    var revSet = (tr[nid] && tr[nid][cidx]) ? tr[nid][cidx] : new Set();
    var scMap  = (sc[nid] && sc[nid][cidx]) ? sc[nid][cidx] : {};
    var revealed = revSet.has(idx);
    var scored   = scMap[idx] !== undefined;
    var tSafe    = escHtml(t);
    var nidQ     = escHtml(nid);

    if (opts.forReview) {
      if (idx === opts.targetTermIdx) {
        var revd = opts.revealedSet && opts.revealedSet.has(idx);
        if (revd) return '<span class="occ unscored">' + tSafe + '</span>';
        return '<span class="occ" onclick="revealReviewTarget(event,' + idx + ')">' + tSafe + '</span>';
      }
      return '<span style="color:var(--text-2)">' + tSafe + '</span>';
    }

    if (!revealed) {
      return '<span class="occ" onclick="revealTerm(event,\'' + nidQ + '\',' + cidx + ',' + idx + ')">' + tSafe + '</span>';
    }

    // Revealed
    var cls = 'occ';
    if (scored) cls += scMap[idx] === 'knew' ? ' rev' : ' needed';
    else cls += ' unscored';

    var html = '<span class="' + cls + '">' + tSafe + '</span>';

    // Score buttons for revealed-but-unscored
    if (!scored) {
      html += '<span class="score-btns">';
      html += '<button class="sbtn sbtn-k" onclick="scoreIt(event,\'' + nidQ + '\',' + cidx + ',' + idx + ',\'knew\')">&#10003; knew</button>';
      html += '<button class="sbtn sbtn-n" onclick="scoreIt(event,\'' + nidQ + '\',' + cidx + ',' + idx + ',\'needed\')">&#10007; needed</button>';
      html += '</span>';
    }

    // Jump link
    var link = LINKS[t];
    if (link && link[0] !== nid) {
      html += '<a class="jlink ' + link[2] + '" onclick="selNode(\'' + link[0] + '\')">\u2192 ' + escHtml(link[1]) + '</a>';
    }

    return html;
  });
}

// ============================================================
// REVEAL / SCORE ACTIONS
// ============================================================
function revealTerm(e, nid, cidx, tidx) {
  e.stopPropagation();
  initNode(nid);
  if (!tr[nid][cidx]) tr[nid][cidx] = new Set();
  if (!tr[nid][cidx].has(tidx)) { tr[nid][cidx].add(tidx); totRev++; }
  render(); updateStats(); saveProgress();
}

function scoreIt(e, nid, cidx, tidx, score) {
  e.stopPropagation();
  initNode(nid);
  if (!sc[nid][cidx]) sc[nid][cidx] = {};
  var prev = sc[nid][cidx][tidx];
  if (prev === score) return;
  if (prev === 'knew')   totKnew--;
  if (prev === 'needed') totNeed--;
  sc[nid][cidx][tidx] = score;
  if (score === 'knew') totKnew++;
  else totNeed++;
  checkNodeDone(nid);
  render(); updateStats(); saveProgress();
}

function checkNodeDone(nid) {
  var allRev = true;
  D[nid].cards.forEach(function(card, cidx) {
    var n = countTerms(card.b);
    var rs = tr[nid][cidx] || new Set();
    if (rs.size < n) allRev = false;
  });
  if (allRev) done.add(nid); else done.delete(nid);
}

function knewAllCurrentCard() {
  if (!cur) return;
  var card = D[cur].cards[ci];
  var n = countTerms(card.b);
  initNode(cur);
  if (!tr[cur][ci]) tr[cur][ci] = new Set();
  if (!sc[cur][ci]) sc[cur][ci] = {};
  for (var i = 0; i < n; i++) {
    if (!tr[cur][ci].has(i)) { tr[cur][ci].add(i); totRev++; }
    var prev = sc[cur][ci][i];
    if (prev === 'knew') continue;
    if (prev === 'needed') totNeed--;
    sc[cur][ci][i] = 'knew';
    totKnew++;
  }
  checkNodeDone(cur);
  render(); updateStats(); saveProgress();
}

function resetCard(nid, cidx) {
  if (!tr[nid] || !tr[nid][cidx]) return;
  var revSet = tr[nid][cidx];
  var scMap  = sc[nid][cidx] || {};
  totRev -= revSet.size;
  revSet.forEach(function(tidx) {
    if (scMap[tidx] === 'knew')   totKnew--;
    if (scMap[tidx] === 'needed') totNeed--;
  });
  tr[nid][cidx] = new Set();
  sc[nid][cidx] = {};
  done.delete(nid);
  render(); updateStats(); saveProgress();
}

function revealCard() {
  if (!cur) return;
  var n = countTerms(D[cur].cards[ci].b);
  initNode(cur);
  if (!tr[cur][ci]) tr[cur][ci] = new Set();
  for (var i = 0; i < n; i++) {
    if (!tr[cur][ci].has(i)) { tr[cur][ci].add(i); totRev++; }
  }
  render(); updateNodeProg(cur); updateStats(); saveProgress();
}

function revealTopic() {
  if (!cur) return;
  initNode(cur);
  D[cur].cards.forEach(function(card, cidx) {
    var n = countTerms(card.b);
    if (!tr[cur][cidx]) tr[cur][cidx] = new Set();
    for (var i = 0; i < n; i++) {
      if (!tr[cur][cidx].has(i)) { tr[cur][cidx].add(i); totRev++; }
    }
  });
  render(); updateNodeProg(cur); updateStats(); saveProgress();
}

function revealAll() {
  Object.keys(D).forEach(function(nid) {
    initNode(nid);
    D[nid].cards.forEach(function(card, cidx) {
      var n = countTerms(card.b);
      if (!tr[nid][cidx]) tr[nid][cidx] = new Set();
      for (var i = 0; i < n; i++) {
        if (!tr[nid][cidx].has(i)) { tr[nid][cidx].add(i); totRev++; }
      }
    });
  });
  if (cur) render();
  updateStats(); saveProgress();
}

// ============================================================
// NODE SELECTION & RENDER
// ============================================================
function selNode(id) {
  if (cur === id) {
    cur = null;
    document.getElementById('panel').classList.add('hidden');
    return;
  }
  cur = id; ci = 0;
  initNode(id);
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('panel-badge').textContent = D[id].label;
  document.getElementById('panel-title').textContent = D[id].sub;
  render();
}

function render() {
  if (!cur) return;
  var cards = D[cur].cards;
  var card  = cards[ci];
  initNode(cur);

  document.getElementById('card-counter').textContent = (ci + 1) + ' / ' + cards.length;
  document.getElementById('btn-prev').disabled = ci === 0;
  document.getElementById('btn-next').disabled = ci === cards.length - 1;

  var n      = countTerms(card.b);
  var revSet = tr[cur][ci] || new Set();
  var allRev = revSet.size === n && n > 0;
  document.getElementById('btn-knew-all').disabled = !allRev;

  var scMap   = sc[cur][ci] || {};
  var revd    = revSet.size;
  var knew    = 0, needed = 0;
  revSet.forEach(function(i) {
    if (scMap[i] === 'knew')   knew++;
    else if (scMap[i] === 'needed') needed++;
  });
  var unscored = revd - knew - needed;

  var html = '';
  html += '<div class="card-eyebrow">' + escHtml(D[cur].label) + ' \u00b7 Card ' + (ci+1) + ' of ' + cards.length + '</div>';
  html += '<div class="card-title">'  + escHtml(card.t) + '</div>';
  html += '<div class="card-body">'   + parseBody(card.b, cur, ci, {}) + '</div>';
  if (card.h) {
    html += '<div class="card-hint"><div class="card-hint-label">Context</div>' + escHtml(card.h) + '</div>';
  }
  html += '<div class="card-metrics">';
  html += '<span class="met">Revealed: ' + revd + '/' + n + '</span>';
  if (knew)    html += '<span class="met green">Knew: '    + knew    + '</span>';
  if (needed)  html += '<span class="met red">Needed: '   + needed  + '</span>';
  if (unscored)html += '<span class="met amber">Unscored: '+ unscored+'</span>';
  html += '</div>';
  html += '<div class="prog-dots">';
  for (var i = 0; i < n; i++) {
    var dc = 'prog-dot';
    if (revSet.has(i)) {
      if (scMap[i] === 'knew')   dc += ' done';
      else if (scMap[i] === 'needed') dc += ' partial';
      else dc += ' partial';
    }
    html += '<span class="' + dc + '"></span>';
  }
  html += '</div>';

  document.getElementById('card-wrap').innerHTML = html;
  updateNodeProg(cur);
}

function prevCard() { if (ci > 0) { ci--; render(); } }
function nextCard() { if (cur && ci < D[cur].cards.length - 1) { ci++; render(); } }

// ============================================================
// REVIEW MODE
// ============================================================
function startReview() {
  revQueue = [];
  Object.keys(D).forEach(function(nid) {
    D[nid].cards.forEach(function(card, cidx) {
      var n      = countTerms(card.b);
      var revSet = (tr[nid] && tr[nid][cidx]) ? tr[nid][cidx] : new Set();
      var scMap  = (sc[nid] && sc[nid][cidx]) ? sc[nid][cidx] : {};
      for (var tidx = 0; tidx < n; tidx++) {
        if (revSet.has(tidx) && scMap[tidx] === 'needed') {
          revQueue.push({ nid: nid, cidx: cidx, tidx: tidx });
        }
      }
    });
  });
  if (revQueue.length === 0) {
    alert('No weak spots yet! Score some terms as \u201c\u2717 needed\u201d first.');
    return;
  }
  // Fisher-Yates shuffle
  for (var i = revQueue.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = revQueue[i]; revQueue[i] = revQueue[j]; revQueue[j] = tmp;
  }
  revIdx = 0; revTr = {};
  document.getElementById('panel').classList.add('hidden');
  document.getElementById('review-panel').classList.remove('hidden');
  renderReview();
}

function renderReview() {
  if (revIdx >= revQueue.length) {
    document.getElementById('rev-card-wrap').innerHTML =
      '<p style="padding:24px;color:var(--green);font-family:\'DM Mono\',monospace;font-size:13px">\u2713 All ' + revQueue.length + ' weak spots reviewed! Great work.</p>';
    document.getElementById('rsub').textContent = 'Queue complete.';
    document.getElementById('rev-knew').disabled = true;
    document.getElementById('rev-need').disabled = true;
    return;
  }
  var item = revQueue[revIdx];
  var nid = item.nid, cidx = item.cidx, tidx = item.tidx;
  var card = D[nid].cards[cidx];
  var node = D[nid];
  var revdSet = revTr[revIdx] || new Set();

  document.getElementById('rsub').textContent =
    node.label + ' \u00b7 ' + card.t + ' \u00b7 Item ' + (revIdx+1) + ' of ' + revQueue.length;

  var html = '';
  html += '<div class="card-eyebrow">' + escHtml(node.label) + ' \u2014 ' + escHtml(node.sub) + '</div>';
  html += '<div class="card-title">'  + escHtml(card.t) + '</div>';
  html += '<div class="card-body">'   + parseBody(card.b, nid, cidx, {
    forReview: true, targetTermIdx: tidx, revealedSet: revdSet
  }) + '</div>';
  if (card.h) {
    html += '<div class="card-hint"><div class="card-hint-label">Context</div>' + escHtml(card.h) + '</div>';
  }

  document.getElementById('rev-card-wrap').innerHTML = html;
  document.getElementById('rev-knew').disabled = false;
  document.getElementById('rev-need').disabled = false;
}

function revealReviewTarget(e, idx) {
  e.stopPropagation();
  if (!revTr[revIdx]) revTr[revIdx] = new Set();
  revTr[revIdx].add(idx);
  renderReview();
}

function scoreReview(score) {
  if (revIdx >= revQueue.length) return;
  var item = revQueue[revIdx];
  var nid = item.nid, cidx = item.cidx, tidx = item.tidx;
  initNode(nid);
  if (!sc[nid][cidx]) sc[nid][cidx] = {};
  var prev = sc[nid][cidx][tidx];
  if (prev === 'knew')   totKnew--;
  if (prev === 'needed') totNeed--;
  sc[nid][cidx][tidx] = score;
  if (score === 'knew') totKnew++; else totNeed++;
  checkNodeDone(nid);
  updateStats(); saveProgress();
  revIdx++;
  renderReview();
}

function closeReview() {
  document.getElementById('review-panel').classList.add('hidden');
  if (cur) render();
}

// ============================================================
// COOKIE PERSISTENCE
// ============================================================
function saveProgress() {
  var payload = { tr: {}, sc: {} };
  Object.keys(tr).forEach(function(nid) {
    payload.tr[nid] = {};
    Object.keys(tr[nid]).forEach(function(ci) {
      payload.tr[nid][ci] = Array.from(tr[nid][ci]);
    });
  });
  payload.sc = sc;
  var exp = new Date(Date.now() + 180*24*60*60*1000).toUTCString();
  try {
    document.cookie = DECK_ID + '=' + encodeURIComponent(JSON.stringify(payload)) +
      '; expires=' + exp + '; SameSite=Lax; path=/';
  } catch(e) {}
}

function loadProgress() {
  var m = document.cookie.match(new RegExp('(?:^|; )' + DECK_ID + '=([^;]*)'));
  if (!m) return;
  try {
    var p = JSON.parse(decodeURIComponent(m[1]));
    Object.keys(p.tr || {}).forEach(function(nid) {
      if (!D[nid]) return;
      initNode(nid);
      Object.keys(p.tr[nid]).forEach(function(ci) {
        tr[nid][ci] = new Set(p.tr[nid][ci]);
      });
    });
    Object.keys(p.sc || {}).forEach(function(nid) {
      if (!D[nid]) return;
      initNode(nid);
      Object.keys(p.sc[nid]).forEach(function(ci) {
        sc[nid][ci] = p.sc[nid][ci];
      });
    });
  } catch(e) {}
}

function restoreSession() {
  loadProgress();
  recalcState();
}

// ============================================================
// RESET ALL
// ============================================================
function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  tr = {}; sc = {}; done = new Set();
  totRev = 0; totKnew = 0; totNeed = 0;
  document.cookie = DECK_ID + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax; path=/';
  if (cur) render();
  updateStats();
}

// ============================================================
// THEMES
// ============================================================
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('eyephys-theme', t); } catch(e) {}
  document.querySelectorAll('.theme-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.theme === t);
  });
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', function(e) {
  var revOpen = !document.getElementById('review-panel').classList.contains('hidden');
  if (revOpen) {
    if (e.key === 'Escape') closeReview();
    return;
  }
  if (e.key === 'ArrowLeft')  prevCard();
  else if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'Escape' && cur) selNode(cur);
});

// ============================================================
// INIT
// ============================================================
(function init() {
  var saved = null;
  try { saved = localStorage.getItem('eyephys-theme'); } catch(e) {}
  if (saved) setTheme(saved);

  var nNodes = Object.keys(D).length;
  var nCards = Object.values(D).reduce(function(n, node) { return n + node.cards.length; }, 0);
  document.getElementById('deckMeta').textContent =
    'Active recall map \u00b7 ' + nNodes + ' topics \u00b7 ' + nCards + ' cards';

  restoreSession();
})();
</script>
