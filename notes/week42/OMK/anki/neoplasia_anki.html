<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intro to Neoplasia — Contextual Anki · Dr. Holla</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── BASE TOKENS (Slate default) ── */
:root {
  --bg: #0b0f1a;
  --surface: #131929;
  --surface-2: #19223a;
  --surface-3: #1f2a42;
  --surface-4: #24314e;
  --amber: #f6a533;
  --amber-soft: rgba(246,165,51,.13);
  --amber-mid: rgba(246,165,51,.25);
  --amber-dim: rgba(246,165,51,.55);
  --teal: #2dd4bf;
  --teal-soft: rgba(45,212,191,.12);
  --teal-mid: rgba(45,212,191,.22);
  --teal-dim: rgba(45,212,191,.5);
  --green: #34d399;
  --green-soft: rgba(52,211,153,.13);
  --green-mid: rgba(52,211,153,.22);
  --red: #f87171;
  --red-soft: rgba(248,113,113,.12);
  --red-mid: rgba(248,113,113,.22);
  --text: #dde5f0;
  --text-2: #7e90a9;
  --text-3: #3e5065;
  --border: #1c2a40;
  --border-2: #243348;
  --hero-glow-a: rgba(45,212,191,.08);
  --hero-glow-b: rgba(246,165,51,.09);
  --bg-top: #0b0f1a;
  --bg-bottom: #0d1321;
  --map-shadow: 0 20px 45px rgba(0,0,0,.22);
  --panel-shadow: 0 22px 48px rgba(0,0,0,.24);
  --header-shadow: 0 22px 50px rgba(0,0,0,.24);
  --header-a: #101828;
  --header-b: #0b1220;
  --card-a: #131929;
  --card-b: #19223a;
  --card-action-bg: #19223a;
  --nav-bg: #19223a;
  --nav-bg-hover: #1f2a42;
  --nav-text: #7e90a9;
  --showall-bg: rgba(45,212,191,.09);
  --showall-text: var(--teal);
  --meta-bg: #19223a;
  --table-head-a: #131929;
  --table-head-b: #19223a;
}
html[data-theme="cream"] {
  --bg: #f4efe4;
  --surface: #fdf9f4;
  --surface-2: #ede8dd;
  --surface-3: #e4ddd0;
  --surface-4: #d8d0c0;
  --amber: #c07800;
  --amber-soft: rgba(192,120,0,.10);
  --amber-mid: rgba(192,120,0,.22);
  --amber-dim: rgba(192,120,0,.50);
  --teal: #0e7490;
  --teal-soft: rgba(14,116,144,.10);
  --teal-mid: rgba(14,116,144,.20);
  --teal-dim: rgba(14,116,144,.45);
  --green: #15803d;
  --green-soft: rgba(21,128,61,.10);
  --green-mid: rgba(21,128,61,.20);
  --red: #b91c1c;
  --red-soft: rgba(185,28,28,.09);
  --red-mid: rgba(185,28,28,.18);
  --text: #1c1610;
  --text-2: #5c4f3a;
  --text-3: #9e9180;
  --border: #d8d0c0;
  --border-2: #c8bfae;
  --hero-glow-a: rgba(14,116,144,.06);
  --hero-glow-b: rgba(192,120,0,.07);
  --bg-top: #f4efe4;
  --bg-bottom: #ece6d8;
  --header-a: #2c1e0e;
  --header-b: #1e1408;
  --card-a: #fdf9f4;
  --card-b: #f4efe4;
  --card-action-bg: #ede8dd;
  --nav-bg: #ede8dd;
  --nav-bg-hover: #e4ddd0;
  --nav-text: #5c4f3a;
  --showall-bg: rgba(14,116,144,.08);
  --showall-text: var(--teal);
  --meta-bg: #ede8dd;
  --table-head-a: #e4ddd0;
  --table-head-b: #d8d0c0;
}
html[data-theme="forest"] {
  --bg: #081512;
  --surface: #0e1f1a;
  --surface-2: #142820;
  --surface-3: #1a3028;
  --surface-4: #1e3830;
  --amber: #f0b849;
  --amber-soft: rgba(240,184,73,.12);
  --amber-mid: rgba(240,184,73,.24);
  --amber-dim: rgba(240,184,73,.52);
  --teal: #34d399;
  --teal-soft: rgba(52,211,153,.11);
  --teal-mid: rgba(52,211,153,.22);
  --teal-dim: rgba(52,211,153,.48);
  --green: #6ee7b7;
  --green-soft: rgba(110,231,183,.12);
  --green-mid: rgba(110,231,183,.22);
  --red: #fca5a5;
  --red-soft: rgba(252,165,165,.10);
  --red-mid: rgba(252,165,165,.20);
  --text: #d4ede6;
  --text-2: #6d9e8c;
  --text-3: #30594c;
  --border: #162720;
  --border-2: #1e3428;
  --hero-glow-a: rgba(52,211,153,.07);
  --hero-glow-b: rgba(240,184,73,.08);
  --bg-top: #081512;
  --bg-bottom: #091610;
  --header-a: #0c1e18;
  --header-b: #091410;
  --card-a: #0e1f1a;
  --card-b: #142820;
  --card-action-bg: #142820;
  --nav-bg: #142820;
  --nav-bg-hover: #1a3028;
  --nav-text: #6d9e8c;
  --showall-bg: rgba(52,211,153,.08);
  --showall-text: var(--teal);
  --meta-bg: #142820;
  --table-head-a: #0e1f1a;
  --table-head-b: #142820;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'DM Sans', sans-serif;
  background:
    radial-gradient(circle at top left, var(--hero-glow-a), transparent 26rem),
    radial-gradient(circle at top right, var(--hero-glow-b), transparent 24rem),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, var(--header-a) 0%, var(--header-b) 100%);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--header-shadow);
  padding: 1.5rem 2rem 1.25rem;
}
.hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
.hero-copy .eyebrow {
  font-family:'DM Mono',monospace; font-size:.68rem; font-weight:500;
  color:var(--teal); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.35rem;
}
.hero-copy h1 {
  font-family:'Crimson Pro',serif; font-size:2rem; font-weight:700;
  color:var(--text); line-height:1.15; margin-bottom:.25rem;
}
.hero-copy #deckMeta { font-size:.8rem; color:var(--text-2); }
.theme-switch { display:flex; gap:.4rem; flex-shrink:0; margin-top:.25rem; }
.theme-btn {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:500;
  padding:.3rem .75rem; border-radius:6px; border:1px solid var(--border-2);
  background:transparent; color:var(--text-2); cursor:pointer; transition:all .15s;
}
.theme-btn:hover { background:var(--surface-2); color:var(--text); }
.theme-btn.active { background:var(--amber-soft); border-color:var(--amber-mid); color:var(--amber); }

/* ── LEGEND ── */
.legend { display:flex; gap:1.25rem; padding:.75rem 2rem; border-bottom:1px solid var(--border); }
.legend-item { display:flex; align-items:center; gap:.4rem; font-size:.72rem; color:var(--text-2); font-family:'DM Mono',monospace; }
.lswatch { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

/* ── MAIN LAYOUT ── */
.app { max-width:900px; margin:0 auto; padding:1.5rem 1rem 3rem; }

/* ── SVG MAP ── */
.map-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; box-shadow:var(--map-shadow);
  padding:1rem 1rem .5rem; margin-bottom:1.25rem; overflow-x:auto;
}
svg.map { display:block; min-width:520px; width:100%; font-family:'DM Mono',monospace; }
.conn { stroke:var(--border-2); stroke-width:1.5; fill:none; opacity:.7; }
.node { cursor:pointer; transition:filter .15s; }
.node:hover { filter:brightness(1.15); }
.node.done-node { opacity:.45; }
.node rect { rx:8; ry:8; stroke-width:1.5; }
.node .lbl { font-size:9px; font-weight:600; fill:currentColor; }
.node .sub { font-size:7.5px; fill:currentColor; opacity:.75; }

.c-amber rect { fill:var(--amber-soft); stroke:var(--amber-mid); }
.c-amber .lbl,.c-amber .sub { fill:var(--amber); }
.c-amber.done-node rect { fill:var(--green-soft); stroke:var(--green-mid); }
.c-amber.done-node .lbl,.c-amber.done-node .sub { fill:var(--green); }

.c-teal rect { fill:var(--teal-soft); stroke:var(--teal-mid); }
.c-teal .lbl,.c-teal .sub { fill:var(--teal); }
.c-teal.done-node rect { fill:var(--green-soft); stroke:var(--green-mid); }
.c-teal.done-node .lbl,.c-teal.done-node .sub { fill:var(--green); }

.c-gray rect { fill:var(--surface-3); stroke:var(--border-2); }
.c-gray .lbl { fill:var(--text); font-size:9px; }
.c-gray .sub { fill:var(--text-2); font-size:7px; }

.hint-lbl { font-size:7px; fill:var(--text-3); font-family:'DM Mono',monospace; }

/* ── PROGRESS DOTS ── */
.dots-row { display:flex; gap:4px; margin-top:.35rem; flex-wrap:wrap; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--surface-3); border:1px solid var(--border-2);
  transition:background .2s, border-color .2s;
}
.dot.partial { background:var(--amber-mid); border-color:var(--amber); }
.dot.done { background:var(--green-mid); border-color:var(--green); }

/* ── CARD PANEL ── */
.panel-wrap { display:none; }
.panel-wrap.open { display:block; }
.panel {
  background: linear-gradient(135deg, var(--card-a), var(--card-b));
  border:1px solid var(--border-2);
  border-radius:14px; box-shadow:var(--panel-shadow);
  overflow:hidden; margin-bottom:1rem;
}
.panel-header {
  padding:.9rem 1.1rem .75rem;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg, var(--header-a), var(--header-b));
}
.panel-header .ph-left { display:flex; align-items:center; gap:.55rem; }
.panel-badge {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:600;
  padding:.2em .55em; border-radius:5px;
}
.badge-amber { background:var(--amber-soft); color:var(--amber); border:1px solid var(--amber-mid); }
.badge-teal  { background:var(--teal-soft);  color:var(--teal);  border:1px solid var(--teal-mid);  }
.panel-title { font-family:'DM Mono',monospace; font-size:.78rem; color:var(--text); font-weight:500; }
.panel-close {
  background:transparent; border:none; color:var(--text-2); font-size:1.1rem;
  cursor:pointer; padding:.15rem .3rem; border-radius:4px; transition:color .15s;
}
.panel-close:hover { color:var(--text); }

.card-body {
  padding:1.1rem 1.25rem;
  min-height:90px;
  font-size:.92rem;
  line-height:1.75;
  color:var(--text);
}
.card-title {
  font-family:'DM Mono',monospace; font-size:.72rem; font-weight:600;
  color:var(--text-2); margin-bottom:.6rem; padding-bottom:.4rem;
  border-bottom:1px solid var(--border);
}
.card-hint {
  margin-top:.75rem; padding:.55rem .8rem;
  background:var(--surface-3); border-radius:8px; border-left:3px solid var(--teal-dim);
  font-size:.8rem; color:var(--text-2); line-height:1.55;
}
.card-hint::before { content:"💡 "; }

/* ── CARD ACTIONS ── */
.card-actions {
  padding:.65rem 1.1rem; background:var(--card-action-bg);
  border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem;
}
.meta-pills { display:flex; gap:.35rem; flex-wrap:wrap; align-items:center; }
.meta-pill {
  font-family:'DM Mono',monospace; font-size:.62rem; font-weight:500;
  padding:.18em .5em; border-radius:4px; background:var(--meta-bg); color:var(--text-2);
  border:1px solid var(--border-2);
}
.meta-pill.knew { color:var(--green); border-color:var(--green-mid); }
.meta-pill.need { color:var(--amber); border-color:var(--amber-mid); }
.action-btns { display:flex; gap:.35rem; }
.btn {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:600;
  padding:.3rem .75rem; border-radius:6px; border:1px solid transparent;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.btn-primary { background:var(--teal-soft); border-color:var(--teal-mid); color:var(--teal); }
.btn-primary:hover:not(:disabled) { background:var(--teal-mid); }
.btn-amber { background:var(--amber-soft); border-color:var(--amber-mid); color:var(--amber); }
.btn-amber:hover:not(:disabled) { background:var(--amber-mid); }
.btn-ghost { background:transparent; border-color:var(--border-2); color:var(--text-2); }
.btn-ghost:hover:not(:disabled) { background:var(--surface-3); }
.btn:disabled { opacity:.35; cursor:not-allowed; }

/* ── CARD NAVIGATION ── */
.card-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:.6rem 1.1rem; border-top:1px solid var(--border);
  background:var(--card-action-bg);
}
.nav-btn {
  font-family:'DM Mono',monospace; font-size:.68rem; font-weight:500;
  padding:.3rem .7rem; border-radius:6px; border:1px solid var(--border-2);
  background:var(--nav-bg); color:var(--nav-text); cursor:pointer; transition:all .15s;
}
.nav-btn:hover:not(:disabled) { background:var(--nav-bg-hover); color:var(--text); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }
.card-counter { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--text-2); }

/* ── OCCLUSION ── */
.occ {
  display:inline-block;
  min-width:3ch;
  background:var(--text);
  color:transparent;
  border:1px solid transparent;
  border-radius:3px;
  cursor:pointer;
  padding:1px 6px;
  white-space:nowrap;
  user-select:none;
  vertical-align:baseline;
  transition:background .15s, color .15s, border-color .15s;
}
.occ:not(.rev):not(.needed):not(.unscored):hover { filter:brightness(1.15); }
.occ.rev      { background:var(--green-soft); color:var(--green);  cursor:default; border-color:rgba(52,211,153,.25); }
.occ.needed   { background:var(--amber-soft); color:var(--amber);  cursor:default; border-color:rgba(246,165,51,.25); }
.occ.unscored { background:var(--green-soft); color:var(--green);  cursor:default; border-color:rgba(52,211,153,.20); }
.score-btns { display:inline-flex; gap:.25rem; margin-left:.35rem; vertical-align:baseline; }
.score-btn {
  font-family:'DM Mono',monospace; font-size:.6rem; font-weight:600;
  padding:.1em .4em; border-radius:4px; border:1px solid transparent; cursor:pointer;
  transition:all .12s; vertical-align:baseline;
}
.score-btn.knew-btn { background:var(--green-soft); color:var(--green); border-color:var(--green-mid); }
.score-btn.knew-btn:hover { background:var(--green-mid); }
.score-btn.need-btn { background:var(--amber-soft); color:var(--amber); border-color:var(--amber-mid); }
.score-btn.need-btn:hover { background:var(--amber-mid); }
.jump-link {
  display:inline-block; margin-left:.35rem; font-family:'DM Mono',monospace;
  font-size:.62rem; font-weight:600; padding:.1em .4em; border-radius:4px;
  cursor:pointer; text-decoration:none; vertical-align:baseline;
  transition:all .12s;
}
.jump-amber { background:var(--amber-soft); color:var(--amber); border:1px solid var(--amber-mid); }
.jump-teal  { background:var(--teal-soft);  color:var(--teal);  border:1px solid var(--teal-mid);  }

/* ── TABLE QUIZ CARDS ── */
.tblq-note {
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.4rem;
  margin-bottom:.75rem; padding:.5rem .75rem; border-radius:7px;
  background:var(--surface-3); border:1px solid var(--border-2);
}
.tblq-copy { font-size:.75rem; color:var(--text-2); }
.tblq-actions { display:none; gap:.35rem; }
.tblq-pill { font-family:'DM Mono',monospace; font-size:.62rem; font-weight:600; padding:.15em .45em; border-radius:4px; background:var(--teal-soft); color:var(--teal); border:1px solid var(--teal-mid); }
.tblq-btn { font-family:'DM Mono',monospace; font-size:.62rem; font-weight:600; padding:.2em .55em; border-radius:4px; border:1px solid var(--border-2); background:var(--surface-4); color:var(--text-2); cursor:pointer; }
.tblq-btn:hover { background:var(--surface-3); color:var(--text); }
.tblq-wrap { overflow-x:auto; border-radius:8px; border:1px solid var(--border-2); }
table.tblq { width:100%; border-collapse:collapse; font-size:.82rem; }
table.tblq th {
  background:linear-gradient(90deg,var(--table-head-a),var(--table-head-b));
  font-family:'DM Mono',monospace; font-size:.68rem; font-weight:600;
  text-transform:uppercase; letter-spacing:.06em; color:var(--text-2);
  padding:.55rem .85rem; border-bottom:1px solid var(--border-2); text-align:left;
}
table.tblq td { padding:.5rem .85rem; border-bottom:1px solid var(--border); vertical-align:middle; }
table.tblq tr:last-child td { border-bottom:none; }
table.tblq tr th[scope="row"] { color:var(--text); font-size:.8rem; background:var(--surface-3); width:34%; }
.tblq td .occ { display:block; text-align:center; white-space:normal; padding:8px 12px; min-width:150px; }
.tblq td .score-row { display:flex; justify-content:center; margin-top:.3rem; }

/* ── STATS BAR ── */
.stats-bar {
  background:var(--surface); border:1px solid var(--border-2); border-radius:10px;
  padding:.65rem 1rem; margin-bottom:1rem;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem;
}
.stats-pills { display:flex; gap:.35rem; flex-wrap:wrap; }
.stat-pill {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:500;
  padding:.2em .55em; border-radius:5px; border:1px solid var(--border-2);
  background:var(--surface-2); color:var(--text-2);
}
.stat-pill.s-rev   { color:var(--teal);  border-color:var(--teal-mid);  background:var(--teal-soft);  }
.stat-pill.s-knew  { color:var(--green); border-color:var(--green-mid); background:var(--green-soft); }
.stat-pill.s-need  { color:var(--amber); border-color:var(--amber-mid); background:var(--amber-soft); }
.stat-pill.s-done  { color:var(--text-2); }
.stats-actions { display:flex; gap:.35rem; flex-wrap:wrap; }
.btn-showall {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:600;
  padding:.3rem .75rem; border-radius:6px; border:1px solid var(--teal-mid);
  background:var(--showall-bg); color:var(--showall-text); cursor:pointer; transition:all .15s;
}
.btn-showall:hover { background:var(--teal-mid); }
.btn-showall:disabled { opacity:.3; cursor:not-allowed; }
.btn-review {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:600;
  padding:.3rem .75rem; border-radius:6px; border:1px solid var(--amber-mid);
  background:var(--amber-soft); color:var(--amber); cursor:pointer; transition:all .15s;
  display:none;
}
.btn-review.visible { display:inline-block; }
.btn-review:hover { background:var(--amber-mid); }
.btn-reset-all {
  font-family:'DM Mono',monospace; font-size:.65rem; font-weight:500;
  padding:.3rem .65rem; border-radius:6px; border:1px solid var(--border-2);
  background:transparent; color:var(--text-2); cursor:pointer; transition:all .15s;
}
.btn-reset-all:hover { background:var(--surface-3); color:var(--text); }

/* ── REVIEW PANEL ── */
.review-panel {
  display:none; background:linear-gradient(135deg,var(--card-a),var(--card-b));
  border:1px solid var(--amber-mid); border-radius:14px; box-shadow:var(--panel-shadow);
  overflow:hidden; margin-bottom:1rem;
}
.review-panel.open { display:block; }
.review-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.9rem 1.1rem; border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,var(--header-a),var(--header-b));
}
.review-title { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; color:var(--amber); }
.rsub {
  padding:.5rem 1.1rem .25rem; font-family:'DM Mono',monospace; font-size:.68rem;
  color:var(--text-2); background:var(--surface-3); border-bottom:1px solid var(--border);
}
.rsub .rterm { color:var(--amber); font-weight:600; }
.review-body { padding:1.1rem 1.25rem; font-size:.92rem; line-height:1.75; color:var(--text); }
.review-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:.6rem 1.1rem; border-top:1px solid var(--border);
  background:var(--card-action-bg);
}
.review-counter { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--text-2); }

/* ── RESPONSIVE ── */
@media(max-width:720px){
  .card-actions { flex-direction:column; align-items:stretch; }
  .action-btns { flex-wrap:wrap; }
  .stats-bar { flex-direction:column; align-items:stretch; }
  .hero-top { flex-direction:column; }
}
</style>

<script>

const DECK_ID = 'neoplasia-holla-b5-v1';
const D = JSON.parse('{"plo1":{"label":"PLO 1","sub":"Tumor Nomenclature","type":"PLO","cards":[{"t":"Core Naming Principle","b":"The primary descriptor of any tumor is {cell or tissue of origin}. The suffix {-oma} is added for all tumors. Epithelial glandular: benign = {adenoma}, malignant = {adenocarcinoma}. Squamous epithelial: benign = {papilloma}, malignant = {squamous cell carcinoma}.","h":"The tissue of origin always comes first — the suffix (-oma, -carcinoma, -sarcoma) encodes whether it is benign or malignant and what lineage."},{"t":"Mesenchymal Tumor Naming","b":"Malignant mesenchymal tumors end in {-sarcoma}. Fibrous tissue: benign = {fibroma}, malignant = {fibrosarcoma}. Cartilage: benign = {chondroma}, malignant = {chondrosarcoma}. Fat: benign = {lipoma}, malignant = {liposarcoma}. Bone: benign = {osteoma}, malignant = {osteosarcoma}. Blood vessels: benign = {hemangioma}, malignant = {angiosarcoma}.","h":"Leukocyte-derived tumors (leukemia / lymphoma) have no benign counterpart — they are inherently malignant."},{"t":"Exceptions to the -oma Rule","b":"Not everything ending in {-oma} is benign. Malignant exceptions: {melanoma}, {lymphoma}, {mesothelioma}. Benign/non-neoplastic exceptions: {hamartoma} (tissue normally at the site, growing haphazardly — has clonal chromosomal aberrations), {granuloma} (inflammatory, not neoplastic).","h":"High-yield trap: melanoma, lymphoma, and mesothelioma all sound benign but are malignant. Know them cold."},{"t":"Mixed & Special Tumors","b":"{Mixed tumors} arise from neoplastic cells that differentiate into both epithelial AND mesenchymal tissue (divergent differentiation). Classic example: {pleomorphic adenoma} of the {parotid gland}. A {teratoma} contains tissue from one or more {germ cell layers} and arises from {totipotent} germ cells in the ovary, testis, or abnormal midline embryonic rests.","h":"Teratomas can differentiate into virtually any cell type — hair, teeth, bone — because they come from totipotent stem cells."},{"t":"Hamartoma vs. Choristoma","b":"A {hamartoma} is a disorganized mass of tissue elements {normally found at that site}; it has {clonal chromosomal} aberrations and is considered {benign}. It can mimic a neoplasm on imaging (e.g., pulmonary {coin lesion}). A {choristoma} (heterotopia) is normal tissue found at a {wrong site}.","h":"Hamartoma = right tissue, wrong architecture. Choristoma = right tissue, wrong location. Neither is truly neoplastic."}]},"plo2":{"label":"PLO 2","sub":"Benign vs. Malignant Features","type":"PLO","cards":[{"t":"Differentiation & Growth Rate","b":"Benign tumors are {well-differentiated} and resemble the tissue of origin; mitoses are {rare and normal}. Malignant tumors range from well to {poorly differentiated}; may be {anaplastic}; mitoses can be {abundant and atypical}.","h":"Atypical mitoses (e.g., tripolar mitosis) are a feature of malignancy. The presence of mitosis alone does not make a tumor malignant."},{"t":"Local Invasion & Necrosis","b":"Benign tumors are {cohesive and well-demarcated}, may have a {capsule}, and do NOT {invade} surrounding tissue. Malignant tumors are {poorly demarcated} and {infiltrate} adjacent structures. Rapidly growing malignant tumors may develop {coagulative necrosis} by outgrowing their vascular supply.","h":"A slowly growing malignant tumor can still form a pseudo-capsule — capsule alone does NOT confirm benignancy. Look for true invasion."},{"t":"Most Reliable Malignancy Indicators","b":"The most reliable indicators are {invasiveness} and {metastasis}. {Lack of capsule} alone does not equal malignancy. Benign tumors retain {functional capability} (e.g., endocrine adenomas can still secrete hormones). Malignant tumors may {lose functional differentiation} as they become more anaplastic.","h":"Metastasis is the gold-standard proof of malignancy — cancer cells at a site physically discontinuous from the primary. No benign tumor does this."},{"t":"Anaplastic Cytologic Features","b":"Features of anaplasia: {pleomorphism} (variation in cell shape/size), disproportionate {N:C ratio}, irregular nuclear borders, {hyperchromasia}, multiple large {nucleoli}, and {atypical/bizarre mitoses} (e.g., {tripolar} mitosis). Also: loss of {polarity} and architectural disarray.","h":"Anaplasia is the cytologic face of malignancy. Each of these features reflects dedifferentiation — the more anaplastic, the further from normal."}]},"plo3":{"label":"PLO 3","sub":"Key Definitions","type":"PLO","cards":[{"t":"Neoplasia — Core Definition","b":"A neoplasm is a {genetic disorder caused by DNA mutations} arising from accumulation of {multiple genetic alterations}. The growth {persists even after the initiating stimulus is removed}. It is governed by {clonal selection} — survival of cells with a proliferative growth advantage.","h":"Persistence after stimulus removal is key. Hyperplasia regresses when the stimulus stops; neoplasia does not."},{"t":"Differentiation vs. Anaplasia","b":"{Differentiation} = the extent to which neoplastic cells resemble their normal {parenchymal counterpart} morphologically AND functionally. {Anaplasia} = lack of differentiation; indicates how far a malignant tumor has diverged from its {tissue of origin}. The more anaplastic, {the less it resembles} the cell of origin.","h":"Think of these as opposite poles on a single axis: well-differentiated (looks like normal tissue) on one end, anaplastic (completely dedifferentiated) on the other."},{"t":"Metaplasia","b":"{Metaplasia} = replacement of one {differentiated cell type} with another. Associated with {injury and repair}. May undergo {malignant transformation} if the offending agent persists. Classic example: {Barrett\'s esophagus} — squamous epithelium replaced by {intestinal columnar} epithelium due to chronic acid exposure.","h":"Metaplasia is reversible and not itself cancerous. But sustained metaplasia (e.g., untreated GERD) creates an environment prone to malignant change."},{"t":"Dysplasia","b":"{Dysplasia} = disordered growth. Features: {pleomorphism}, increased {N:C ratio}, {hyperchromasia}, loss of {differentiation}, architectural disarray. Precursor to malignancy; may be {reversible} if the stimulus is removed. When severe and full-thickness: carcinoma {in situ}.","h":"Dysplasia progression: mild → moderate → severe (CIS) → invasive. Removing the offending agent (e.g., treating chronic cervicitis) can still reverse dysplasia at earlier stages."},{"t":"Parenchyma vs. Stroma","b":"{Parenchyma} = the actual neoplastic {tumor cells} — the proliferating component. {Stroma} = reactive {connective tissue and blood vessels} that support the tumor. Some malignant tumors induce excessive stroma called {desmoplasia}, contributing to the hard texture felt on exam.","h":"Parenchyma = the cancer; stroma = its life support. Tumor angiogenesis (new vessel formation) is how stroma serves the parenchyma — target of anti-VEGF therapies."}]},"plo4":{"label":"PLO 4","sub":"Local Invasion & Metastasis","type":"PLO","cards":[{"t":"Benign Tumor — Local Behavior","b":"Benign tumors grow as {cohesive, expansile} masses. They remain {localized} to site of origin and lack the capacity to invade or metastasize. They grow slowly and may develop a {capsule}. Importantly, {lack of capsule} alone does NOT equal malignancy.","h":"Expansile growth pushes tissue aside (benign); infiltrative growth invades and destroys it (malignant). The capsule is formed by compressed surrounding tissue, not by the tumor itself."},{"t":"Malignant Tumor — Local Invasion","b":"Malignant tumors are {poorly demarcated} from surrounding tissue and {infiltrate} adjacent structures without a clean surgical plane. Slowly growing malignant tumors may develop a {pseudo-capsule} (not a true capsule). {Invasiveness} and metastasis are the reliable indicators of malignancy.","h":"The surgeon\'s problem: no clean margin to cut to. Infiltrative growth means tumor cells are interdigitated with normal tissue — incomplete excision leads to recurrence."},{"t":"Metastasis — Definition & Risk Features","b":"Metastasis = spread of tumor to sites {physically discontinuous} with the primary tumor. All malignant tumors have the {capacity} to metastasize, but some rarely do (e.g., {basal cell carcinoma} of skin, CNS {gliomas}). Features increasing metastatic risk: {lack of differentiation}, aggressive local invasion, {rapid growth}, large tumor size.","h":"Basal cell carcinoma is the classic exception — it is locally destructive and malignant but almost never metastasizes. CNS tumors rarely metastasize outside the CNS."},{"t":"Carcinoma-In-Situ (CIS)","b":"CIS = severe dysplasia involving the {full thickness} of the epithelium, but does NOT penetrate the {basement membrane}. Has all cytologic features of {malignancy}. {High probability} of progression to invasive cancer if untreated. Common sites: {cervix}, breast ({DCIS}), skin, urinary bladder. Potentially {curable} at this stage.","h":"CIS = malignant cells, non-malignant behavior. No metastasis yet because there is no access to lymphatics or vasculature. Early detection here is life-saving."},{"t":"CIS → Invasive Transition","b":"Once the {basement membrane} is breached, the tumor becomes {invasive}. This grants access to {lymphatics and blood vessels} → metastatic potential. TNM stage becomes {T1 or greater} by definition. Example: {DCIS} → invasive ductal carcinoma of breast. Early detection by Pap smear (cervical {CIS}) or mammography ({DCIS}) is life-saving.","h":"The basement membrane is the critical barrier. Before breach: curable. After breach: staging begins, metastasis is possible. This is why screening programs exist."}]},"lo1":{"label":"LO 1","sub":"Paraneoplastic Syndromes","type":"LO","cards":[{"t":"Definition & Clinical Importance","b":"Paraneoplastic syndromes = clinical signs/symptoms caused by malignancy but NOT due to {tumor invasion or metastasis}. Caused by tumor production of {hormones, peptides, or immune mediators}. May be the {first sign} of malignancy. Can cause {life-threatening} symptoms independent of tumor burden. Most common with {lung}, {breast}, and {hematologic} malignancies.","h":"The tumor is talking to the rest of the body through chemical messengers. Paraneoplastic symptoms often appear before the tumor is found — alerting the clinician to search for a primary."},{"t":"Hypercalcemia — Most Common PNS","b":"{Hypercalcemia} is the most common paraneoplastic syndrome. True paraneoplastic mediators: {PTHrP} (PTH-related protein — structurally similar to PTH), TNF, TGF-alpha, IL-1. Associated cancers: {lung}, breast, kidney, ovaries. Symptoms: weakness/lethargy, N/V, altered mental status, {bradycardia}, acute renal failure.","h":"Distinguish: paraneoplastic hypercalcemia (PTHrP — humoral) vs. osteolytic hypercalcemia (direct bone invasion by mets — NOT paraneoplastic). PTHrP is normally made in trace amounts by keratinocytes."},{"t":"Cushing Syndrome (Most Common PNS Endocrinopathy)","b":"Most common paraneoplastic {endocrinopathy}. Mediator: ectopic {ACTH} (or pro-opiomelanocortin). Associated with {small cell lung carcinoma}, pancreatic tumors, thymic tumors. Features: HTN, {moon face}, {buffalo hump}, decreased muscle mass, {hyperglycemia}, poor wound healing, {purple striae}, depression.","h":"Small cell lung cancer is the classic ectopic ACTH producer. Remember its paraneoplastic triad: ectopic ACTH (Cushing), ectopic ADH (SIADH), and Eaton-Lambert syndrome."},{"t":"SIADH & Neuromyopathic PNS","b":"SIADH: ectopic {ADH} produced by {small cell lung carcinoma} → {hyponatremia}, confusion, seizures. Neuromyopathic PNS: {immune-mediated} mechanism (antigen mimicry — tumor antigen resembles normal tissue) → {autoimmune} damage → peripheral neuropathy, encephalitis, {myasthenia gravis}-like syndrome. Associated with lung and breast malignancies.","h":"SIADH = dilutional hyponatremia from too much ADH. Neuromyopathic PNS = the immune system attacks self in a case of mistaken identity triggered by the tumor antigen."},{"t":"Cachexia","b":"Tumor-associated cachexia is mediated by {TNF-alpha} (cachectin), {IL-1}, and {IL-6}. Features: skeletal muscle loss with or without fat loss, anorexia, fatigue, anemia, edema, taste changes. {Cannot} be fully reversed by nutritional support alone.","h":"Cachexia is not simple starvation. The cytokine milieu drives direct catabolism — forcing protein breakdown regardless of caloric intake. Treating the tumor is the only effective intervention."}]},"lo2":{"label":"LO 2","sub":"Desmoplasia","type":"LO","cards":[{"t":"Definition of Desmoplasia","b":"{Desmoplasia} = induction of {excessive dense fibrous connective tissue} by a malignant tumor within and around the tumor stroma. Commonly seen in {breast carcinoma} (causes the palpable hard mass) and {pancreatic carcinoma}.","h":"Des- (band/tendon) + -plasia (formation). Think of it as a reactive fibrotic hardening around the tumor — a stromal response to malignant invasion."},{"t":"Desmoplasia as an Invasive Indicator","b":"Desmoplastic reaction = histologic sign of {invasive} tumor because it requires {tumor-stroma interaction}: tumor cells penetrate beyond normal boundaries, triggering {reactive stroma} (fibroblast activation). Non-invasive / {in-situ} tumors typically {lack} a desmoplastic reaction because they have not yet penetrated to reach stroma.","h":"Presence of desmoplasia on histology → invasive tumor. Absence → may still be in-situ. This is a key histologic clue to distinguish CIS from early invasion."},{"t":"Clinical Consequences","b":"In breast carcinoma, desmoplasia creates the {hard, irregular palpable mass} detected on exam. In pancreatic cancer, the {dense stroma} blocks drug delivery, contributing to chemotherapy resistance. Presence of desmoplasia helps distinguish {invasive} from {in-situ} tumor on biopsy.","h":"Desmoplasia is both a diagnostic marker and a clinical obstacle. In pancreatic cancer, the stroma-to-tumor cell ratio is often 80:20 — most of the mass is reactive fibrosis, not cancer cells."}]},"lo3":{"label":"LO 3","sub":"3 Pathways of Tumor Spread","type":"LO","cards":[{"t":"Pathway 1: Direct Seeding of Body Cavities","b":"Direct seeding most often involves the {peritoneal cavity}; also pleural and pericardial cavities. Can cause {malignant effusions}. Classic example: {ovarian carcinoma} seeding throughout the peritoneum → {omental implants} and ascites.","h":"Peritoneal seeding creates drop metastases — tumor nodules implanting throughout the abdominal cavity. Omental cake is the classic radiologic finding. Pseudomyxoma peritonei is a gel-like variant."},{"t":"Pathway 2: Lymphatic Spread","b":"{Lymphatic spread} is the most common pathway for {carcinomas}. Follows natural lymphatic drainage routes. The {sentinel node} = first regional lymph node to receive lymphatic drainage from the primary tumor. Used for prognosis and staging in {breast cancer} and {melanoma}.","h":"Sentinel node biopsy: inject dye/tracer near the tumor; if the first node is clean, the rest of the regional nodes are likely clean too — avoids full dissection and its morbidity."},{"t":"Pathway 3: Hematogenous Spread","b":"{Hematogenous spread} is most common for {sarcomas}. Occurs via {thin-walled veins}. {Liver} and {lung} are the most common metastatic sites. Liver receives blood from the {portal vein} (GI tumors first go here). {Lung} receives all systemic venous return → any tumor can potentially reach it.","h":"Portal circulation explains why colorectal, gastric, and pancreatic cancers so reliably metastasize to the liver first. Lung is the universal dump site for systemic venous blood."},{"t":"Carcinoma vs. Sarcoma Spread","b":"{Carcinomas} preferentially use {lymphatic} spread. {Sarcomas} preferentially use {hematogenous} spread. The most common overall metastatic sites are {liver} and {lung}. Lymph node involvement is detected clinically by {sentinel node} biopsy (breast, melanoma) or full dissection.","h":"A useful pearl: cancer in lymph nodes first suggests carcinoma; cancer showing up in the lung before nodes suggests sarcoma. These are tendencies, not rules."}]},"lo4":{"label":"LO 4","sub":"Grading vs. Staging","type":"LO","cards":[{"t":"Grading — Definition","b":"Grading is based on the {degree of differentiation} of tumor cells (cytologic appearance). Features assessed: cellular differentiation, {mitosis count}, presence of {necrosis}, architectural pattern ({gland formation} vs. solid sheets). Scale: typically {Grade 1–4} (higher number = {less differentiated}, more aggressive). Some tumors have unique systems (e.g., {Gleason score} for prostate).","h":"Grade = how abnormal the cells look under the microscope. Higher grade = more anaplastic. Note that histologic grade does not always predict biologic behavior — some high-grade tumors respond well to therapy."},{"t":"Staging — Definition","b":"Staging is based on the {extent and anatomic spread} of malignancy. Factors: primary tumor {size and invasion depth}, {lymph node involvement}, {distant metastasis}. Staging offers more {clinical value} than grading for prognosis, treatment planning, and enrollment in clinical trials. Most common system: {AJCC TNM}.","h":"Stage = how far has it spread. More actionable than grade. A Stage IV tumor drives the clinical decision toward systemic therapy; a Stage I tumor drives curative surgery."},{"t":"TNM System Components","b":"T = primary tumor: {TX} (cannot assess) → {T0} (no evidence) → {Tis} (carcinoma in situ) → {T1–T4} (increasing size/invasion). N = regional nodes: {N0} (none) → {N1–N3} (increasing node involvement). M = metastasis: {M0} (none present) → {M1} (distant metastasis present).","h":"TNM = Tumor, Nodes, Metastasis. Each axis tells a different part of the story — how big, where has it spread locally, and has it gone distant."},{"t":"TNM Stage Groups","b":"Stage {0} = CIS (Tis, N0, M0). Stage {I} = small, confined to organ (T1, N0, M0). Stages {II–III} = larger or locally invasive ± {regional nodes}. Stage {IV} = distant metastasis (any T, any N, {M1}). Stage IV carries the {poorest prognosis} and usually shifts goals toward palliation.","h":"Stage 0 is often curable with local excision. Stage IV is usually not curable with current therapies — goals shift to prolonging life and maintaining quality of life."},{"t":"TNM Prefixes","b":"{c}TNM = {clinical} staging: based on physical exam, imaging, biopsy (within ~4 months of diagnosis). {p}TNM = {pathologic} staging: based on tissue after surgical excision (most accurate). {y}TNM = staging after {therapy} (e.g., post-chemo). {r}TNM = staging after {recurrence} following a disease-free interval.","h":"Example: cT2N1M1 means the clinical assessment shows T2 tumor, 1 node involved, distant mets. After surgery, pTNM may upstage or downstage based on actual tissue findings."}]}}');

const NODE_IDS = Object.keys(D);

// ── INIT ──
function initNode(nid) {
  if (!tr[nid]) {
    tr[nid] = {};
    sc[nid] = {};
    D[nid].cards.forEach((_, i) => {
      tr[nid][i] = new Set();
      sc[nid][i] = {};
    });
  }
}

function countTerms(body) {
  return (body.match(/\{[^}]+\}/g) || []).length;
}

function allRevealed(nid, cidx) {
  const total = countTerms(D[nid].cards[cidx].b);
  return total > 0 && tr[nid][cidx].size >= total;
}

// ── PARSE BODY ──
function parseBody(body, nid, cidx, opts = {}) {
  let i = 0;
  return body.replace(/\{([^}]+)\}/g, (_, t) => {
    const idx = i++;
    if (opts.forReview) {
      if (idx === opts.targetTermIdx) {
        const revealed = opts.revealedSet && opts.revealedSet.has(idx);
        if (revealed) {
          return '<span class="occ rev">' + esc(t) + '</span>';
        }
        return '<span class="occ" onclick="revealReviewTerm(' + idx + ')">' + esc(t) + '</span>';
      }
      return '<span style="color:var(--text-2)">' + esc(t) + '</span>';
    }
    const revealed = tr[nid] && tr[nid][cidx] && tr[nid][cidx].has(idx);
    const scored   = sc[nid] && sc[nid][cidx] && sc[nid][cidx][idx];
    let cls = 'occ';
    if (revealed && scored === 'knew')   cls = 'occ rev';
    else if (revealed && scored === 'needed') cls = 'occ needed';
    else if (revealed && !scored) cls = 'occ unscored';
    let html = '<span class="' + cls + '"';
    if (!revealed) html += ' onclick="revealTerm(' + idx + ')"';
    html += '>' + esc(t) + '</span>';
    if (revealed && !scored) {
      html += '<span class="score-btns">';
      html += '<button class="score-btn knew-btn" onclick="event.stopPropagation();scoreIt(\'' + nid + '\',' + cidx + ',' + idx + ',\'knew\')">✓ knew</button>';
      html += '<button class="score-btn need-btn" onclick="event.stopPropagation();scoreIt(\'' + nid + '\',' + cidx + ',' + idx + ',\'needed\')">✗ needed</button>';
      html += '</span>';
    }
    if (revealed && LINKS[t] && LINKS[t][0] !== nid) {
      const link = LINKS[t];
      html += '<span class="jump-link jump-' + link[2] + '" onclick="selNode(\'' + link[0] + '\')">' +
              '→ ' + link[1] + '</span>';
    }
    return html;
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SELECT NODE ──
function selNode(nid) {
  if (!D[nid]) return;
  initNode(nid);
  cur = nid; ci = 0;
  document.getElementById('panel-wrap').classList.add('open');
  const node = D[nid];
  const ph = document.getElementById('ph-badge');
  ph.textContent = node.label;
  ph.className = 'panel-badge ' + (node.type === 'PLO' ? 'badge-amber' : 'badge-teal');
  document.getElementById('ph-title').textContent = node.sub;
  document.getElementById('btn-reveal-topic').disabled = false;
  render();
  updateStats();
}

function closePanel() {
  document.getElementById('panel-wrap').classList.remove('open');
  cur = null;
  document.getElementById('btn-reveal-topic').disabled = true;
}

// ── RENDER ──
function render() {
  if (!cur) return;
  const card = D[cur].cards[ci];
  document.getElementById('card-title').textContent = card.t;
  document.getElementById('card-content').innerHTML = parseBody(card.b, cur, ci);
  const hint = document.getElementById('card-hint');
  if (card.h) { hint.style.display = ''; hint.textContent = card.h; }
  else hint.style.display = 'none';
  document.getElementById('card-counter').textContent = (ci+1) + ' / ' + D[cur].cards.length;
  document.getElementById('btn-prev').disabled = ci === 0;
  document.getElementById('btn-next').disabled = ci === D[cur].cards.length - 1;
  renderCardMeta();
  updateDots();
}

function renderCardMeta() {
  if (!cur) return;
  const m = cardMetrics(cur, ci);
  const container = document.getElementById('card-meta');
  let html = '<span class="meta-pill">' + m.revealed + ' / ' + m.total + ' revealed</span>';
  if (m.knew > 0)    html += '<span class="meta-pill knew">' + m.knew + ' knew</span>';
  if (m.needed > 0)  html += '<span class="meta-pill need">' + m.needed + ' needed</span>';
  if (m.unscored > 0) html += '<span class="meta-pill">' + m.unscored + ' to score</span>';
  container.innerHTML = html;
  document.getElementById('btn-reveal-card').disabled = m.total === 0 || m.allRevealed;
  document.getElementById('btn-knew-all').disabled = !m.allRevealed;
  document.getElementById('btn-reset-card').disabled = m.revealed === 0;
}

function cardMetrics(nid, cidx) {
  const total = countTerms(D[nid].cards[cidx].b);
  const revealed = tr[nid][cidx] ? tr[nid][cidx].size : 0;
  let knew = 0, needed = 0;
  if (sc[nid] && sc[nid][cidx]) {
    Object.values(sc[nid][cidx]).forEach(v => { if(v==='knew') knew++; else if(v==='needed') needed++; });
  }
  const unscored = revealed - knew - needed;
  return { total, revealed, knew, needed, unscored, allRevealed: total > 0 && revealed >= total };
}

// ── TERM REVEAL & SCORING ──
function revealTerm(idx) {
  if (!cur) return;
  tr[cur][ci].add(idx);
  totRev++;
  checkNodeDone(cur);
  render();
  updateStats();
  saveProgress();
}

function scoreIt(nid, cidx, tidx, score) {
  if (!sc[nid]) sc[nid] = {};
  if (!sc[nid][cidx]) sc[nid][cidx] = {};
  const prev = sc[nid][cidx][tidx];
  if (prev === score) return;
  if (prev === 'knew')   totKnew--;
  if (prev === 'needed') totNeed--;
  sc[nid][cidx][tidx] = score;
  if (score === 'knew')   totKnew++;
  if (score === 'needed') totNeed++;
  if (cur === nid && ci === cidx) render();
  updateStats();
  saveProgress();
}

function revealCard() {
  if (!cur) return;
  const total = countTerms(D[cur].cards[ci].b);
  for (let i = 0; i < total; i++) {
    if (!tr[cur][ci].has(i)) { tr[cur][ci].add(i); totRev++; }
  }
  checkNodeDone(cur);
  render();
  updateStats();
  saveProgress();
}

function knewAllCurrentCard() {
  if (!cur) return;
  const total = countTerms(D[cur].cards[ci].b);
  for (let i = 0; i < total; i++) {
    const prev = sc[cur][ci][i];
    if (prev === 'knew') continue;
    if (prev === 'needed') totNeed--;
    sc[cur][ci][i] = 'knew';
    totKnew++;
  }
  render();
  updateStats();
  saveProgress();
}

function resetCard() {
  if (!cur) return;
  const total = countTerms(D[cur].cards[ci].b);
  tr[cur][ci].forEach(() => totRev--);
  tr[cur][ci] = new Set();
  if (sc[cur] && sc[cur][ci]) {
    Object.values(sc[cur][ci]).forEach(v => { if(v==='knew') totKnew--; else if(v==='needed') totNeed--; });
    sc[cur][ci] = {};
  }
  done.delete(cur);
  document.getElementById('n-' + cur).classList.remove('done-node');
  render();
  updateStats();
  saveProgress();
}

// ── REVEAL TOPIC / DECK ──
function revealTopic() {
  if (!cur) return;
  D[cur].cards.forEach((card, cidx) => {
    const total = countTerms(card.b);
    for (let i = 0; i < total; i++) {
      if (!tr[cur][cidx].has(i)) { tr[cur][cidx].add(i); totRev++; }
    }
  });
  checkNodeDone(cur);
  render();
  updateStats();
  saveProgress();
}

function revealDeck() {
  NODE_IDS.forEach(nid => {
    initNode(nid);
    D[nid].cards.forEach((card, cidx) => {
      const total = countTerms(card.b);
      for (let i = 0; i < total; i++) {
        if (!tr[nid][cidx].has(i)) { tr[nid][cidx].add(i); totRev++; }
      }
    });
    checkNodeDone(nid);
  });
  if (cur) render();
  updateStats();
  saveProgress();
}

// ── NAVIGATION ──
function navigate(dir) {
  if (!cur) return;
  ci = Math.max(0, Math.min(D[cur].cards.length - 1, ci + dir));
  render();
}

// ── CHECK NODE DONE ──
function checkNodeDone(nid) {
  if (!tr[nid]) return;
  const allDone = D[nid].cards.every((card, cidx) => {
    const total = countTerms(card.b);
    return total === 0 || (tr[nid][cidx] && tr[nid][cidx].size >= total);
  });
  if (allDone) {
    done.add(nid);
    document.getElementById('n-' + nid).classList.add('done-node');
  } else {
    done.delete(nid);
    document.getElementById('n-' + nid).classList.remove('done-node');
  }
}

// ── DOTS ──
function updateDots() {
  const row = document.getElementById('dots-row');
  if (!cur) { row.innerHTML = ''; return; }
  const cards = D[cur].cards;
  row.innerHTML = cards.map((card, cidx) => {
    const total = countTerms(card.b);
    const rev = tr[cur][cidx] ? tr[cur][cidx].size : 0;
    let cls = 'dot';
    if (total === 0 || rev >= total) cls = 'dot done';
    else if (rev > 0) cls = 'dot partial';
    return '<div class="' + cls + '" title="Card ' + (cidx+1) + ': ' + card.t + '" onclick="ci=' + cidx + ';render()"></div>';
  }).join('');
}

// ── STATS ──
function updateStats() {
  const totalCards = NODE_IDS.reduce((n, nid) => n + D[nid].cards.length, 0);
  document.getElementById('st-rev').textContent  = totRev + ' revealed';
  document.getElementById('st-knew').textContent = totKnew + ' knew';
  document.getElementById('st-need').textContent = totNeed + ' needed';
  document.getElementById('st-done').textContent = done.size + ' / ' + NODE_IDS.length + ' topics done';
  const reviewBtn = document.getElementById('btn-review');
  if (totNeed > 0) {
    reviewBtn.style.display = 'inline-block';
    reviewBtn.textContent = 'Review weak spots (' + totNeed + ')';
  } else {
    reviewBtn.style.display = 'none';
  }
}

// ── RESET ALL ──
function resetAll() {
  if (!confirm('Reset all progress?')) return;
  tr = {}; sc = {}; done = new Set();
  totRev = 0; totKnew = 0; totNeed = 0;
  NODE_IDS.forEach(nid => {
    document.getElementById('n-' + nid).classList.remove('done-node');
  });
  closePanel();
  closeReview();
  updateStats();
  eraseCookie();
}

// ── REVIEW MODE ──
function startReview() {
  const queue = [];
  NODE_IDS.forEach(nid => {
    if (!sc[nid]) return;
    D[nid].cards.forEach((card, cidx) => {
      if (!sc[nid][cidx]) return;
      let i = 0;
      (card.b.match(/\{[^}]+\}/g) || []).forEach((_, tidx) => {
        if (sc[nid][cidx][tidx] === 'needed') {
          queue.push({ nid, cidx, tidx, term: card.b.match(/\{([^}]+)\}/g)[tidx].replace(/[{}]/g,'') });
        }
        i++;
      });
    });
  });
  // Fisher-Yates shuffle
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  revQueue = queue; revIdx = 0; revTr = {};
  if (revQueue.length === 0) return;
  closePanel();
  document.getElementById('review-panel').classList.add('open');
  renderReview();
}

function closeReview() {
  document.getElementById('review-panel').classList.remove('open');
  revQueue = []; revIdx = 0; revTr = {};
}

function renderReview() {
  if (revQueue.length === 0) return;
  const item = revQueue[revIdx];
  const card = D[item.nid].cards[item.cidx];
  const rsub = document.getElementById('rsub-bar');
  rsub.innerHTML = D[item.nid].label + ' — ' + D[item.nid].sub + ' &nbsp;·&nbsp; Card: <em>' + esc(card.t) + '</em> &nbsp;·&nbsp; Term to recall: <span class="rterm">' + esc(item.term) + '</span>';
  const revealedSet = revTr[revIdx] || new Set();
  document.getElementById('review-content').innerHTML = parseBody(card.b, item.nid, item.cidx, {
    forReview: true, targetTermIdx: item.tidx, revealedSet
  });
  document.getElementById('rev-counter').textContent = (revIdx+1) + ' / ' + revQueue.length;
  document.getElementById('btn-rev-prev').disabled = revIdx === 0;
  document.getElementById('btn-rev-next').disabled = revIdx === revQueue.length - 1;
}

function revealReviewTerm(idx) {
  if (!revTr[revIdx]) revTr[revIdx] = new Set();
  revTr[revIdx].add(idx);
  renderReview();
}

function navigateReview(dir) {
  revIdx = Math.max(0, Math.min(revQueue.length - 1, revIdx + dir));
  renderReview();
}

// ── KEYBOARD ──
document.addEventListener('keydown', function(e) {
  const revOpen = document.getElementById('review-panel').classList.contains('open');
  if (revOpen) {
    if (e.key === 'ArrowLeft')  { navigateReview(-1); e.preventDefault(); }
    if (e.key === 'ArrowRight') { navigateReview(1);  e.preventDefault(); }
    if (e.key === 'Escape')     closeReview();
    return;
  }
  const panOpen = document.getElementById('panel-wrap').classList.contains('open');
  if (panOpen) {
    if (e.key === 'ArrowLeft')  { navigate(-1); e.preventDefault(); }
    if (e.key === 'ArrowRight') { navigate(1);  e.preventDefault(); }
    if (e.key === 'Escape')     closePanel();
  }
});

// ── THEME ──
function setTheme(theme) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-theme="' + theme + '"]').classList.add('active');
  if (theme === 'slate') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('ctx-anki-theme-' + DECK_ID, theme); } catch(e){}
}

// ── PROGRESS COOKIE ──
function saveCookie(val) {
  const d = new Date(); d.setTime(d.getTime() + 180*24*60*60*1000);
  document.cookie = COOKIE + '=' + encodeURIComponent(val) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}
function loadCookie() {
  const name = COOKIE + '=';
  return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(name)) ?
    decodeURIComponent(document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(name)).substring(name.length)) : null;
}
function eraseCookie() {
  document.cookie = COOKIE + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;SameSite=Lax';
}

function saveProgress() {
  const payload = { c: cur, i: ci, r: {}, s: {} };
  NODE_IDS.forEach(nid => {
    if (!tr[nid]) return;
    payload.r[nid] = D[nid].cards.map((_, cidx) =>
      tr[nid][cidx] ? Array.from(tr[nid][cidx]).join('.') : '');
    payload.s[nid] = D[nid].cards.map((_, cidx) => {
      if (!sc[nid][cidx]) return '';
      return Object.entries(sc[nid][cidx]).map(([k,v]) => k + (v==='knew'?'k':'n')).join('.');
    });
  });
  try { saveCookie(JSON.stringify(payload)); } catch(e){}
}

function loadProgress() {
  const raw = loadCookie();
  if (!raw) return;
  try {
    const p = JSON.parse(raw);
    NODE_IDS.forEach(nid => {
      if (!p.r || !p.r[nid]) return;
      initNode(nid);
      p.r[nid].forEach((revStr, cidx) => {
        if (!revStr) return;
        revStr.split('.').filter(Boolean).forEach(idx => tr[nid][cidx].add(parseInt(idx)));
      });
      if (p.s && p.s[nid]) {
        p.s[nid].forEach((scStr, cidx) => {
          if (!scStr) return;
          scStr.split('.').filter(Boolean).forEach(tok => {
            const idx = parseInt(tok);
            const score = tok.endsWith('k') ? 'knew' : 'needed';
            sc[nid][cidx][idx] = score;
          });
        });
      }
    });
    if (p.c && D[p.c]) { cur = p.c; ci = p.i || 0; }
  } catch(e) {}
}

function recalcState() {
  totRev = 0; totKnew = 0; totNeed = 0; done = new Set();
  NODE_IDS.forEach(nid => {
    if (!tr[nid]) return;
    D[nid].cards.forEach((_, cidx) => {
      totRev += tr[nid][cidx] ? tr[nid][cidx].size : 0;
      if (sc[nid][cidx]) {
        Object.values(sc[nid][cidx]).forEach(v => { if(v==='knew') totKnew++; else if(v==='needed') totNeed++; });
      }
    });
    const allDone = D[nid].cards.every((card, cidx) => {
      const total = countTerms(card.b);
      return total === 0 || (tr[nid][cidx] && tr[nid][cidx].size >= total);
    });
    if (allDone) {
      done.add(nid);
      document.getElementById('n-' + nid).classList.add('done-node');
    }
  });
}

function restoreSession() {
  loadProgress();
  recalcState();
  updateStats();
  if (cur && D[cur]) {
    selNode(cur);
    ci = Math.min(ci, D[cur].cards.length - 1);
    render();
  }
}

// ── BOOT ──
(function boot() {
  // Theme
  try {
    const saved = localStorage.getItem('ctx-anki-theme-' + DECK_ID);
    if (saved) setTheme(saved);
  } catch(e){}

  // Deck meta
  const totalCards = NODE_IDS.reduce((n, nid) => n + D[nid].cards.length, 0);
  document.getElementById('deckMeta').textContent =
    'Active recall map · ' + NODE_IDS.length + ' topics · ' + totalCards + ' cards';

  updateStats();
  restoreSession();
})();
</script>
</body>
