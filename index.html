      name:"USMLE/COMLEX Practice Set 2",
      ploFile:"notes/week38-endocrine.html",
      plos:[],
      questions:[{stem:"A 24-year-old man is referred for infertility after 2 years of trying to conceive. He is tall (6'3\"), has minimal facial hair, and reports bilateral gynecomastia since adolescence. Bilateral testes are small and firm (~3 mL). Semen analysis: azoospermia. Karyotype: 47,XXY. Which mechanism best explains gynecomastia in this patient despite low-normal testosterone?",choices:["A. Duplicated aromatase gene on the extra X chromosome produces excess estradiol","B. Elevated LH causes autonomous Leydig cell estradiol secretion independent of aromatase","C. Elevated SHBG preferentially binds testosterone over estradiol, shifting the free estradiol:free testosterone ratio toward estrogen dominance at breast tissue","D. Azoospermia causes retrograde accumulation of estradiol-rich seminal fluid raising systemic levels","E. The extra X chromosome directly activates estrogen receptors in breast tissue"],correct:2,explanation:"In 47,XXY, elevated LH/FSH reflect primary testicular failure. SHBG is elevated (low testosterone reduces SHBG suppression; estradiol also stimulates hepatic SHBG synthesis). SHBG binds testosterone with ~3× higher affinity than estradiol. This disproportionately reduces free testosterone while leaving more free estradiol — shifting the free estradiol:testosterone ratio at breast tissue and driving gynecomastia.",wrongExplanations:{0:"Aromatase (CYP19A1) is on chromosome 15, not the X chromosome. There is no duplicated aromatase gene in 47,XXY.",1:"Leydig cells in Klinefelter's are hyalinized and dysfunctional — they cannot mount a robust response to elevated LH. LH-independent direct estradiol hypersecretion is not the mechanism.",3:"Seminal fluid does not recirculate systemically. There is no physiological retrograde absorption pathway.",4:"Gynecomastia is driven by the endocrine imbalance (free estradiol:testosterone ratio), not by direct X-chromosome transcriptional activation of estrogen receptors."},eli5:"Gynecomastia is about ratio, not absolute levels. SHBG clings to testosterone much tighter than estradiol. When SHBG is elevated in Klinefelter's, it mops up more testosterone than estradiol — leaving relatively more free estradiol. The breast sees 'more estrogen, less androgen' and grows, even with low-normal total testosterone."},
{stem:"An 18-year-old male presents for delayed puberty evaluation. He has never had a spontaneous erection, has no pubic or axillary hair, and has small pre-pubertal testes (2 mL). His mother notes he has never been able to smell flowers. He is 5'10\" — tall for his family. GnRH stimulation shows a blunted LH response. MRI: absent olfactory bulbs. Why is this patient taller than expected for his family despite having no sex hormones?",choices:["A. GnRH deficiency causes compensatory growth hormone hypersecretion","B. Absent sex steroids prevent epiphyseal closure, allowing prolonged growth-plate activity beyond the normal pubertal fusion age","C. FSH deficiency reduces Sertoli-derived IGF-1 which normally limits bone growth","D. Absent olfactory bulbs reduce intracranial pressure, decreasing resistance to long-bone growth","E. Low LH causes excess adrenal cortisol stimulating osteoblast proliferation"],correct:1,explanation:"Sex steroids drive epiphyseal closure by stimulating growth plate chondrocyte maturation and ossification. Without testosterone (and its aromatized product estradiol), growth plates remain open past normal pubertal fusion. This causes prolonged long-bone growth — tall stature with eunuchoid proportions (arm span > height). The same phenotype is seen in aromatase-deficient males, confirming estradiol (from testosterone aromatization) is the primary epiphyseal closure signal in males.",wrongExplanations:{0:"GnRH deficiency does not cause GH hypersecretion. GH is regulated by GHRH/somatostatin independently of GnRH. GH levels are typically normal in Kallmann syndrome.",2:"IGF-1 is produced primarily by the liver in response to GH, not by Sertoli cells. FSH deficiency does not reduce skeletal IGF-1 in a clinically meaningful way.",3:"Absent olfactory bulbs are a developmental anomaly of GnRH neuron migration — they have no effect on intracranial pressure or long-bone growth mechanics.",4:"Low LH does not affect adrenal cortisol. Cortisol is regulated by ACTH from the pituitary — a completely separate axis from LH/FSH."},eli5:"Testosterone (aromatized to estradiol) is what CLOSES the growth plates and stops you from getting taller. In Kallmann syndrome there's no testosterone — so the growth plates never get the 'stop' signal. The plates stay open for years longer than normal and the person just keeps growing — hence eunuchoid tall stature."},
{stem:"A 28-year-old man presents with severe low back pain and multiple vertebral compression fractures after minimal trauma. He is 6'5\" with eunuchoid proportions. He reports normal libido and sexual function. DEXA T-score: −3.8 at the lumbar spine. No steroid use, celiac disease, or alcohol. No medications. What is the most likely diagnosis, and why does this patient have severe osteoporosis despite markedly elevated testosterone?",choices:["A. Androgen insensitivity — defective AR prevents testosterone's anabolic bone effects","B. Aromatase deficiency — estradiol (from testosterone conversion) is the primary driver of bone mineralization in males; without it osteoclasts are unopposed despite very high testosterone","C. Hypogonadotropic hypogonadism — elevated LH causes paradoxical bone loss via LH receptor osteoclast activation","D. GH deficiency — low IGF-1 causes osteoblast failure","E. Primary hyperparathyroidism — an undetected parathyroid adenoma is driving bone disease"],correct:1,explanation:"Aromatase (CYP19A1) deficiency is autosomal recessive. Without aromatase, testosterone cannot be converted to estradiol. In males, estradiol is essential for epiphyseal closure (absent → tall eunuchoid stature) and bone mineralization (estradiol suppresses osteoclastogenesis via ER-alpha on osteoclasts). Without estradiol, osteoclasts are unopposed → severe osteoporosis despite very high testosterone. Elevated LH/FSH reflect absent estradiol feedback on the HPG axis → unrestrained gonadotropin secretion → very high testosterone. Treatment: low-dose transdermal estradiol normalizes bone density and closes epiphyses.",wrongExplanations:{0:"AIS presents with female or ambiguous phenotype, not male phenotype with normal libido. AIS patients have functional aromatase. And AR-mediated bone effects are secondary to ER-mediated effects.",2:"LH does not activate osteoclasts via LH receptors. Elevated LH here is a consequence of absent estradiol feedback, not the cause of bone loss.",3:"IGF-1 is stated as normal. The bone disease is from absent estradiol, not IGF-1 deficiency.",4:"Primary hyperparathyroidism would cause hypercalcemia, elevated PTH, low phosphate, nephrolithiasis. The undetectable estradiol and very high testosterone with elevated LH/FSH are the diagnostic keys."},eli5:"Men need estrogen too — just in smaller amounts. Testosterone gets converted to estradiol by aromatase in bone and other tissues. Estradiol is what ACTUALLY protects bone in males by suppressing osteoclasts. Without aromatase, there's zero estradiol even with sky-high testosterone — the bone just gets eaten away. The tall stature happened because epiphyses never closed (no estradiol to close them)."},
{stem:"A 19-year-old woman has had severe hypertension (BP 198/112) since age 15, with two episodes of hypokalemic paralysis. She takes no medications and denies licorice ingestion. No Cushingoid features. Cortisol studies are normal. CT adrenals: normal bilaterally. Family history: father and uncle with early-onset hypertension. Which mechanism best explains hypertension and hypokalemia in this patient?",choices:["A. A GnRH-secreting adrenal tumor cross-activates mineralocorticoid receptors via sex hormone precursors","B. Deficiency of 11β-HSD2 allows cortisol to accumulate in renal tubular cells and activate mineralocorticoid receptors, causing aldosterone-like effects despite low aldosterone","C. A cortisol-producing microadenoma too small to detect on CT is driving mineralocorticoid receptor activation","D. 21-hydroxylase deficiency causing excess deoxycorticosterone is responsible","E. Bilateral micronodular hyperplasia — aldosterone is falsely suppressed by cortisol cross-reactivity in the assay"],correct:1,explanation:"11β-HSD2 converts active cortisol → inactive cortisone in mineralocorticoid target tissues (distal nephron), protecting MR from cortisol (which circulates at ~100× aldosterone concentrations but with equal MR affinity). When 11β-HSD2 is deficient (autosomal recessive = apparent mineralocorticoid excess syndrome, AME), cortisol activates MR → Na+ retention, K+ wasting, H+ secretion → hypertension, hypokalemia, metabolic alkalosis. Aldosterone is suppressed by volume expansion. The markedly elevated urine cortisol:cortisone ratio (>1.5) is the diagnostic hallmark. Licorice (glycyrrhizic acid) inhibits 11β-HSD2 pharmacologically, causing the same syndrome.",wrongExplanations:{0:"GnRH-secreting adrenal tumors are not recognized entities, and sex hormone precursors do not activate mineralocorticoid receptors.",2:"Total and urine free cortisol are both normal — ruling out cortisol overproduction. The elevated cortisol:cortisone ratio reflects impaired inactivation of normal cortisol, not overproduction.",3:"21-hydroxylase deficiency causes cortisol and aldosterone deficiency with androgen excess. Deoxycorticosterone (DOC) excess is seen in 11β-hydroxylase deficiency, not 21-hydroxylase deficiency.",4:"In primary aldosteronism, aldosterone would be HIGH, not suppressed. Suppressed renin + suppressed aldosterone + hypertension + hypokalemia = non-aldosterone mineralocorticoid excess (here cortisol acting through MR)."},eli5:"Cortisol can bind the mineralocorticoid receptor just as well as aldosterone. The only thing that normally protects the kidney is the enzyme 11β-HSD2, which inactivates cortisol to cortisone in renal cells before it touches the MR. If that enzyme is broken, cortisol pours into the kidney acting like aldosterone — hypertension, hypokalemia, suppressed renin, suppressed aldosterone. The elevated urine cortisol:cortisone ratio is the diagnostic giveaway."},
{stem:"A 17-year-old is brought to the ED unresponsive. He was well 12 hours prior. He is febrile (40.2°C), hypotensive (BP 64/30), and tachycardic (HR 138). He has a diffuse non-blanching purpuric rash. CSF Gram stain: gram-negative diplococci. Despite aggressive fluids and IV ceftriaxone, BP remains 62/28. Random cortisol 3.1 μg/dL. Potassium 6.4 mEq/L. Bilateral adrenal hemorrhage (Waterhouse-Friderichsen) is confirmed. Why is shock in adrenal crisis disproportionately refractory to vasopressors?",choices:["A. Adrenal medulla destruction eliminates epinephrine, removing direct cardiac contractility support","B. Cortisol is required to upregulate vascular alpha-adrenergic and angiotensin II receptor sensitivity; without it, vasopressors cannot achieve adequate vasoconstriction, and simultaneous aldosterone loss compounds volume depletion","C. Hemorrhagic chromaffin cell lysis releases catecholamines causing vasoplegia from receptor desensitization","D. Adrenal sinusoids drain into the IVC, causing retrograde right heart failure","E. Released arachidonic acid metabolites competitively block vasopressor receptors"],correct:1,explanation:"Cortisol maintains vascular tone by: (1) upregulating alpha-1 adrenergic receptor expression and post-receptor signaling on vascular smooth muscle, (2) increasing angiotensin II receptor density and sensitivity, and (3) inhibiting vasodilatory prostaglandins and nitric oxide. Without cortisol, vasopressors (norepinephrine, phenylephrine) cannot achieve adequate vasoconstriction — 'vasopressor-refractory shock.' Simultaneous aldosterone deficiency causes rapid Na+ and water losses → volume depletion. IV hydrocortisone 100mg is the critical intervention that restores vasopressor sensitivity.",wrongExplanations:{0:"While adrenal medullary epinephrine contributes to the stress response, the primary mechanism of vasopressor-refractory shock is glucocorticoid deficiency impairing vascular catecholamine sensitivity — not simply loss of epinephrine output. Sympathetic nerves can compensate with norepinephrine.",2:"Hemorrhagic chromaffin cell lysis does release some stored catecholamines acutely, but this is not the dominant mechanism. The transient release does not cause sustained receptor desensitization sufficient to explain vasopressor-refractory shock.",3:"Adrenal hemorrhage volumes are not sufficient to cause mechanical right heart failure. The shock mechanism is hormonal, not mechanical.",4:"There is no physiologically established mechanism whereby adrenal hemorrhage releases arachidonic acid metabolites in quantities sufficient to competitively antagonize vasopressors."},eli5:"Cortisol is the volume knob that makes blood vessels respond to squeeze signals (norepinephrine, angiotensin II). Without cortisol, the vessels go deaf to those signals — vasopressors literally can't work properly. Simultaneously, aldosterone loss means salt and water pour out of the kidneys. You lose vascular tone AND volume at the same time. IV hydrocortisone restores vasopressor sensitivity within hours."},
{stem:"A 38-year-old woman with Cushing's disease underwent bilateral adrenalectomy 3 years ago after failed transsphenoidal surgery. She is on hydrocortisone and fludrocortisone replacement. She now has worsening headaches, bitemporal hemianopia, and new skin darkening of palmar creases and buccal mucosa. MRI: a 2.4 cm pituitary mass (previously 3mm). What is this diagnosis, and which mechanism drove the aggressive pituitary growth after adrenalectomy?",choices:["A. Recurrent Cushing's disease — residual corticotroph cells regenerated cortisol-secreting capacity","B. Nelson's syndrome — removal of both adrenal glands eliminates cortisol negative feedback on the corticotroph adenoma, allowing uninhibited ACTH secretion and rapid tumor growth","C. A new GH-secreting adenoma from radiation-induced chromosomal instability","D. An unrelated craniopharyngioma compressing the optic chiasm","E. Exogenous hydrocortisone is stimulating the corticotroph adenoma via dopamine receptor cross-reactivity"],correct:1,explanation:"Nelson's syndrome: corticotroph adenoma persists after bilateral adrenalectomy (BLA). With both adrenals removed, there is zero cortisol → complete loss of glucocorticoid negative feedback → uninhibited ACTH and POMC production → ACTH rises dramatically (>1,000 pg/mL) → MSH (co-produced from POMC) causes hyperpigmentation. The freed adenoma undergoes rapid aggressive growth → optic chiasm compression (bitemporal hemianopia), cranial nerve palsies. Mild prolactin elevation reflects stalk compression. Treatment: pituitary re-irradiation, repeat surgery, or ACTH-lowering agents.",wrongExplanations:{0:"Both adrenal glands were removed — there is no cortisol production to regenerate. The patient's cortisol is within replacement range from exogenous hydrocortisone, confirming no adrenal function.",2:"The dramatically elevated ACTH, hyperpigmentation, and known prior corticotroph adenoma all point to Nelson's syndrome — not a new radiation-induced GH tumor.",3:"The massively elevated ACTH and hyperpigmentation are incompatible with craniopharyngioma. A new unrelated craniopharyngioma would not explain ACTH >2,000 pg/mL.",4:"Hydrocortisone is a glucocorticoid that should SUPPRESS corticotroph activity via GR feedback. It does not stimulate corticotroph adenomas via dopamine receptors."},eli5:"The pituitary adenoma that caused Cushing's disease was being partially restrained by cortisol from the adrenal glands. Remove both adrenals and that feedback is completely gone. The tumor now has zero brakes — ACTH skyrockets (and so does MSH, causing hyperpigmentation), and the tumor grows aggressively. This is Nelson's syndrome, occurring in ~25% of patients after bilateral adrenalectomy for Cushing's disease."},
{stem:"A 31-year-old woman has 8-month amenorrhea, bilateral milky nipple discharge, headaches, and decreased libido. Urine hCG negative. No antipsychotics, metoclopramide, or opioids. She reports progressive difficulty with peripheral vision. MRI: 1.8 cm pituitary mass with lateral extension toward the cavernous sinus. This patient's amenorrhea is most directly caused by which mechanism?",choices:["A. The macroadenoma physically compresses LH-producing gonadotrophs preventing LH secretion","B. Hyperprolactinemia directly inhibits hypothalamic GnRH pulsatility, suppressing LH and FSH and reducing gonadal estradiol — functional hypogonadotropic hypogonadism","C. High prolactin stimulates adrenal progesterone causing chronic luteal-phase arrest","D. Prolactin competes with estradiol for uterine endometrial binding sites preventing endometrial proliferation","E. Elevated prolactin downregulates LH receptors on the corpus luteum blocking progesterone synthesis"],correct:1,explanation:"Prolactin inhibits GnRH secretion at the hypothalamus (stimulates dopamine release from tuberoinfundibular neurons which suppresses GnRH pulsatility) and may also directly inhibit pituitary gonadotrophs. The net result: suppression of LH and FSH → anovulation → low estradiol → amenorrhea. Treatment: dopamine agonists (cabergoline, bromocriptine) — augmenting dopamine signaling reduces prolactin secretion and often shrinks the tumor.",wrongExplanations:{0:"While a macroadenoma can compress surrounding gonadotrophs, the primary mechanism of amenorrhea in prolactinoma is prolactin-mediated GnRH suppression. LH and FSH are functionally suppressed by the hormone, not structurally absent from compression.",2:"Prolactin does not stimulate adrenal progesterone production in any clinically meaningful way. Progesterone comes from the ovarian corpus luteum in the menstrual cycle.",3:"Prolactin does not compete with estradiol for uterine endometrial binding sites. These are entirely different receptor families with no competitive binding relationship.",4:"The cycle fails at a much earlier stage — GnRH/LH/FSH suppression prevents folliculogenesis and ovulation entirely, so a corpus luteum never forms in the first place."},eli5:"Prolactin has a secret second job — it suppresses GnRH. This makes evolutionary sense: if you're nursing a baby, you don't want to get pregnant again right away, so prolactin shuts off the reproductive axis. In a prolactinoma, massively elevated prolactin chronically suppresses GnRH pulses → no LH/FSH → no follicle development → no ovulation → no estradiol → amenorrhea. It's the body's 'nursing brake' stuck permanently on."},
{stem:"A 58-year-old man with confirmed primary hyperaldosteronism (unilateral adenoma, awaiting surgery) is started on spironolactone 100 mg/day. After 6 weeks, BP improves and potassium normalizes. He now returns complaining of painful bilateral breast enlargement and difficulty with erections. His wife confirms decreased libido. Which mechanism best explains the gynecomastia and erectile dysfunction with spironolactone?",choices:["A. Spironolactone blocks aldosterone receptors in testes reducing testosterone biosynthesis","B. Spironolactone and its active metabolite canrenone are androgen receptor antagonists and also inhibit steroidogenic enzymes (CYP17A1, 3β-HSD), reducing testosterone synthesis and blocking AR signaling at target tissues","C. Aldosterone blockade causes compensatory ACTH rise which cross-activates estrogen receptors in breast tissue","D. Spironolactone causes hyperprolactinemia by blocking tuberoinfundibular dopamine receptors","E. Volume reduction from the diuretic effect reduces adrenal blood flow impairing testosterone synthesis"],correct:1,explanation:"Spironolactone's off-target effects: (1) androgen receptor antagonism — spironolactone and active metabolite canrenone competitively block AR in target tissues (breast, genitals, hair follicles); (2) inhibition of steroidogenic enzymes (CYP17A1, 3β-HSD, side-chain cleavage) → reduced testicular testosterone synthesis; (3) elevated SHBG alters free hormone dynamics. Net: functional androgen deficiency → gynecomastia (loss of androgen-mediated breast tissue inhibition), erectile dysfunction, decreased libido. Elevated LH reflects partial loss of testosterone feedback; elevated estradiol (from aromatization) unopposed by androgens at breast AR worsens gynecomastia.",wrongExplanations:{0:"The relevant testicular targets are androgen receptors and steroidogenic enzymes — not mineralocorticoid receptors. Spironolactone's testicular effects are via AR antagonism and enzyme inhibition.",2:"ACTH is regulated by cortisol feedback via the HPA axis — independent of aldosterone. ACTH elevation is not a consequence of MR antagonism, and ACTH does not cross-activate estrogen receptors.",3:"Spironolactone does not block dopamine receptors. Dopamine receptor antagonism causing hyperprolactinemia and gynecomastia is the mechanism of antipsychotics, metoclopramide — not spironolactone.",4:"Spironolactone causes mild volume reduction, but this does not meaningfully reduce adrenal blood flow. Testosterone is synthesized in the TESTES (Leydig cells), not the adrenal glands."},eli5:"Spironolactone is a 'dirty' drug — it blocks multiple targets. It blocks mineralocorticoid receptors (good — lowers BP), but also blocks androgen receptors (testosterone can't signal in tissues) AND inhibits testosterone synthesis enzymes. Less testosterone made + testosterone can't act = functional androgen deficiency at tissues — erectile dysfunction, decreased libido. The shift toward relative estrogen dominance grows breast tissue. This is why the more selective eplerenone causes fewer sexual side effects."},
{stem:"A 45-year-old man with metastatic small cell lung cancer and ectopic ACTH syndrome has cortisol of 180 μg/dL (nl 5–25), profound hypokalemia (K 2.1), and glucose of 380 mg/dL. He is developing opportunistic infections. Surgery is not immediately possible. Ketoconazole is started for rapid cortisol lowering. Which mechanism best describes how ketoconazole rapidly lowers cortisol in this patient?",choices:["A. Ketoconazole blocks glucocorticoid receptors in peripheral tissues preventing cortisol from exerting effects without lowering levels","B. Ketoconazole inhibits multiple adrenal steroidogenic CYP enzymes (CYP11A1, CYP17A1, CYP11B1) blocking the cortisol synthesis pathway at several steps simultaneously","C. Ketoconazole stimulates 11β-HSD2 in the adrenal cortex converting active cortisol to inactive cortisone before release","D. Ketoconazole suppresses ACTH secretion from the lung cancer cells by binding ectopic GnRH receptors","E. Ketoconazole accelerates hepatic cortisol metabolism via CYP3A4 induction increasing clearance"],correct:1,explanation:"Ketoconazole (azole antifungal) blocks multiple adrenal steroidogenic CYP enzymes: CYP11A1 (cholesterol → pregnenolone — first committed step), CYP17A1 (17α-hydroxylase/17,20-lyase — needed for cortisol and androgens), and CYP11B1 (11β-hydroxylase — last step: 11-deoxycortisol → cortisol). Hitting multiple steps simultaneously causes rapid, substantial falls in cortisol (within hours to days). Used in medical management of severe hypercortisolism when surgery is unavailable. Other agents: metyrapone (CYP11B1 only), osilodrostat, levoketoconazole. Mifepristone blocks GR (receptor antagonist — cortisol level doesn't fall, only action is blocked).",wrongExplanations:{0:"This describes mifepristone (RU-486), a GR antagonist. Ketoconazole lowers cortisol levels by blocking synthesis — it does not act at the receptor level.",2:"11β-HSD2 is located in peripheral tissues (kidney, colon), not in the adrenal cortex. Ketoconazole does not stimulate 11β-HSD2 — it inhibits adrenal steroidogenic CYP enzymes.",3:"Ketoconazole has no activity at GnRH receptors and cannot suppress ACTH secretion from ectopic tumor cells. Ectopic ACTH production is autonomous and does not respond to such manipulation.",4:"Ketoconazole is actually a CYP3A4 INHIBITOR, not an inducer. It would reduce hepatic cortisol clearance slightly, not increase it. The dominant therapeutic action is on adrenal CYP enzymes."},eli5:"Ketoconazole is an antifungal drug that accidentally hits the same CYP enzymes that make cortisol. It's like throwing a wrench into multiple stages of the cortisol assembly line simultaneously — the line slows down rapidly. Since the ectopic ACTH can't be stopped easily, you attack the adrenal gland's ability to respond to ACTH instead. Block the factories, not the orders from the boss."},
{stem:"A 54-year-old woman with pemphigus vulgaris has been on prednisone 30 mg/day for 3 years. She presents with acute severe mid-thoracic back pain after picking up a grocery bag. MRI confirms T8 compression fracture. DEXA 6 months ago: T-score −2.1 at the lumbar spine. She takes calcium 500 mg BID and vitamin D 1,000 IU daily but no bone-protective therapy. Which mechanism is the MOST important driver of glucocorticoid-induced bone loss?",choices:["A. Glucocorticoids increase osteoclast activity by directly upregulating RANKL in osteoclast precursors","B. Glucocorticoids directly suppress osteoblast differentiation and function via GRα — reducing bone formation; also increase osteoblast/osteocyte apoptosis; and reduce intestinal calcium absorption while increasing renal calcium wasting","C. Glucocorticoids suppress hepatic IGF-1 production reducing osteoblast stimulation","D. Chronic inflammation from pemphigus itself accelerates bone loss independent of steroids","E. Prednisone competes with calcium for intestinal absorption reducing available calcium for mineralization"],correct:1,explanation:"Glucocorticoid-induced osteoporosis (GIOP) mechanisms via GRα activation: (1) Direct suppression of osteoblast differentiation (inhibits Wnt/Runx2 signaling), reduced osteoblast function, and increased osteoblast/osteocyte apoptosis → dramatically reduced bone formation (reflected by reduced bone formation markers); (2) Reduced intestinal calcium absorption (inhibits TRPV6 channels, vitamin D signaling) → hypocalciuria initially, then secondary hyperparathyroidism; (3) Increased renal calcium wasting (direct tubular effect) → PTH elevation → increased osteoclastic bone resorption. The early phase of GIOP is dominated by bone formation collapse. Treatment: bisphosphonate (alendronate, risedronate) or denosumab.",wrongExplanations:{0:"While glucocorticoids can increase osteoclast lifespan (via RANKL/OPG modulation), the DOMINANT and most important mechanism of GIOP is suppression of osteoblast function and increased osteoblast apoptosis — bone formation collapse. Bone formation markers are low (not just resorption markers).",2:"IGF-1 suppression by glucocorticoids is a secondary mechanism contributing to osteoblast inhibition, but it is not the most important primary driver. The dominant effect is direct GRα-mediated osteoblast suppression.",3:"Pemphigus vulgaris itself does not cause significant bone loss. Glucocorticoid therapy is the dominant driver of GIOP in this patient — not the underlying autoimmune disease.",4:"Prednisone does not compete with calcium for intestinal absorption. These are absorbed by completely different mechanisms. Glucocorticoids inhibit active calcium transport (TRPV6 channels) in the duodenum — a receptor/channel-mediated effect, not competition."},eli5:"Steroids attack bone from two sides: (1) they kill the bone-BUILDING cells (osteoblasts and osteocytes) by suppressing their function and increasing their apoptosis — so less bone gets made; AND (2) they simultaneously mess with calcium — reducing intestinal absorption and increasing urinary losses — which stimulates PTH to pull calcium from bone. The bone-making side collapses while calcium gets pulled out. Classic glucocorticoid osteoporosis."},
{stem:"A 52-year-old man with hypogonadism (testosterone 148 ng/dL, confirmed on two AM measurements) is started on testosterone cypionate injections 200 mg every 2 weeks. After 6 months he feels significantly better with improved energy and libido. Routine labs now show hematocrit of 58% (nl <52% in males). Which mechanism best explains the polycythemia in this patient on testosterone therapy?",choices:["A. Testosterone stimulates platelet-derived growth factor (PDGF) in bone marrow causing erythroid hyperplasia independent of EPO","B. Testosterone stimulates renal EPO production and also directly stimulates erythroid progenitor cells via androgen receptors in bone marrow, increasing red cell mass; EPO may be inappropriately low for the degree of erythrocytosis","C. Exogenous testosterone causes adrenal DHEA suppression which normally inhibits erythropoiesis — less DHEA means more red cell production","D. Testosterone increases hepatic hepcidin synthesis, reducing iron sequestration and increasing iron availability for erythropoiesis","E. Polycythemia reflects improved tissue oxygenation from testosterone-enhanced cardiac output reducing hypoxic EPO drive"],correct:1,explanation:"Testosterone stimulates erythropoiesis via two pathways: (1) direct androgen receptor (AR)-mediated stimulation of erythroid progenitor cells in bone marrow — AR is expressed on erythroid precursors, and testosterone directly promotes erythroid differentiation; (2) increased renal EPO production — testosterone upregulates EPO gene expression in renal peritubular cells. In this patient, EPO is appropriately low-normal (suppressed by the elevated hematocrit), indicating erythropoiesis is driven predominantly by the direct AR-mediated bone marrow effect at this stage. Polycythemia is a well-recognized and potentially serious complication of testosterone therapy — it increases risk of venous thromboembolism and stroke. Management: reduce testosterone dose, increase injection frequency, or therapeutic phlebotomy.",wrongExplanations:{0:"PDGF is involved in platelet and mesenchymal cell biology, not the primary driver of testosterone-induced erythropoiesis. Testosterone-induced erythrocytosis is AR-mediated and EPO-mediated, not PDGF-mediated.",2:"DHEA does not inhibit erythropoiesis in a clinically meaningful way. Testosterone suppresses gonadotropins (LH/FSH) and can indirectly suppress adrenal DHEA (via ACTH effects are minimal), but DHEA loss is not the mechanism of polycythemia.",3:"Testosterone actually REDUCES hepcidin (by suppressing its expression), increasing iron availability — this is part of the pro-erythropoietic effect. But the primary mechanism is AR-mediated bone marrow stimulation and EPO upregulation, not the hepcidin pathway alone.",4:"Improved cardiac output does not cause polycythemia — it would reduce hypoxia and thus reduce EPO, if anything. EPO is already suppressed here. The polycythemia is from direct testosterone-driven erythropoiesis, not an oxygenation mechanism."},eli5:"Testosterone is a potent stimulator of red blood cell production — this is partly why male hematocrit is normally higher than female hematocrit. It stimulates the kidneys to make more EPO, AND directly stimulates bone marrow progenitor cells to make more RBCs via androgen receptors. With supraphysiologic or even high-normal testosterone from injections, the bone marrow can overshoot — making so many RBCs that blood gets dangerously thick."},
{stem:"A 33-year-old woman with primary adrenal insufficiency (Addison's disease, autoimmune) is on hydrocortisone 15 mg AM / 5 mg PM and fludrocortisone 0.1 mg daily. She presents with headache, ankle swelling, and a BP of 158/96 mmHg. Previously well-controlled. She has been under significant work stress. She increased her hydrocortisone dose herself to 30 mg AM / 15 mg PM for the past 3 weeks 'for the stress.' What is the most likely cause of hypertension and hypokalemia in this patient, and what should be done?",choices:["A. Fludrocortisone dose is too high and needs to be reduced given the hypertension and hypokalemia","B. The self-increased hydrocortisone dose has added significant glucocorticoid-mediated mineralocorticoid activity (hydrocortisone has intrinsic mineralocorticoid activity); return to normal dose — the high hydrocortisone plus fludrocortisone is causing excess mineralocorticoid effect","C. Her Addison's disease is progressing to primary hyperaldosteronism requiring adrenal imaging","D. Stress-induced catecholamine excess is causing hypertension and hypokalemia independently","E. The elevated sodium reflects hyperaldosteronism from fludrocortisone overdose requiring complete discontinuation"],correct:1,explanation:"Hydrocortisone (cortisol) has intrinsic mineralocorticoid activity — approximately 1:30 potency vs aldosterone on a per-mg basis, but at high doses this is clinically significant. At 45 mg/day hydrocortisone, the mineralocorticoid contribution is substantial. Combined with fludrocortisone 0.1 mg/day, total mineralocorticoid activity is excessive → Na+ retention → hypertension, edema; K+ wasting → hypokalemia; renin suppression. Treatment: return to physiologic hydrocortisone dose (15/5 mg). At physiologic doses, hydrocortisone's mineralocorticoid contribution is small and appropriately supplemented by fludrocortisone. Key teaching: hydrocortisone has both GC and MC activity — dose matters.",wrongExplanations:{0:"Fludrocortisone dose (0.1 mg/day) has not changed. The new mineralocorticoid load comes from the tripled hydrocortisone dose. Reducing fludrocortisone would address part of the problem but misses the primary cause.",2:"Addison's disease does not progress to primary hyperaldosteronism — these are opposite diagnoses (Addison's = adrenal destruction, PA = autonomous aldosterone overproduction). The clinical timeline (3 weeks of self-increased steroids) makes iatrogenic excess the clear diagnosis.",3:"Stress-induced catecholamine excess causes tachycardia, sweating, and transient hypertension — not persistent hypokalemia and suppressed renin. Catecholamines can cause mild hypokalemia via beta-2 mediated K+ shift into cells, but this is not the dominant mechanism here.",4:"Sodium of 144 mEq/L is normal (not hypernatremia). Fludrocortisone dose is unchanged. The problem is the excess hydrocortisone mineralocorticoid effect. Stopping fludrocortisone completely would risk undertreating her mineralocorticoid deficiency once hydrocortisone is returned to normal."},eli5:"Hydrocortisone (cortisol) naturally has mineralocorticoid activity — about 1/10th the potency of aldosterone per milligram, but at high doses this adds up fast. At 45 mg/day of hydrocortisone, the mineralocorticoid effect is substantial. Combined with her fludrocortisone, she's now getting way too much mineralocorticoid activity — sodium retention, potassium wasting, hypertension. The fix is to return to her normal hydrocortisone dose — not to reduce fludrocortisone first."},
{stem:"A researcher designs a trial to test whether Drug X reduces 30-day mortality compared to standard of care (SOC) in septic shock. Patients are randomized 1:1. Primary endpoint: 30-day all-cause mortality. The trial uses a two-tailed alpha of 0.05 and 80% power. Results: Drug X mortality 22%, SOC mortality 28%. Risk difference: −6% (Drug X better). 95% CI: (−11%, −1%). Which of the following correctly interprets the trial result and identifies the appropriate next step?",choices:["A. Non-inferiority is established because the CI does not cross the non-inferiority margin","B. Superiority is established — the 95% CI is entirely below 0 (entirely favorable), p<0.05; Drug X reduces 30-day mortality vs SOC; regulatory submission is appropriate","C. The trial is inconclusive because a 6% absolute risk reduction is below the minimum clinically important difference of 10%","D. Equivalence is established because the CI (−11%, −1%) is narrow and close to zero","E. The result is invalid — a two-tailed test should not be used for mortality endpoints where only benefit matters"],correct:1,explanation:"Superiority trial: to establish superiority, the entire 95% CI for the treatment difference must lie on the side of benefit — here, entirely below 0 (meaning Drug X mortality is consistently lower than SOC by 1% to 11%). The CI (−11%, −1%) does not include 0 → statistically significant → superiority established. P=0.03 confirms this. The 6% absolute risk reduction is also clinically meaningful in septic shock. The trial met its primary endpoint; regulatory submission is the appropriate next step. Both ITT analysis (primary for superiority trials) and per-protocol analysis should be reported.",wrongExplanations:{0:"Non-inferiority trials require a pre-specified non-inferiority margin and a one-sided hypothesis. This was designed as a superiority trial vs SOC. The correct interpretation is superiority, not non-inferiority.",2:"The trial is NOT inconclusive — it achieved its pre-specified primary endpoint (superiority in 30-day mortality, p<0.05, CI excludes 0). A 6% absolute risk reduction in septic shock mortality represents a number needed to treat of ~17 — highly clinically significant. The MCID threshold cited is fictional.",3:"Equivalence would require the CI to fall within pre-specified ±Δ boundaries. A CI of (−11%, −1%) shows a consistent mortality benefit — not equivalence. The drugs are not 'similar enough'; Drug X is clearly better.",4:"Two-tailed tests are appropriate for superiority trials even for mortality — they acknowledge the drug could theoretically be harmful (increase mortality) as well as helpful. A one-tailed test would be less conservative and is generally not preferred by regulatory agencies. Two-tailed is the correct choice."},eli5:"For superiority: we need the entire CI to be on the 'better' side of zero. Risk difference is defined as Drug X minus SOC. A negative number means Drug X had LOWER mortality — that's better. The CI goes from −11% to −1%: entirely below zero. The whole CI is in the favorable zone. P<0.05. Superiority is proven. The drug reduces deaths."},
{stem:"A trial compares a new once-monthly biologic (Drug M) to daily oral prednisone for prevention of disease flares in eosinophilic granulomatosis with polyangiitis (EGPA). The primary endpoint is proportion of patients in remission at 12 months. Non-inferiority margin Δ = 15% (absolute). Results: Drug M remission rate 71%, Prednisone remission rate 74%. Risk difference: −3% (Drug M slightly lower). 95% CI: (−14%, +8%). Which of the following correctly interprets the non-inferiority result?",choices:["A. Non-inferiority is not established — the point estimate shows Drug M is 3% worse than prednisone","B. Non-inferiority is not established — the lower CI bound (−14%) is above −Δ (−15%) but only barely, and the CI also crosses 0, so the result is uncertain","C. Non-inferiority IS established — the entire 95% CI (−14% to +8%) lies above −Δ (−15%); Drug M is not unacceptably worse than prednisone","D. Superiority of prednisone is established because the point estimate favors prednisone","E. The trial is invalid because the non-inferiority margin of 15% is too generous for a serious condition"],correct:2,explanation:"Non-inferiority criterion: the lower bound of the 95% CI must be above −Δ (−15%). Lower bound = −14% > −15% → non-inferiority IS established. Drug M is not unacceptably worse than prednisone (the worst-case scenario, −14%, is within the acceptable 15% margin). The CI also extends above 0 (+8%), meaning Drug M could potentially be superior — but superiority requires the CI to be entirely above 0, which it is not (lower bound −14%). Final interpretation: NI proven, superiority not proven. Since Drug M is once-monthly vs daily oral prednisone (with significant steroid side effects), NI may support preference for Drug M based on convenience and steroid-sparing benefits.",wrongExplanations:{0:"The point estimate alone never determines NI. NI is determined by the lower CI bound vs −Δ. A −3% point estimate is irrelevant if the CI lower bound stays above −Δ. The CI lower bound (−14%) > −Δ (−15%) → NI established.",1:"The CI crossing 0 is relevant for SUPERIORITY, not non-inferiority. For NI, only the lower CI bound matters (compared to −Δ). The result is NOT uncertain — NI is clearly established since −14% > −15%.",3:"Superiority of prednisone would require the CI to be entirely below −Δ (entirely unfavorable for Drug M). The CI extends up to +8% — Drug M could be better. Prednisone superiority is not established.",4:"The trial design and margin are pre-specified clinical choices. A 15% margin for EGPA remission may be appropriate given the benefit-risk tradeoff of avoiding long-term daily prednisone. The trial cannot be retroactively declared invalid based on margin size — this must be challenged in the pre-trial protocol phase."},eli5:"For non-inferiority: draw a line at −Δ (−15%). Ask: does the worst-case scenario (lower CI bound) stay above that line? Lower CI bound is −14%. Is −14% above −15%? Yes — barely, but yes. So non-inferiority IS established. The Drug M might be up to 14% worse (in the worst case), but that's within the pre-specified 'acceptable' 15% margin. The CI crossing 0 doesn't matter for NI — only the lower bound vs −Δ matters."},
{stem:"A 48-year-old man with chronic low back pain has been on long-term high-dose opioid therapy (oxycodone ER 80 mg BID) for 4 years. He presents with fatigue, 12 kg weight loss, decreased libido, and mild orthostatic hypotension. His pain management physician notices he looks unwell. He has no hyperpigmentation. Cortisol stimulation test (250 μg cosyntropin): peak cortisol 12 μg/dL (nl >18 μg/dL). Which of the following best explains the abnormal cosyntropin stimulation test and the pattern of HPA suppression in this patient?",choices:["A. Long-term opioids directly destroy adrenal cortical cells causing primary adrenal insufficiency","B. Opioids mimic endogenous β-endorphins and suppress hypothalamic CRH secretion — chronic suppression leads to adrenal cortex atrophy from ACTH deficiency, causing a blunted cosyntropin response despite adequate exogenous ACTH","C. The cosyntropin test result reflects poor adrenal circulation from opioid-induced hypotension","D. Opioids directly inhibit ACTH release from the anterior pituitary by binding pituitary mu-opioid receptors","E. High-dose opioids upregulate peripheral cortisol catabolism via CYP3A4 induction mimicking adrenal insufficiency"],correct:1,explanation:"Opioid-induced adrenal insufficiency (OIAI): mu-opioid receptors are expressed on hypothalamic neurons; opioid binding mimics β-endorphin → suppresses CRH pulsatility → chronically low ACTH → adrenal cortex undergoes atrophy from disuse. The blunted cosyntropin response (peak cortisol 12 vs >18 μg/dL) reflects adrenal cortex atrophy — the adrenal cannot mount adequate cortisol production even when maximally stimulated with exogenous ACTH. ACTH is low (secondary/tertiary pattern), no hyperpigmentation (confirms central, not primary). Concurrent suppression of LH/FSH → testosterone deficiency (opioid-induced hypogonadism = OPIAD). Management: reduce/taper opioid dose if possible; hydrocortisone replacement if necessary.",wrongExplanations:{0:"Opioids do not directly destroy adrenal cortical cells. Primary adrenal insufficiency would show HIGH ACTH and hyperpigmentation — both absent here. ACTH is low, confirming central (secondary/tertiary) suppression.",2:"Opioid-induced hypotension does not directly impair adrenal cortical function via circulatory mechanism. The blunted cosyntropin response reflects adrenal atrophy from chronic ACTH deficiency, not poor perfusion.",3:"Opioids primarily suppress the HPA axis at the HYPOTHALAMIC level (CRH neurons) via mu-opioid receptors, not primarily at the anterior pituitary. The cascade is: opioid → suppress CRH → low ACTH → adrenal atrophy. Direct pituitary mu-opioid effects are a minor secondary component.",4:"Opioids do not significantly induce CYP3A4. CYP3A4 induction (e.g., rifampin) would increase cortisol clearance — lowering levels — but would not cause adrenal atrophy or a blunted cosyntropin response (the adrenal itself would remain intact and capable of responding to ACTH)."},eli5:"Opioids act like your body's own β-endorphins, which are one of the key brakes on GnRH AND CRH. Chronic high-dose opioids chronically suppress CRH → ACTH → adrenal cortex gets no stimulation → adrenal cortex atrophies. It's the same thing that happens with long-term steroid use, but the suppression signal here is opioid-mediated. The cosyntropin test shows the adrenal cortex has atrophied — it can't ramp up even when given synthetic ACTH directly."},
{stem:"A 44-year-old woman presents to her gynecologist with decreased libido, fatigue, and loss of pubic and axillary hair over 2 years. She has regular menstrual cycles and normal pelvic exam. She does not take any medications. She is noted to have smooth, dry skin and decreased axillary hair. Ovarian function is confirmed normal on labs. Which of the following best explains this patient's isolated DHEA-S deficiency with normal cortisol and normal ACTH?",choices:["A. Primary adrenal insufficiency selectively affecting the zona reticularis before involving the zona fasciculata","B. Adrenarche reversal — the zona reticularis involutes with aging independent of ACTH, causing selective decline in adrenal androgens without affecting cortisol production","C. Selective ovarian androgen deficiency from early premature ovarian aging depleting DHEA","D. Low ACTH from a developing pituitary microadenoma is selectively reducing adrenal androgen production","E. Elevated SHBG from the patient's age is binding and inactivating DHEA-S"],correct:1,explanation:"Adrenopause: the zona reticularis involutes progressively with aging, causing declining DHEA and DHEA-S production independent of ACTH levels or cortisol production. ACTH is normal; cortisol (zona fasciculata) is normal; only zona reticularis-derived androgens (DHEA, DHEA-S, androstenedione) decline. This is a physiological process beginning in the late 20s–30s and accelerating thereafter. Symptoms in women: decreased libido, loss of pubic/axillary hair (androgen-dependent), fatigue, dry skin. Primary adrenal insufficiency would show low cortisol + high ACTH — absent here. Some women benefit from low-dose DHEA replacement, though evidence is mixed.",wrongExplanations:{0:"Primary adrenal insufficiency would show low cortisol AND high ACTH. Both are normal in this patient. The zona reticularis is the most vulnerable to primary adrenal destruction (it is the innermost and last to be involved), not the first. Also, isolated zona reticularis failure without fasciculata involvement is not characteristic of autoimmune Addison's.",2:"DHEA-S is produced by the ADRENAL zona reticularis (not the ovaries). Ovarian androgen production (testosterone, androstenedione from theca cells) is regulated by LH — confirmed normal here. Ovarian aging would affect estradiol/LH/FSH — also normal.",3:"ACTH is normal — ruling out a pituitary microadenoma causing ACTH deficiency. Also, ACTH deficiency would impair cortisol production as well (zona fasciculata is also ACTH-dependent), which is not the case here.",4:"SHBG binds testosterone and estradiol — not DHEA-S. DHEA-S is a sulfate ester and circulates at high concentrations largely unbound. SHBG changes do not explain low DHEA-S levels."},eli5:"After adrenarche (the adrenal 'puberty' around age 6–8 that starts adrenal androgen production), the zona reticularis gradually declines with age — this is called 'adrenopause.' DHEA and DHEA-S peak in early adulthood and decline by about 2% per year thereafter. Cortisol is unaffected because it comes from the zona fasciculata, which is regulated by ACTH and doesn't involute the same way. This is a normal aging phenomenon, not a disease in most cases — but some women feel it significantly."},
{stem:"A 67-year-old man is admitted to the ICU for septic shock from pneumonia. He is intubated and on norepinephrine. On day 3, routine labs show low TSH (0.2 mIU/L), low total T4 (2.8 μg/dL), low total T3 (48 ng/dL), and elevated reverse T3 (68 ng/dL, nl <24). Free T4 by equilibrium dialysis is 0.9 ng/dL (normal). His team debates whether to start levothyroxine. What is the most likely diagnosis, and what is the mechanism of the elevated reverse T3?",choices:["A. Central hypothyroidism from critical illness-related pituitary dysfunction — levothyroxine replacement is indicated","B. Non-thyroidal illness syndrome (sick euthyroid) — peripheral conversion of T4 to active T3 is impaired and shifts to inactive reverse T3 production; levothyroxine is NOT indicated and may worsen outcomes","C. Subclinical hyperthyroidism from stress-induced thyroid autonomy — the suppressed TSH indicates excess thyroid hormone","D. Primary hypothyroidism masked by illness — total T4 and T3 are low confirming deficiency despite normal free T4","E. Cortisol excess from stress response is directly inactivating T3 by upregulating deiodinase type 3 at thyroid receptors"],correct:1,explanation:"Non-thyroidal illness syndrome (NTIS/sick euthyroid): in critical illness, pro-inflammatory cytokines (IL-1, IL-6, TNF-α) and elevated cortisol suppress: (1) TSH secretion from the pituitary; (2) deiodinase type 1 (D1) activity, which normally converts T4 → active T3; (3) upregulate deiodinase type 3 (D3), which converts T4 → reverse T3 (inactive) and T3 → 3,3'-T2 (inactive). Result: low TSH, low total T4, very low T3, very high rT3, but FREE T4 by equilibrium dialysis is normal (total T4 is low because TBG is reduced in critical illness). Treatment: treat the underlying illness. Levothyroxine is NOT indicated — multiple trials show no benefit and potential harm.",wrongExplanations:{0:"Central hypothyroidism would show persistently low free T4 and low TSH with an underlying pituitary lesion. Here free T4 is normal by accurate equilibrium dialysis measurement. The pattern (very low T3, very high rT3, normal free T4) is classic NTIS, not pituitary hypothyroidism.",2:"Subclinical hyperthyroidism shows suppressed TSH with normal T4/T3 — not low total T3 and elevated rT3. The thyroid is not autonomously overproducing hormone; TSH suppression here is cytokine/cortisol-mediated at the pituitary.",3:"Free T4 is normal by equilibrium dialysis — the gold standard. Low total T4 in critical illness reflects reduced thyroid-binding globulin (TBG, a negative acute phase reactant), not true T4 deficiency. Total T4 is misleading in this context; free T4 is the correct measurement.",4:"Cortisol (and cytokines) do suppress D1 and upregulate D3, which shifts T4 metabolism toward rT3 — this is part of the mechanism. However, cortisol does not 'inactivate T3 at thyroid receptors.' The mechanism is enzymatic (deiodinase activity alteration), not receptor-level inactivation."},eli5:"In critical illness, the body makes a strategic decision: stop wasting energy on active metabolism. It shunts T4 away from converting to active T3 (which speeds up metabolism) and instead converts it to reverse T3 (an inactive mirror image). This dramatically lowers T3 and raises reverse T3 — the body's 'hibernate mode.' TSH also drops because cytokines suppress the pituitary. Giving thyroid hormone to these patients actually makes things worse — the body is doing this on purpose."},
{stem:"A rheumatologist is selecting a corticosteroid for a patient with rheumatoid arthritis who needs the anti-inflammatory benefits of steroids but has poorly controlled diabetes, osteoporosis, and prior avascular necrosis of the hip. The rheumatologist explains there is research on 'dissociated steroids' designed to exploit the difference between two GR-mediated mechanisms. Which of the following best describes the theoretical basis for 'dissociated steroids' and why they may benefit this patient?",choices:["A. Dissociated steroids selectively bind GRβ instead of GRα, exploiting GRβ's anti-inflammatory transrepression activity while avoiding GRα metabolic side effects","B. Dissociated steroids selectively promote GR transrepression (direct protein-protein inhibition of NF-κB and AP-1 — anti-inflammatory) while minimizing GR transactivation of metabolic genes (gluconeogenesis, RANKL, myostatin) that drive diabetes, osteoporosis, and muscle wasting","C. Dissociated steroids bypass nuclear GR binding entirely and act only through membrane-bound GR for rapid non-genomic anti-inflammatory effects","D. Dissociated steroids selectively inhibit GRα in adipose tissue while preserving GRα function in immune cells","E. Dissociated steroids are metabolized exclusively by CYP3A4 in liver, preventing systemic metabolic effects while maintaining local joint anti-inflammation"],correct:1,explanation:"Classical GR signaling has two distinct mechanisms: (1) Transactivation — GR binds GREs in gene promoters and directly upregulates target genes. This drives anti-inflammatory genes (annexin-1, IκBα) BUT ALSO metabolic side effects (PEPCK, G6Pase → hyperglycemia; RANKL → osteoclast activation → bone loss; myostatin → muscle wasting; lipolysis genes → lipodystrophy); (2) Transrepression — GR physically interacts with NF-κB and AP-1 transcription factors and directly suppresses inflammatory gene transcription (COX-2, TNF-α, IL-1, IL-6) without binding GREs. Dissociated steroids aim to maintain transrepression (anti-inflammation) while minimizing transactivation (metabolic side effects). Several candidates are in development (e.g., selective GR modulators/SEGRMs). This patient's comorbidities (diabetes, osteoporosis, AVN) are exactly the metabolic side effects of transactivation.",wrongExplanations:{0:"GRβ is a dominant-negative inhibitor of GRα — it does not have its own anti-inflammatory transrepression activity. Binding GRβ preferentially would actually reduce steroid efficacy (as GRβ opposes GRα). Dissociated steroids are designed to selectively exploit GRα transrepression, not GRβ.",2:"Membrane-bound GR (non-genomic rapid signaling) is a real pathway but is not the basis of 'dissociated steroid' development. The research focus is on separating the two genomic GRα pathways (transrepression vs transactivation), not bypassing nuclear GR.",3:"Dissociated steroids are not designed to selectively inhibit GRα in adipose tissue. They are designed to shift the transcriptional MECHANISM (transrepression vs transactivation) within all GR-expressing cells, not to achieve tissue selectivity.",4:"CYP3A4 metabolism occurs in liver and affects systemic exposure — this is a pharmacokinetic concept. Dissociated steroids work via a pharmacodynamic (receptor signaling mechanism) concept, not selective hepatic metabolism."},eli5:"Normal steroids do two things via the GR: (1) Transrepression — the GR physically blocks the inflammation switches (NF-κB, AP-1) — this is the GOOD anti-inflammatory effect; (2) Transactivation — the GR turns on genes like PEPCK (makes blood sugar go up), RANKL (eats bone), myostatin (wastes muscle) — these are the BAD metabolic side effects. If you could design a steroid that only does transrepression and not transactivation, you'd get all the anti-inflammation without diabetes, osteoporosis, and muscle wasting. That's the goal of dissociated steroids."},
{stem:"A 28-year-old woman (gravida 1, para 0) at 7 weeks gestation presents after genetic counseling. Both she and her husband are confirmed carriers of the 21-hydroxylase deficiency gene (CYP21A2 mutations). They are concerned about virilization of a female fetus. The maternal-fetal medicine specialist discusses prenatal dexamethasone treatment. Chorionic villus sampling (CVS) will be performed at 10 weeks. Dexamethasone is started empirically at 7 weeks (before CVS results). If CVS at 10 weeks shows the fetus is an unaffected male (46,XY, no CYP21A2 mutation), what should be done and why?",choices:["A. Continue dexamethasone through delivery — virilization of male genitalia may still occur in unaffected males","B. Immediately discontinue dexamethasone — there is no risk of virilization in an unaffected male fetus and continued maternal dexamethasone exposure carries fetal risks with no benefit","C. Reduce dexamethasone to half-dose and continue until birth to ensure adrenal maturity","D. Switch from dexamethasone to prednisone — prednisone crosses the placenta less and provides gentler fetal suppression","E. Continue dexamethasone only for the third trimester to prevent neonatal adrenal suppression"],correct:1,explanation:"Prenatal dexamethasone therapy for CAH aims to suppress fetal adrenal androgen production in an affected 46,XX fetus — preventing virilization of female external genitalia. The only beneficiary is an AFFECTED FEMALE (46,XX + CYP21A2 mutation). Only 1 in 8 fetuses fits this criterion (25% affected × 50% female = 12.5%). For an unaffected 46,XY male: (1) no risk of androgen-induced virilization exists — male external genitalia develop normally from testosterone, not from disordered adrenal function; (2) no CAH to treat. Dexamethasone crosses the placenta (specifically chosen for this — unlike prednisone/hydrocortisone, which are inactivated by placental 11β-HSD2). Continued exposure carries risks: fetal HPA suppression, intrauterine growth restriction, potential neurodevelopmental effects. Stop immediately upon confirming unaffected male status.",wrongExplanations:{0:"Virilization of male genitalia is caused by fetal testicular testosterone — not adrenal androgens. There is no risk of abnormal virilization in a normal 46,XY male from adrenal androgen excess (and this fetus has no CAH anyway). Continuing dexamethasone serves no purpose and exposes the fetus to unnecessary risk.",2:"There is no benefit of 'adrenal maturity' from dexamethasone in an unaffected male. Lung maturity from corticosteroids is a consideration in prematurity (betamethasone 34–36 weeks) — not in a term-planned pregnancy. Reducing dose instead of stopping still exposes the fetus to unnecessary drug.",3:"Prednisone is inactivated by placental 11β-HSD2 and does NOT effectively cross to the fetus — which is exactly WHY dexamethasone (not prednisone) is specifically chosen for prenatal CAH treatment. But again, for an unaffected male, no treatment is indicated at all.",4:"There is no indication for any glucocorticoid in the third trimester for this scenario. Third-trimester dexamethasone would cause fetal HPA suppression in an otherwise healthy unaffected male fetus — no benefit, real harm."},eli5:"Prenatal dexamethasone is only ever indicated to prevent virilization of an AFFECTED FEMALE fetus (46,XX with CAH). An unaffected male: (1) can't be virilized anyway — he's already male; (2) doesn't have CAH, so there's no excess androgen to suppress. There's zero benefit and real fetal risks (dexamethasone crosses the placenta and can affect fetal HPA axis, growth, and neurodevelopment). Stop it immediately."}]

    quizzes:[{name:"Cardiopulmonary Basics",questions:[{stem:"A 45-year-old male presents with chest pain that worsens with inspiration. Which of the following is the most likely diagnosis?",choices:["A. Myocardial infarction","B. Pleuritis","C. Gastroesophageal reflux disease","D. Costochondritis","E. Pulmonary embolism"],correct:1,explanation:"Pleuritic chest pain \u2014 worsens with breathing \u2014 is the hallmark of pleuritis.",wrongExplanations:{0:"MI pain is pressure/squeezing, NOT affected by respiration.",2:"GERD causes burning related to meals and position.",3:"Costochondritis is reproducible with chest wall palpation.",4:"PE can cause pleuritic pain but would present with dyspnea and tachycardia."},eli5:"Your lungs are wrapped in a slippery bag. When inflamed, every breath makes surfaces rub \u2014 like a sunburn!"}]},{name:"Head & Neck Anatomy",questions:[{stem:"How many total bones make up the human skull?",choices:["A. 20","B. 22","C. 24","D. 28"],correct:1,explanation:"The skull consists of 22 bones: 8 in the neurocranium and 14 in the viscerocranium.",wrongExplanations:{},eli5:""},

document.addEventListener('mouseup',function(){
  if(!toolMode)return;
  var sel=window.getSelection();
  if(!sel.rangeCount||sel.isCollapsed)return;
  var qbd=document.querySelector('.qbd');
  if(!qbd)return;
  var r=sel.getRangeAt(0);
  if(!qbd.contains(r.commonAncestorContainer))return;
  var tag=toolMode==='hl'?'MARK':'S';
  /* Check if selection is entirely inside an existing tag of same type — toggle off */
  var parent=r.commonAncestorContainer;
  if(parent.nodeType===3)parent=parent.parentNode;
  if(parent&&parent.tagName===tag){
    /* Unwrap: replace the tag with its text */
    var txt=document.createTextNode(parent.textContent);
    parent.parentNode.replaceChild(txt,parent);
    sel.removeAllRanges();return;
  }
  /* Also check if any child of range is already tagged — remove those first */
  var existing=r.cloneContents().querySelectorAll(tag.toLowerCase()+','+tag);
  if(existing.length>0){
    /* Unwrap existing tags in selection first */
    var container=r.commonAncestorContainer.nodeType===3?r.commonAncestorContainer.parentNode:r.commonAncestorContainer;
    container.querySelectorAll(tag.toLowerCase()+','+tag).forEach(function(el){
      if(sel.containsNode(el,true)){
        el.replaceWith(document.createTextNode(el.textContent));
      }
    });
    sel.removeAllRanges();return;
  }
  try{var wrap=document.createElement(tag);r.surroundContents(wrap)}catch(e){var frag=r.extractContents();var wrap2=document.createElement(tag);wrap2.appendChild(frag);r.insertNode(wrap2)}
  sel.removeAllRanges();
})}

function openQ(wn,qi,src){var qz=src==='assess'?DATA[CC].weeks[wn].assessments[qi]:DATA[CC].weeks[wn].quizzes[qi];AQ={w:wn,i:qi,q:qz,src:src};CQ=0;AQS={};NC=0;NI=0;selAnswer={};toolMode='';rstT();stopCd();CDminutes=10;document.getElementById('cdVal').textContent='10';document.getElementById('cdTime').textContent='--:--';document.getElementById('cdBox').classList.remove('active','warn');document.getElementById('cdGoBtn').innerHTML='&#9654; Start';document.getElementById('hlTool').classList.remove('active');document.getElementById('stTool').classList.remove('active');document.getElementById('qoT').textContent=qz.name;document.getElementById('qo').classList.add('open');document.body.style.overflow='hidden';document.getElementById('printBtn').style.display='none';uSt();rQ()}
function closeQ(){document.getElementById('qo').classList.remove('open');document.body.style.overflow='';pT();stopCd();AQ=null;document.getElementById('printBtn').style.display='none'}
function resetQ(){CQ=0;AQS={};NC=0;NI=0;selAnswer={};toolMode='';rstT();stopCd();CDminutes=10;document.getElementById('cdVal').textContent='10';document.getElementById('cdTime').textContent='--:--';document.getElementById('cdBox').classList.remove('active','warn');document.getElementById('cdGoBtn').innerHTML='&#9654; Start';document.getElementById('hlTool').classList.remove('active');document.getElementById('stTool').classList.remove('active');uSt();rQ();document.getElementById('printBtn').style.display='none'}
function uSt(){document.getElementById('sC').textContent=NC;document.getElementById('sI').textContent=NI;var t=NC+NI;document.getElementById('sP').textContent=t>0?Math.round(NC/t*100)+'%':'\u2014';if(AQ&&t===AQ.q.questions.length&&t>0)document.getElementById('printBtn').style.display='inline-block'}

/* tools */
function toggleTool(t){if(toolMode===t){toolMode='';document.getElementById(t==='hl'?'hlTool':'stTool').classList.remove('active')}else{toolMode=t;document.getElementById('hlTool').classList.toggle('active',t==='hl');document.getElementById('stTool').classList.toggle('active',t==='st')}}
function clearMarks(){var qbd=document.querySelector('.qbd');if(!qbd)return;qbd.querySelectorAll('mark,s').forEach(function(m){m.replaceWith(document.createTextNode(m.textContent))})}

/* countdown +/- */
function adjCd(d){if(CDrun)return;CDminutes=Math.max(1,Math.min(120,CDminutes+d));document.getElementById('cdVal').textContent=CDminutes}
function toggleCd(){if(CDrun){CDrun=false;clearInterval(CDint);document.getElementById('cdBox').classList.remove('active');document.getElementById('cdGoBtn').innerHTML='&#9654; Resume'}else{if(CDrem<=0)CDrem=CDminutes*60;CDrun=true;document.getElementById('cdBox').classList.add('active');document.getElementById('cdGoBtn').innerHTML='&#9208; Pause';CDint=setInterval(function(){CDrem--;uCdD();if(CDrem<=0){clearInterval(CDint);CDrun=false;document.getElementById('cdTime').textContent='\u23F0 TIME!';document.getElementById('cdBox').classList.add('warn');document.getElementById('cdGoBtn').innerHTML='&#9654; Start'}},1000);uCdD()}}
function resetCd(){stopCd();CDrem=0;document.getElementById('cdTime').textContent='--:--';document.getElementById('cdBox').classList.remove('active','warn');document.getElementById('cdGoBtn').innerHTML='&#9654; Start'}
function stopCd(){CDrun=false;clearInterval(CDint)}
function uCdD(){var m=Math.floor(CDrem/60),s=CDrem%60;document.getElementById('cdTime').textContent=m+':'+s.toString().padStart(2,'0');document.getElementById('cdBox').classList.toggle('warn',CDrem<=60)}

/* click choice */
function clickChoice(i){if(!AQ||AQS[CQ]||toolMode)return;selAnswer[CQ]=i;rQ()}
function submitAns(){if(!AQ||AQS[CQ]||selAnswer[CQ]===undefined)return;var i=selAnswer[CQ],q=AQ.q.questions[CQ],ok=i===q.correct;AQS[CQ]={s:i,r:ok?'c':'i'};if(ok)NC++;else NI++;uSt();rQ()}

function rQ(){if(!AQ)return;var a=document.getElementById('qA'),qs=AQ.q.questions,q=qs[CQ],tot=qs.length,ans=AQS[CQ],pg=(CQ+1)/tot*100,L=['A','B','C','D','E'],hasSel=selAnswer[CQ]!==undefined;
var dots='<div class="qdots">';for(var i=0;i<tot;i++){var c='';if(i===CQ)c='cur';else if(AQS[i]&&AQS[i].r==='c')c='acor';else if(AQS[i]&&AQS[i].r==='i')c='ainc';dots+='<div class="qd '+c+'" onclick="gQ('+i+')"></div>'}dots+='</div>';
var ch=q.choices.map(function(c,i){var cl='';
if(ans){cl='dis';if(i===q.correct)cl+=' shc';if(ans.s===i&&i===q.correct)cl='dis cor';if(ans.s===i&&i!==q.correct)cl='dis inc'}else{if(selAnswer[CQ]===i)cl='sel'}
return'<div class="ac '+cl+'" onclick="clickChoice('+i+')"><div class="cl">'+L[i]+'</div><div class="ctx">'+c.replace(/^[A-E]\.\s*/,'')+'</div></div>'}).join('');
var submitH='';if(!ans){submitH='<div class="submit-row"><button class="submit-btn" onclick="submitAns()"'+(hasSel?'':' disabled')+'>Submit Answer</button></div>'}
var yw='';if(ans&&ans.s!==q.correct&&q.wrongExplanations&&q.wrongExplanations[ans.s])yw='<div class="exs exw"><div class="exl">\u2717 Why '+L[ans.s]+' is Wrong</div><div class="ext">'+q.wrongExplanations[ans.s]+'</div></div>';
var ow='';if(q.wrongExplanations){var ot=Object.keys(q.wrongExplanations).filter(function(k){return+k!==q.correct&&(!ans||+k!==ans.s)}).map(function(k){return'<div class="wce"><strong>'+L[+k]+':</strong> '+q.wrongExplanations[k]+'</div>'}).join('');if(ot)ow='<div class="exs exw"><div class="exl">\u2717 Other Wrong Choices</div><div class="ext">'+ot+'</div></div>'}
a.innerHTML='<div class="qcd"><div class="qpg"><div class="qpf" style="width:'+pg+'%"></div></div><div class="qbd"><div class="qnum">Question '+(CQ+1)+' of '+tot+'</div><div class="qstem">'+q.stem+'</div><div class="ach">'+ch+'</div>'+submitH+'<div class="exb'+(ans?' vis':'')+'"><div class="exs exc"><div class="exl">\u2713 Why '+L[q.correct]+' is Correct</div><div class="ext">'+q.explanation+'</div></div>'+yw+ow+'<div class="exs exe"><div class="exl">\uD83D\uDCA1 ELI5</div><div class="ext">'+q.eli5+'</div></div></div></div><div class="qnv"><button class="nb" onclick="pQ()" '+(CQ===0?'disabled':'')+'>&#8592; Prev</button>'+dots+'<button class="nb pr" onclick="nQ()" '+(CQ===tot-1?'disabled':'')+'>Next &#8594;</button></div></div>'}

function nQ(){if(CQ<AQ.q.questions.length-1){CQ++;rQ()}}
function pQ(){if(CQ>0){CQ--;rQ()}}
function gQ(i){CQ=i;rQ()}

/* timer */
function togT(){TR?pT():stT2()}
function stT2(){TR=true;document.getElementById('tB').innerHTML='\u23F8';document.getElementById('tD').classList.add('run');TI=setInterval(function(){TS++;uTD()},1000)}
function pT(){TR=false;document.getElementById('tB').innerHTML='\u25B6';document.getElementById('tD').classList.remove('run');clearInterval(TI)}
function rstT(){pT();TS=0;uTD();document.getElementById('tD').classList.remove('warn')}
function uTD(){var m=Math.floor(TS/60).toString().padStart(2,'0'),s=(TS%60).toString().padStart(2,'0');document.getElementById('tT').textContent=m+':'+s;if(TS>90)document.getElementById('tD').classList.add('warn');else document.getElementById('tD').classList.remove('warn')}

/* print */
function printReport(){if(!AQ)return;var qs=AQ.q.questions,L=['A','B','C','D','E'],t=NC+NI,tot=qs.length,pct=t>0?Math.round(NC/t*100):0;
var h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+AQ.q.name+'</title><link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Nunito:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Nunito,sans-serif;color:#1E1E20;line-height:1.7;padding:48px;max-width:760px;margin:0 auto;font-size:15px}h1{font-family:"Crimson Pro",serif;font-size:28px;color:#1B2A4A}h2{font-size:13px;color:#6B7689;font-weight:400;margin-bottom:24px;border-bottom:2px solid #1A7A6D;padding-bottom:12px}.sts{display:flex;gap:18px;margin-bottom:28px;padding:18px;background:#FBF8F3;border-radius:12px;border:1px solid #DBD5C9}.st{text-align:center;flex:1}.st b{font-family:"Crimson Pro",serif;font-size:28px;display:block;color:#1B2A4A}.st span{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#A0AAB8;font-weight:700}.q{margin-bottom:24px;page-break-inside:avoid;border:1px solid #DBD5C9;border-radius:12px;overflow:hidden}.qh2{padding:14px 20px;background:#FBF8F3;border-bottom:1px solid #DBD5C9;font-weight:700;font-size:12px;display:flex;justify-content:space-between}.qs2{padding:18px 20px;font-family:"Crimson Pro",serif;font-size:17px;line-height:1.7}.chs{padding:0 20px 8px}.ch2{padding:5px 0;font-size:14px;display:flex;gap:8px}.ch2 .lt{font-family:"IBM Plex Mono",monospace;font-weight:600;min-width:22px;color:#A0AAB8}.ch2.cor{color:#2D8659;font-weight:700}.ch2.cor .lt{color:#2D8659}.ch2.wp{color:#C44040;text-decoration:line-through}.xc{background:#E8F5EE;border-top:3px solid #2D8659;padding:16px 20px;font-size:14px}.xc b,.xw b,.xe b{font-size:9px;text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:6px;font-family:"IBM Plex Mono",monospace}.xc b{color:#2D8659}.xw{background:#FDF0F0;border-top:3px solid #C44040;padding:16px 20px;font-size:14px}.xw b{color:#C44040}.xe{background:#E3F5F2;border-top:3px solid #1A7A6D;padding:16px 20px;font-size:14px}.xe b{color:#1A7A6D}.tg{font-size:10px;padding:4px 12px;border-radius:20px;font-weight:700}.tc{background:#E8F5EE;color:#2D8659}.ti{background:#FDF0F0;color:#C44040}footer{text-align:center;margin-top:32px;font-size:10px;color:#A0AAB8;border-top:1px solid #DBD5C9;padding-top:14px}@media print{body{padding:20px}}</style></head><body>';
h+='<h1>'+AQ.q.name+'</h1><h2>Block 5 \u2022 UNE COM \u2022 '+DATA[CC].fullName+'</h2><div class="sts"><div class="st"><b>'+NC+'</b><span>Correct</span></div><div class="st"><b>'+NI+'</b><span>Incorrect</span></div><div class="st"><b>'+pct+'%</b><span>Score</span></div><div class="st"><b>'+t+'</b><span>Total</span></div></div>';
qs.forEach(function(q,i){var ans=AQS[i],ok=ans&&ans.r==='c';h+='<div class="q"><div class="qh2"><span>Q'+(i+1)+'/'+tot+'</span><span class="tg '+(ok?'tc':'ti')+'">'+(ok?'\u2713 Correct':'\u2717 Incorrect')+'</span></div><div class="qs2">'+q.stem+'</div><div class="chs">';q.choices.forEach(function(c,j){var cls='';if(j===q.correct)cls='cor';else if(ans&&ans.s===j)cls='wp';h+='<div class="ch2 '+cls+'"><span class="lt">'+L[j]+'.</span><span>'+c.replace(/^[A-E]\.\s*/,'')+(j===q.correct?' \u2713':'')+'</span></div>'});h+='</div><div><div class="xc"><b>\u2713 '+L[q.correct]+' is Correct</b>'+q.explanation+'</div>';if(ans&&ans.s!==q.correct&&q.wrongExplanations&&q.wrongExplanations[ans.s])h+='<div class="xw"><b>\u2717 '+L[ans.s]+' was Wrong</b>'+q.wrongExplanations[ans.s]+'</div>';h+='<div class="xe"><b>\uD83D\uDCA1 ELI5</b>'+q.eli5+'</div></div></div>'});
h+='<footer>Block 5 Study Hub \u2022 UNE COM \u2022 '+new Date().toLocaleDateString()+'</footer></body></html>';
var w2=window.open('','_blank');if(w2){w2.document.write(h);w2.document.close();setTimeout(function(){w2.print()},500)}else alert('Allow popups to print.')}

init();
</script>
