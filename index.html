      ploFile:"notes/week38-endocrine.html",
      plos:[],
      questions:[{stem:"A 16-year-old is brought in by her parents for primary amenorrhea. She has never had a menstrual period. She reports normal breast development and no acne. On exam, she appears phenotypically female with Tanner V breast development, scant pubic and axillary hair, and a blind-ending vaginal pouch. Pelvic ultrasound reveals absent uterus and ovaries; firm, non-tender masses are palpable in the inguinal canals bilaterally. Karyotype returns as 46,XY. Which of the following best explains the absent pubic and axillary hair in this patient despite markedly elevated testosterone levels?",choices:["A. Aromatase deficiency prevents conversion of testosterone to estradiol, blocking androgen-dependent hair follicle activation","B. Non-functional androgen receptor prevents testosterone and DHT from signaling in androgen-sensitive tissues including pubic and axillary hair follicles","C. Elevated LH causes paradoxical suppression of 5α-reductase in skin, preventing DHT-mediated hair growth","D. The blind-ending vagina obstructs retrograde hormone delivery to hair follicles in the pubic region","E. Absent ovaries reduce estradiol, which is the primary driver of pubic hair growth in biological females"],correct:1,explanation:"CAIS is caused by loss-of-function mutations in the androgen receptor (AR) gene on the X chromosome. All androgen-dependent tissues — including pubic hair follicles, external genitalia virilization, and clitoral/penile development — require functional AR signaling. DHT is the primary androgen for pubic and axillary hair; without a working AR, DHT cannot signal. Breast development occurs because aromatase converts some testosterone to estradiol, which acts on estrogen receptors (unaffected). The very high testosterone and LH reflect loss of androgen-mediated negative feedback at the hypothalamus and pituitary.",wrongExplanations:{0:"Aromatase deficiency would reduce estradiol but would not explain absent pubic hair — that's androgen-mediated, not estrogen-mediated. Also, estradiol is present (breast development occurred), so aromatase is intact.",2:"Elevated LH does not paradoxically suppress 5α-reductase. This pathway doesn't exist. The issue is androgen receptor dysfunction, not enzyme deficiency.",3:"Hormone delivery to hair follicles is systemic via the bloodstream, not local retrograde transport. The vaginal anatomy is irrelevant to hair follicle androgen signaling.",4:"Pubic and axillary hair is driven by androgens (DHT), not estradiol. Estrogen drives breast development and uterine growth. Absent ovaries reduce estradiol but that doesn't explain absent pubic hair — the testes are producing estradiol via aromatase."},eli5:"In complete androgen insensitivity syndrome (CAIS), the androgen receptor is completely broken. Testosterone and DHT are produced in normal or elevated amounts, but no tissue in the body can respond to them — including the hair follicles that normally grow pubic and axillary hair under DHT stimulation. So even with sky-high testosterone, the hair just never grows."},
{stem:"A 58-year-old woman with rheumatoid arthritis has been taking prednisone 20 mg daily for 14 months. She presents to the ED after 3 days of vomiting and inability to keep down her oral medications. She is found to be hypotensive (BP 78/42 mmHg), tachycardic (HR 118 bpm), and febrile (38.9°C). Labs reveal hyponatremia (Na 128 mEq/L), normal potassium (K 4.0 mEq/L), and hypoglycemia (glucose 54 mg/dL). She has no skin hyperpigmentation. Which of the following best explains why this patient has hyponatremia but normal potassium and no hyperpigmentation?",choices:["A. Primary adrenal insufficiency from autoimmune destruction — ACTH is paradoxically low due to concurrent pituitary involvement","B. Secondary adrenal insufficiency from HPA axis suppression — cortisol is low but aldosterone is preserved via the intact renin-angiotensin system; ACTH is suppressed by exogenous glucocorticoid feedback","C. Mineralocorticoid excess from the prednisone itself — sodium retention causes dilutional hyponatremia while aldosterone is suppressed","D. Syndrome of inappropriate ADH secretion from stress — ACTH and cortisol are unrelated to this presentation","E. Tertiary adrenal insufficiency from hypothalamic damage — CRH deficiency leads to low ACTH and compensatory aldosterone excess"],correct:1,explanation:"Secondary adrenal insufficiency from HPA suppression: chronic exogenous glucocorticoids → suppress CRH and ACTH chronically → adrenal cortex atrophies. When oral prednisone is stopped (vomiting), there's no endogenous cortisol to compensate. Key distinctions from primary AI: (1) ACTH is LOW (not high) — no hyperpigmentation; (2) Aldosterone is NORMAL — aldosterone is regulated by angiotensin II/renin/potassium, not ACTH, so K⁺ stays normal and there's no salt-wasting. The hyponatremia in secondary AI is caused by cortisol deficiency impairing free water excretion (cortisol normally suppresses ADH and enables diuresis).",wrongExplanations:{0:"Primary adrenal insufficiency would show HIGH ACTH (and MSH → hyperpigmentation) and LOW aldosterone (→ hyperkalemia + salt wasting). This patient has low ACTH, normal K⁺, normal aldosterone — ruling out primary AI.",2:"Prednisone has minimal mineralocorticoid activity compared to aldosterone. It does not cause aldosterone suppression leading to hyponatremia. Mineralocorticoid excess would cause hypokalemia and hypertension, not this picture.",3:"SIADH can cause hyponatremia, but it doesn't explain the hypotension, hypoglycemia, low cortisol, and low ACTH. This is a glucocorticoid-deficiency crisis, not an isolated ADH disorder.",4:"Tertiary AI (hypothalamic CRH deficiency) is rare. The far more common and clinically relevant cause in this scenario is iatrogenic HPA suppression from long-term exogenous steroids. Also, aldosterone excess doesn't occur in tertiary AI."},eli5:"This patient stopped being able to take her prednisone (couldn't keep it down). After 14 months of daily steroids, her own adrenal glands have atrophied — they got no practice. Now in crisis, her cortisol is nearly zero and ACTH is also low (the whole central axis was suppressed). No hyperpigmentation because ACTH is LOW — you only get that in primary where ACTH is HIGH. Aldosterone is normal because it's not controlled by ACTH — it's controlled by the kidney's renin system, which still works fine. The hyponatremia comes from low cortisol's effect on water handling, not from salt wasting."},
{stem:"A 34-year-old woman presents with 18-month history of weight gain predominantly around the trunk and face, easy bruising, purple striae on her abdomen, mild proximal muscle weakness, and hypertension (BP 156/94 mmHg). Fasting glucose is 138 mg/dL. Low-dose dexamethasone suppression test (1 mg overnight): cortisol = 18.4 μg/dL (fails to suppress). High-dose dexamethasone suppression test (8 mg overnight): cortisol = 6.1 μg/dL (suppresses >50%). MRI pituitary shows a 4mm hypoenhancing lesion. Based on the laboratory findings and imaging, what is the most likely diagnosis and the mechanism by which the high-dose dexamethasone test distinguishes this from other causes of Cushing's syndrome?",choices:["A. Ectopic ACTH syndrome — small cell lung cancer produces ACTH autonomously and will suppress with high-dose dexamethasone due to residual GR expression in tumor cells","B. Cushing's disease (pituitary ACTH adenoma) — pituitary adenoma retains partial glucocorticoid feedback sensitivity, suppressing with high-dose but not low-dose dexamethasone","C. Primary adrenal adenoma — autonomous cortisol production suppresses at high doses because adrenal GR expression remains intact","D. Pseudo-Cushing's state — alcohol-related HPA dysregulation responds only to high-dose suppression","E. Adrenocortical carcinoma — large tumors maintain cortisol feedback via GRβ upregulation"],correct:1,explanation:"Cushing's disease (pituitary corticotroph adenoma) is the diagnosis. Pituitary ACTH-secreting adenomas have an abnormally elevated set-point for glucocorticoid negative feedback but are not completely autonomous — they still respond to supraphysiological doses of dexamethasone. High-dose dex (8 mg) suppresses cortisol >50% = pituitary source. ACTH is elevated (ruling out primary adrenal). The 4mm pituitary lesion corroborates this. Primary adrenal adenomas would show suppressed ACTH and no high-dose suppression. Ectopic ACTH (very high ACTH, often >200 pg/mL) shows no suppression at any dose.",wrongExplanations:{0:"Ectopic ACTH syndrome (e.g., small cell lung cancer) shows NO suppression with high-dose dexamethasone — tumor cells lack functional glucocorticoid feedback. ACTH is also typically massively elevated (>200 pg/mL) in ectopic ACTH, not mildly elevated as here. Also, ectopic cells don't typically express GRs in a functionally relevant way.",2:"Primary adrenal adenoma would show LOW or undetectable ACTH (the high cortisol suppresses the HPA axis). It would NOT suppress with any dose of dexamethasone because cortisol production is ACTH-independent. This patient has elevated ACTH, ruling out primary adrenal.",3:"Pseudo-Cushing's (alcoholism, depression) typically suppresses with LOW-dose dexamethasone — unlike true Cushing's. This patient failed low-dose suppression, making pseudo-Cushing's unlikely. Also, alcohol history is not mentioned.",4:"Adrenocortical carcinoma (like adrenal adenoma) would show suppressed ACTH and NO dexamethasone suppression at any dose. GRβ upregulation causing autonomous cortisol feedback is not a recognized mechanism in adrenocortical carcinoma."},eli5:"Think of the pituitary adenoma as a thermostat that's been turned up too high but can still respond to a really powerful override signal. Low-dose dex (normal signal) — no response. High-dose dex (10x stronger signal) — yes, finally suppresses. Primary adrenal tumors and ectopic ACTH sources are completely rogue — they don't respond to ANY dose. So 'suppresses only with high dose' = pituitary source (Cushing's disease)."},
{stem:"A 42-year-old man presents to the ED with a 30-minute episode of severe throbbing headache, profuse sweating, and palpitations. He is diaphoretic and tremulous. BP is 228/134 mmHg; HR 112 bpm. The episode resolves spontaneously over 45 minutes. He reports three similar episodes in the past month, each lasting 20–60 minutes. Between episodes, BP is 142/88 mmHg. CT abdomen reveals a 3.8 cm right adrenal mass. 24-hour urine collection is sent. The markedly elevated metanephrines with relatively higher metanephrines vs. normetanephrines suggests predominantly epinephrine secretion. Which enzyme is responsible for epinephrine synthesis in this tumor, and what normally maintains its activity in adrenal chromaffin cells?",choices:["A. Tyrosine hydroxylase; maintained by sympathetic neural firing rate from the splanchnic nerve","B. Dopamine β-hydroxylase; maintained by high intra-adrenal norepinephrine concentrations","C. PNMT; maintained by high local cortisol concentrations draining from the adrenal cortex via centripetal circulation","D. Aromatic amino acid decarboxylase; maintained by systemic catecholamine feedback via α2-adrenergic receptors","E. Monoamine oxidase; maintained by adrenal medullary pressure and volume"],correct:2,explanation:"PNMT (phenylethanolamine-N-methyltransferase) catalyzes NE → epinephrine. Its expression in adrenal chromaffin cells is uniquely maintained by high local cortisol concentrations delivered via the centripetal portal circulation from adrenal cortex to medulla — cortisol concentrations there are ~100× systemic blood levels. The tumor (pheochromocytoma) arises from these chromaffin cells and retains PNMT activity, secreting predominantly epinephrine. Metanephrine (epinephrine metabolite) >> normetanephrine indicates epinephrine dominance, typical of intra-adrenal pheochromocytomas vs. paragangliomas (extra-adrenal; no cortisol exposure; produce only NE).",wrongExplanations:{0:"Tyrosine hydroxylase (TH) converts tyrosine → DOPA (first step in catecholamine synthesis). It is maintained by cAMP-mediated phosphorylation and sympathetic activity, but it is NOT the enzyme making epinephrine from NE.",1:"Dopamine β-hydroxylase (DBH) converts dopamine → norepinephrine (the step before PNMT). High NE concentrations do not 'maintain' DBH — DBH is regulated by transcription factors and copper availability, not substrate feedback.",3:"Aromatic amino acid decarboxylase (AAAD/DOPA decarboxylase) converts DOPA → dopamine. It's the second step, not the NE→epi step. α2-adrenergic receptor feedback regulates NE release from terminals, not AAAD expression.",4:"Monoamine oxidase (MAO) is a degradation enzyme — it breaks down catecholamines. It is not involved in epinephrine synthesis and is not maintained by 'adrenal pressure.'"},eli5:"PNMT is the enzyme that takes norepinephrine and adds one methyl group to make epinephrine. What keeps PNMT running? Cortisol from the adrenal cortex, which flows inward through a special portal-like blood supply, bathing chromaffin cells in ultra-high cortisol. That's why adrenal chromaffin cells make mostly epinephrine (80%), while peripheral sympathetic nerves (no local cortisol) make only norepinephrine."},
{stem:"A 51-year-old man with treatment-resistant hypertension (on 3 antihypertensives) presents for evaluation. He denies muscle cramps but is found to have asymptomatic hypokalemia on routine labs. He does not take diuretics. He does not use licorice or herbal supplements. BP 172/98 mmHg. No Cushingoid features. CT adrenal reveals bilateral adrenal hyperplasia. Which of the following best explains the pathophysiology of hypokalemia and metabolic alkalosis in this patient?",choices:["A. High ACTH drives excess cortisol in the zona fasciculata, which cross-reacts with mineralocorticoid receptors causing K⁺ loss","B. Autonomous aldosterone excess from the zona glomerulosa activates ENaC and Na⁺/K⁺-ATPase in the distal nephron, causing Na⁺ retention, K⁺ wasting, and H⁺ secretion","C. Low renin activity reduces angiotensin II, impairing renal K⁺ conservation and causing hypokalemia","D. Bilateral adrenal hyperplasia reduces cortisol production, leading to ACTH-driven mineralocorticoid excess from the zona reticularis","E. Excess aldosterone stimulates the H⁺/K⁺-ATPase in the stomach, causing systemic alkalosis from gastric acid loss"],correct:1,explanation:"Primary hyperaldosteronism (Conn's): autonomous aldosterone from zona glomerulosa → binds mineralocorticoid receptors in principal cells of the collecting duct → (1) upregulates ENaC (epithelial Na⁺ channel) → Na⁺ reabsorption → volume expansion → hypertension + suppressed renin; (2) upregulates basolateral Na⁺/K⁺-ATPase → K⁺ secreted into urine → hypokalemia; (3) stimulates intercalated cell H⁺-ATPase → H⁺ secretion → metabolic alkalosis. Bilateral hyperplasia (vs. unilateral adenoma) typically requires medical management with mineralocorticoid antagonists (spironolactone/eplerenone) rather than surgery.",wrongExplanations:{0:"ACTH and cortisol are normal in this patient. Cortisol does weakly bind mineralocorticoid receptors, but this occurs in states of extreme cortisol excess (Cushing's), not with normal cortisol levels. This is not the mechanism here.",2:"Low renin means LESS angiotensin II, not more K⁺ wasting. Low renin in this context is a consequence of volume expansion from aldosterone excess — the RAAS is appropriately suppressed by high volume. The hypokalemia comes from aldosterone's direct action on the kidney, not from angiotensin II changes.",3:"Bilateral adrenal hyperplasia in this context involves the zona GLOMERULOSA (aldosterone-producing), not reduced cortisol. Cortisol is normal. The zona reticularis doesn't produce mineralocorticoids.",4:"Aldosterone acts on the kidney's collecting duct, not the stomach. Metabolic alkalosis here is from renal H⁺ secretion driven by aldosterone, not gastric acid loss (which would require clinical vomiting/NG suction)."},eli5:"Aldosterone is like a traffic controller in the kidney's collecting duct. It opens channels (ENaC) that let sodium flood in and simultaneously forces potassium and acid (H⁺) out into the urine. With WAY too much aldosterone, you keep tons of sodium (high BP), and you dump potassium and acid — giving you low potassium and metabolic alkalosis."},
{stem:"A child raised as a girl since birth presents to pediatric endocrinology at age 12 for evaluation of primary amenorrhea and clitoromegaly. Parents report the child was assigned female at birth due to ambiguous genitalia. Over the past year, the child has developed a deepening voice, increased muscle mass, and growth of what was previously thought to be a clitoris into a phallus. Karyotype is 46,XY. No testes are palpable. Which of the following best explains why this patient virilized at puberty despite having appeared female at birth?",choices:["A. Testosterone receptor mutations resolved spontaneously at puberty, restoring androgen sensitivity","B. At puberty, massive testosterone surge overcomes the enzyme deficiency and directly virilizes tissues without requiring DHT conversion","C. Puberty triggers de novo expression of 5α-reductase type 1 in extrascrotal skin, partially compensating for type 2 deficiency and allowing testosterone-driven virilization","D. Adrenal DHEA surges at adrenarche convert to testosterone in peripheral tissues, bypassing the 5α-reductase deficiency","E. Testosterone is sufficient for male external genital virilization at puberty; DHT is only required for fetal development of the external genitalia, prostate, and anterior urethra"],correct:2,explanation:"5α-reductase type 2 deficiency: type 2 enzyme is expressed in the urogenital sinus and external genital skin during fetal life. DHT (not testosterone) is required for differentiation of the external genitalia, anterior urethra, and prostate. Without it, the 46,XY fetus has ambiguous/female-appearing external genitalia despite normal internal Wolffian duct derivatives. At puberty: (1) testosterone surge is biologically active at androgen receptors without needing conversion to DHT for many tissues (muscle, larynx, phallus elongation); (2) 5α-reductase type 1 (expressed in skin/liver) is upregulated and partially compensates → some DHT production. This explains the dramatic virilization at puberty despite ambiguous genitalia at birth.",wrongExplanations:{0:"5α-reductase deficiency is a fixed enzyme deficiency from a gene mutation — it does not 'resolve spontaneously.' Androgen receptors are normal in this condition; the defect is in DHT synthesis.",1:"While testosterone does directly act at androgen receptors without requiring DHT conversion in some tissues, the explanation omits the critical contribution of 5α-reductase type 1 upregulation at puberty. Saying testosterone 'overcomes' the deficiency is imprecise — there are two mechanisms operating simultaneously.",3:"Adrenal DHEA (adrenarche) does contribute to androgen pool but produces far less testosterone than pubertal gonadal activation. And adrenal androgens would still face the same 5α-RD2 deficiency. This is not the primary explanation for pubertal virilization.",4:"This confuses fetal and pubertal roles. DHT IS required during fetal development for external genitalia. At puberty, testosterone is sufficient for many virilizing changes, but type 1 5α-reductase also contributes. The statement that 'DHT is only required fetally' is an oversimplification — DHT from type 1 still contributes at puberty."},eli5:"During fetal development, building the external genitalia (penis, scrotum, prostate) requires DHT — not testosterone. If you can't make DHT (5α-RD2 deficiency), external genitalia look female at birth. But at puberty, the massive testosterone surge is enough on its own to virilize — enlarge the phallus, build muscle, deepen the voice. Plus, 5α-reductase type 1 (different gene, expressed in skin) partially compensates. So these kids can appear female at birth but masculinize dramatically at puberty."},
{stem:"A 29-year-old woman presents with a 4-month history of progressive fatigue, 8 kg weight loss, and a craving for salty foods. She has noticed darkening of her skin, particularly in her palmar creases, buccal mucosa, and recent scars. BP is 92/58 mmHg supine, falling to 74/44 mmHg on standing. She has a history of Hashimoto's thyroiditis and type 1 diabetes. The hyperpigmentation in this patient is caused by which mechanism?",choices:["A. Low cortisol directly stimulates melanocytes via glucocorticoid receptor-mediated upregulation of tyrosinase","B. High ACTH stimulates MC1R (melanocortin-1 receptor) on melanocytes; ACTH and α-MSH are both derived from the POMC precursor","C. Elevated renin activates the renin-angiotensin system, which cross-reacts with melanocortin receptors in the skin","D. Autoimmune destruction of adrenal cells releases melanin precursors into the bloodstream, depositing in skin","E. Elevated aldosterone precursors from the damaged adrenal cortex stimulate melanin synthesis"],correct:1,explanation:"POMC (pro-opiomelanocortin) is the precursor to both ACTH and α-MSH (alpha-melanocyte-stimulating hormone). When adrenal cortex is destroyed → cortisol falls → no negative feedback → hypothalamus and pituitary ramp up CRH and ACTH massively. Excess ACTH cross-activates MC1R on melanocytes (same receptor that α-MSH binds) → stimulates melanin synthesis → hyperpigmentation in sun-exposed areas, creases, scars, and buccal mucosa. This hyperpigmentation is pathognomonic of primary adrenal insufficiency — it does NOT occur in secondary or tertiary AI (where ACTH is low).",wrongExplanations:{0:"Cortisol does not directly stimulate melanocytes. Glucocorticoid receptors on melanocytes don't drive pigmentation — this is an ACTH/MSH-mediated melanocortin receptor mechanism, not a glucocorticoid receptor mechanism.",2:"Renin and angiotensin II do not cross-react with melanocortin receptors. The renin-angiotensin system operates via AT1/AT2 receptors on vascular and renal tissue — completely separate from MC1R on melanocytes.",3:"Autoimmune destruction of adrenal cells does not release melanin precursors. Melanin is produced in melanocytes, not adrenal cells. The mechanism is hormonal (ACTH/MSH signaling), not released cellular contents.",4:"Aldosterone precursors (like deoxycorticosterone) do not stimulate melanin synthesis. The adrenal cortex in Addison's disease is destroyed — there's no excess production of any steroid precursor. The hyperpigmentation is driven by ACTH excess from the pituitary."},eli5:"ACTH and α-MSH (melanocyte-stimulating hormone) are like siblings — they're both made from the same parent protein called POMC. When the adrenals are destroyed, cortisol crashes, so the pituitary screams louder and louder (ACTH skyrockets). All that ACTH spills over and binds the same melanocortin receptors (MC1R) on skin melanocytes that α-MSH normally uses — triggering hyperpigmentation. It's a side effect of the feedback alarm going off."},
{stem:"A 3-day-old male infant is brought to the ED by parents concerned about poor feeding. The infant appears dehydrated, lethargic, and has vomited twice. Vitals show: BP 58/32 mmHg, HR 188 bpm, T 37.2°C. The parents note the baby seemed fine at birth but has progressively worsened. Physical exam reveals no dysmorphic features and normal-appearing male external genitalia. In this infant with the classic salt-wasting form of 21-hydroxylase deficiency, which of the following best explains why ACTH is massively elevated despite the male infant having normal-appearing external genitalia?",choices:["A. 21-hydroxylase deficiency blocks androgen synthesis; elevated ACTH stimulates compensatory sex hormone secretion from the zona reticularis","B. Cortisol deficiency removes negative feedback → massive ACTH elevation. In males, androgens from excess 17-OHP shunting do not cause visible genital abnormality (unlike females where clitoromegaly occurs); external genitalia appear normal at birth in 46,XY individuals","C. 17-OHP elevation suppresses ACTH at the hypothalamic level, causing paradoxical pituitary ACTH hypersecretion","D. High potassium directly stimulates the anterior pituitary to secrete excess ACTH as a compensatory mechanism","E. The newborn HPA axis is immature and secretes ACTH constitutively regardless of cortisol levels"],correct:1,explanation:"21-hydroxylase deficiency impairs cortisol synthesis → loss of negative feedback → ACTH rises dramatically. High ACTH drives excess precursor production (17-OHP accumulates) and shunts precursors into the intact androgen pathway (DHEA, androstenedione, testosterone). In 46,XY males: fetal testosterone (from testes) already masculinized external genitalia normally — the additional androgen excess doesn't change already-formed male genitalia. In 46,XX females: extra androgens cause virilization of female genitalia (clitoromegaly, labial fusion) — this is how girls are typically caught at birth. Boys are often diagnosed only after the salt-wasting crisis (days 1–2 weeks of life).",wrongExplanations:{0:"21-hydroxylase deficiency does NOT block androgen synthesis — quite the opposite. It blocks cortisol and aldosterone synthesis, causing EXCESS androgen production from diverted precursors. ACTH elevation is due to cortisol deficiency, not to drive androgen secretion.",2:"17-OHP does not suppress ACTH. Cortisol (not 17-OHP) provides negative feedback to the HPA axis. Elevated 17-OHP reflects blocked conversion — it is not a feedback signal. The HPA axis responds to cortisol, not 17-OHP.",3:"Hyperkalemia (elevated K⁺) primarily stimulates aldosterone secretion from the zona glomerulosa via the renin-angiotensin-aldosterone system. It does not directly stimulate anterior pituitary ACTH secretion.",4:"While the neonatal HPA axis is somewhat immature, it is not constitutively active. ACTH in this infant is massively elevated because of loss of cortisol feedback — not due to normal constitutive neonatal ACTH secretion."},eli5:"The 21-hydroxylase enzyme is blocked, so the road to cortisol is closed. No cortisol = no feedback = ACTH skyrockets. All those backed-up precursors (especially 17-OHP) get rerouted into the androgen pathway. But here's the key: a 46,XY male already has male external genitalia from fetal testosterone — the extra androgens from the enzyme deficiency don't change what's already there. In females, the same androgen flood causes virilization (large clitoris, fused labia) — that's how CAH gets caught early in girls. Boys look normal at birth and often get diagnosed only when they salt-waste in crisis like this baby."},
{stem:"A 32-year-old emergency medicine resident completes her first year of residency during which she worked 80-hour weeks with frequent overnight call. She reports weight gain of 7 kg over the year, new-onset insomnia despite exhaustion, difficulty concentrating, and frequent upper respiratory infections. She denies steroid use or chronic illness. Her attending orders labs drawn at 4 PM (during clinic hours). Which of the following best explains the blunted cortisol diurnal variation and elevated evening cortisol seen in this patient?",choices:["A. Adrenal adenoma causing autonomous cortisol secretion independent of the circadian clock","B. Chronic sleep disruption and psychosocial stress chronically activate the HPA axis, particularly via evening CRH secretion — disrupting the normal SCN-mediated diurnal suppression of evening cortisol","C. Nighttime light exposure during call shifts directly suppresses melatonin and simultaneously elevates cortisol via the pineal-adrenal axis","D. Elevated evening ACTH from a developing pituitary microadenoma is the most likely cause in a young woman with these symptoms","E. Normal variant — cortisol levels are always higher in physicians due to occupational chronic sympathetic activation"],correct:1,explanation:"The diurnal cortisol rhythm (peak 6–8 AM, nadir midnight) is driven by the SCN entraining CRH/ACTH pulses. Chronic sleep deprivation, irregular light-dark cycles, and psychosocial stress (common in residency) chronically activate the HPA axis — particularly increasing evening/nocturnal CRH release. This blunts the diurnal fall, causing elevated evening cortisol, flattened morning-to-evening ratio, and elevated 24h urine cortisol. Clinical consequences: insulin resistance (mild hyperglycemia), immunosuppression (frequent infections), weight gain (visceral), sleep disturbance. This functional hypercortisolism (pseudo-Cushing's of stress) is distinguished from true Cushing's by normal midnight suppression after brief normalization and reversibility.",wrongExplanations:{0:"Adrenal adenoma causing autonomous cortisol would also suppress ACTH (high cortisol → low ACTH). This patient has mildly elevated ACTH. Also, adenoma cortisol secretion is typically not diurnal-pattern dependent in the way stress dysregulation is.",2:"There is no 'pineal-adrenal axis' in the way described. Melatonin suppression by nighttime light is real (circadian disruption), but melatonin doesn't directly elevate cortisol. The mechanism is indirect — through HPA activation from stress and SCN disruption.",3:"A pituitary microadenoma is possible in the differential, but this is a young resident with a clear occupational stress exposure. Chronic shift work-related HPA dysregulation is the far more likely (and common) explanation. A microadenoma would warrant further workup (MRI, suppression testing) if stress-related causes are ruled out.",4:"'Normal variant in physicians' is not a physiologically valid explanation. Chronic cortisol dysregulation in healthcare workers is a real and well-documented occupational health concern — not a benign normal variant."},eli5:"Normally, cortisol is highest at 6-8 AM (waking) and drops to nearly nothing by midnight. This is controlled by the SCN (your body's clock) and requires regular, predictable sleep-wake cycles and light exposure. When you're chronically sleep-deprived and stressed, the HPA axis stays inappropriately activated — cortisol stays high in the evening when it should be falling. The SCN 'forgets' to shut off the evening signal. This is chronic stress dysregulation, not a tumor."},
{stem:"A 44-year-old man with severe asthma requires frequent systemic corticosteroid bursts despite high-dose inhaled fluticasone, a long-acting β2-agonist, and theophylline. His pulmonologist notes he has required 6 prednisone bursts in 12 months. Spirometry shows persistent airflow limitation. He is a non-smoker with no evidence of aspirin-exacerbated respiratory disease. Bronchial biopsy shows significant eosinophilic and neutrophilic inflammation with elevated IL-8, TNF-α, and IL-17 mRNA expression despite steroid therapy. The elevated GRβ:GRα ratio in the bronchial biopsy most likely contributes to steroid resistance via which mechanism?",choices:["A. GRβ competitively binds glucocorticoids, reducing GRα's ability to suppress NF-κB and AP-1 in airway inflammatory cells","B. GRβ forms inactive heterodimers with GRα, preventing nuclear translocation of the cortisol-GRα complex and blocking GRE binding","C. GRβ is induced by pro-inflammatory cytokines (IL-2, IL-4, TNF-α); it acts as a dominant-negative inhibitor of GRα, and may also directly activate pro-inflammatory gene transcription","D. GRβ upregulates CYP3A4 in airway epithelial cells, increasing local glucocorticoid metabolism and reducing effective drug concentration","E. GRβ sequesters the POMC gene promoter, reducing ACTH production and impairing HPA axis response to inhaled steroids"],correct:2,explanation:"GRβ lacks a ligand-binding domain and cannot bind glucocorticoids. Its dominant-negative effects operate via: (1) forming GRα/GRβ heterodimers that cannot activate GREs; (2) competing with GRα for GRE binding sites in promoters; (3) recruiting co-repressors that silence GRα target genes. Critically, GRβ expression is upregulated by the same cytokines (IL-1, IL-2, IL-4, IL-8, TNF-α) that drive asthma inflammation — creating a vicious cycle where inflammation begets steroid resistance. Some evidence suggests GRβ can also directly transactivate inflammatory genes. This is why severe steroid-resistant asthma may respond better to targeted biologics (anti-IL-5, anti-IL-4Rα) than to escalating steroids.",wrongExplanations:{0:"GRβ does NOT bind glucocorticoids — it lacks a functional ligand-binding domain. The competition with GRα is at the DNA level (GRE binding competition) and protein-protein interaction (heterodimerization), not at the glucocorticoid binding step.",1:"Partially correct — GRβ does form heterodimers with GRα. However, the mechanism of steroid resistance is more nuanced than simply 'preventing nuclear translocation.' GRα/GRβ heterodimers can still enter the nucleus but are transcriptionally inactive. Additionally, GRβ competes for GRE binding independently.",3:"GRβ does not upregulate CYP3A4 in airway cells. Local glucocorticoid metabolism by CYP3A4 occurs primarily in the liver, not in bronchial epithelium. This is not a recognized mechanism of GRβ-mediated steroid resistance.",4:"GRβ does not act on the POMC gene promoter or regulate ACTH production. GRβ acts in peripheral tissues (airway, immune cells), not in the pituitary. This mechanism doesn't exist."},eli5:"GRβ is a broken version of the glucocorticoid receptor. It can't bind steroids itself, but it teams up with GRα (the working one) and blocks it — like a broken key that gets stuck in the ignition. The worst part: the same inflammatory cytokines causing the asthma (IL-2, TNF-α, etc.) also MAKE MORE GRβ. So the more inflamed the airway, the more GRβ, the more steroid-resistant the patient becomes. It's a vicious cycle."},
{stem:"A 28-year-old male competitive bodybuilder presents to a men's health clinic requesting fertility evaluation. He and his partner have been trying to conceive for 18 months without success. He admits to using testosterone enanthate injections (400 mg/week) for the past 3 years for performance enhancement. He stopped the injections 8 weeks ago when trying to conceive. He appears well-muscled with mild testicular atrophy on exam (volume estimated 8 mL bilaterally, nl: 15–25 mL). This patient's azoospermia is primarily a consequence of which mechanism?",choices:["A. Direct spermatotoxic effect of supraphysiologic testosterone on spermatogonial DNA, causing irreversible germ cell loss","B. Exogenous testosterone suppressed LH and FSH chronically → testicular atrophy and near-absent intratesticular testosterone + FSH-driven spermatogenesis","C. Aromatization of exogenous testosterone to estradiol directly inhibited spermatogenesis at the level of Sertoli cells via ER-mediated pathways","D. Exogenous testosterone increased SHBG, reducing free testosterone available for intratesticular spermatogenesis support","E. Inhibin B excess from exogenous androgen feedback directly suppressed FSH to levels incompatible with spermatogenesis"],correct:1,explanation:"Exogenous testosterone chronically suppresses LH and FSH via negative feedback on the HPG axis. The critical distinction: spermatogenesis requires (1) very HIGH intratesticular testosterone (maintained by LH → Leydig cell synthesis), and (2) FSH stimulation of Sertoli cells. Serum testosterone from injections doesn't raise intratesticular levels — it actually suppresses them by eliminating LH. Low LH → Leydig cells atrophy → intratesticular T plummets → spermatogenesis fails. Low FSH → Sertoli cells underactivated → no ABP, no support for sperm maturation. The pattern: azoospermia, low LH, low FSH, low inhibin B (Sertoli cells understimulated), testicular atrophy. Recovery requires HPG axis reactivation (can use hCG + FSH, or clomiphene/SERMs).",wrongExplanations:{0:"Supraphysiologic testosterone is NOT directly spermatotoxic to germ cell DNA. The mechanism is hormonal suppression of the HPG axis, not a direct toxic effect on spermatogonia. Azoospermia from exogenous androgens is reversible in most cases — arguing against irreversible germ cell destruction.",2:"While estradiol does feed back negatively on the HPG axis, the primary mechanism of androgen-induced azoospermia is LH/FSH suppression → loss of intratesticular testosterone and FSH-driven Sertoli support. Estradiol-mediated direct Sertoli cell suppression is not the primary mechanism.",3:"Exogenous testosterone would not markedly increase SHBG (it has variable effects). More critically, 'free testosterone for intratesticular use' isn't the relevant pathway — intratesticular testosterone is made locally by Leydig cells under LH stimulation. SHBG changes to serum free T are irrelevant to the mechanism of azoospermia here.",4:"Inhibin B in this patient is LOW (not elevated), because FSH is suppressed → Sertoli cells unstimulated → less inhibin B produced. The sequence is: exogenous T → low FSH → low inhibin B (not excess inhibin B → low FSH)."},eli5:"Exogenous testosterone tells the HPA… err, HPG axis to shut down. No more LH = Leydig cells stop making intratesticular testosterone (the high local levels needed for sperm). No more FSH = Sertoli cells stop supporting spermatogenesis. Without these two signals, the testes essentially go to sleep. Intratesticular testosterone is much higher than blood testosterone — losing LH loses that critical high local concentration. The result: azoospermia. The good news is this is usually reversible, but recovery can take 6–24 months."},
{stem:"A 67-year-old man with newly diagnosed metastatic prostate cancer (Gleason 9, PSA 48 ng/mL) is started on leuprolide acetate depot injection for androgen deprivation therapy. Two weeks after the first injection, he calls the clinic reporting worsening bone pain and increased urinary obstructive symptoms. PSA at 2 weeks is now 62 ng/mL (higher than at diagnosis). Which of the following best explains the paradoxical worsening at 2 weeks and the eventual testosterone suppression at 8 weeks?",choices:["A. Leuprolide stimulates pituitary GnRH receptors → initial LH/FSH surge → testosterone 'flare' → tumor stimulation. Continued receptor stimulation causes downregulation and desensitization → suppression of LH/FSH → castrate testosterone by 3–4 weeks","B. Leuprolide is a GnRH antagonist that takes 8 weeks to fully block GnRH receptors; the initial period represents incomplete blockade","C. The tumor itself upregulates testosterone synthesis de novo via intratumoral steroidogenesis during the first 2 weeks before leuprolide reaches therapeutic levels","D. Leuprolide initially acts at the testicular LH receptor to directly stimulate testosterone synthesis before its central effects take over","E. The worsening at 2 weeks reflects direct cardiotoxicity of leuprolide that reduces renal clearance of testosterone"],correct:0,explanation:"GnRH agonists (leuprolide, goserelin) have a biphasic mechanism. Initially, continuous GnRH agonist stimulation → pituitary gonadotroph hyperstimulation → surge in LH and FSH → testosterone spike ('flare' effect, days 1–14). This initial testosterone rise can stimulate androgen-sensitive prostate cancer → worsening bone pain, spinal cord compression risk, urinary obstruction, PSA rise. After continued receptor stimulation (days 14–28), gonadotroph GnRH receptors downregulate and desensitize → LH and FSH fall → testosterone reaches castrate levels (<50 ng/dL) by week 3–4. Anti-androgens (bicalutamide) are given for the first 4 weeks to block androgen effects during the flare.",wrongExplanations:{1:"Leuprolide is a GnRH AGONIST, not an antagonist. GnRH antagonists (degarelix) work immediately by competitively blocking GnRH receptors — no flare. The delay described is due to the agonist's initial stimulation phase before receptor desensitization, not incomplete blockade.",2:"While intratumoral steroidogenesis is a real phenomenon in castration-resistant prostate cancer, it is not the primary explanation for the 2-week flare in treatment-naive patients. The flare is caused by the initial LH/FSH surge from leuprolide's agonist activity at pituitary GnRH receptors.",3:"Leuprolide acts on the hypothalamic-pituitary axis (GnRH receptors on gonadotrophs), not directly on testicular LH receptors. Its initial effect is via the HPG axis, not via direct gonadal stimulation.",4:"There is no cardiotoxicity mechanism that reduces renal clearance of testosterone. Leuprolide's metabolic effects on the cardiovascular system are longer-term and unrelated to testosterone clearance."},eli5:"GnRH agonists are tricky — they start by stimulating the pituitary, not blocking it. So for the first 1-2 weeks, they cause a massive LH surge (like holding the doorbell down — before it burns out). That LH surge spikes testosterone, which feeds the tumor and makes symptoms temporarily worse — this is called the 'flare' effect. Then the pituitary receptors get burned out and downregulate, LH crashes, and testosterone drops to castrate levels. You can prevent the flare by adding a short-course anti-androgen (bicalutamide) at the start."},
{stem:"A 24-year-old man with Addison's disease is maintained on hydrocortisone 20 mg AM / 10 mg PM and fludrocortisone 0.1 mg daily. He is diagnosed with pulmonary tuberculosis (smear-positive) and started on standard 4-drug RIPE therapy (rifampin, isoniazid, pyrazinamide, ethambutol). Two weeks later, he presents to the ED with weakness, nausea, abdominal pain, BP 82/50 mmHg, and a glucose of 48 mg/dL. What is the most likely mechanism causing this acute presentation, and what adjustment should be made?",choices:["A. Rifampin inhibits CYP3A4, causing hydrocortisone toxicity; the dose should be reduced by 50%","B. Isoniazid causes adrenal hemorrhage, requiring emergency adrenalectomy and permanent dose escalation","C. Rifampin is a potent CYP3A4 inducer, markedly increasing hydrocortisone metabolism → inadequate cortisol replacement → adrenal crisis; hydrocortisone dose must be substantially increased (often 2–3×)","D. Pyrazinamide directly antagonizes glucocorticoid receptors, rendering hydrocortisone ineffective; switch to dexamethasone","E. TB itself causes adrenal destruction (TB adrenalitis), requiring complete cessation of hydrocortisone to prevent over-replacement"],correct:2,explanation:"Rifampin is a potent inducer of CYP3A4 (via PXR nuclear receptor activation). Hydrocortisone (and all synthetic glucocorticoids) are CYP3A4 substrates. Induction dramatically increases hydrocortisone clearance → plasma levels fall far below replacement threshold → functional adrenal insufficiency → adrenal crisis in a patient with no endogenous cortisol reserve. Management: (1) immediate IV hydrocortisone for acute crisis; (2) increase oral hydrocortisone dose 2–3× while on rifampin; (3) monitor for adequacy of replacement. This drug interaction is well-documented and clinically critical — TB and adrenal insufficiency co-occur (TB adrenalitis causes ~7–20% of Addison's cases globally), making this interaction particularly dangerous.",wrongExplanations:{0:"Rifampin INDUCES (not inhibits) CYP3A4. An inhibitor would INCREASE hydrocortisone levels (→ Cushingoid features, not crisis). The clinical presentation is adrenal crisis — the opposite of toxicity. The dose must be INCREASED, not reduced.",1:"Isoniazid does not cause adrenal hemorrhage. Isoniazid's main concerns are hepatotoxicity, peripheral neuropathy (prevented by B6), and lupus-like syndrome. Adrenal hemorrhage (Waterhouse-Friderichsen) is associated with meningococcemia, not antitubercular drugs.",3:"Pyrazinamide does not antagonize glucocorticoid receptors. It is a pyrazine derivative that works against Mycobacterium tuberculosis and has no known glucocorticoid receptor interactions.",4:"TB adrenalitis CAN cause Addison's disease, but this patient already has Addison's — he's on replacement therapy. The acute crisis is from rifampin-mediated CYP3A4 induction reducing his replacement hydrocortisone levels. Stopping hydrocortisone would be lethal."},eli5:"Rifampin is one of the most powerful CYP3A4 enzyme inducers known — it cranks up the liver's drug-metabolism machinery to maximum power. Hydrocortisone is metabolized by CYP3A4. So after starting rifampin, the liver chews through the hydrocortisone so fast that barely any is left to actually replace cortisol. The patient has Addison's — there's no backup adrenal function — so they crash into adrenal crisis despite taking their normal dose."},
{stem:"A 38-year-old woman with known hypothyroidism is also found to have unexpectedly elevated total testosterone (92 ng/dL; ref: 2–45 ng/dL in women) during a routine workup for hirsutism. She is on no medications known to affect testosterone. She has regular menstrual cycles, no clitoromegaly, and only mild facial hair. Her gynecologist is concerned about an androgen-secreting tumor. What is the most likely explanation for the elevated total testosterone with minimal androgenic symptoms in this patient?",choices:["A. Partial androgen insensitivity syndrome (PAIS) — elevated testosterone with reduced AR sensitivity explains mild symptoms","B. Elevated SHBG due to hypothyroidism-mediated reduction in hepatic SHBG catabolism, increasing bound (inactive) testosterone; free testosterone is normal explaining minimal symptoms","C. Elevated SHBG due to hypothyroidism causing autonomous SHBG synthesis by ovarian theca cells","D. The elevated total testosterone reflects adrenal androgen excess; DHEA-S measurement is the next appropriate test","E. Normal variant — total testosterone up to 100 ng/dL is physiologically normal in women with regular cycles"],correct:1,explanation:"Hypothyroidism reduces hepatic SHBG catabolism → SHBG accumulates → more testosterone is bound to SHBG. SHBG-bound testosterone is biologically inactive (tight binding, slow dissociation). Total testosterone rises because labs measure free + bound, but free testosterone (the bioactive fraction) remains normal. The HPG axis maintains normal free T via feedback. Result: high total T, normal free T, normal androgenic activity (minimal symptoms), regular cycles. Key teaching: always measure SHBG and calculate free testosterone when total T is elevated — particularly in thyroid disease, liver disease, or OCP use.",wrongExplanations:{0:"PAIS would present with XY karyotype or significant androgenic symptoms. This patient has no karyotype abnormality mentioned and has regular menstrual cycles. PAIS doesn't explain elevated SHBG.",2:"SHBG is synthesized by the LIVER, not by ovarian theca cells. Hypothyroidism affects hepatic SHBG metabolism, not ovarian SHBG production. Theca cells produce androgens (testosterone, androstenedione), not binding proteins.",3:"DHEA-S elevation would suggest adrenal androgen excess (DHEA from zona reticularis). However, SHBG is already markedly elevated, and free testosterone is normal — strongly suggesting this is a binding protein issue, not androgen overproduction. LH/FSH being normal also argues against an ovarian or adrenal tumor.",4:"Total testosterone of 92 ng/dL is above the normal range for women (typically 2–45 ng/dL). This is not a 'normal variant.' However, the key insight is that total testosterone elevation here is artifactual (SHBG elevation), not pathological androgen excess."},eli5:"Hypothyroidism does something sneaky to SHBG — it reduces the liver's ability to break down SHBG, so SHBG builds up. More SHBG = more testosterone gets caged up. Total testosterone looks high on labs because you're measuring all of it (caged + free). But only FREE testosterone causes androgenic symptoms. Since free T is normal, the patient has normal androgenic activity — no tumor needed. This is a classic SHBG trap on exams."},
{stem:"A 55-year-old man underwent transsphenoidal surgery for a large non-functioning pituitary macroadenoma 6 weeks ago. Postoperatively, he was started on hydrocortisone 15 mg AM / 5 mg PM. He returns to clinic feeling significantly better than immediately post-op but now reports cold intolerance, constipation, dry skin, and persistent fatigue despite glucocorticoid replacement. His wife notes he seems 'slower' mentally. Exam: HR 52 bpm, BP 104/68 mmHg, dry coarse skin, non-pitting periorbital edema, delayed relaxation of deep tendon reflexes. Why is the TSH normal-low despite the patient having central hypothyroidism, and what treatment is indicated?",choices:["A. The TSH is suppressed by the hydrocortisone; stop hydrocortisone first then remeasure TSH to confirm hypothyroidism","B. In central (secondary/tertiary) hypothyroidism, the pituitary cannot produce normal TSH — TSH is low or inappropriately 'normal' despite low free T4 because the pituitary itself is damaged; levothyroxine is indicated based on low free T4","C. TSH of 0.4 mIU/L is within normal range and rules out hypothyroidism; the symptoms reflect residual hydrocortisone-mediated metabolic slowing","D. Low TSH indicates subclinical hyperthyroidism; the free T4 of 0.5 is a lab error and should be repeated","E. The low-normal TSH indicates the patient is over-replaced with hydrocortisone, causing exogenous steroid-mediated TSH suppression; reduce hydrocortisone dose"],correct:1,explanation:"Central (secondary) hypothyroidism: pituitary damage (post-surgical) → insufficient TSH secretion → thyroid gland understimulated → low T4. TSH is not elevated (as it would be in primary hypothyroidism) — it is low or inappropriately 'normal' (low or low-normal TSH + low free T4 = central hypothyroidism). TSH is not a reliable screening tool for central hypothyroidism — free T4 must be used directly. Treatment: levothyroxine, titrated to free T4 in the mid-to-upper normal range. Critical point: always replace cortisol BEFORE thyroid hormone in panhypopituitarism — thyroid hormone accelerates cortisol metabolism and can precipitate adrenal crisis if adrenal insufficiency is untreated.",wrongExplanations:{0:"Stopping hydrocortisone to 'unmask' TSH would precipitate adrenal crisis in a patient with secondary AI — dangerous and unnecessary. Glucocorticoids do mildly suppress TSH but the magnitude is small. A TSH of 0.4 with free T4 of 0.5 is clearly central hypothyroidism, not steroid-suppressed TSH.",2:"TSH 0.4 mIU/L is technically within the reference range of 0.4–4.0 mIU/L. However, in the context of pituitary surgery, free T4 of 0.5 ng/dL (markedly low), and symptoms of hypothyroidism, the TSH must be interpreted in context. The pituitary can't produce a normal TSH response — so a 'normal' TSH is inappropriately low for the situation.",3:"Free T4 of 0.5 ng/dL is unambiguously low (normal ~0.8–1.8 ng/dL). This is not a lab error. TSH of 0.4 with low free T4 = central hypothyroidism, not subclinical hyperthyroidism (which would require high free T4 with low TSH).",4:"A hydrocortisone dose of 15/5 mg is physiologic replacement (equivalent to normal daily cortisol production ~15–20 mg/day). This would not cause significant TSH suppression sufficient to explain a low free T4 and overt hypothyroidism symptoms."},eli5:"Normally, when thyroid hormone is low, the pituitary senses it and screams 'TSH! TSH!' to try to make the thyroid work harder. But in central hypothyroidism, the pituitary itself is damaged — it can't make normal TSH. So the TSH looks 'normal' or even low-normal, even though free T4 is actually dangerously low. The pituitary can't sound the alarm properly. You must look at free T4 directly, not just rely on TSH — which is why free T4 is the gold standard for monitoring central hypothyroidism."},
{stem:"A randomized controlled trial compares a new oral anticoagulant (Drug X) to warfarin for prevention of stroke in atrial fibrillation. The primary endpoint is stroke/systemic embolism. The predefined non-inferiority margin is Δ = 1.5% absolute risk difference. The trial enrolls 4,200 patients per arm. Results: Drug X event rate 3.2% vs. warfarin 3.8%. Risk difference: −0.6% (Drug X better). 95% CI for risk difference: (−1.4%, +0.2%). Based on these results, which of the following conclusions is correct?",choices:["A. Superiority is established because the point estimate favors Drug X (−0.6%) and is statistically significant","B. Non-inferiority is established, and since the 95% CI crosses 0 (includes possibility Drug X is slightly worse), superiority cannot be claimed","C. Non-inferiority is NOT established because the upper CI bound (+0.2%) exceeds 0, indicating Drug X could be worse than warfarin","D. The trial is inconclusive — the non-inferiority margin was set incorrectly and must be renegotiated","E. Both non-inferiority and superiority are established because the lower CI bound does not cross −Δ and the upper CI entirely stays below +Δ"],correct:1,explanation:"Non-inferiority conclusion: the entire 95% CI (−1.4% to +0.2%) must be below +Δ (+1.5%). Upper bound +0.2% < +1.5% → non-inferiority IS established. However, the CI crosses 0 (includes values where Drug X could be up to 0.2% worse than warfarin) → superiority is NOT established. To claim superiority in a non-inferiority trial, the entire CI must lie on the beneficial side of 0 (entirely negative risk difference = Drug X always better). This is a classic 'non-inferiority proven, superiority not proven' result — the drug is at least as good as warfarin but not proven better.",wrongExplanations:{0:"Superiority requires the entire CI to exclude 0 on the favorable side. The CI here includes +0.2% (Drug X could be slightly worse than warfarin). Crossing 0 means superiority is NOT established, regardless of the point estimate.",2:"The upper CI bound (+0.2%) does cross 0 — meaning Drug X COULD be slightly worse. But this is the criterion for claiming superiority, not non-inferiority. For NI, we compare the upper bound to +Δ (+1.5%), not to 0. Since +0.2% < +1.5%, NI IS established.",3:"The non-inferiority margin was pre-specified (not incorrectly set during the trial). The trial is NOT inconclusive — it clearly establishes non-inferiority. The margin would need pre-trial justification but cannot be 'renegotiated' post-hoc.",4:"Both cannot be claimed. Non-inferiority IS established (upper CI < +Δ). But superiority requires the CI to exclude 0 entirely on the favorable side — the upper bound +0.2% crosses 0, so superiority is NOT established. Claiming both simultaneously is incorrect."},eli5:"For non-inferiority: the worst-case scenario (upper CI bound = +0.2%) must be less than +Δ (+1.5%). It is — so non-inferiority is proven. For superiority: the CI must NOT cross zero. But our upper bound is +0.2%, which crosses zero (the drug could be 0.2% worse). So we CAN'T declare superiority — there's still a chance warfarin is marginally better. Non-inferiority: YES. Superiority: NO (CI crosses zero)."},
{stem:"A generic pharmaceutical company conducts an equivalence trial comparing their generic levothyroxine (Drug G) to brand-name levothyroxine (Drug B) in 800 patients with hypothyroidism. The predefined equivalence margin is Δ = ±0.3 mIU/L change in TSH from baseline. After 6 months, the mean TSH difference (Drug G − Drug B) is +0.05 mIU/L. The 95% CI is (−0.18, +0.38). Which of the following best describes the correct interpretation of these trial results?",choices:["A. Equivalence is established — the point estimate (+0.05) is very close to 0 and clinically negligible","B. Equivalence is not established — the upper CI bound (+0.38) exceeds +Δ (+0.30), meaning Drug G could cause meaningfully worse TSH control; non-inferiority also fails for the same reason","C. Equivalence is not established because the upper CI exceeds +Δ, but non-inferiority IS established because the lower CI (−0.18) is above −Δ (−0.30)","D. The trial failed — both drugs should be withdrawn from the market pending further study","E. Superiority of Drug B over Drug G is established because the CI extends into the zone where Drug G is worse"],correct:2,explanation:"Equivalence requires BOTH bounds of the CI to be within (−Δ, +Δ) = (−0.30, +0.30). Lower bound: −0.18 > −0.30 ✓. Upper bound: +0.38 > +0.30 ✗. → Equivalence NOT established. However, for non-inferiority (one-sided): lower bound must be above −Δ. −0.18 > −0.30 ✓ → Non-inferiority IS established. Interpretation: Drug G is not worse than Drug B (NI proven), but we cannot claim they are therapeutically equivalent (the generic could make TSH up to 0.38 mIU/L higher than brand-name — outside the equivalence margin). Regulatory implication: FDA may still consider this sufficient for generic approval depending on clinical context.",wrongExplanations:{0:"The point estimate alone (clinical judgment of 'negligible') is never sufficient to declare equivalence in a clinical trial. Statistical equivalence requires the ENTIRE CI to fall within the predefined margins. The CI upper bound exceeds +Δ — equivalence fails by statistical definition.",1:"Non-inferiority IS established (lower CI bound −0.18 > −Δ −0.30). This answer incorrectly states non-inferiority fails — it conflates the non-inferiority criterion (lower CI vs −Δ) with the equivalence criterion (both CI bounds vs ±Δ).",3:"Non-inferiority is established — Drug G is not meaningfully worse. The trial result is not a failure; it demonstrates NI with equivalence not proven. Neither drug needs to be withdrawn. This is a common result for generic equivalence trials.",4:"Superiority of Drug B requires Drug G's CI to be entirely above +Δ (entirely unfavorable). The CI includes −0.18 (Drug G could actually be slightly better than Drug B). This does not establish Brand B superiority."},eli5:""},
{stem:"A 45-year-old woman with primary adrenal insufficiency (Addison's disease) on hydrocortisone 15 mg AM / 5 mg PM and fludrocortisone 0.1 mg daily is scheduled for an elective laparoscopic cholecystectomy. She is otherwise healthy. The anesthesiology team asks you about perioperative steroid management. Which of the following perioperative steroid management strategies is most appropriate for this patient undergoing a moderate-stress surgical procedure?",choices:["A. Continue her regular oral hydrocortisone only — laparoscopic surgery is low-risk and no supplementation is required","B. Administer hydrocortisone 100 mg IV bolus before induction, then 50 mg IV every 8 hours for 48 hours, then taper back to maintenance over 2–3 days","C. Triple her oral hydrocortisone dose to 45 mg AM / 15 mg PM for the week before surgery to pre-load cortisol reserves","D. Discontinue fludrocortisone perioperatively — IV normal saline provides adequate mineralocorticoid coverage","E. Administer a single dose of dexamethasone 4 mg IV at induction — it has long duration and high glucocorticoid potency with negligible mineralocorticoid activity"],correct:1,explanation:"Stress dosing for moderate surgical stress (laparoscopic surgery) in a patient with primary AI: (1) hydrocortisone 100 mg IV bolus at induction (covers the acute surgical stress peak); (2) 50 mg IV every 8 hours for 24–48 hours (covers the postoperative stress period); (3) taper back to maintenance over 2–3 days as stress resolves. Hydrocortisone at high doses also has mineralocorticoid activity, so fludrocortisone can be held during the perioperative IV period but should be resumed when the patient is eating and on oral meds. High-dose hydrocortisone (>100 mg/day equivalent) covers mineralocorticoid needs.",wrongExplanations:{0:"Oral medications cannot be reliably absorbed perioperatively (NPO status, anesthetic effects on gut motility, potential nausea/vomiting). A patient with Addison's cannot rely on oral hydrocortisone during surgery — IV stress dosing is mandatory.",2:"'Pre-loading' cortisol by taking extra oral doses before surgery does not work — cortisol has a short half-life and is not stored. What matters is having IV cortisol available during and after the acute surgical stress, not pre-surgical oral loading.",3:"Normal saline does NOT provide mineralocorticoid coverage — it replaces volume and sodium but doesn't activate mineralocorticoid receptors. Fludrocortisone should be continued (or high-dose hydrocortisone IV, which has intrinsic mineralocorticoid activity at high doses).",4:"Dexamethasone has essentially no mineralocorticoid activity — it only covers glucocorticoid needs. This patient also needs mineralocorticoid replacement (or high-dose hydrocortisone). Additionally, dexamethasone is not the standard stress-dosing agent; hydrocortisone is preferred because it covers both glucocorticoid and mineralocorticoid needs at higher doses."},eli5:"For moderate-stress surgery in a patient with Addison's disease, you need to give IV cortisol because: (1) she can't make any herself, (2) surgical stress normally causes a 5-10x cortisol surge, and (3) she can't absorb oral medications reliably under anesthesia. The classic approach is 100 mg IV at induction, then 50 mg every 8 hours for the first 1-2 days (covering the stress response period), then tapering back to her baseline over 2-3 days."},
{stem:"A clinical trial evaluates a new antidepressant vs. placebo for major depressive disorder over 12 weeks. The ITT analysis (n=820, all randomized) shows a mean HAMD-17 reduction of 4.2 points for drug vs. 3.1 points for placebo (difference 1.1; 95% CI: 0.1 to 2.1; p=0.033). The per-protocol analysis (n=612, excluding 25% who dropped out or had >20% protocol violations) shows a mean difference of 2.8 points (95% CI: 1.8 to 3.8; p<0.001). The minimum clinically important difference (MCID) is considered 3 points on HAMD-17. Which of the following best describes the correct interpretation and the key limitation of this trial?",choices:["A. The trial demonstrates superiority — ITT p<0.05 confirms statistical significance and the per-protocol analysis confirms robust clinical benefit above the MCID","B. The trial is statistically positive (ITT p=0.033) but clinically uncertain — the ITT effect (1.1 pts) falls below the MCID (3 pts), and the large dropout rate introduces potential bias; the discordance between ITT and PP raises concerns about protocol adherence affecting results","C. The trial is negative — per-protocol analysis is the gold standard for superiority trials and the PP difference does not reach statistical significance","D. The trial is invalid due to the 25% dropout rate; all results should be disregarded until the trial is repeated with better adherence","E. Superiority is established only for patients who adhered to the protocol; the drug should be approved exclusively for adherent patients"],correct:1,explanation:"Interpretation: statistically positive ITT (CI excludes 0, p=0.033), but effect size below MCID (1.1 < 3.0 pts) → clinically meaningful benefit not established. High dropout (25%) threatens ITT analysis quality (LOCF or imputation assumptions matter greatly). PP analysis shows larger effect (2.8 pts, approaching MCID) — but PP excludes dropouts who may have stopped due to lack of efficacy or side effects, inflating apparent benefit. The large ITT/PP discordance (1.1 vs 2.8) itself is a red flag for significant dropout-related bias. Key teaching: statistical significance ≠ clinical significance; always evaluate effect size against MCID.",wrongExplanations:{0:"The PP difference (2.8 pts) does NOT exceed the MCID (3.0 pts) — it is still below. Even in PP analysis, clinical significance is not established. Also, using PP to 'confirm' superiority in a superiority trial is inappropriate — ITT is primary.",2:"For superiority trials, ITT is the primary analysis, not per-protocol. The trial is NOT negative — ITT is statistically positive. PP showing a larger (not smaller) effect is the norm when dropouts reduce dilution of treatment effect.",3:"25% dropout requires careful handling (via imputation methods like LOCF, MMRM) but does not automatically invalidate a trial. The results are not 'disregarded' — they are interpreted with awareness of the dropout-related limitations.",4:"Drug approval based on 'adherent patients only' is not how regulatory approvals work. Drugs are approved for populations (with the full ITT in mind), not just for the per-protocol compliant subset. This would also be clinically impractical."},eli5:"The drug is statistically 'better' than placebo (ITT p=0.033), but the real-world benefit is only 1.1 points — which is less than the 3 points experts consider clinically meaningful. So technically, yes, there's a difference. But would a patient actually feel better? Probably not enough to matter. The dropout rate is suspicious too — why did 25% leave? If the sicker patients (or patients getting worse) dropped out, the PP analysis looks artificially better. This is the 'statistically significant but clinically insignificant' trap."},
{stem:"A 62-year-old man presents with a 6-month history of fatigue, cold intolerance, decreased libido, and 10 kg weight gain. He had a subarachnoid hemorrhage with surgical clipping of a right MCA aneurysm 8 months ago. He was told his pituitary was 'affected' during surgery. He takes no medications. On exam: BP 102/64 mmHg, HR 56 bpm, periorbital edema, dry coarse skin, loss of axillary and pubic hair, and small soft testes. This patient has panhypopituitarism. In what order should hormone replacement be initiated, and why?",choices:["A. Start levothyroxine first — thyroid hormone is the most symptomatic deficiency and drives all other hormonal normalizations","B. Start all deficient hormones simultaneously to correct all abnormalities efficiently and prevent further deterioration","C. Start hydrocortisone first, then levothyroxine after 48–72 hours, then testosterone last — thyroid hormone accelerates cortisol clearance and can precipitate adrenal crisis if cortisol is not first replaced","D. Start testosterone first to restore libido and energy, then address thyroid and adrenal replacement once the patient reports improvement","E. Start hydrocortisone and levothyroxine simultaneously — testosterone can be deferred as it is not immediately life-threatening"],correct:2,explanation:"The critical rule in panhypopituitarism replacement: cortisol FIRST, then thyroid. Mechanism: thyroid hormone (T3/T4) upregulates hepatic enzyme activity (including cortisol metabolism) and increases metabolic rate → accelerated cortisol clearance → can precipitate adrenal crisis in an unprotected patient. Sequence: (1) hydrocortisone replacement (start immediately — low cortisol + hypoglycemia + hyponatremia = dangerous); (2) levothyroxine after 48–72 hours of cortisol replacement; (3) testosterone can be started electively once stabilized. GH replacement (if needed) is typically last and elective. Starting thyroid hormone first without glucocorticoid coverage is a classic exam trap and real-world danger.",wrongExplanations:{0:"Starting levothyroxine first in a patient with unrecognized or untreated adrenal insufficiency can precipitate adrenal crisis — a potentially fatal error. Thyroid hormone increases cortisol clearance; if the patient has no cortisol reserve (as here), this can cause acute life-threatening cortisol deficiency.",1:"Starting all hormones simultaneously is dangerous because thyroid hormone accelerates cortisol clearance. Even if hydrocortisone is started at the same time, the interaction is unpredictable. Sequential initiation (cortisol first, then thyroid) is the standard of care.",3:"Starting testosterone first addresses only a non-urgent deficiency (libido) while leaving life-threatening adrenal insufficiency and symptomatic hypothyroidism untreated. Adrenal crisis (due to low cortisol) can occur at any time under physiologic stress — this patient needs cortisol replacement urgently.",4:"Starting hydrocortisone and levothyroxine simultaneously is debated but generally not recommended — the standard is to wait 48–72 hours after establishing cortisol replacement before adding thyroid hormone. This avoids the risk of levothyroxine accelerating the metabolism of initially low cortisol before steady-state replacement is achieved."},eli5:"This is the 'rule of order' in panhypopituitarism — it matters A LOT. Always start cortisol first because it's life-threatening if missing and thyroid hormone will make it worse. Here's why: thyroid hormone speeds up metabolism, including cortisol breakdown. If you give thyroid hormone to someone with low cortisol and no cortisol replacement, the little cortisol they have gets chewed through even faster — adrenal crisis. So: (1) cortisol first, then (2) thyroid, then (3) everything else (testosterone, GH) once the patient is stable."}]
