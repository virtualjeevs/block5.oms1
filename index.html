<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block 5 — UNE COM Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#1A7A6D;--teal-deep:#125E54;--teal-light:#E3F5F2;--teal-mid:#2BA393;--teal-glow:#3EC4B2;
  --navy:#1B2A4A;--navy2:#12203C;
  --coral:#E07A5F;--coral-bg:#FEF0EB;
  --gold:#D4A843;--gold-bg:#FDF6E3;--gold-warm:#E8C76A;
  --plum:#7B5EA7;--plum-bg:#F3EEF9;
  --sky:#4A9AE8;--sky-bg:#EAF2FC;
  --warm:#FBF8F3;--cream:#F6F3EC;--white:#FFFFFF;
  --ink:#1E1E20;--ink2:#3E4555;--slate:#6B7689;--mist:#A0AAB8;
  --rule:#DBD5C9;--rule2:#E9E4DA;
  --green:#2D8659;--green-bg:#E8F5EE;
  --red:#C44040;--red-bg:#FDF0F0;
  --amber:#C07B1A;--amber-bg:#FEF5E6;
  --r:12px;--rs:8px;
  --sh:0 1px 3px rgba(0,0,0,0.04),0 2px 12px rgba(0,0,0,0.03);
  --sh2:0 6px 24px rgba(0,0,0,0.08);
  --tr:0.2s ease;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;font-size:16px;background:var(--cream);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
::selection{background:var(--teal-light);color:var(--teal-deep)}
.app{display:flex;height:100vh}

/* ═══ SIDEBAR ═══ */
.sb{width:280px;min-width:280px;background:var(--navy2);color:#fff;display:flex;flex-direction:column;z-index:10}
.sb-hd{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-brand{display:flex;align-items:center;gap:12px}
.sb-brand img{width:46px;height:46px;border-radius:10px;object-fit:cover;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.sb-brand-txt h1{font-family:'Crimson Pro',serif;font-size:21px;font-weight:700;line-height:1.15}
.sb-brand-txt h1 em{font-style:normal;color:var(--teal-glow)}
.sb-brand-txt small{display:block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;opacity:0.35;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.sb-tabs{display:flex;margin:12px 14px 0;gap:4px}
.sb-tab{flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;cursor:pointer;border:none;border-radius:7px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3);transition:var(--tr);font-family:'Nunito',sans-serif}
.sb-tab:hover{color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.06)}
.sb-tab.on{color:var(--navy2);background:var(--teal-glow);box-shadow:0 1px 8px rgba(62,196,178,0.25)}
.sb-list{flex:1;overflow-y:auto;padding:8px 0 20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.06) transparent}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
.wk{margin:1px 8px;border-radius:var(--rs)}
.wk-hd{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;border-radius:var(--rs);transition:var(--tr)}
.wk-hd:hover{background:rgba(255,255,255,0.04)}
.wk.on>.wk-hd{background:rgba(255,255,255,0.07)}
.wk.on.ex>.wk-hd{border-radius:var(--rs) var(--rs) 0 0}
.wk-n{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,0.06)}
.wk.on .wk-n{background:var(--teal-glow);color:var(--navy2)}
.wk-l{font-size:15px;font-weight:600;flex:1}
.wk-dots{display:flex;gap:4px}
.wk-d{width:6px;height:6px;border-radius:50%;opacity:0.7}
.wk-d.dn{background:#5EC490}.wk-d.dq{background:var(--gold-warm)}.wk-d.dr{background:var(--coral)}
.wk-ch{font-size:9px;opacity:0.25;transition:transform .2s}
.wk.ex .wk-ch{transform:rotate(180deg);opacity:0.5}
.wk-sub{display:none;padding:2px 0 4px;background:rgba(0,0,0,0.12);border-radius:0 0 var(--rs) var(--rs)}
.wk.ex .wk-sub{display:block}
.si{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 36px;cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,0.35);transition:var(--tr)}
.si:hover{color:rgba(255,255,255,0.7)}
.si.on{color:#fff;font-weight:700}
.si .sii{width:18px;text-align:center;font-size:14px}
.si .sic{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:0.35}
.sb-tog{display:none;position:fixed;top:12px;left:12px;z-index:50;width:42px;height:42px;border-radius:var(--rs);border:none;background:var(--navy);color:#fff;font-size:18px;cursor:pointer;box-shadow:var(--sh2)}

/* ═══ MAIN ═══ */
.mn{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--cream)}
.mn-hd{padding:28px 44px 24px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--rule2)}
.mn-hd h2{font-family:'Crimson Pro',serif;font-size:32px;font-weight:700;color:var(--navy);letter-spacing:-0.5px;line-height:1.15}
.mn-hd .bc{font-size:14px;color:var(--slate);margin-top:5px}
.mn-bd{flex:1;padding:36px 44px 80px}
.mn-inner{max-width:880px}

/* sections */
.sec{margin-bottom:40px;animation:rise .3s ease both}
.sec:nth-child(2){animation-delay:.05s}.sec:nth-child(3){animation-delay:.1s}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sec-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--rule2)}
.sec-hd h3{font-family:'Crimson Pro',serif;font-size:17px;font-weight:700;color:var(--teal-deep);letter-spacing:0.3px;text-transform:uppercase}
.sec-hd .cnt{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mist);font-weight:600}

/* notes */
.ng{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.nc{padding:22px;background:var(--white);border:1.5px solid var(--rule2);border-radius:var(--r);transition:var(--tr);display:flex;flex-direction:column}
.nc:hover{border-color:var(--green);box-shadow:var(--sh2);transform:translateY(-2px)}
.nc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.nc-top .ni{font-size:28px;margin-top:2px}
.nc-top .nt{font-family:'Crimson Pro',serif;font-size:18px;font-weight:700;color:var(--navy);line-height:1.25}
.nc-top .nf{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--mist);margin-top:3px}
.nc-btns{display:flex;gap:6px;margin-top:auto}
.nc-btn{flex:1;padding:9px 0;text-align:center;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);border:none}
.nc-btn.open{background:var(--teal);color:#fff}.nc-btn.open:hover{background:var(--teal-deep)}
.nc-btn.dl{background:transparent;color:var(--ink2);border:1.5px solid var(--rule)}.nc-btn.dl:hover{background:var(--teal-light);color:var(--teal);border-color:var(--teal)}

/* quiz cards */
.qg{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.qc{padding:22px;background:var(--white);border:1.5px solid var(--rule2);border-radius:var(--r);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--coral),var(--gold-warm));opacity:0;transition:var(--tr)}
.qc:hover{border-color:var(--coral);box-shadow:var(--sh2);transform:translateY(-2px)}
.qc:hover::before{opacity:1}
.qc .qn{font-family:'Crimson Pro',serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:5px}
.qc .qs{font-size:14px;color:var(--slate)}
.qc .qi{position:absolute;bottom:-6px;right:6px;font-size:48px;opacity:0.04}

/* RAT/PQ cards */
.rat-card{padding:22px;background:var(--white);border:1.5px solid var(--rule2);border-radius:var(--r);transition:var(--tr);overflow:hidden;position:relative;margin-bottom:10px}
.rat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--plum),var(--coral));opacity:0;transition:var(--tr)}
.rat-card:hover{border-color:var(--plum);box-shadow:var(--sh2);transform:translateY(-2px)}
.rat-card:hover::before{opacity:1}
.rat-card .rat-name{font-family:'Crimson Pro',serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.rat-card .rat-meta{font-size:14px;color:var(--slate);display:flex;gap:14px}
.rat-btns{display:flex;gap:6px;margin-top:14px}
.rat-btn{padding:9px 18px;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);border:none}
.rat-btn.plo{background:var(--plum);color:#fff}.rat-btn.plo:hover{background:#6A4F90}
.rat-btn.prac{background:var(--coral);color:#fff}.rat-btn.prac:hover{background:#C96A52}

/* empty */
.emp{text-align:center;padding:44px 20px}
.emp .ei{font-size:36px;margin-bottom:10px;opacity:0.2}
.emp h4{font-family:'Crimson Pro',serif;font-size:18px;color:var(--ink2);margin-bottom:6px}
.emp p{font-size:14px;color:var(--slate)}
.emp code{background:var(--warm);padding:2px 8px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);border:1px solid var(--rule2)}

/* ═══ QUIZ OVERLAY ═══ */
.qo{display:none;position:fixed;inset:0;background:var(--warm);z-index:200;overflow-y:auto}
.qo.open{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.qt-bar{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.qt-bar h2{font-family:'Crimson Pro',serif;font-size:21px;font-weight:700}
.qt-btns{display:flex;gap:6px}
.qt-btn{padding:8px 16px;border-radius:var(--rs);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:var(--tr);border:none}
.qt-btn.reset{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12)}
.qt-btn.reset:hover{background:rgba(255,255,255,0.14);color:#fff}
.qt-btn.print{display:none;background:var(--gold-warm);color:var(--navy2);font-weight:800}
.qt-btn.print:hover{background:var(--gold)}
.qt-btn.close{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}
.qt-btn.close:hover{background:rgba(255,255,255,0.16);color:#fff}

.qin{max-width:820px;margin:0 auto;padding:28px 24px 80px}
.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:14px}
.qst{display:flex;gap:8px}
.stb{background:var(--white);border:1px solid var(--rule2);border-radius:var(--r);padding:14px 22px;text-align:center;min-width:82px;box-shadow:var(--sh)}
.stb .n{font-family:'Crimson Pro',serif;font-size:28px;font-weight:700;color:var(--navy)}
.stb .l{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mist);font-weight:700;margin-top:2px}

/* timer area */
.timer-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.td{display:flex;align-items:center;gap:8px;background:var(--white);border:2px solid var(--rule);border-radius:var(--r);padding:10px 16px;box-shadow:var(--sh)}
.td.run{border-color:var(--teal)}.td.warn{border-color:var(--coral)}
.td .tm{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--navy);min-width:95px;text-align:center}
.td.warn .tm{color:var(--coral)}
.tb{width:36px;height:36px;border-radius:50%;border:2px solid var(--navy);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--tr);color:var(--navy)}
.tb:hover{background:var(--navy);color:#fff}

/* countdown */
.cd-box{display:flex;align-items:center;gap:8px;background:var(--white);border:2px solid var(--rule);border-radius:var(--r);padding:10px 16px;box-shadow:var(--sh)}
.cd-box.active{border-color:var(--coral)}
.cd-box .cd-time{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--navy);min-width:95px;text-align:center}
.cd-box.warn .cd-time{color:var(--coral);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.cd-box .cd-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mist);font-weight:700}
.cd-btn{padding:8px 14px;border-radius:var(--rs);border:1.5px solid var(--rule);background:var(--white);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink2);transition:var(--tr)}
.cd-btn:hover{border-color:var(--coral);color:var(--coral);background:var(--coral-bg)}

/* toolbar */
.q-toolbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.q-tool{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1.5px solid var(--rule);background:var(--white);cursor:pointer;transition:var(--tr);font-family:'Nunito',sans-serif;color:var(--ink2)}
.q-tool:hover{border-color:var(--teal);color:var(--teal)}
.q-tool.active{background:var(--teal-light);border-color:var(--teal);color:var(--teal)}
.q-tool.active.hl-tool{background:#FFFDE0;border-color:#D4C030;color:#8B7B00}
.q-tool.active.st-tool{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* question card */
.qcd{background:var(--white);border:1.5px solid var(--rule2);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.qpg{height:4px;background:var(--cream)}.qpf{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-glow));transition:width .4s;border-radius:0 2px 2px 0}
.qbd{padding:32px 36px}
.qnum{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mist);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.qstem{font-family:'Crimson Pro',serif;font-size:20px;line-height:1.75;margin-bottom:28px;font-weight:500;color:var(--ink);cursor:text}
.qstem mark,.ac mark{background:#FFFAAD;padding:0 2px;border-radius:3px}
.qstem s,.ac s{color:var(--mist);text-decoration:line-through}
.ach{display:grid;gap:8px}
.ac{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;border:1.5px solid var(--rule);border-radius:var(--r);cursor:pointer;transition:var(--tr);background:var(--white);position:relative}
.ac:hover:not(.dis):not(.struck){border-color:var(--teal);background:var(--teal-light)}
.ac.sel{border-color:var(--teal)!important;background:var(--teal-light)!important}
.ac.cor{border-color:var(--green)!important;background:var(--green-bg)!important}
.ac.inc{border-color:var(--red)!important;background:var(--red-bg)!important}
.ac.shc{border-color:var(--green)!important;background:var(--green-bg)!important}
.ac.dis{cursor:default}
.ac.struck{opacity:0.35;cursor:pointer}
.ac.struck .ctx{text-decoration:line-through}
.ac.struck:hover{opacity:0.45}
.ac mark{background:#FFFAAD;padding:0 2px;border-radius:3px}
.cl{width:34px;height:34px;border-radius:50%;border:2px solid var(--rule);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;flex-shrink:0;transition:var(--tr);background:var(--cream)}
.ac.sel .cl{background:var(--teal)!important;border-color:var(--teal)!important;color:#fff!important}
.ac.cor .cl{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important}
.ac.inc .cl{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}
.ac.shc .cl{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important}
.ctx{font-size:16px;line-height:1.55;padding-top:4px}

/* submit */
.submit-row{margin-top:18px;text-align:center}
.submit-btn{padding:13px 44px;border-radius:var(--r);background:var(--teal);color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;border:none;transition:var(--tr);box-shadow:0 2px 8px rgba(26,122,109,0.2)}
.submit-btn:hover{background:var(--teal-deep);box-shadow:0 4px 16px rgba(26,122,109,0.3)}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}

/* explanations */
.exb{margin-top:24px;border-radius:var(--r);overflow:hidden;display:none;border:1px solid var(--rule2)}
.exb.vis{display:block;animation:fi .35s ease}
.exs{padding:20px 24px}.exs+.exs{border-top:1px solid rgba(0,0,0,0.04)}
.exs.exc{background:var(--green-bg);border-left:4px solid var(--green)}
.exs.exw{background:var(--red-bg);border-left:4px solid var(--red)}
.exs.exe{background:var(--teal-light);border-left:4px solid var(--teal)}
.exl{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.exs.exc .exl{color:var(--green)}.exs.exw .exl{color:var(--red)}.exs.exe .exl{color:var(--teal)}
.ext{font-size:15px;line-height:1.7;color:var(--ink2)}
.wce{margin-top:8px;padding:10px 14px;background:rgba(255,255,255,0.5);border-radius:var(--rs);font-size:14px;line-height:1.6}
.wce strong{color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:12px}

/* nav */
.qnv{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-top:1px solid var(--rule2);background:var(--cream)}
.nb{padding:10px 24px;border:2px solid var(--navy);background:#fff;border-radius:var(--rs);cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--navy);transition:var(--tr)}
.nb:hover{background:var(--navy);color:#fff}
.nb.pr{background:var(--navy);color:#fff}.nb.pr:hover{background:var(--navy2)}
.nb:disabled{opacity:0.2;cursor:not-allowed}
.qdots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.qd{width:12px;height:12px;border-radius:50%;border:2px solid var(--rule);background:#fff;cursor:pointer;transition:var(--tr)}
.qd.cur{border-color:var(--teal);background:var(--teal)}.qd.acor{border-color:var(--green);background:var(--green)}.qd.ainc{border-color:var(--red);background:var(--red)}

/* PLO overlay */
.plo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:250;align-items:center;justify-content:center}
.plo-overlay.open{display:flex}
.plo-box{background:var(--white);border-radius:var(--r);max-width:720px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:var(--sh2);animation:fi .3s ease}
.plo-hd{position:sticky;top:0;background:var(--plum);color:#fff;padding:18px 24px;border-radius:var(--r) var(--r) 0 0;display:flex;justify-content:space-between;align-items:center;z-index:1}
.plo-hd h3{font-family:'Crimson Pro',serif;font-size:20px;font-weight:700}
.plo-close{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:7px 16px;border-radius:var(--rs);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;transition:var(--tr)}
.plo-close:hover{background:rgba(255,255,255,0.25)}
.plo-bd{padding:24px}
.plo-item{margin-bottom:16px;padding:18px;background:var(--plum-bg);border-radius:var(--rs);border-left:4px solid var(--plum)}
.plo-item h4{font-family:'Crimson Pro',serif;font-size:17px;font-weight:700;color:var(--plum);margin-bottom:6px}
.plo-item p{font-size:15px;line-height:1.7;color:var(--ink2)}

@media(max-width:768px){
.sb{position:fixed;left:-280px;top:0;bottom:0;transition:left .3s;z-index:100}
.sb.mo{left:0}
.sb-tog{display:flex;align-items:center;justify-content:center}
.mn-hd{padding:20px 18px 16px 62px}.mn-bd{padding:24px 16px 60px}
.qin{padding:18px 14px}.qbd{padding:24px 20px}.qh{flex-direction:column}
.ng,.qg{grid-template-columns:1fr}
}

      ploFile:"notes/week38-endocrine.html",
      plos:[
        {title:"PLO 1: Testicular Synthesis of Testosterone & AR Binding",content:"Testosterone is synthesized in Leydig cells under HPG axis regulation. LH activates the cAMP-PKA pathway, upregulating steroidogenic enzymes. Cholesterol is transported into mitochondria via StAR protein (rate-limiting step). Pathway: Cholesterol → Pregnenolone (inner mitochondrial membrane) → Progesterone (smooth ER) → 17α-Hydroxyprogesterone → Androstenedione → Testosterone (via 17β-HSD). Key enzymes: cholesterol side-chain cleavage (CYP11A1), 3β-HSD, 17α-hydroxylase, 17,20-lyase, 17β-HSD. Testosterone circulates 98% bound (SHBG + albumin) and 2% free (biologically active). In testes, bound to ABP. Testosterone binds the androgen receptor (AR), a nuclear receptor. Free T diffuses into cells → in some tissues converted to DHT by 5α-reductase (higher AR affinity) → T or DHT binds cytoplasmic AR → HSPs dissociate → conformational change → AR dimerizes → enters nucleus → binds AREs → recruits co-activators/co-repressors → regulates gene transcription. Effects: male reproductive organ development, spermatogenesis, secondary sexual characteristics, libido/mood."},
        {title:"PLO 2: Central Regulation — GnRH, FSH, and LH",content:"HPG axis: Hypothalamus → GnRH (pulsatile, from arcuate nucleus) → Anterior pituitary → LH + FSH. GnRH binds GPCR on gonadotrophs → activates phospholipase C → IP3 + DAG → calcium influx + cAMP → LH and FSH release. GnRH release stimulated by NE, Neuropeptide Y, leptin; inhibited by β-endorphin, IL-1, GABA, dopamine. LH: binds LH receptors on Leydig cells → cAMP-PKA → increases StAR protein and steroidogenic enzymes → directly stimulates testosterone. FSH: binds FSH receptors on Sertoli cells → promotes ABP (maintains high intratesticular T) and inhibin B secretion → supports spermatogenesis. Critical: GnRH must be pulsatile (q60-120 min). Continuous GnRH → receptor downregulation → paradoxical suppression (therapeutic basis for leuprolide in prostate cancer)."},
        {title:"PLO 3: Negative Feedback on Glandular Secretion",content:"Two primary negative feedback loops: (1) LH pathway: Testosterone from Leydig cells → partly converted to 17β-estradiol → both T and E2 feed back on hypothalamus and pituitary to inhibit GnRH and LH release, decreasing amplitude of LH pulses. (2) FSH pathway: FSH stimulates Sertoli cells → Sertoli cells secrete inhibin B → inhibin B specifically acts at pituitary to inhibit further FSH secretion. Additional feedback: DHT (via 5α-reductase) provides stronger inhibition of GnRH and LH. Estradiol (via aromatase in Leydig cells and adipose) inhibits GnRH and LH secretion — essential for bone density in males."},
        {title:"PLO 4: Hormone Binding to Plasma Proteins",content:"Plasma binding proteins (albumin, globulins) are made by liver. Steroid and thyroid hormones are lipid-soluble and bind these proteins. Effects: facilitates transport through bloodstream, protects from degradation (prolongs half-life), bound hormones are inactive (reservoir). Only free/unbound hormones can bind receptors. If liver increases binding protein production → free hormone decreases → feedback triggers more hormone release to compensate. Steroids bind weakly to albumin → easily dissociate → 'bioavailable.' Bioavailable testosterone = free T + albumin-bound T. SHBG binds tightly (high affinity, slow dissociation) → biologically inactive. For cortisol: ~90% bound (80% CBG, 10% albumin) = inactive; ~10% free = active form that diffuses into cells and binds GRs."},
        {title:"PLO 5: Adrenal Cortex Steroid Hormones & Zones",content:"Mnemonic: Salt, Stress/Sugar, Sex (outer to inner). Zona Glomerulosa (outer): Aldosterone (mineralocorticoid) — regulates Na⁺/K⁺ balance, increases Na⁺ retention and K⁺ excretion in kidneys, controls blood pressure. Regulated by RAAS (not ACTH primarily). Zona Fasciculata (middle): Cortisol (glucocorticoid) — manages stress response, increases blood glucose, suppresses immune function, regulates metabolism. Regulated by ACTH. Zona Reticularis (inner): Androgens (DHEA, Androstenedione) — precursors to sex hormones, contributes to secondary sex characteristics especially in females. Regulated by ACTH."},
        {title:"PLO 6: Cortisol Forms in Bloodstream & CBG",content:"Bound cortisol (~90%, inactive): ~80% to corticosteroid-binding globulin (CBG/transcortin) — acts as reservoir, prolongs half-life, prevents rapid metabolism/excretion; ~10% to albumin (weak binding). Free cortisol (~10%, active): unbound, biologically active form that diffuses into cells, binds glucocorticoid receptors, exerts physiological effects. Clinical relevance: OCP/estrogen increases hepatic CBG → more binding → free cortisol transiently drops → HPA compensates (↑ACTH) → total cortisol rises but free cortisol normalizes. Can falsely elevate total cortisol measurements."},
        {title:"PLO 7: Adrenal Medulla Catecholamines & Release Mechanism",content:"Adrenal medulla synthesizes catecholamines from tyrosine. Pathway: Tyrosine → (tyrosine hydroxylase) → DOPA → (AAAD) → Dopamine → (dopamine β-hydroxylase) → Norepinephrine → (PNMT) → Epinephrine. Production: Epinephrine ~80%, Norepinephrine ~20%, Dopamine <1%. PNMT expression maintained by cortisol (portal circulation from cortex to medulla). Release mechanism: Stress → sympathetic activation → preganglionic sympathetic neurons fire → release ACh onto chromaffin cells → ACh binds nicotinic receptors → calcium influx → vesicle exocytosis → epinephrine (80%) and norepinephrine (20%) into bloodstream. Epi effects: ↑HR (β1), bronchodilation (β2), ↑glucose (β2), vasodilation in muscle. NE effects: vasoconstriction (α1), ↑BP, maintains basal vascular tone."},
        {title:"PLO 8: CRH, ACTH, and HPA Axis",content:"HPA Axis = Hypothalamus → Pituitary → Adrenal Cortex. CRH: from paraventricular nucleus of hypothalamus, stimulated by stress and circadian rhythm, inhibited by cortisol (negative feedback). Travels via hypophyseal portal system to anterior pituitary. ACTH: from anterior pituitary (in response to CRH), binds MC2R receptors on zona fasciculata → stimulates cortisol synthesis and release. Inhibited by high cortisol. Sequence: Stress → hypothalamus secretes CRH → anterior pituitary releases ACTH → ACTH binds MC2R on adrenal cortex (zona fasciculata) → cortisol synthesis → cortisol regulates metabolism, immune response, stress adaptation (↑blood glucose, suppresses inflammation). Negative feedback: high cortisol inhibits both CRH and ACTH release."},
        {title:"PLO 9: Diurnal Pattern of Cortisol",content:"Cortisol follows circadian (diurnal) rhythm. Early morning (4-8 AM, peak ~6-8 AM): highest — prepares for wakefulness, alertness, gluconeogenesis. Daytime: gradual decline — supports metabolism, stress response, immune regulation. Evening: low — allows relaxation and transition to rest. Night (midnight-4 AM): lowest — facilitates sleep, tissue repair, immune function. Controlled by: light exposure (morning light → ↑CRH/ACTH → high cortisol; darkness → suppresses CRH → low cortisol), SCN (suprachiasmatic nucleus — master circadian clock, detects light/dark cycles, signals hypothalamus), HPA axis. Disruptions: chronic stress → elevated evening cortisol; sleep deprivation → dysregulated cortisol affecting immune function and metabolism. Night shift workers: SCN gradually adapts, cortisol peak shifts to align with new awakening time."},
        {title:"PLO 10: Glucocorticoid Receptors & Cortisol Gene Activation",content:"Two types: GRα (GR1) — found in most tissues (cytoplasm), binds cortisol with high affinity AND aldosterone, mediates metabolic/anti-inflammatory/immunosuppressive effects, activates or represses gene transcription via GREs. GRβ (GR2) — primarily in immune/inflammatory cells, only binds cortisol (not aldosterone), acts as dominant-negative inhibitor of GRα, inhibits GRα-mediated gene expression → linked to glucocorticoid resistance (asthma, RA). Cellular mechanism: (1) Cortisol freely diffuses into cell (lipophilic), (2) Binds inactive GRα → conformational change → releases HSPs, (3) Activated cortisol-GR complex enters nucleus → binds GREs → acts as transcription factor, (4) Transactivation: ↑gluconeogenesis genes, ↑anti-inflammatory proteins (IκBα, lipocortin-1); Transrepression: suppresses pro-inflammatory genes by blocking NF-κB and AP-1."},
        {title:"PLO 11: Superiority, Non-Inferiority & Equivalence Trials",content:"Superiority trial (Novel vs Non-standard): Tests if new intervention is BETTER than control. Two-tailed hypothesis. Uses effect size (d). Statistical significance: μ₁ − μ₀ ≠ 0. CI entirely above 0 = superior. Reports p-value and CI. ITT analysis. Noninferiority trial (Novel vs Standard): Tests if new intervention is NOT UNACCEPTABLY WORSE. One-tailed hypothesis. Uses effect size (d) and clinically meaningful difference (Δ). Statistical significance: μ₁ − μ₀ > −Δ. CI lower bound above −Δ = non-inferior. Reports CI. Requires BOTH ITT and per-protocol analysis. Equivalence trial (Novel vs Standard): Tests if new intervention is SIMILAR (neither worse nor better). Two-tailed hypothesis. Statistical significance: −Δ ≤ μ₁ − μ₀ ≤ Δ. Entire CI within (−Δ, +Δ) = equivalent. Reports CI. Requires BOTH ITT and per-protocol."},
        {title:"PLO 12: Plotting & Interpreting Trial Results",content:"Superiority: CI entirely above 0 = new treatment superior; CI crosses 0 = no significant difference (superiority not proven); CI entirely below 0 = control is superior. Noninferiority: CI entirely above −Δ = non-inferiority proven; CI crosses −Δ = non-inferiority not proven; CI entirely below −Δ = new treatment is inferior. If CI also exceeds 0, can claim superiority. Equivalence: CI entirely within (−Δ, +Δ) = treatments are equivalent; CI extends beyond −Δ or +Δ = equivalence not proven."},
        {title:"PLO 13: Primary, Secondary & Acute Adrenal Insufficiency",content:"Primary AI (Addison's disease): Direct damage to adrenal glands → reduced cortisol AND aldosterone. High ACTH (no negative feedback) → hyperpigmentation (ACTH/MSH from same POMC precursor). Features: fatigue, weight loss, hypotension, salt craving, hyperkalemia, hyponatremia. Secondary AI: Insufficient ACTH from pituitary → cortisol deficiency. Aldosterone usually NORMAL (regulated by RAAS, not ACTH). No hyperpigmentation (ACTH is low). Features: fatigue, weight loss, hypotension. Acute AI (Adrenal Crisis): Sudden life-threatening drop in cortisol, often triggered by stress (infection, trauma, surgery) in patients with adrenal insufficiency or abrupt glucocorticoid withdrawal. Treatment: rapid IV hydrocortisone + fluid support (isotonic saline). Features: severe hypotension, shock, abdominal pain, vomiting, confusion."},
        {title:"PLO 14: Pharmacodynamics & Pharmacokinetics of Synthetic Corticosteroids",content:"Synthetic corticosteroids = Glucocorticoids + Mineralocorticoids (longer acting, variable mineralocorticoid activity). Glucocorticoids (cortisol, prednisone, triamcinolone, dexamethasone): bind GRα in cytoplasm → form complex → enter nucleus → regulate gene expression. Effects: anti-inflammatory, immunosuppressive. Adverse effects: adrenal atrophy, osteoporosis, diabetes, Cushingoid symptoms, weight gain, muscle wasting, heart failure, HTN, steroid psychosis. Metabolized by CYP3A4 — CYP3A4 inducers (rifampin) decrease levels. Mineralocorticoids (aldosterone, fludrocortisone): bind MRs in kidney, colon, sweat glands → increase Na⁺ reabsorption and K⁺ excretion via Na⁺/K⁺ ATPase and ENaC in distal tubules. Fludrocortisone adverse effects: hypertension, edema, hypokalemia."}
      ],
      questions:[{stem:"A researcher blocks StAR protein function in Leydig cells. Which of the following best describes the immediate consequence?",choices:["A. Testosterone cannot be converted to DHT in peripheral tissues","B. Cholesterol cannot be transported into mitochondria, halting steroidogenesis","C. LH cannot bind to its receptor on Leydig cells","D. GnRH secretion is increased due to lack of negative feedback","E. Pregnenolone accumulates in the smooth endoplasmic reticulum"],correct:1,explanation:"StAR (steroidogenic acute regulatory protein) is the rate-limiting step — it transports cholesterol from the outer to the inner mitochondrial membrane. Without it, cholesterol cannot enter the mitochondria to be converted to pregnenolone, immediately halting all downstream steroidogenesis.",wrongExplanations:{0:"5α-reductase (in peripheral tissues) handles T→DHT conversion, not StAR. StAR operates upstream, inside Leydig cell mitochondria.",2:"LH receptor binding is a separate event upstream of StAR. LH binding activates cAMP-PKA, which then upregulates StAR — so LHR binding is unaffected.",3:"GnRH would eventually increase due to loss of negative feedback, but this is a delayed downstream consequence, not the immediate result of StAR blockade.",4:"Pregnenolone is produced inside the mitochondria from cholesterol — if cholesterol can't get in, pregnenolone can't form at all. There's nothing to accumulate anywhere."},eli5:"StAR protein is like the doorman of the mitochondria specifically for cholesterol. If the doorman is blocked, cholesterol can't get inside, and the whole steroid factory shuts down — because cholesterol is the very first ingredient."},
{stem:"A male patient is found to have a deficiency in 5α-reductase type 2. Which clinical finding would you MOST expect?",choices:["A. Elevated testosterone with underdevelopment of the prostate and external genitalia","B. Low testosterone with normal spermatogenesis","C. Elevated DHT with virilization of female external genitalia","D. Absent spermatogenesis due to loss of intratesticular testosterone","E. Normal male development with decreased libido only"],correct:0,explanation:"5α-reductase type 2 converts testosterone → DHT in the prostate, seminal vesicles, and genital skin. DHT is required for development of male external genitalia and prostate. Without it, testosterone levels are normal or elevated (no DHT feedback), but DHT-dependent structures underdevelop. Classic 5α-RD2 deficiency presents as 46,XY with ambiguous/female external genitalia at birth.",wrongExplanations:{1:"Testosterone is not low — in fact it's often elevated because DHT normally contributes to negative feedback. Spermatogenesis depends on intratesticular testosterone (not DHT), so it remains intact.",2:"This would be the opposite — 5α-reductase MAKES DHT. A deficiency means LESS DHT, not more. Elevated DHT causes virilization; this is not what you see with the deficiency.",3:"Spermatogenesis requires high intratesticular testosterone (maintained by LH on Leydig cells and FSH on Sertoli cells). 5α-reductase deficiency does not eliminate testosterone.",4:"Libido is mediated by testosterone and the androgen receptor in the brain — not primarily by DHT type 2. The major deficit is structural development of DHT-dependent tissues."},eli5:"DHT (made from testosterone by 5α-reductase) is what builds the prostate and external male genitalia during development. If you can't make DHT, testosterone is still there and normal, but the tissues that need DHT specifically (like the prostate and external genitals) don't develop properly."},
{stem:"A patient with liver cirrhosis is found to have decreased sex hormone-binding globulin (SHBG). How would this most likely affect testosterone physiology?",choices:["A. Total testosterone increases and symptoms of androgen excess appear","B. Free testosterone transiently increases, but negative feedback restores equilibrium","C. Bioavailable testosterone is permanently reduced","D. LH levels rise because less testosterone is available for feedback","E. SHBG reduction has no effect as albumin compensates fully"],correct:1,explanation:"When SHBG decreases, initially more free (bioavailable) testosterone is available. This elevated free testosterone exerts stronger negative feedback on the hypothalamus and pituitary, suppressing GnRH and LH. The result is decreased testosterone production, restoring free levels toward normal. Total testosterone may be lower, but free testosterone equilibrates.",wrongExplanations:{0:"Total testosterone would actually trend downward as negative feedback kicks in. Sustained androgen excess symptoms would not appear because the HPG axis compensates by reducing LH-driven synthesis.",2:"Bioavailable testosterone (free + albumin-bound) would not be permanently reduced — it transiently rises, and the system compensates. 'Permanent reduction' is incorrect.",3:"LH would actually DECREASE, not rise, because the increased free testosterone exerts stronger negative feedback at the pituitary. Rising LH would be expected if testosterone were low.",4:"Albumin binding is weak and reversible, serving as a reservoir, but it cannot fully substitute for the regulatory role of SHBG, especially acutely. The change does matter physiologically."},eli5:"Think of SHBG as a cage for testosterone. If the cage breaks (SHBG falls), testosterone escapes — free levels go up briefly. But your body's thermostat (negative feedback via HPG axis) senses more free T and turns down production, so levels normalize again."},
{stem:"Which of the following best explains why DHT, not testosterone, is the primary androgen in the prostate?",choices:["A. DHT cannot be converted back to testosterone by aromatase","B. DHT has a 10-fold higher affinity for AR and dissociates much more slowly","C. Testosterone cannot cross the blood-prostate barrier","D. The prostate only expresses GRβ, which binds DHT exclusively","E. DHT activates a separate non-genomic signaling pathway in prostatic cells"],correct:1,explanation:"DHT binds the androgen receptor with approximately 2–5x higher affinity than testosterone and dissociates up to 5x more slowly, resulting in a longer-lasting, more stable receptor complex. This prolonged receptor occupancy drives stronger and more sustained gene transcription — which is why the prostate (and skin, scalp follicles) depend on DHT for their androgen effects.",wrongExplanations:{0:"Aromatase converts testosterone to estradiol, not back from DHT. While DHT can't be aromatized (it is the 5α-reduced form), this is not the primary reason it predominates — it's about receptor affinity.",2:"Testosterone is a small lipophilic steroid and freely diffuses into prostatic cells. There is no 'blood-prostate barrier' analogous to the blood-brain barrier.",3:"The prostate primarily expresses GRα (GR1), the canonical androgen receptor, not GRβ. GRβ is predominantly found in immune/inflammatory cells and acts as a dominant-negative inhibitor.",4:"While steroids do have some non-genomic effects, the primary mechanism of DHT action in the prostate is classical nuclear receptor-mediated gene transcription — the same pathway as testosterone."},eli5:"Both DHT and testosterone can fit into the androgen receptor lock. But DHT fits so much better and holds on so much longer — it's like a master key vs a copied key. In the prostate, which needs a strong androgen signal, that extra grip makes all the difference."},
{stem:"A man is given a continuous GnRH agonist (e.g., leuprolide) for prostate cancer. After 2 weeks, his LH and testosterone levels are markedly suppressed. What is the mechanism?",choices:["A. Chronic GnRH agonist causes pituitary gonadotroph hyperplasia and FSH predominance","B. Continuous GnRH stimulation downregulates GnRH receptors on pituitary gonadotrophs","C. Leuprolide directly inhibits LH receptors on Leydig cells","D. GnRH agonists block testosterone synthesis at the StAR protein level","E. Negative feedback from aromatized estradiol suppresses LH secretion"],correct:1,explanation:"GnRH normally acts in a pulsatile manner to stimulate LH and FSH. When a GnRH agonist is given continuously, the pituitary gonadotrophs are exposed to constant stimulation, which paradoxically leads to receptor downregulation and desensitization. Within 1–3 weeks, gonadotroph response is suppressed, LH falls, and testicular testosterone drops to castrate levels — the therapeutic goal in prostate cancer.",wrongExplanations:{0:"Continuous GnRH stimulation leads to gonadotroph desensitization and receptor downregulation, NOT hyperplasia. FSH predominance does not occur; both LH and FSH are suppressed.",2:"Leuprolide acts at the pituitary level, not on testicular LH receptors. It does not have direct action on Leydig cells.",3:"GnRH agonists act on the hypothalamic-pituitary axis. They do not directly inhibit intratesticular enzymatic steps like StAR protein function.",4:"While aromatase-derived estradiol does participate in feedback, the primary mechanism of GnRH agonist suppression is receptor downregulation at the pituitary, not estradiol feedback."},eli5:"GnRH is meant to be released in pulses — like ringing a doorbell periodically. If you hold the button down constantly, the doorbell system burns out and stops responding. Continuous GnRH agonist exhausts the pituitary receptors (downregulation), so no more LH is released."},
{stem:"A patient with a testosterone-secreting testicular tumor has which of the following hormonal profiles?",choices:["A. High LH, high FSH, high testosterone","B. Low LH, low FSH, high testosterone, low inhibin B","C. Low LH, low FSH, high testosterone, normal or low inhibin B","D. Low LH, normal FSH, high testosterone (inhibin B suppresses only FSH)","E. Normal LH, high FSH, high testosterone"],correct:2,explanation:"A testosterone-secreting tumor causes autonomous high testosterone → strong negative feedback on hypothalamus (↓GnRH) and pituitary (↓LH, ↓FSH). With low FSH, Sertoli cells are understimulated, so inhibin B secretion also decreases. This creates a profile of high T, low LH, low FSH, and low-to-normal inhibin B.",wrongExplanations:{0:"High testosterone would suppress LH and FSH through negative feedback — so both should be LOW, not high. This profile would suggest primary hypogonadism (e.g., Klinefelter's).",1:"Nearly correct, but inhibin B would be LOW (not noted as normal), because FSH suppression leads to understimulated Sertoli cells which produce less inhibin B.",3:"FSH is NOT normal — it is suppressed. Testosterone's negative feedback acts on both LH and FSH. Inhibin B also falls with low FSH. The 'inhibin B only suppresses FSH' statement is about the physiology of inhibin B as a feedback signal, not the outcome here.",4:"LH would not be normal — high testosterone strongly suppresses LH secretion via negative feedback at both the hypothalamus (↓GnRH) and pituitary levels."},eli5:"High testosterone turns off LH and GnRH by negative feedback — so LH drops. FSH also drops because high androgens feed back on the pituitary. But inhibin B (from Sertoli cells) depends on FSH — since FSH is low, inhibin B also falls. It's a domino effect."},
{stem:"Which of the following best explains why FSH is essential for spermatogenesis even though testosterone alone can initiate the process?",choices:["A. FSH directly stimulates spermatogonial DNA replication via a nuclear receptor","B. FSH promotes ABP secretion by Sertoli cells, maintaining high intratesticular testosterone concentrations","C. FSH is required to activate 5α-reductase in Sertoli cells to produce DHT","D. FSH prevents apoptosis of Leydig cells during active spermatogenesis","E. FSH inhibits inhibin B, releasing FSH's own inhibitory brake"],correct:1,explanation:"FSH binds its receptor (FSHR) on Sertoli cells and stimulates production of androgen-binding protein (ABP). ABP binds testosterone within the seminiferous tubules, dramatically increasing local testosterone concentration far beyond what serum levels alone could achieve. This high intratesticular testosterone environment is critical for spermatogenesis. FSH also stimulates inhibin B secretion (for FSH feedback control).",wrongExplanations:{0:"FSH acts through a G-protein coupled receptor (GPCR/cAMP pathway), not a nuclear receptor. FSH does not directly replicate DNA — it acts on Sertoli cell support functions.",2:"5α-reductase converts testosterone to DHT in peripheral tissues and certain testicular cells, but this is not the primary FSH-driven mechanism for spermatogenesis support.",3:"FSH does not act on Leydig cells — that's LH's job. FSH acts exclusively on Sertoli cells. It has no anti-apoptotic role for Leydig cells.",4:"This is backwards. FSH stimulates inhibin B secretion, and inhibin B then feeds back to inhibit FSH — not the other way around. FSH doesn't inhibit its own inhibitor."},eli5:"Testosterone alone can start spermatogenesis, but to maintain the very high concentrations needed inside the testes, you need a binding protein to hold it there. FSH tells Sertoli cells to make ABP (androgen-binding protein), which traps testosterone inside the tubules where sperm are made."},
{stem:"A patient is on long-term opioid therapy. Which change in the HPG axis would you most expect?",choices:["A. Increased GnRH pulsatility due to loss of dopamine inhibition","B. Decreased GnRH due to β-endorphin-mediated inhibition of hypothalamic GnRH neurons","C. Increased testosterone due to direct opioid stimulation of Leydig cells","D. Decreased inhibin B due to direct opioid suppression of Sertoli cells","E. Increased LH with compensatory testosterone elevation"],correct:1,explanation:"Endogenous β-endorphins inhibit GnRH secretion from hypothalamic neurons. Exogenous opioids mimic this effect, suppressing GnRH pulsatility → reduced LH and FSH → decreased testosterone. This is clinically known as opioid-induced androgen deficiency (OPIAD) and presents with fatigue, decreased libido, erectile dysfunction, and low testosterone.",wrongExplanations:{0:"Dopamine actually inhibits GnRH. Opioids suppress GnRH via β-endorphin pathways, not by affecting dopamine. Also, reduced dopamine would increase GnRH — but opioids do the opposite here.",2:"Opioids do not directly stimulate Leydig cells. The primary opioid effect on testosterone is indirect, via suppression of the HPG axis centrally.",3:"Inhibin B suppression would be secondary (due to low FSH → less Sertoli stimulation), not a direct opioid effect on Sertoli cells. And this would be a downstream effect, not the most direct answer.",4:"LH would be DECREASED, not increased, because opioid-mediated β-endorphin signaling suppresses GnRH → less LH released. Testosterone follows LH downward."},eli5:"Opioids act like your body's natural β-endorphins — which are one of the known brakes on GnRH release. More β-endorphin-like signaling = more braking on GnRH = less LH = less testosterone. This is called opioid-induced hypogonadism."},
{stem:"The enzyme 17β-hydroxysteroid dehydrogenase (17β-HSD) is most directly responsible for which conversion in the Leydig cell steroidogenic pathway?",choices:["A. Cholesterol → Pregnenolone","B. Progesterone → 17α-Hydroxyprogesterone","C. Androstenedione → Testosterone","D. Testosterone → Dihydrotestosterone","E. Pregnenolone → Progesterone"],correct:2,explanation:"17β-hydroxysteroid dehydrogenase (17β-HSD type 3 in testes) catalyzes the final and key step: androstenedione → testosterone, by reducing the ketone at C17 to a hydroxyl group. This occurs in the smooth endoplasmic reticulum of Leydig cells. It's the last committed step before testosterone is released into the bloodstream.",wrongExplanations:{0:"Cholesterol → Pregnenolone is done by cholesterol side-chain cleavage enzyme (CYP11A1 / P450scc) in the inner mitochondrial membrane. This is the first step, not 17β-HSD.",1:"Progesterone → 17α-Hydroxyprogesterone is performed by 17α-hydroxylase (CYP17A1). Not 17β-HSD.",3:"Testosterone → DHT is performed by 5α-reductase, primarily in peripheral tissues. This does not occur in Leydig cells as a major pathway.",4:"Pregnenolone → Progesterone is catalyzed by 3β-hydroxysteroid dehydrogenase (3β-HSD). This early step occurs after transport out of mitochondria into the smooth ER."},eli5:"Think of the pathway as an assembly line. By the time you get to 17β-HSD, the structure is almost done — it converts androstenedione (a weak androgen) into testosterone (the real deal) by adding a hydroxyl group at the 17-beta position."},
{stem:"Estrogen therapy in a transgender woman increases hepatic SHBG production. What downstream effect on testosterone physiology would you predict?",choices:["A. Increased free testosterone due to displacement from albumin","B. Decreased free testosterone, triggering HPG axis upregulation of LH and total testosterone","C. Increased total testosterone with stable free testosterone","D. No change in free testosterone because aromatase compensates","E. Decreased DHT only, with testosterone levels unaffected"],correct:1,explanation:"Increased SHBG binds more testosterone → free testosterone falls. This reduced free testosterone weakens negative feedback on the hypothalamus and pituitary → GnRH and LH rise → Leydig cells are stimulated more → total testosterone increases. Eventually a new equilibrium is reached where free testosterone is partially restored, but at a higher total testosterone level. This is why estrogen in transgender women is often combined with an anti-androgen.",wrongExplanations:{0:"Albumin and SHBG don't compete for the same binding sites in a simple displacement. Increased SHBG causes net MORE binding of testosterone, lowering free levels — not increasing them.",2:"Partial credit thinking: total testosterone does rise due to HPG compensation. However, 'stable free testosterone' is not the most accurate immediate prediction — free T initially drops before compensation kicks in, and it's the driving force for the HPG response.",3:"Aromatase converts testosterone → estradiol, but this is a separate pathway. Aromatase activity doesn't regulate SHBG-mediated sequestration of testosterone.",4:"SHBG binds both testosterone and DHT. The effect would reduce free testosterone and free DHT. It is not DHT-selective."},eli5:"More SHBG = more cages for testosterone. Suddenly a lot of testosterone gets caged up, so free testosterone drops. The HPG thermostat detects this, tries to compensate by releasing more LH, and total testosterone rises. It's a push-pull between the cage and the factory."},
{stem:"In the classical genomic androgen signaling pathway, what is the role of heat shock proteins (HSPs) associated with the androgen receptor?",choices:["A. HSPs phosphorylate the AR, increasing its affinity for androgen response elements","B. HSPs maintain the AR in an inactive but hormone-receptive conformation; androgen binding causes their release","C. HSPs transport DHT across the nuclear membrane into the nucleus","D. HSPs stabilize the AR-DNA complex after nuclear entry","E. HSPs prevent ubiquitination and degradation of free testosterone in the cytoplasm"],correct:1,explanation:"In the absence of ligand, the AR in the cytoplasm is held in an inactive but hormone-receptive conformation by a complex of heat shock proteins (primarily Hsp90, Hsp70, Hsp56). These chaperones maintain the ligand-binding domain in the correct 3D shape for hormone recognition. Upon androgen binding, HSPs dissociate, the AR undergoes a conformational change (revealing nuclear localization signals), dimerizes, and translocates to the nucleus to bind AREs.",wrongExplanations:{0:"HSPs do not phosphorylate the AR — they are structural chaperones that maintain conformation. Phosphorylation of the AR occurs via other kinase pathways as a separate modulation event.",2:"HSPs do not transport ligands. DHT/testosterone are lipophilic and diffuse passively across membranes. The AR-ligand complex itself is what translocates to the nucleus.",3:"HSPs are released when androgen binds — they are NOT part of the AR-DNA complex in the nucleus. Their role is exclusively in the cytoplasm prior to activation.",4:"HSPs do not protect free testosterone from degradation. Testosterone protection in the bloodstream is provided by SHBG and albumin, not by intracellular HSPs."},eli5:"Before testosterone arrives, the androgen receptor is like a sleeping guard — just sitting there, folded up nicely by HSPs (chaperone proteins) that keep it in the right shape. When testosterone shows up and binds, it kicks the HSPs off, and the guard wakes up and goes to the nucleus to do its job."},
{stem:"A 30-year-old bodybuilder uses exogenous testosterone injections for 1 year and then abruptly stops. What is the expected hormonal profile immediately after stopping?",choices:["A. High LH, high FSH, high testosterone — rebound hypergonadism","B. Low LH, low FSH, low endogenous testosterone — secondary hypogonadism pattern","C. High LH, high FSH, low testosterone — primary hypogonadism pattern","D. Normal LH, normal FSH, normal testosterone within 48 hours","E. High LH, low FSH, low testosterone due to selective inhibin B persistence"],correct:1,explanation:"Prolonged exogenous testosterone suppresses the HPG axis via negative feedback → hypothalamus and pituitary are chronically suppressed → LH and FSH remain low. When exogenous T is stopped, endogenous LH/FSH don't immediately recover (they were suppressed for months). The testes, having been inactive, have low Leydig cell function. The result is low LH, low FSH, and low endogenous testosterone — a pattern of secondary hypogonadism. Recovery can take weeks to months.",wrongExplanations:{0:"Rebound hypergonadism does not occur acutely. The HPG axis was chronically suppressed and needs time to recover. There is no surge of LH or testosterone immediately after stopping.",2:"High LH + low testosterone = primary hypogonadism (testes are damaged and don't respond). That's not the case here — the problem is central suppression, not testicular failure. LH is low, not high.",3:"HPG axis recovery after long-term exogenous androgen use takes weeks to months, not 48 hours. This is the physiological basis for post-cycle therapy (PCT) protocols.",4:"Inhibin B suppression would lag because FSH is low. However, the question asks about the LH/FSH/testosterone profile — both LH and FSH are low (not just FSH). There is no selective FSH elevation."},eli5:"For a whole year, the HPG axis was getting told 'stop making testosterone, we've got plenty.' The pituitary and hypothalamus basically went to sleep. When exogenous testosterone suddenly disappears, the factory (testes) can't start up immediately and neither can the boss (hypothalamus/pituitary) — everything is temporarily low."},
{stem:"Which statement about GnRH secretion is MOST accurate?",choices:["A. GnRH is released tonically and continuously from the paraventricular nucleus","B. Pulsatile GnRH release is required; continuous exposure desensitizes pituitary gonadotrophs","C. GnRH acts via a nuclear receptor to upregulate LH gene transcription","D. High dopamine levels stimulate GnRH release via D2 receptors in the arcuate nucleus","E. GnRH release is stimulated by high testosterone via a positive feedback mechanism"],correct:1,explanation:"GnRH must be released in a pulsatile fashion (every 60–120 minutes) for normal gonadotroph function. Continuous GnRH exposure leads to receptor downregulation and desensitization, paradoxically suppressing LH and FSH. This is the therapeutic principle behind GnRH agonists (leuprolide) used to suppress testosterone in prostate cancer — initial flare, then suppression.",wrongExplanations:{0:"GnRH is released from the arcuate nucleus (hypothalamus), not the paraventricular nucleus (which releases CRH and ADH). More critically, GnRH release is PULSATILE, not tonic/continuous.",2:"GnRH acts via a G-protein coupled receptor (Gq/phospholipase C/IP3 pathway) on pituitary gonadotrophs. It does NOT use a nuclear receptor mechanism.",3:"Dopamine INHIBITS GnRH secretion — it is one of the suppressors of the HPG axis. Levodopa or dopamine agonists can suppress LH. Stimulation is incorrect here.",4:"Testosterone (and DHT, estradiol) exerts NEGATIVE feedback on GnRH. There is no positive feedback mechanism for testosterone on GnRH in males (unlike estradiol on LH in females at ovulation)."},eli5:"GnRH is like a doorbell — it only works if you ring it then release it, ring it then release it. If you hold your finger on the doorbell constantly, the person inside stops hearing it. Pulsatile = effective. Continuous = receptor burnout."},
{stem:"A clinician wants to assess a patient's biologically active testosterone. Which measurement best reflects this?",choices:["A. Total serum testosterone only","B. Free testosterone + albumin-bound testosterone (bioavailable fraction)","C. Free testosterone + SHBG-bound testosterone","D. SHBG levels alone","E. Total testosterone divided by SHBG"],correct:1,explanation:"Bioavailable testosterone = free testosterone + albumin-bound testosterone. Albumin binds testosterone weakly and reversibly — it dissociates easily at capillary surfaces, making it available for tissue uptake. SHBG-bound testosterone is tightly bound and not available for receptor binding. Free + albumin-bound = ~50% of total T = the clinically meaningful 'bioavailable' fraction.",wrongExplanations:{0:"Total testosterone includes SHBG-bound (biologically inactive) testosterone. In patients with high SHBG (e.g., liver disease, hyperthyroidism), total testosterone may look normal while bioavailable testosterone is low — making total T misleading alone.",2:"Adding SHBG-bound testosterone would include the inactive fraction. The whole point is to EXCLUDE SHBG-bound T since it's tightly sequestered and not available to tissues.",3:"SHBG alone tells you about the carrier protein, not the active testosterone. You need to know how much testosterone is actually free and albumin-bound.",4:"Total T / SHBG is sometimes used as a rough proxy for free androgen index, but it's not the same as directly measured bioavailable testosterone and is considered less accurate than calculated or directly measured free + albumin-bound T."},eli5:"Bioavailable testosterone = what the body can actually use. That means free testosterone (totally unbound) PLUS the albumin-bound testosterone (loosely held and easily released). SHBG-bound testosterone is tightly locked up and can't be used — so you don't count it."},
{stem:"Aromatase (CYP19A1) activity in Leydig cells converts testosterone into estradiol. What is the physiological significance of this conversion?",choices:["A. Estradiol from Leydig cells stimulates FSH production via positive feedback","B. Estradiol contributes to negative feedback on both GnRH and LH, and is essential for bone density in males","C. Estradiol prevents excessive spermatogenesis by inhibiting FSH at the level of Sertoli cells","D. Aromatase activity in Leydig cells is the primary source of estrogen in adult males","E. Estradiol is only relevant in females; its Leydig cell production is physiologically negligible"],correct:1,explanation:"Estradiol produced by Leydig cell aromatase (and adipose tissue) serves two major roles: (1) participates in negative feedback at the hypothalamus and pituitary to suppress GnRH and LH, and (2) is essential for bone mineralization in males — men with aromatase deficiency have tall stature, unfused epiphyses, and severe osteoporosis despite normal testosterone. Estradiol is also the primary androgen-derived feedback hormone for LH suppression.",wrongExplanations:{0:"Estradiol in males exerts NEGATIVE feedback on GnRH and LH — NOT positive feedback. Positive feedback of estradiol on LH occurs only in females (the LH surge at ovulation).",2:"Estradiol inhibits FSH indirectly (via GnRH/LH suppression and alongside inhibin B) but does not directly act on Sertoli cells to prevent spermatogenesis. The framing is too simplistic and inaccurate.",3:"In adult males, adipose tissue aromatase (not Leydig cells) is actually the quantitatively dominant source of circulating estradiol. Leydig cell aromatase is significant but adipose tissue contributes more to systemic levels.",4:"Estradiol is critically important in males — aromatase-deficient men develop severe osteoporosis, tall stature, and metabolic disorders. Calling it 'physiologically negligible' is completely wrong."},eli5:"Men make estrogen too! Testosterone gets converted to estradiol right in the testes (and fat tissue). This estradiol actually helps control testosterone levels by feeding back to slow down the HPG axis. It also protects men's bones — men with aromatase deficiency have severe osteoporosis."},
{stem:"A 45-year-old woman is diagnosed with an FSH-secreting pituitary adenoma. She has had no gonadal symptoms. This is best explained by:",choices:["A. FSH at high levels exerts strong negative feedback, suppressing GnRH and LH to zero","B. FSH receptors in the ovary downregulate with chronic FSH excess, making them unresponsive","C. FSH requires co-stimulation by LH to activate ovarian follicle development; without pulsatile LH, FSH excess is ineffective","D. FSH adenomas typically produce biologically inactive FSH isoforms","E. Inhibin B from granulosa cells completely compensates by blocking FSH action"],correct:3,explanation:"FSH-secreting pituitary adenomas often secrete FSH with abnormal glycosylation patterns that make it immunologically detectable but biologically inactive or less potent. This is a well-recognized phenomenon — the tumor FSH can be measured in serum but fails to adequately stimulate follicular development, which explains the lack of gonadal symptoms (e.g., multiple follicle development, hyperstimulation) despite high circulating FSH levels.",wrongExplanations:{0:"FSH does not exert negative feedback on GnRH or LH in the way testosterone and estradiol do. Inhibin B selectively inhibits FSH at the pituitary. FSH itself doesn't suppress the HPG axis.",1:"FSH receptor downregulation does occur with sustained stimulation but is not the primary or most direct explanation. FSH-secreting adenomas in clinical settings are classically explained by biologically inactive hormone production.",2:"LH and FSH can have synergistic effects but FSH alone can stimulate follicle development independently. The lack of pulsatile GnRH pattern does affect LH more than FSH in terms of secretion, but this doesn't explain absent gonadal response to FSH.",4:"Inhibin B suppresses pituitary FSH production (feedback), but it cannot 'block FSH action at the ovary.' Inhibin B acts at the pituitary, not as a peripheral antagonist of FSH at gonads."},eli5:"Not all FSH from a tumor is 'factory-quality.' Pituitary adenomas often produce FSH that has unusual sugar modifications (glycosylation patterns) making it immunoreactive (detectable by lab tests) but biologically weak — the key doesn't fit the lock well enough to turn it."},
{stem:"A genetic male (46,XY) with complete androgen insensitivity syndrome (CAIS) has a female phenotype. Which hormone profile would you expect?",choices:["A. Low testosterone, high LH, high FSH — primary gonadal failure","B. High testosterone, high LH, low FSH — due to inhibin B suppression only","C. High testosterone, high LH, normal-high FSH — AR cannot mediate feedback or virilization","D. Low LH, low testosterone, normal FSH","E. Normal testosterone, normal LH, elevated FSH only"],correct:2,explanation:"In CAIS, the AR is non-functional. Testosterone is produced (Leydig cells work fine, driven by LH), but no tissue can respond to it — including the hypothalamus/pituitary. This means testosterone cannot exert negative feedback on LH → LH is elevated → drives more testosterone production → very high testosterone. FSH is also elevated because androgen-mediated feedback at the pituitary is lost. Estradiol (aromatized from testosterone) may provide partial feedback.",wrongExplanations:{0:"This would be primary gonadal failure — the testes would be damaged and unable to produce testosterone. In CAIS, testes function normally (they make plenty of testosterone). The problem is downstream at the receptor.",1:"Close, but FSH would also be elevated (not low), because androgen-mediated inhibition of FSH at the pituitary is also lost. Inhibin B may still be partially suppressing FSH, leading to variable FSH, but 'low FSH' is not the expected dominant finding.",3:"Low LH would indicate HPG suppression by working negative feedback — but that can't happen in CAIS since the AR is broken. LH must be elevated.",4:"'Only FSH elevated with normal LH and testosterone' doesn't fit. With non-functional AR, both LH and testosterone would be elevated. There's no mechanism to elevate FSH selectively while keeping LH normal in this context."},eli5:"In CAIS, the androgen receptor is broken — testosterone is made fine, but no tissue can respond to it. Since testosterone can't feed back on the hypothalamus/pituitary either (that also requires working AR), LH stays high, and testosterone goes even higher. It's like a thermostat with a broken sensor — the furnace keeps running."},
{stem:"Why do steroids bound to albumin (unlike SHBG-bound steroids) contribute to the bioavailable fraction?",choices:["A. Albumin has a lower molecular weight and passes through capillary walls more easily","B. The steroid-albumin bond is weak and reversible, allowing rapid dissociation at target tissues","C. Albumin contains a specific androgen-binding domain that facilitates receptor transfer","D. Steroids bound to albumin are actively transported into cells by a dedicated membrane transporter","E. Albumin is synthesized locally in target tissues, ensuring hormone delivery at the site of action"],correct:1,explanation:"The key difference between SHBG and albumin binding is affinity. SHBG binds testosterone with high affinity (tight, slow dissociation), making it biologically inactive. Albumin binds testosterone with low affinity (weak, rapid dissociation), allowing the hormone to easily dissociate at capillary surfaces and diffuse into target cells. This makes albumin-bound testosterone part of the 'bioavailable' pool, along with free testosterone.",wrongExplanations:{0:"Molecular weight and capillary permeability are not the determining factors. SHBG also circulates in blood and reaches tissues — the difference is affinity of hormone binding, not size of the protein.",2:"Albumin does not have a specific androgen-binding domain that facilitates receptor transfer. Albumin is a non-specific carrier protein that binds many lipophilic molecules loosely. There is no 'receptor transfer' mechanism.",3:"Lipophilic steroids like testosterone cross cell membranes by passive diffusion — not via active membrane transporters. Active transport is needed for hydrophilic molecules, not steroids.",4:"Albumin is synthesized in the liver and circulates systemically — it is not made locally in target tissues. The key is its binding affinity, not its site of synthesis."},eli5:"SHBG is like a tight-grip handshake — hard to break. Albumin is like a loose, casual handshake — easily released. Because the albumin bond is weak, when blood flows past a tissue that needs testosterone, the hormone simply lets go of albumin and diffuses into the cell."},
{stem:"A male infant with congenital adrenal hyperplasia (CAH) due to 21-hydroxylase deficiency has elevated androgens. Which statement best explains the mechanism?",choices:["A. 21-hydroxylase deficiency increases 17α-hydroxylase activity by substrate feedback","B. Cortisol deficiency leads to elevated ACTH, driving excess flux through the androgen synthesis pathway","C. Aldosterone deficiency causes compensatory overproduction of androgens to maintain sodium balance","D. 21-hydroxylase is required to convert androgens to cortisol; its deficiency blocks this conversion","E. Elevated ACTH directly stimulates testicular Leydig cells to produce more testosterone"],correct:1,explanation:"21-hydroxylase converts progesterone → deoxycorticosterone (aldosterone pathway) and 17α-hydroxyprogesterone → 11-deoxycortisol (cortisol pathway). When blocked, cortisol cannot be synthesized → no negative feedback on ACTH → ACTH rises dramatically → the adrenal cortex is overstimulated. Precursors accumulate upstream (17α-hydroxyprogesterone, progesterone) and are shunted through the intact androgen synthesis pathway (17,20-lyase → androstenedione → testosterone), causing androgen excess.",wrongExplanations:{0:"21-hydroxylase deficiency does not directly increase 17α-hydroxylase activity through substrate feedback. The mechanism is an ACTH-driven increase in overall adrenal cortex stimulation, not enzyme upregulation.",2:"Aldosterone deficiency causes sodium wasting and fluid loss, but it does not drive androgen overproduction as compensation. The androgen excess comes from ACTH-driven precursor accumulation, not aldosterone deficit.",3:"21-hydroxylase is NOT involved in converting androgens to cortisol. It acts on progesterone and 17α-OHP. Androgens are made from 17α-OHP and androstenedione, which are upstream of where 21-hydroxylase acts.",4:"ACTH acts on adrenal cortex (zona fasciculata/reticularis), NOT on testicular Leydig cells. Leydig cells are stimulated by LH only. ACTH has no direct role in testicular steroidogenesis."},eli5:"Think of 21-hydroxylase as a road that goes toward cortisol. If that road is blocked, the cortisol factory can't make cortisol, so the body keeps screaming for more (ACTH keeps rising). But all those precursors that can't become cortisol get diverted onto a different road — the androgen road — and you get a flood of androgens instead."},
{stem:"After the AR-ligand complex enters the nucleus and binds androgen response elements (AREs), which of the following outcomes is directly mediated?",choices:["A. Post-translational modification of existing androgen receptor protein","B. Recruitment of co-activators or co-repressors to modulate RNA polymerase II activity at target gene promoters","C. Direct methylation of histone H3 to silence pro-inflammatory genes","D. Export of mRNA from the nucleus via AR-regulated nuclear pore proteins","E. Stimulation of ribosomal assembly for androgen-specific protein synthesis"],correct:1,explanation:"After AR dimerizes and binds AREs in the promoter/enhancer regions of target genes, it recruits transcriptional co-regulators — co-activators (e.g., SRC-1, p300/CBP) that enhance RNA Pol II activity, or co-repressors that suppress transcription. These co-regulators bridge the AR to the general transcription machinery and modify chromatin (histone acetylation, etc.), ultimately regulating target gene expression (e.g., PSA, IGF-1, muscle protein genes).",wrongExplanations:{0:"Post-translational modification of the AR (phosphorylation, ubiquitination) occurs in the cytoplasm as regulatory events — not as the primary nuclear outcome after ARE binding. The nuclear event is transcription regulation.",2:"Histone methylation (particularly H3K27me3 for silencing) is mediated by specific histone methyltransferases (e.g., PRC2 complex). While AR can influence chromatin remodeling, direct H3 methylation is not the immediate mechanism of ARE-bound AR signaling.",3:"mRNA export through nuclear pores is a downstream event (after transcription) controlled by export factors. AR doesn't regulate nuclear pore proteins as a primary transcriptional mechanism.",4:"Ribosome assembly is a separate process occurring in the nucleolus, involving rRNA. AR-mediated gene transcription produces mRNA for specific proteins, but ribosomal assembly itself is not directly stimulated by ARE-bound AR."},eli5:"Once the AR sticks to the DNA at an ARE, it acts like a recruiter — it calls in helper proteins (co-activators or co-repressors) that talk to the RNA polymerase machinery to either turn the gene up or turn it off. The AR itself doesn't do the transcribing; it organizes the crew that does."},
{stem:"A patient with a zona glomerulosa adenoma presents with hypertension and hypokalemia. Lab work shows low renin, high aldosterone, low cortisol, and low ACTH. Which of the following best explains the low ACTH?",choices:["A. Aldosterone directly inhibits ACTH secretion from the pituitary","B. High aldosterone → sodium retention → expanded volume → suppresses renin, but ACTH is unaffected by aldosterone; low ACTH here reflects concurrent cortisol deficiency suppressing HPA axis feedback","C. Low ACTH is expected because aldosterone excess suppresses CRH at the hypothalamus","D. Low ACTH is not expected; this finding suggests a secondary rather than primary aldosteronism","E. High sodium caused by aldosterone excess inhibits CRH release from the paraventricular nucleus"],correct:3,explanation:"In primary hyperaldosteronism (Conn's syndrome), only the zona glomerulosa is overactive. Cortisol is produced by zona fasciculata (under ACTH control), and this axis is unaffected. ACTH should be NORMAL in a pure zona glomerulosa adenoma. Low ACTH in this scenario is inconsistent with primary aldosteronism and instead suggests a pituitary or secondary process. Aldosterone does NOT regulate ACTH secretion.",wrongExplanations:{0:"Aldosterone has NO direct inhibitory effect on ACTH. The feedback on ACTH is via cortisol (not aldosterone). These are entirely separate regulatory axes.",1:"Cortisol levels would be normal in isolated zona glomerulosa adenoma — there is no cortisol deficiency. The framing of 'cortisol deficiency suppressing HPA feedback' is contradictory and incorrect.",2:"Aldosterone does not suppress CRH. The HPA axis (CRH → ACTH → cortisol) is a completely separate axis from the renin-angiotensin-aldosterone system. Aldosterone cannot suppress CRH.",4:"Sodium levels do not regulate CRH secretion from the paraventricular nucleus. CRH is regulated by stress, circadian rhythm, and cortisol negative feedback — not sodium."},eli5:"In a zona glomerulosa adenoma (Conn's syndrome), only aldosterone is elevated. Cortisol and ACTH should be completely normal because they're controlled by a separate axis (HPA). If ACTH is low, that's a red flag — it suggests the problem might be in the pituitary (secondary), not the adrenal gland itself."},
{stem:"A patient is started on oral contraceptives (OCP), which increase hepatic production of corticosteroid-binding globulin (CBG). What would you expect to happen to free cortisol?",choices:["A. Free cortisol increases permanently because estrogen also stimulates adrenal cortisol synthesis","B. Free cortisol drops transiently, but the HPA axis compensates — ACTH rises and total cortisol increases to restore free cortisol","C. Free cortisol drops permanently due to irreversible CBG-cortisol binding","D. Free cortisol is unaffected because albumin always compensates for CBG changes","E. Free cortisol increases because CBG competes with albumin, displacing cortisol into the free fraction"],correct:1,explanation:"Estrogen (from OCP) stimulates hepatic CBG synthesis → more CBG binds cortisol → free cortisol transiently decreases → less negative feedback on HPA → ACTH rises → adrenal cortex increases cortisol production until free cortisol normalizes. Net result: elevated total serum cortisol (most of the extra is CBG-bound/inactive), but free cortisol is normal. This is clinically important — OCP can falsely elevate total cortisol measurements.",wrongExplanations:{0:"Estrogen does not directly stimulate adrenal cortisol synthesis. The effect is indirect via CBG elevation, and the final free cortisol normalizes through HPA compensation.",2:"CBG-cortisol binding is reversible. There is no permanent increase in binding or permanent free cortisol suppression. The HPA axis compensates effectively.",3:"Albumin has lower affinity for cortisol than CBG and cannot fully compensate for large increases in CBG. Additionally, the compensatory mechanism is primarily through increased cortisol production (via ACTH), not albumin binding.",4:"CBG and albumin don't compete in a displacement reaction. Increased CBG simply increases total cortisol-binding capacity, pulling more cortisol into the bound (inactive) pool — not releasing more into the free pool."},eli5:"OCP raises CBG (more cages). Cages fill up with cortisol → free cortisol drops. But the HPA thermostat detects less free cortisol, thinks production is low, cranks up ACTH → adrenal makes more cortisol → free cortisol is restored. End result: normal free cortisol, but higher TOTAL cortisol (more is bound)."},
{stem:"A patient with a pheochromocytoma has massively elevated catecholamines. Which physiological finding is most consistent with predominantly epinephrine excess (vs. norepinephrine excess)?",choices:["A. Severe hypertension with reflex bradycardia and no tachycardia","B. Tachycardia, hyperglycemia, diaphoresis, and dilated pupils with variable blood pressure","C. Hypertension with strong reflex bradycardia due to pure vasoconstriction","D. Bradycardia with hypoglycemia due to unopposed β2 stimulation","E. Peripheral vasoconstriction only, with no cardiac effects"],correct:1,explanation:"Epinephrine stimulates β1 (↑HR, ↑contractility), β2 (vasodilation in muscle, bronchodilation, ↑glycogenolysis → hyperglycemia), and α1 receptors. This produces tachycardia, hyperglycemia, diaphoresis (sympathetic activation), and variable blood pressure (β2 vasodilation may blunt the rise). Norepinephrine is predominantly α1/α2 (vasoconstriction → hypertension → reflex bradycardia). Predominantly epinephrine-secreting pheos cause the metabolic syndrome-like picture described.",wrongExplanations:{0:"Severe hypertension + reflex bradycardia without tachycardia is classic for NOREPINEPHRINE excess (pure vasoconstriction → baroreceptor-mediated reflex bradycardia). Epinephrine causes tachycardia due to β1 stimulation.",2:"Again, this describes norepinephrine — predominantly α-receptor mediated vasoconstriction causing hypertension and reflex bradycardia. Epinephrine has additional β effects that prevent this pure picture.",3:"Bradycardia + hypoglycemia does not match catecholamine excess of any type. β2 stimulation causes hyperglycemia (glycogenolysis), not hypoglycemia. Bradycardia is a vagal/reflex phenomenon associated with nor-epi excess, not epi.",4:"Peripheral vasoconstriction alone is norepinephrine's signature. Epinephrine has both vasodilatory (β2 in muscle) and vasoconstrictive (α1) effects, plus cardiac effects. 'No cardiac effects' is wrong for epinephrine."},eli5:"Epinephrine hits β1 (heart rate up, heart squeezes harder), β2 (airways open, blood glucose rises, muscles get blood), and α1 (some vasoconstriction). It's the full-body alarm. Norepinephrine is more α-dominant — lots of vasoconstriction, blood pressure shoots up, and the heart may actually slow down reflexively. So tachycardia + hyperglycemia + sweating = epinephrine-dominant."},
