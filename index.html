      questions:[{stem:"A patient with a zona glomerulosa adenoma presents with hypertension and hypokalemia. Lab work shows low renin, high aldosterone, low cortisol, and low ACTH. Which of the following best explains the low ACTH?",choices:["A. Aldosterone directly inhibits ACTH secretion from the pituitary","B. High aldosterone → sodium retention → expanded volume → suppresses renin, but ACTH is unaffected by aldosterone; low ACTH here reflects concurrent cortisol deficiency suppressing HPA axis feedback","C. Low ACTH is expected because aldosterone excess suppresses CRH at the hypothalamus","D. Low ACTH is not expected; this finding suggests a secondary rather than primary aldosteronism","E. High sodium caused by aldosterone excess inhibits CRH release from the paraventricular nucleus"],correct:3,explanation:"In primary hyperaldosteronism (Conn's syndrome), only the zona glomerulosa is overactive. Cortisol is produced by zona fasciculata (under ACTH control), and this axis is unaffected. ACTH should be NORMAL in a pure zona glomerulosa adenoma. Low ACTH in this scenario is inconsistent with primary aldosteronism and instead suggests a pituitary or secondary process. Aldosterone does NOT regulate ACTH secretion.",wrongExplanations:{0:"Aldosterone has NO direct inhibitory effect on ACTH. The feedback on ACTH is via cortisol (not aldosterone). These are entirely separate regulatory axes.",1:"Cortisol levels would be normal in isolated zona glomerulosa adenoma — there is no cortisol deficiency. The framing of 'cortisol deficiency suppressing HPA feedback' is contradictory and incorrect.",2:"Aldosterone does not suppress CRH. The HPA axis (CRH → ACTH → cortisol) is a completely separate axis from the renin-angiotensin-aldosterone system. Aldosterone cannot suppress CRH.",4:"Sodium levels do not regulate CRH secretion from the paraventricular nucleus. CRH is regulated by stress, circadian rhythm, and cortisol negative feedback — not sodium."},eli5:"In a zona glomerulosa adenoma (Conn's syndrome), only aldosterone is elevated. Cortisol and ACTH should be completely normal because they're controlled by a separate axis (HPA). If ACTH is low, that's a red flag — it suggests the problem might be in the pituitary (secondary), not the adrenal gland itself."},
{stem:"A patient is started on oral contraceptives (OCP), which increase hepatic production of corticosteroid-binding globulin (CBG). What would you expect to happen to free cortisol?",choices:["A. Free cortisol increases permanently because estrogen also stimulates adrenal cortisol synthesis","B. Free cortisol drops transiently, but the HPA axis compensates — ACTH rises and total cortisol increases to restore free cortisol","C. Free cortisol drops permanently due to irreversible CBG-cortisol binding","D. Free cortisol is unaffected because albumin always compensates for CBG changes","E. Free cortisol increases because CBG competes with albumin, displacing cortisol into the free fraction"],correct:1,explanation:"Estrogen (from OCP) stimulates hepatic CBG synthesis → more CBG binds cortisol → free cortisol transiently decreases → less negative feedback on HPA → ACTH rises → adrenal cortex increases cortisol production until free cortisol normalizes. Net result: elevated total serum cortisol (most of the extra is CBG-bound/inactive), but free cortisol is normal. This is clinically important — OCP can falsely elevate total cortisol measurements.",wrongExplanations:{0:"Estrogen does not directly stimulate adrenal cortisol synthesis. The effect is indirect via CBG elevation, and the final free cortisol normalizes through HPA compensation.",2:"CBG-cortisol binding is reversible. There is no permanent increase in binding or permanent free cortisol suppression. The HPA axis compensates effectively.",3:"Albumin has lower affinity for cortisol than CBG and cannot fully compensate for large increases in CBG. Additionally, the compensatory mechanism is primarily through increased cortisol production (via ACTH), not albumin binding.",4:"CBG and albumin don't compete in a displacement reaction. Increased CBG simply increases total cortisol-binding capacity, pulling more cortisol into the bound (inactive) pool — not releasing more into the free pool."},eli5:"OCP raises CBG (more cages). Cages fill up with cortisol → free cortisol drops. But the HPA thermostat detects less free cortisol, thinks production is low, cranks up ACTH → adrenal makes more cortisol → free cortisol is restored. End result: normal free cortisol, but higher TOTAL cortisol (more is bound)."},
{stem:"A patient with a pheochromocytoma has massively elevated catecholamines. Which physiological finding is most consistent with predominantly epinephrine excess (vs. norepinephrine excess)?",choices:["A. Severe hypertension with reflex bradycardia and no tachycardia","B. Tachycardia, hyperglycemia, diaphoresis, and dilated pupils with variable blood pressure","C. Hypertension with strong reflex bradycardia due to pure vasoconstriction","D. Bradycardia with hypoglycemia due to unopposed β2 stimulation","E. Peripheral vasoconstriction only, with no cardiac effects"],correct:1,explanation:"Epinephrine stimulates β1 (↑HR, ↑contractility), β2 (vasodilation in muscle, bronchodilation, ↑glycogenolysis → hyperglycemia), and α1 receptors. This produces tachycardia, hyperglycemia, diaphoresis (sympathetic activation), and variable blood pressure (β2 vasodilation may blunt the rise). Norepinephrine is predominantly α1/α2 (vasoconstriction → hypertension → reflex bradycardia). Predominantly epinephrine-secreting pheos cause the metabolic syndrome-like picture described.",wrongExplanations:{0:"Severe hypertension + reflex bradycardia without tachycardia is classic for NOREPINEPHRINE excess (pure vasoconstriction → baroreceptor-mediated reflex bradycardia). Epinephrine causes tachycardia due to β1 stimulation.",2:"Again, this describes norepinephrine — predominantly α-receptor mediated vasoconstriction causing hypertension and reflex bradycardia. Epinephrine has additional β effects that prevent this pure picture.",3:"Bradycardia + hypoglycemia does not match catecholamine excess of any type. β2 stimulation causes hyperglycemia (glycogenolysis), not hypoglycemia. Bradycardia is a vagal/reflex phenomenon associated with nor-epi excess, not epi.",4:"Peripheral vasoconstriction alone is norepinephrine's signature. Epinephrine has both vasodilatory (β2 in muscle) and vasoconstrictive (α1) effects, plus cardiac effects. 'No cardiac effects' is wrong for epinephrine."},eli5:"Epinephrine hits β1 (heart rate up, heart squeezes harder), β2 (airways open, blood glucose rises, muscles get blood), and α1 (some vasoconstriction). It's the full-body alarm. Norepinephrine is more α-dominant — lots of vasoconstriction, blood pressure shoots up, and the heart may actually slow down reflexively. So tachycardia + hyperglycemia + sweating = epinephrine-dominant."},
{stem:"A patient is on high-dose prednisone for 6 months and develops a severe infection requiring emergency surgery. The anesthesiologist administers 'stress dose steroids.' Why is this necessary?",choices:["A. Prednisone downregulates CRH receptors in the pituitary, preventing ACTH release","B. Chronic exogenous glucocorticoids suppress the HPA axis; adrenal glands atrophy and cannot mount a cortisol stress response","C. Prednisone is metabolized to cortisol by CYP3A4 during surgery, requiring supplementation to prevent toxic levels","D. Surgical stress activates norepinephrine which blocks prednisone from binding glucocorticoid receptors","E. High-dose glucocorticoids are needed to suppress the inflammatory response to surgery, not for adrenal insufficiency"],correct:1,explanation:"Chronic exogenous glucocorticoid use suppresses the HPA axis via negative feedback → CRH and ACTH are chronically suppressed → adrenal cortex undergoes disuse atrophy and loses the ability to mount a cortisol stress response. Surgery is a massive physiological stressor requiring cortisol surges (5–10x normal). Without it, hemodynamic instability (adrenal crisis) can occur. Stress dose steroids (IV hydrocortisone) bridge this gap during the period of HPA suppression.",wrongExplanations:{0:"Prednisone suppresses the HPA axis via glucocorticoid receptors at both the hypothalamus and pituitary (reducing CRH and ACTH synthesis/secretion). It's not specifically CRH receptor downregulation — it's a broader GR-mediated feedback suppression.",2:"Prednisone is a prodrug converted to prednisolone by 11β-HSD in the liver — not to cortisol, and not in a way that causes toxicity. Prednisone itself has glucocorticoid activity via GR binding.",3:"Norepinephrine does not block glucocorticoid receptors. This mechanism does not exist. The issue is adrenal atrophy, not receptor competition.",4:"While high-dose steroids can suppress inflammation, the PRIMARY reason for stress-dose steroids in this context is adrenal insufficiency prevention — the adrenal glands cannot mount an endogenous cortisol response due to HPA suppression."},eli5:"After 6 months of steroid pills, your adrenal glands are basically unemployed. The HPA axis was constantly being told 'enough cortisol already' — so ACTH went to zero, and the adrenal glands shrank from disuse. Now when you really need a surge of cortisol for the stress of surgery, there's nothing there. You have to give the cortisol externally — fast."},
{stem:"Which of the following would you expect in a patient who has had a bilateral adrenalectomy (removal of both adrenal glands) and receives cortisol replacement but NO mineralocorticoid replacement?",choices:["A. Hypertension, hyperkalemia, and metabolic acidosis","B. Hypotension, hyperkalemia, hyponatremia, and metabolic acidosis","C. Hypotension, hypokalemia, and metabolic alkalosis","D. Normal blood pressure, hypernatremia, and elevated renin","E. Hypertension, hyponatremia, and low aldosterone with suppressed renin"],correct:1,explanation:"Without aldosterone (mineralocorticoid), the distal tubule cannot reabsorb Na⁺ (no ENaC upregulation) and cannot excrete K⁺ or H⁺. Results: ↓Na⁺ retention → volume depletion → hypotension; ↑K⁺ retention → hyperkalemia; ↓H⁺ excretion → metabolic acidosis; hyponatremia from sodium wasting. This is the crisis seen in mineralocorticoid deficiency (as in primary adrenal insufficiency/Addison's when aldosterone is also lost).",wrongExplanations:{0:"Hypertension would require aldosterone EXCESS (sodium retention). Without aldosterone, you get hypotension from sodium/water loss. Hyperkalemia is correct but hypertension is not.",2:"Hypokalemia + metabolic alkalosis = TOO MUCH aldosterone (or other mineralocorticoid excess). Without any mineralocorticoid, you get the opposite: hyperkalemia + metabolic acidosis.",3:"Normal blood pressure requires adequate volume, which requires aldosterone-driven sodium retention. Without aldosterone, hypotension occurs. Renin would be high (not because of hypernatremia, but because of volume depletion stimulating the RAAS), but blood pressure would not be normal.",4:"This describes hyperaldosteronism — high aldosterone would cause hypertension and suppress renin. The question specifies NO mineralocorticoid replacement, so this is the opposite direction."},eli5:"Aldosterone's job is: hold onto sodium (and water), kick out potassium, keep the blood acid-base happy by excreting H⁺. Without it, sodium and water leave → low BP. Potassium builds up → hyperkalemia. And you can't excrete enough acid → metabolic acidosis. It's a salt-water-electrical emergency."},
{stem:"A patient works night shifts for 3 years and consistently sleeps from 8 AM to 4 PM. What would you expect regarding their cortisol rhythm over time?",choices:["A. Cortisol remains peaked at 6–8 AM regardless of sleep schedule, driven by fixed circadian gene expression","B. The cortisol rhythm gradually adapts — peak shifts to align with awakening time (around 4 PM) driven by SCN light entrainment","C. Cortisol rhythm is completely abolished in permanent shift workers due to HPA axis burnout","D. Cortisol peaks remain morning-based because light exposure during the commute home maintains the original rhythm","E. Cortisol shifts to peak at 8 AM but with lower amplitude due to partial SCN adaptation"],correct:1,explanation:"The SCN (suprachiasmatic nucleus) is the primary circadian pacemaker and is entrained by light-dark cycles. In permanent night shift workers with consistent sleep-wake schedules, the SCN gradually adapts to the new schedule. Cortisol secretion shifts to peak at awakening (their 4 PM 'morning'), not at 6–8 AM, because the HPA axis is entrained by the sleep-wake cycle and light exposure patterns. Full adaptation may take weeks and is often incomplete with variable light exposure.",wrongExplanations:{0:"Cortisol rhythm is NOT fixed — it is an adaptable circadian rhythm entrained by the SCN. It can shift with sustained schedule changes. This is well-documented in shift work and jet lag research.",2:"The cortisol rhythm does not become abolished ('HPA burnout') in shift workers. Dysregulation (blunted amplitude, delayed peak) can occur, but the axis doesn't fail. Abnormal patterns are associated with health risks, not axis failure.",3:"If the patient commutes home during morning light (toward sunset for a day-worker), their SCN still receives the primary entraining signal from their work-night darkness and day-sleep pattern. Brief light exposure during commute is insufficient to maintain the original rhythm against a completely reversed schedule.",4:"Partial adaptation with reduced amplitude doesn't accurately describe the dominant mechanism. The peak shifts, not just reduces. The SCN adapts to the dominant zeitgeber (time cue), especially sleep timing."},eli5:"The SCN (your body's clock) sets cortisol timing based on two things: light exposure and sleep-wake cycle. Night shift workers expose the SCN to a completely different light-dark and wake-sleep pattern. Over weeks to months, the SCN adapts — the cortisol peak shifts to align with their new 'morning' (whenever they wake up, now ~4 PM)."},
{stem:"A patient with severe asthma is found to have significantly elevated GRβ expression in airway cells. What is the clinical implication?",choices:["A. Enhanced steroid sensitivity because GRβ amplifies GRα-mediated anti-inflammatory signaling","B. Glucocorticoid resistance — GRβ acts as a dominant-negative inhibitor of GRα, reducing steroid efficacy","C. Preferential binding of cortisol to GRβ, redirecting it away from immune cells","D. Increased risk of adrenal atrophy due to GRβ-mediated feedback suppression","E. Enhanced mineralocorticoid effects in the airway, causing fluid accumulation"],correct:1,explanation:"GRβ lacks a functional ligand-binding domain and does not bind cortisol or synthetic glucocorticoids. It acts as a dominant-negative inhibitor of GRα by competing for DNA binding sites (GREs) and for heterodimerization, preventing GRα from activating anti-inflammatory genes. Elevated GRβ expression is strongly linked to glucocorticoid resistance in inflammatory diseases — particularly asthma and rheumatoid arthritis — explaining why some patients don't respond to inhaled or systemic steroids.",wrongExplanations:{0:"GRβ is the OPPOSITE of a GRα amplifier. It is a dominant-negative inhibitor — it opposes GRα function. GRβ does not enhance steroid sensitivity; it reduces it.",2:"GRβ does not bind cortisol. The 'redirecting cortisol away from immune cells' concept is incorrect. Cortisol/glucocorticoids bind GRα; GRβ has no hormone-binding capacity.",3:"GRβ does not mediate feedback suppression of the HPA axis. Adrenal atrophy results from GRα-mediated suppression of the HPA axis by exogenous glucocorticoids — not from GRβ.",4:"GRβ does not have mineralocorticoid activity. The airway is not a major site of mineralocorticoid action. This mechanism doesn't exist."},eli5:"GRβ is like a broken key that gets stuck in the lock. It doesn't work itself, but it blocks GRα (the working key) from opening the door. More GRβ = more broken keys in the locks = less working signaling = steroids can't do their anti-inflammatory job = steroid-resistant asthma."},
{stem:"A 40-year-old woman presents with fatigue, weight loss, and hyperpigmentation. Labs show low cortisol, high ACTH, low aldosterone, and hyponatremia with hyperkalemia. What is the most likely diagnosis and pathophysiology?",choices:["A. Secondary adrenal insufficiency — pituitary failure causes low ACTH, low cortisol, and aldosterone loss","B. Primary adrenal insufficiency (Addison's disease) — adrenal cortex damage causes cortisol and aldosterone deficiency; high ACTH drives hyperpigmentation","C. Tertiary adrenal insufficiency — hypothalamic CRH deficiency leads to all hormonal findings","D. Cushing's syndrome — high cortisol is misinterpreted; hyperpigmentation reflects MSH excess","E. Secondary adrenal insufficiency with concurrent primary hyperaldosteronism"],correct:1,explanation:"This is classic Addison's disease (primary adrenal insufficiency): direct adrenal cortex damage → loss of both cortisol AND aldosterone → no negative feedback on HPA → ACTH (and MSH from same POMC precursor) skyrockets → hyperpigmentation. Low aldosterone explains hyponatremia (sodium wasting) + hyperkalemia (K⁺ retention) + hypotension. High ACTH distinguishes primary from secondary/tertiary (both of which would have low ACTH).",wrongExplanations:{0:"Secondary adrenal insufficiency has LOW ACTH (pituitary failure) — the opposite of what's described. Also, in secondary AI, aldosterone is usually NORMAL (regulated by renin-angiotensin, not ACTH), so hyponatremia + hyperkalemia would NOT typically occur.",2:"Tertiary AI (hypothalamic failure) also presents with LOW ACTH and LOW CRH — not high ACTH. And like secondary AI, aldosterone would be preserved. Hyperpigmentation does not occur in tertiary AI.",3:"Cushing's syndrome = excess cortisol (opposite of low). Hyperpigmentation in Cushing's can occur in ectopic ACTH syndrome (very high ACTH) but cortisol would be HIGH, not low. This entire picture contradicts Cushing's.",4:"Combining secondary AI (low ACTH) with primary hyperaldosteronism (high aldosterone) would produce a completely different lab picture. The simultaneous low cortisol + low aldosterone + high ACTH all point to primary adrenal failure."},eli5:"High ACTH + low cortisol = the adrenal gland itself is damaged (primary). The pituitary is screaming 'MAKE CORTISOL!' but the adrenal can't respond. ACTH also pigments skin. Low aldosterone = the whole adrenal cortex is damaged (not just fasciculata). Salt is lost, potassium rises, and BP drops."},
{stem:"Which enzyme directly converts norepinephrine to epinephrine, and what maintains its expression in chromaffin cells?",choices:["A. Tyrosine hydroxylase; maintained by dopamine feedback","B. Dopamine β-hydroxylase; maintained by LH from the pituitary","C. PNMT (phenylethanolamine-N-methyltransferase); maintained by cortisol from the adrenal cortex","D. Aromatic amino acid decarboxylase; maintained by sympathetic tone","E. Catechol-O-methyltransferase; maintained by adrenal medullary pressure"],correct:2,explanation:"PNMT (phenylethanolamine-N-methyltransferase) methylates norepinephrine → epinephrine. PNMT expression in adrenal medullary chromaffin cells is uniquely maintained by high local concentrations of cortisol. The adrenal cortex drains into the medulla via a centripetal (portal) circulation, delivering cortisol at concentrations ~100x higher than peripheral blood. This cortisol-driven PNMT activity explains why adrenal medullary cells produce mostly epinephrine (~80%), while sympathetic nerve terminals (no local cortisol) produce predominantly norepinephrine.",wrongExplanations:{0:"Tyrosine hydroxylase converts tyrosine → DOPA (the very first step in catecholamine synthesis). It is NOT the NE→Epi enzyme. It's maintained by sympathetic activity and cAMP, not dopamine feedback.",1:"Dopamine β-hydroxylase converts dopamine → norepinephrine (the step before PNMT). LH does not regulate adrenal medullary enzyme expression — LH acts on the gonads.",3:"Aromatic amino acid decarboxylase (AAAD/DOPA decarboxylase) converts DOPA → dopamine. It is maintained by substrate availability and pyridoxal phosphate, not sympathetic tone. And it's not the NE→Epi step.",4:"COMT (catechol-O-methyltransferase) is a DEGRADATION enzyme for catecholamines — it metabolizes epinephrine and norepinephrine. It is not a synthetic enzyme and does not convert NE to epinephrine."},eli5:"The enzyme that makes epinephrine from norepinephrine is PNMT. What keeps PNMT active? Cortisol! This is a beautiful anatomical trick — cortisol from the adrenal cortex drains directly into the medulla (portal-like system), bathing the chromaffin cells in high-dose cortisol to keep PNMT running. The stress hormone (cortisol) literally fuels the fight-or-flight hormone (epinephrine) factory."},
{stem:"A patient on dexamethasone for brain edema is found to have significantly elevated blood glucose. Which mechanism best explains this?",choices:["A. Dexamethasone binds insulin receptors, directly blocking glucose uptake","B. Dexamethasone activates GRα → upregulates gluconeogenic enzymes (PEPCK, G6Pase) in liver and causes insulin resistance in muscle and fat","C. Dexamethasone stimulates glucagon secretion from pancreatic alpha cells via β-cell suppression","D. Dexamethasone inhibits CYP3A4, increasing cortisol levels which then cause hyperglycemia","E. Dexamethasone suppresses insulin secretion by binding to pancreatic GRβ receptors"],correct:1,explanation:"Dexamethasone (like all glucocorticoids) activates GRα → translocates to nucleus → binds GREs → upregulates key gluconeogenic enzymes in the liver: PEPCK (rate-limiting for gluconeogenesis) and G6Pase. Simultaneously, glucocorticoids cause insulin resistance in skeletal muscle and adipose tissue by impairing glucose transporter (GLUT4) translocation and post-receptor insulin signaling. This combination of increased hepatic glucose output + decreased peripheral uptake = steroid-induced hyperglycemia.",wrongExplanations:{0:"Glucocorticoids do not bind insulin receptors. Insulin resistance caused by glucocorticoids is post-receptor — impaired downstream signaling (IRS-1, Akt pathway) — not direct receptor blockade.",2:"Glucocorticoids do not primarily work through glucagon stimulation. While mild effects on islet cells exist, the dominant mechanism is hepatic gluconeogenesis upregulation and peripheral insulin resistance via GRα.",3:"This is backwards. Dexamethasone itself has negligible mineralocorticoid activity and does not inhibit CYP3A4 in a way that increases cortisol. Dexamethasone IS the active glucocorticoid — it doesn't work by raising cortisol.",4:"Glucocorticoids can impair insulin secretion, but this is a secondary/minor mechanism. The dominant cause of steroid-induced hyperglycemia is hepatic gluconeogenesis + peripheral insulin resistance via GRα, not direct pancreatic GRβ binding (which has no documented mechanism for this)."},eli5:"Dexamethasone is a powerful glucocorticoid — it acts exactly like cortisol on steroids (literally). It turns on liver genes to make more glucose (gluconeogenesis), and it makes fat and muscle cells ignore insulin (insulin resistance). So glucose pours into the blood from the liver, and can't get taken up by tissues — blood sugar skyrockets."},
{stem:"A patient's 24-hour urinary free cortisol is markedly elevated. You perform a high-dose dexamethasone suppression test and find cortisol is appropriately suppressed. What does this most likely indicate?",choices:["A. Primary adrenal adenoma secreting cortisol autonomously","B. Ectopic ACTH syndrome from a small cell lung cancer","C. Cushing's disease — a pituitary ACTH-secreting adenoma that is suppressible at high dexamethasone doses","D. Pseudo-Cushing's state due to chronic alcoholism","E. Adrenocortical carcinoma with excessive cortisol secretion"],correct:2,explanation:"The dexamethasone suppression test exploits the negative feedback of the HPA axis. Pituitary ACTH-secreting adenomas (Cushing's disease) have a relatively preserved (though abnormal) feedback set-point — they suppress cortisol with HIGH-dose but not low-dose dexamethasone. This is the classic high-dose suppression test result pointing to a pituitary source. Primary adrenal tumors and ectopic ACTH sources are fully autonomous and do NOT suppress with any dose of dexamethasone.",wrongExplanations:{0:"A primary adrenal adenoma produces cortisol independently of ACTH — it is fully autonomous and would NOT suppress with high-dose dexamethasone (or any dose). It would also show low ACTH on labs.",1:"Ectopic ACTH syndrome (e.g., from lung cancer) is a fully autonomous ACTH source — it has no glucocorticoid receptors responding to negative feedback. It would NOT suppress with high-dose dexamethasone.",3:"Pseudo-Cushing's (alcoholism, severe depression) elevates cortisol but the HPA axis retains normal feedback. A pseudo-Cushing's state would typically show suppression even on LOW-dose dexamethasone testing — the feedback isn't as abnormally elevated.",4:"Adrenocortical carcinoma is an autonomous primary adrenal tumor — like an adrenal adenoma, it would NOT suppress with dexamethasone (low or high dose). ACTH would be low due to negative feedback from the high cortisol."},eli5:"High-dose dexamethasone is a big suppression signal. A normal pituitary adenoma (Cushing's disease) still partly responds to this massive signal and suppresses cortisol — it's abnormal but not completely rogue. A primary adrenal tumor or ectopic ACTH source doesn't care at all — they're fully autonomous. So 'suppresses with high dose but not low dose' = pituitary source."},
{stem:"A patient with secondary adrenal insufficiency is started on hydrocortisone replacement but develops worsening weakness, nausea, and orthostatic hypotension despite adequate cortisol levels. What is the most likely explanation?",choices:["A. Overdose of hydrocortisone is suppressing the residual pituitary function","B. Secondary adrenal insufficiency occasionally has concurrent aldosterone deficiency that was not initially apparent","C. Hydrocortisone is converted to cortisone by 11β-HSD, making it ineffective","D. Cortisol replacement has unmasked concurrent central hypothyroidism (common in panhypopituitarism)","E. The patient has developed autoimmune gastritis causing poor hydrocortisone absorption"],correct:3,explanation:"Secondary adrenal insufficiency from pituitary disease is often part of panhypopituitarism. Central hypothyroidism (low TSH → low T4) is common and can coexist. Starting cortisol replacement alone may unmask hypothyroidism for two reasons: (1) cortisol increases hepatic clearance of thyroid hormones, (2) the improvement in cortisol physiology reveals that thyroid deficiency was also contributing to symptoms. Classic teaching: always evaluate for and treat central hypothyroidism alongside adrenal insufficiency in panhypopituitarism.",wrongExplanations:{0:"Adequate hydrocortisone doses do not suppress 'residual pituitary function' in a dangerous way — the pituitary is already compromised in secondary AI. This doesn't explain the new/ongoing symptoms.",1:"Secondary adrenal insufficiency (pituitary dysfunction) typically spares aldosterone because aldosterone is primarily regulated by the renin-angiotensin system, not ACTH. Aldosterone deficiency is the hallmark of PRIMARY, not secondary, AI. However, in very severe panhypopituitarism with low ACTH, some partial aldosterone reduction may occur — but this is NOT the classic or most likely explanation here.",2:"Hydrocortisone IS cortisol (or is rapidly converted to active form). 11β-HSD1 actually converts cortisone → cortisol in target tissues. Hydrocortisone is the active form and does not require conversion; it's not rendered ineffective.",4:"Autoimmune gastritis causing malabsorption is not a standard complication of secondary adrenal insufficiency specifically. The question is asking about pathophysiology in the context of pituitary disease."},eli5:"In panhypopituitarism (where the whole pituitary is failing), patients often also have low thyroid hormone (central hypothyroidism). Hypothyroidism slows everything down — weak, fatigued, low BP. Starting cortisol can actually 'unmask' hypothyroidism because cortisol increases thyroid hormone clearance and reduces TSH secretion. If you give cortisol without replacing thyroid hormone, the patient feels worse — or their hypothyroidism becomes clinically apparent."},
{stem:"A new once-daily antibiotic is being compared to a twice-daily standard antibiotic for community-acquired pneumonia. The study is designed to show the new drug is 'not meaningfully worse.' The key statistical threshold is set at Δ = 10%. What type of trial is this, and what must the confidence interval demonstrate to support the conclusion?",choices:["A. Superiority trial; CI must be entirely above 0","B. Equivalence trial; CI must be entirely within (−10%, +10%)","C. Non-inferiority trial; CI lower bound must be entirely above −10% (−Δ)","D. Non-inferiority trial; CI upper bound must be entirely above +10% (+Δ)","E. Superiority trial; CI must cross 0 to confirm no difference"],correct:2,explanation:"This is a non-inferiority trial — the goal is to show the new drug is not unacceptably inferior (not worse by more than Δ = 10%). The hypothesis is one-tailed: μ₁ − μ₀ > −Δ. The confidence interval approach: if the entire CI lies above −Δ (−10%), non-inferiority is declared. The upper end doesn't matter for a pure NI conclusion. If the CI also exceeds 0, you can additionally claim superiority.",wrongExplanations:{0:"Superiority requires CI entirely above 0. That's a different trial design — the goal is to prove the new drug is BETTER, not just not-worse. The clinical scenario clearly describes a non-inferiority design.",1:"Equivalence trials require the CI to fit within BOTH boundaries (−Δ and +Δ) — showing the drugs are similar in both directions. Non-inferiority only requires checking one side (the lower bound), not both.",3:"For non-inferiority, you check the LOWER bound of the CI against −Δ. The upper bound crossing +Δ is irrelevant for NI. If anything, upper bound criteria are relevant for equivalence trials.",4:"A CI that 'crosses 0' in a superiority trial means no significant difference — superiority NOT proven. That's the failure condition, not the success condition. Also, this is a non-inferiority trial, not superiority."},eli5:"The goal is to show 'not meaningfully worse' — that's non-inferiority. The danger zone is on one side only (the drug being WORSE by more than Δ). So you draw a line at −10% (−Δ) and ask: does the entire CI stay above that line? If yes, you've shown the new drug isn't worse by more than the acceptable margin."},
{stem:"In an equivalence trial comparing a generic drug to a brand-name drug, the CI for the treatment difference is (−3%, +12%) with Δ = 10%. What is the correct interpretation?",choices:["A. Equivalence is declared because the CI midpoint is close to 0","B. Equivalence is not declared because the CI extends beyond +Δ (+10%)","C. Non-inferiority is declared because the lower CI bound is above −Δ","D. Superiority of the generic drug is declared because the CI is mostly positive","E. Both equivalence and non-inferiority are declared"],correct:1,explanation:"For equivalence, the ENTIRE CI must lie within (−Δ, +Δ) = (−10%, +10%). The CI here is (−3%, +12%). The lower bound (−3%) is within the boundary, but the upper bound (+12%) EXCEEDS +Δ (+10%). Therefore, equivalence cannot be declared — the generic might be meaningfully better than the brand-name. However, note that the lower bound (−3%) is above −Δ, so non-inferiority IS technically demonstrated (a secondary finding).",wrongExplanations:{0:"The CI midpoint is not the criterion for equivalence. You need the ENTIRE CI (both bounds) to fall within ±Δ. Even if the midpoint is near 0, if the CI is wide and crosses a boundary, equivalence fails.",2:"Non-inferiority is technically demonstrated (lower bound −3% > −Δ −10%), but the question asks about the PRIMARY outcome of this EQUIVALENCE trial. The answer about equivalence NOT being declared is more directly correct for the question as asked.",3:"Superiority requires the CI to be entirely above 0. Here the CI includes negative values (goes down to −3%). Since it crosses 0, superiority of the generic is NOT declared.",4:"Equivalence is NOT declared (CI exceeds +Δ). Non-inferiority IS demonstrated as a secondary finding. But claiming both are declared is incorrect because the primary endpoint (equivalence) was not met."},eli5:"Equivalence means the CI must fit neatly inside the box (−10% to +10%). Here, the CI goes from −3% to +12%. It sticks out above +10% like a tail sticking out of the box. Since the whole CI doesn't fit inside, equivalence is NOT proven. The generic might actually be slightly better or different — we don't know."},
{stem:"A patient on dexamethasone is started on rifampin for tuberculosis. What change in dexamethasone dosing might be needed and why?",choices:["A. Decrease the dose — rifampin inhibits CYP3A4, increasing dexamethasone levels","B. Increase the dose — rifampin is a potent CYP3A4 inducer, markedly increasing dexamethasone metabolism and lowering plasma levels","C. No change needed — dexamethasone is not metabolized by CYP3A4","D. Decrease the dose — rifampin competes with dexamethasone for glucocorticoid receptor binding","E. Switch to prednisone — rifampin specifically inhibits dexamethasone but not other glucocorticoids"],correct:1,explanation:"Glucocorticoids including dexamethasone are metabolized by CYP3A4. Rifampin is one of the most potent CYP3A4 inducers known — it upregulates CYP3A4 expression dramatically (via PXR nuclear receptor). This causes rapid dexamethasone metabolism → significantly reduced plasma levels → therapeutic failure. Clinically, steroid doses often need to be increased substantially when rifampin is co-administered. This interaction is clinically critical in TB management when steroids are also required (e.g., TB meningitis).",wrongExplanations:{0:"Rifampin is an INDUCER, not an inhibitor of CYP3A4. CYP3A4 inhibitors (e.g., azole antifungals, ritonavir) would INCREASE dexamethasone levels. Rifampin does the opposite.",2:"Dexamethasone IS metabolized by CYP3A4 — this is explicitly stated in the pharmacokinetics section. All synthetic glucocorticoids are CYP3A4 substrates.",3:"Rifampin does not compete with dexamethasone for glucocorticoid receptor binding. Rifampin's effect is purely pharmacokinetic (enzyme induction), not pharmacodynamic (receptor competition).",4:"All synthetic glucocorticoids are CYP3A4 substrates to varying degrees. Rifampin induction affects the whole class, not just dexamethasone. There is no rifampin-dexamethasone specific interaction that spares other glucocorticoids."},eli5:"Rifampin turns on the liver's drug-destroying machinery (CYP3A4) like cranking a furnace to full blast. Dexamethasone is fuel that gets burned in that furnace. More furnace = less dexamethasone surviving long enough to work. You need to give more of it to compensate."},
{stem:"A patient with known secondary adrenal insufficiency develops an Addisonian crisis after missing several doses of hydrocortisone during a gastrointestinal illness. You administer stress-dose steroids. What additional concern must be addressed urgently?",choices:["A. Hyperkalemia — secondary AI also causes aldosterone deficiency, creating life-threatening electrolyte imbalance","B. Volume resuscitation with isotonic saline — hypotension from cortisol deficiency causes vasodilation and decreased cardiac output; IV fluids are critical","C. Antifungal prophylaxis — glucocorticoid deficiency dramatically increases susceptibility to candidal infections","D. Immediate thyroid hormone supplementation to prevent myxedema coma","E. Empiric antibiotics covering gram-negative organisms — cortisol deficiency impairs innate immunity within hours"],correct:1,explanation:"Adrenal crisis management requires TWO simultaneous interventions: (1) rapid IV glucocorticoid (hydrocortisone 100mg IV bolus) and (2) aggressive IV isotonic saline resuscitation. Cortisol is essential for vascular tone (upregulates α-adrenergic receptor expression and angiotensin II sensitivity). Without it, profound vasodilation and reduced cardiac responsiveness cause distributive shock. IV fluids address the hemodynamic collapse while hydrocortisone corrects the underlying deficiency.",wrongExplanations:{0:"Hyperkalemia is more characteristic of PRIMARY adrenal insufficiency (where aldosterone is also lost). In secondary AI, aldosterone is preserved (regulated by renin-angiotensin, not ACTH). Electrolyte abnormalities are much milder in secondary AI.",2:"While glucocorticoid deficiency does impair immune function long-term, acute candidal infection from missing a few doses is not the immediate urgent concern. Candidal prophylaxis is not standard acute management.",3:"While panhypopituitarism can involve central hypothyroidism, myxedema coma is a separate and subacute complication. The IMMEDIATE urgency in adrenal crisis is hemodynamic — fluid resuscitation and steroids come first.",4:"Empiric antibiotics are appropriate if infection triggered the crisis (treat the precipitating cause), but they are not the 'additional urgent concern' — fluids are. Cortisol deficiency impairs immunity over weeks, not hours."},eli5:"In adrenal crisis, the patient is crashing in large part because cortisol helps maintain vascular tone and blood pressure. Without it, blood vessels dilate and cardiac output falls — basically the blood pressure drops dangerously. The steroid helps, but you also need to flood the system with saline to refill the tank and restore blood pressure."},
{stem:"A pharmaceutical company wants to show their new antihypertensive is MORE effective than placebo in reducing systolic BP. They design a parallel-group RCT. What are the correct hypothesis type and primary statistical threshold?",choices:["A. One-tailed hypothesis; non-inferiority margin Δ is the key threshold","B. Two-tailed hypothesis; CI entirely above 0 confirms superiority","C. Two-tailed hypothesis; CI must cross 0 to confirm no difference","D. One-tailed hypothesis; CI must be entirely within ±Δ","E. Two-tailed hypothesis; CI must be below 0 to show BP is reduced"],correct:1,explanation:"Superiority trials use a two-tailed hypothesis (μ₁ − μ₀ ≠ 0) because the design acknowledges the drug could potentially be worse or better. To declare superiority, the entire confidence interval must lie above 0 (in the direction of benefit). P-value < 0.05 AND CI above 0 are reported. Note that the outcome direction matters: if measuring BP reduction (effect = new drug BP − placebo BP), a positive value means MORE reduction (good), so CI above 0 = benefit.",wrongExplanations:{0:"One-tailed hypothesis and non-inferiority margins are features of NON-INFERIORITY trials, not superiority trials. Superiority vs placebo uses a two-tailed design to test whether the drug is different from (and specifically better than) placebo.",2:"CI crossing 0 means NO significant difference — this is the null/failure result, not the success criterion. A CI crossing 0 would mean the superiority trial failed to show benefit.",3:"CI within ±Δ is the criterion for EQUIVALENCE trials. Superiority requires CI entirely on one side of 0.",4:"Direction depends on how the outcome is defined. If BP outcome is defined as drug − placebo BP (where negative = drug lowers BP more), CI below 0 might indicate benefit. But the statement 'CI below 0 to show superiority' as an absolute rule is wrong — the key is that CI doesn't cross the neutral value (0) in the unfavorable direction."},eli5:"Trying to prove 'better than placebo' = superiority trial. Two-tailed because you're looking for any significant difference (the drug could theoretically be better OR worse — and you need to show it's specifically better). If the whole CI is above zero, the new drug is better. But if CI crosses zero, there's no significant benefit."},
{stem:"Cortisol is known to be anti-inflammatory. At the molecular level, which mechanism best explains suppression of the inflammatory response by cortisol?",choices:["A. Cortisol binds TLR4 receptors on macrophages, preventing NF-κB from recognizing LPS","B. Cortisol-GRα complex induces transcription of IκBα (NF-κB inhibitor) and lipocortin-1 (annexin-1), and directly transrepresses pro-inflammatory gene promoters by binding AP-1 and NF-κB","C. Cortisol inhibits cyclooxygenase-2 (COX-2) by competitively binding its active site","D. Cortisol stimulates IL-10 secretion from T-regulatory cells by binding IL-10 receptor promoters","E. Cortisol causes apoptosis of all immune cells by activating p53 transcription"],correct:1,explanation:"The GRα-cortisol complex has multiple anti-inflammatory mechanisms: (1) Transactivation — GRα binds GREs to induce IκBα (inhibitor of NF-κB, blocking inflammatory gene expression) and annexin-1/lipocortin-1 (inhibits phospholipase A2, blocking arachidonic acid release and downstream prostaglandin/leukotriene synthesis); (2) Transrepression — GRα physically interacts with AP-1 and NF-κB transcription factors to directly suppress their target inflammatory gene transcription, including COX-2, TNF-α, IL-1, IL-6, and iNOS.",wrongExplanations:{0:"Cortisol does not bind TLR4 receptors. TLR4 is a pattern recognition receptor on innate immune cells. Cortisol's anti-inflammatory effects are via intracellular GR, not surface TLR4 binding.",2:"NSAIDs (like ibuprofen) competitively inhibit COX-2. Cortisol does NOT directly inhibit COX-2 by binding to it. Cortisol reduces COX-2 EXPRESSION through transrepression of NF-κB — a transcriptional, not enzymatic, mechanism.",3:"While cortisol can influence IL-10 indirectly, it does not 'stimulate IL-10 secretion by binding IL-10 receptor promoters' as a primary anti-inflammatory mechanism. The dominant mechanisms are IκBα induction and transrepression of AP-1/NF-κB.",4:"Cortisol does induce apoptosis of certain immune cells (particularly lymphocytes and eosinophils — basis of steroid therapy in leukemia and allergy), but it does not cause apoptosis of ALL immune cells, and the mechanism is GR-mediated, not via p53 (which responds to DNA damage). Macrophages and neutrophils are largely resistant to steroid-induced apoptosis."},eli5:"Cortisol fights inflammation on two fronts: (1) it turns ON genes that make proteins which block the inflammation switch (NF-κB inhibitor = IκBα), and (2) it physically blocks the inflammation switch itself by grabbing onto it (transrepression of NF-κB and AP-1). It also turns on lipocortin-1 which blocks the whole arachidonic acid cascade that leads to prostaglandins and leukotrienes."},
{stem:"An investigator reports: 'Our new drug met non-inferiority in the per-protocol analysis but NOT in the intention-to-treat (ITT) analysis.' What is the correct regulatory/clinical interpretation?",choices:["A. Non-inferiority is established; per-protocol analysis is the gold standard for NI trials","B. Non-inferiority is uncertain; NI trials require BOTH per-protocol AND ITT analyses to confirm the result — discordance weakens the claim","C. ITT is irrelevant for NI trials; per-protocol meeting non-inferiority is sufficient for approval","D. The trial failed — ITT is the only valid analysis for any clinical trial","E. The discordance means the drug is superior in compliant patients but inferior in real-world use"],correct:1,explanation:"Non-inferiority trials have a unique requirement: BOTH per-protocol (PP) AND intention-to-treat (ITT) analyses must demonstrate non-inferiority for a robust conclusion. The rationale: ITT typically biases toward the null (makes drugs look similar) — so if ITT doesn't show NI, it's particularly concerning. PP analysis selects per-protocol completers (most favorable). Discordance (PP meets NI, ITT doesn't) is a red flag that the NI conclusion is not reliable. Regulatory agencies (FDA, EMA) require both analyses to be concordant for NI claims.",wrongExplanations:{0:"Per-protocol is NOT the sole gold standard for NI trials. Unlike superiority trials (where ITT is king), NI trials require BOTH. PP alone is insufficient for regulatory approval of an NI claim.",2:"ITT is absolutely relevant for NI trials — perhaps more so than for superiority trials. The unique requirement of NI trials to show both ITT and PP analysis is a well-established regulatory standard.",3:"ITT alone is not the only valid analysis in all clinical trials. For superiority trials, ITT is primary. For NI trials, BOTH are needed. Saying 'the trial failed' only based on ITT is too strong — the result is inconclusive/uncertain.",4:"This interpretation (superior in compliant, inferior in real-world) is a possible inference, but it's not the standard regulatory interpretation. The proper interpretation is that NI is unproven due to discordant results — it doesn't mean inferiority is proven in ITT."},eli5:"In non-inferiority trials, you need to pass TWO tests: ITT AND per-protocol. Why? Because ITT analysis (counting everyone including dropouts and protocol violators) tends to DILUTE differences — making drugs look more similar. If the drug only looks non-inferior when you cherry-pick the most compliant patients (per-protocol) but not in the full analysis (ITT), that's suspicious. You need both to be confident."},
{stem:"A patient with Cushing's syndrome due to an adrenal adenoma has been in remission for 2 years after surgical resection. His HPA axis function is being reassessed. Which pattern best describes the expected recovery?",choices:["A. Full HPA recovery within 2 weeks post-surgery; ACTH and CRH normalize first, then cortisol","B. Prolonged HPA suppression lasting months to over a year; ACTH recovers before adrenal cortex function, but full recovery varies","C. Permanent HPA axis damage; lifelong glucocorticoid replacement is always required after adrenal adenoma","D. Immediate overshoot of ACTH post-surgery causing secondary adrenal hyperplasia","E. The contralateral adrenal gland maintains normal cortisol output, so no HPA suppression occurs"],correct:1,explanation:"Prolonged cortisol excess from an autonomous adrenal adenoma chronically suppresses CRH and ACTH, causing atrophy of both pituitary corticotrophs and the contralateral adrenal cortex. After resection, HPA axis recovery is delayed and can take 6–24 months. The sequence: CRH and ACTH begin to recover first as pituitary corticotrophs regenerate, followed by gradual restoration of adrenal responsiveness. Patients require glucocorticoid replacement (tapering) during recovery. Recovery timing is unpredictable and must be assessed periodically with stimulation testing.",wrongExplanations:{0:"Two-week recovery is far too optimistic. Prolonged cortisol excess causes adrenal atrophy and pituitary corticotroph suppression that takes months to reverse. 'ACTH normalizes first, then cortisol' is directionally correct, but the timeline is wrong.",2:"Permanent HPA damage is not the expected outcome. Most patients do eventually recover full HPA function, though the timeline varies and some patients may have prolonged recovery. 'Always requires lifelong replacement' overstates the permanence.",3:"An 'ACTH overshoot causing secondary hyperplasia' does not occur in this scenario. ACTH recovery is gradual as corticotrophs regenerate. Massive ACTH surge causing hyperplasia is not the clinical course after adrenal adenoma resection.",4:"The contralateral adrenal was also suppressed by the chronically high cortisol from the adenoma — it undergoes atrophy just like the ipsilateral non-adenomatous tissue. It does NOT maintain normal output. This is why patients need steroid replacement post-operatively."},eli5:"The autonomous adrenal tumor was pumping out cortisol for years, completely shutting off the HPA axis. The pituitary and hypothalamus essentially forgot how to work. After the tumor is removed, the body suddenly has no cortisol — but the pituitary/hypothalamus don't spring back immediately. Recovery is slow, taking months to over a year. ACTH usually comes back first, then the remaining adrenal tissue starts responding."}]
